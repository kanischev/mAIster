schemaVersion: 2
# Dogfood registration: MAIster registers itself (T8). The AIF package is
# consumed as ONE packages[] import (ADR-088) from the public maister-plugins
# git repo, tag-pinned — portable across hosts (the stand clones it over HTTPS).
# No repo_path here: registration derives the project's repo location from the
# resolved source (clone target in clone-mode, the provided dir in
# existing-mode), never from this file.
project:
  name: maister
  main_branch: main
  branch_prefix: maister/
  default_runner: claude-code
packages:
  - id: aif
    source: https://github.com/kanischev/maister-plugins
    version: aif/v2.0.0
    path: packages/aif
flows: []
