schemaVersion: 2
# Dogfood registration: MAIster registers itself (T8). repo_path is the main
# checkout (a launch does `git worktree add` off it). The AIF package is
# consumed as ONE packages[] import (ADR-088) from the local maister-plugins
# checkout — file:// for local dogfood; the production shape is the git URL
# with the same tag. Machine-specific absolute paths — local dogfood artifact,
# not for main.
project:
  name: maister
  repo_path: /Users/kaa/Work/Projects/Personal/mAIster
  main_branch: main
  branch_prefix: maister/
  default_runner: claude-code
packages:
  - id: aif
    source: file:///Users/kaa/Work/Projects/Personal/maister-plugins
    version: aif/v2.0.0
    path: packages/aif
flows: []
