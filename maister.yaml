schemaVersion: 2
# Dogfood registration: MAIster registers itself (T8). The AIF package is
# consumed as ONE packages[] import (ADR-088) from the maister-plugins git
# repo, tag-pinned — portable across hosts (the stand clones it over HTTPS,
# the repo is public). `repo_path` below is a machine-local absolute path that
# is ONLY read for "existing"-mode registration; clone-mode (the default)
# ignores it and uses the clone target dir instead.
project:
  name: maister
  repo_path: /Users/kaa/Work/Projects/Personal/mAIster
  main_branch: main
  branch_prefix: maister/
  default_runner: claude-code
packages:
  - id: aif
    source: https://github.com/kanischev/maister-plugins
    version: aif/v2.0.0
    path: packages/aif
flows: []
