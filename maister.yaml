schemaVersion: 2
# Dogfood registration: MAIster registers itself (T8). repo_path is the main
# checkout (a launch does `git worktree add` off it); the flow + capability
# sources point at the extracted AIF package in the local maister-plugins
# checkout (ADR-087; installFlow auto-detects file:// and copies into the
# ~/.maister cache). After P1 this collapses to one `packages[]` entry
# ({source: maister-plugins, path: packages/aif, version: aif/v2.0.0}).
# Machine-specific absolute paths — local dogfood artifact, not for main.
project:
  name: maister
  repo_path: /Users/kaa/Work/Projects/Personal/mAIster
  main_branch: main
  branch_prefix: maister/
  default_runner: claude-code
capability_imports:
  - id: aif-bundle
    source: file:///Users/kaa/Work/Projects/Personal/maister-plugins/packages/aif/capability
    version: local-dev
flows:
  - id: aif-dev
    source: file:///Users/kaa/Work/Projects/Personal/maister-plugins/packages/aif/flows/dev
    version: local-dev
  - id: aif-bugfix
    source: file:///Users/kaa/Work/Projects/Personal/maister-plugins/packages/aif/flows/bugfix
    version: local-dev
  - id: aif-evolve
    source: file:///Users/kaa/Work/Projects/Personal/maister-plugins/packages/aif/flows/evolve
    version: local-dev
  - id: aif-roadmap
    source: file:///Users/kaa/Work/Projects/Personal/maister-plugins/packages/aif/flows/roadmap
    version: local-dev
  - id: aif-init
    source: file:///Users/kaa/Work/Projects/Personal/maister-plugins/packages/aif/flows/init
    version: local-dev
