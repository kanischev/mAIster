schemaVersion: 1
name: aif-init
metadata:
  title: "AIF — Init"
  summary: "One-time project configuration: AIF context + architecture (no npm)."
  labels: [setup, onboarding]
  route_when: "One-time: project not yet AIF-initialized."
  links:
    - { kind: framework, title: "AI Factory 2.x", url: "https://github.com/lee-to/ai-factory/tree/2.x" }
    - { kind: docs, title: "Configuration", url: "https://github.com/lee-to/ai-factory/blob/2.x/docs/configuration.md" }
  sources:
    - { component: "skills/aif-*, agents/*", origin: "github.com/lee-to/ai-factory@2.x" }
runner_profiles:
  claude-code:
    capability_agent: claude
    adapter: claude
    model: claude-sonnet-4-6
    provider:
      kind: anthropic
compat:
  engine_min: 1.1.0
nodes:
  - id: setup
    type: ai_coding
    action:
      prompt: "/aif {{ task.prompt }}"
    transitions:
      success: architecture

  - id: architecture
    type: ai_coding
    action:
      prompt: "/aif-architecture"
    transitions:
      success: review

  - id: review
    type: human
    finish:
      human:
        role: maintainer
        decisions: [approve]
        commentsVar: review_comments
    transitions:
      approve: commit

  - id: commit
    type: ai_coding
    action:
      prompt: "/aif-commit"
    pre_finish:
      gates:
        - id: commit-gate
          kind: command_check
          mode: blocking
          command: "test -z \"$(git status --porcelain --untracked-files=no)\" && git log -1 --pretty=%s | grep -Eq '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\\([^)]+\\))?!?: .+'"
    transitions:
      success: done
