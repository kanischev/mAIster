# MAIster reverse proxy — terminates TLS, proxies to Next.js on 127.0.0.1:3000.
# Copy to /etc/nginx/sites-available/maister, symlink into sites-enabled,
# obtain certs (certbot --nginx -d maister.example.com), then `nginx -t && systemctl reload nginx`.
# Caddy equivalent: a single `reverse_proxy 127.0.0.1:3000` site with `flush_interval -1` on /api/runs/.

server {
    listen 80;
    server_name maister.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name maister.example.com;

    ssl_certificate     /etc/letsencrypt/live/maister.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maister.example.com/privkey.pem;

    # Run-event SSE stream (GET /api/runs/<id>/stream) — buffering MUST be off,
    # read timeout long, otherwise the live timeline stalls behind nginx.
    location /api/runs/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
