# Local TEST fixture for node-output.integration.test.ts — NOT a shipped flow.
# Exercises the M26 P1 structured-output channel end-to-end: the ai_coding
# node emits the ```json maister:output sentinel block (validated against
# ./schemas/result.json) and the downstream cli node renders the captured
# vars via {{ steps.plan.vars.* }}. output.result requires engine_min 1.3.0.
schemaVersion: 1
name: m26-output
compat:
  engine_min: 1.3.0
nodes:
  - id: plan
    type: ai_coding
    action:
      prompt: "plan {{ task.prompt }}"
    output:
      result:
        schema: ./schemas/result.json
    transitions:
      success: use

  - id: use
    type: cli
    action:
      command: 'echo "got:{{ steps.plan.vars.verdict }}"'
    transitions:
      success: done
