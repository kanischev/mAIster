# Local TEST fixture for runner.integration.test.ts — NOT a shipped flow.
# Restores the original single-graph `aif` manifest (plan -> implement -> checks
# -> judge -> review) that lived at plugins/aif/flow.yaml before that package was
# restructured into a multi-flow bundle. The runner integration test is
# deliberately decoupled from plugins/aif (flow packages move to their own repos),
# so it carries its own fixture here. `setup:` is dropped (a runner test never
# needs the install hook); everything else is verbatim.
schemaVersion: 1
name: aif
runner_profiles:
  claude-code:
    capability_agent: claude
    adapter: claude
    model: claude-sonnet-4-6
    provider:
      kind: anthropic
# Flow graph v1 (M11a, ADR-026): uses `nodes[]`, so engine_min >= 1.1.0.
# M12 (ADR-033): typed artifacts (produces/requires/artifact_required gate)
# require engine_min >= 1.2.0.
compat:
  engine_min: 1.2.0
# M15 (ADR-048): flow-level calibration default — folded into each
# ai_judgment/skill_check gate at compile time.
verdict_calibration:
  confidence_min: 0.7
capabilities:
  - shell
  - edit
artifacts:
  - diff
  - human_note
nodes:
  - id: plan
    type: ai_coding
    action:
      prompt: "/aif-plan {{ task.prompt }}"
    output:
      produces:
        - id: plan-summary
          kind: human_note
    transitions:
      success: implement

  - id: implement
    type: ai_coding
    action:
      prompt: "/aif-implement"
    input:
      requires:
        - artifact: plan-summary
          kind: human_note
    output:
      produces:
        - id: impl-diff
          kind: diff
          requiredFor: [review, merge]
    settings:
      tools:
        claude: [Read, Edit, Bash]
      skills: [aif-implement]
      permissionMode: ask
      limits:
        maxDurationMinutes: 60
      enforcement:
        tools: instruct
        skills: instruct
        permissionMode: instruct
    transitions:
      success: checks

  - id: checks
    type: check
    action:
      command: "pnpm -s lint"
    output:
      produces:
        - id: lint-report
          kind: lint_report
    transitions:
      success: judge

  - id: judge
    type: judge
    action:
      prompt: "Review the implementation diff against the task requirements. Reply with a JSON verdict object {\"verdict\":\"pass\"|\"fail\",\"confidence\":0-1,\"reasons\":[...],\"recommendedAction\":\"...\"}."
    input:
      requires:
        - artifact: impl-diff
          kind: diff
        - artifact: lint-report
          kind: lint_report
    output:
      produces:
        - id: judge-verdict
          kind: ai_judgment
    transitions:
      success: review

  - id: review
    type: human
    input:
      requires:
        - artifact: judge-verdict
          kind: ai_judgment
    pre_finish:
      gates:
        - id: impl-diff-required
          kind: artifact_required
          mode: blocking
          inputArtifacts: [impl-diff]
        - id: ai-quality-advisory
          kind: ai_judgment
          mode: advisory
          prompt: >
            Assess the implementation diff against the task requirements.
            Reply with a JSON object:
            {"verdict":"pass"|"fail","confidence":0-1,"reasons":[...]}
    finish:
      human:
        role: maintainer
        decisions: [approve, rework, takeover]
        commentsVar: review_comments
    transitions:
      approve: done
      rework: implement
      takeover: checks
    rework:
      allowedTargets: [implement]
      workspacePolicies: [keep]
      maxLoops: 3
      commentsVar: review_comments
