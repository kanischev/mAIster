name: ${COMPOSE_PROJECT_NAME:-maister}

services:
  app:
    build:
      context: .
      target: production
    image: ${MAISTER_IMAGE:-maister/app:dev}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_URL: ${DB_URL:-postgres://maister:maister@postgres:5432/maister}
      MAISTER_MAX_CONCURRENT_RUNS: ${MAISTER_MAX_CONCURRENT_RUNS:-1}
      MAISTER_SUPERVISOR_URL: ${MAISTER_SUPERVISOR_URL:-http://supervisor:7777}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - maister_runtime:/app/.maister
      - ${MAISTER_REPOS_HOST_PATH:-${HOME}/.maister}:/repos
    depends_on:
      postgres:
        condition: service_healthy
      supervisor:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  supervisor:
    build:
      context: .
      target: production
    image: ${MAISTER_IMAGE:-maister/app:dev}
    command: ["pnpm", "--filter", "@maister/supervisor", "start"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      MAISTER_SUPERVISOR_PORT: ${MAISTER_SUPERVISOR_PORT:-7777}
      MAISTER_RUNTIME_ROOT: /app
      MAISTER_HEARTBEAT_INTERVAL_MS: ${MAISTER_HEARTBEAT_INTERVAL_MS:-5000}
      MAISTER_KILL_GRACE_MS: ${MAISTER_KILL_GRACE_MS:-5000}
      MAISTER_SHUTDOWN_GRACE_MS: ${MAISTER_SHUTDOWN_GRACE_MS:-15000}
      MAISTER_KEEPALIVE_MINUTES: ${MAISTER_KEEPALIVE_MINUTES:-30}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - maister_runtime:/app/.maister
      - ${MAISTER_REPOS_HOST_PATH:-${HOME}/.maister}:/repos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:7777/sessions').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maister}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maister}
      POSTGRES_DB: ${POSTGRES_DB:-maister}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maister} -d ${POSTGRES_DB:-maister}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  maister_runtime:
