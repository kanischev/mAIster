name: ${COMPOSE_PROJECT_NAME:-maister}

# Only Postgres is containerized. `web` and `supervisor` run on the host via
# pnpm (they spawn agent CLIs, need host agent auth, and operate on host git
# repos / worktrees) — see ADR-023 and `CLAUDE.md` "How to run".
services:
  postgres:
    # ADR-122 (Project Brain): pgvector-enabled PG16 — the brain lineage does
    # `CREATE EXTENSION vector` + HNSW. Data-compatible with `postgres:16-alpine`
    # (same PG16 data dir), so the swap needs no dump/restore of postgres_data.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maister}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maister}
      POSTGRES_DB: ${POSTGRES_DB:-maister}
    ports:
      # Host-run web + supervisor connect over loopback (DB_URL=…@localhost:5432).
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maister} -d ${POSTGRES_DB:-maister}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
