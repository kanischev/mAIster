x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

x-security: &default-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

# Production hardening overlay for the only containerized service, Postgres.
# `web` and `supervisor` run on the host (see ADR-023); the base file's
# 127.0.0.1:5432 publish lets them reach Postgres over loopback.
services:
  postgres:
    # ADR-122 (Project Brain): pgvector-enabled PG16, data-compatible with
    # `postgres:16-alpine` (same PG16 data dir). Matches the base compose image.
    image: pgvector/pgvector:pg16
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
      - /run/postgresql:noexec,nosuid,size=50m
    <<: *default-security
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
          pids: 256
    logging: *default-logging
    restart: unless-stopped

networks:
  default:
    driver: bridge
    internal: false
