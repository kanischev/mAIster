name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled]

jobs:
  lint-typecheck-unit:
    name: lint + typecheck + unit (web + supervisor)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (monorepo root)
        run: pnpm install --frozen-lockfile

      - name: Lint (web)
        run: pnpm --filter maister-web lint

      - name: Typecheck (web)
        run: pnpm --filter maister-web typecheck

      - name: Unit tests (web)
        run: pnpm --filter maister-web test:unit

      - name: Lint (supervisor)
        run: pnpm --filter @maister/supervisor lint

      - name: Typecheck (supervisor)
        run: pnpm --filter @maister/supervisor typecheck

      - name: Unit tests (supervisor)
        run: pnpm --filter @maister/supervisor test:unit

      - name: Integration tests (supervisor)
        run: pnpm --filter @maister/supervisor test:integration

  integration:
    name: integration tests (web testcontainers)
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'integration')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (monorepo root)
        run: pnpm install --frozen-lockfile

      - name: Integration tests (web)
        run: pnpm --filter maister-web test:integration
