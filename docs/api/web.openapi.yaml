      operationId: replayProjectWebhookDelivery
      parameters:
        - { $ref: "#/components/parameters/ProjectSlug" }
        - { $ref: "#/components/parameters/WebhookId" }
        - { $ref: "#/components/parameters/DeliveryId" }
      responses:
        "202":
          description: Delivery re-queued; it will be re-sent on the next drain.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: |
            Delivery is currently `pending` and cannot be replayed (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

components:
  securitySchemes:
    cronToken:
      type: apiKey
      in: header
      name: X-Maister-Cron-Token
      description: |
        Shared-secret header for the GC cron route, compared in constant time
        to `MAISTER_CRON_TOKEN`. Server-only secret — never logged or streamed.
        Unset token disables the route (503). Not an Auth.js session.
    projectToken:
      type: http
      scheme: bearer
      description: |
        External API bearer token for the `/api/v1/ext/` surface (M16,
        ADR-041; global personal tokens Implemented by 0063). Project-bound
        tokens carry `project_id`; global personal user tokens carry
        `project_id = NULL` and authorize per addressed project through the
        owner account. Format: `mai_` + base64url(randomBytes(32)). Stored as
        sha256 hex at rest; compared with `timingSafeEqual`; never logged or
        streamed. Tokens carry route scopes; `*` grants the project external
        API except exact-only human-HITL approval (`hitl:respond:human`).
        Token failures map to 401, 403, or 404 per the existence-hide and
        missing-scope policies. Used only by
        `docs/api/external/operations.openapi.yaml` routes; session-auth routes
        do not accept tokens.
  parameters:
    ProjectSlug:
      name: slug
      in: path
      required: true
      description: Kebab-case project slug (derived from `project.name`).
      schema: { type: string }
    WebhookId:
      name: id
      in: path
      required: true
      description: Webhook subscription id (`webhook_subscriptions.id`).
      schema: { type: string }
    DeliveryId:
      name: deliveryId
      in: path
      required: true
      description: |
        Delivery id (`webhook_deliveries.id`). MUST belong to the subscription
        in the same path (server-state join; mismatch → 404).
      schema: { type: string }
    DeliveryCursor:
      name: cursor
      in: query
      required: false
      description: Opaque newest-first paging cursor returned as `nextCursor`.
      schema: { type: string }
    DeliveryLimit:
      name: limit
      in: query
      required: false
      description: Page size for the delivery log (default 50).
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
  responses:
    Unauthenticated:
      description: No valid session (`UNAUTHENTICATED`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    Forbidden:
      description: |
        Caller lacks the required project role (`UNAUTHORIZED`) or the account
        must change its password first (`PASSWORD_CHANGE_REQUIRED`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    NotFound:
      description: |
        (M22) Resource genuinely not found: unknown run/project, a run with no
        flow/manifest, or a path not in the git-tracked tree. A bare HTTP 404 —
        NOT a thrown `MaisterError` (it does not map `PRECONDITION`, whose status
        is 409). Access denied (non-member / below-`member` role) is 403, not 404.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/NotFoundBody" }
    Precondition:
      description: Precondition failed or conflict (`PRECONDITION` / `CONFLICT`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    Conflict:
      description: State conflict (`PRECONDITION` / `CONFLICT`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    Config:
      description: Invalid body or incompatible package (`CONFIG`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    FlowInstall:
      description: Flow package install/upgrade failed (`FLOW_INSTALL`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    OkResult:
      description: Action succeeded.
      content:
        application/json:
          schema:
            type: object
            required: [ok]
            properties:
              ok: { type: boolean, enum: [true] }
  schemas:
    InboxCardContext:
      type: object
      description: |
        Designed (inbox card redesign). Lazy per-card decision context loaded when
        an inbox HITL card is expanded. Explicit DTO — no DB rows or server-only
        handles. Every field is nullable: a source that cannot be read degrades to
        `null` rather than failing the request.
      additionalProperties: false
      required: [lastAgentMessage, gates, diff, progress]
      properties:
        lastAgentMessage:
          nullable: true
          type: object
          additionalProperties: false
          required: [text, at]
          properties:
            text: { type: string }
            at: { type: string, format: date-time }
          description: Trailing coalesced `agent_message_chunk` from `run.events.jsonl`.
        gates:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [gateId, kind, mode, status]
            properties:
              gateId: { type: string }
              kind:
                type: string
                enum: [command_check, skill_check, ai_judgment, artifact_required, external_check, human_review]
              mode: { type: string, enum: [blocking, advisory] }
              status:
                type: string
                enum: [pending, running, passed, failed, stale, skipped, overridden]
          description: Gates of the run's current node attempt (`getRunNodeStatuses`).
        diff:
          nullable: true
          type: object
          additionalProperties: false
          required: [files, additions, deletions]
          properties:
            files: { type: integer }
            additions: { type: integer }
            deletions: { type: integer }
          description: Changed-files summary (`prepareDiffSummary`); no code payload.
        progress:
          nullable: true
          type: object
          additionalProperties: false
          required: [done, total]
          properties:
            done: { type: integer }
            total: { type: integer }
          description: Node progress (graph runs; legacy runs derive from the board spine).
    PostProjectBody:
      type: object
      description: |
        Project source union (ADR-025, extended by
        [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons)).
        Supply at least one of `repoUrl` or `target`. With `repoUrl` and no
        `target`, MAIster clones into `MAISTER_REPOS_ROOT` under a name derived
        from the URL; pass `target` to override that name (or to register an
        existing local directory when `repoUrl` is omitted). Deep path/URL
        validation runs server-side before any filesystem access.

        **(Implemented)** `maister.yaml` is **optional** at manual registration:
        when the resolved repo has no manifest the project registers from DB
        defaults (repo untouched, `maister_yaml_path = null`). `mode` selects
        the onboarding mode; `name` is the explicit project name used when no
        manifest is present; `token` is a one-off HTTPS clone credential. All
        are `body-controlled` creation attributes, each independently validated
        server-side (`mode` allow-list; `name` → `deriveSlug`; `token` →
        askpass secret handling — never persisted).
      minProperties: 1
      properties:
        repoUrl:
          type: string
          minLength: 1
          maxLength: 2048
          description: |
            Git URL to clone (https / http / ssh / scp `git@host:org/repo`
            / file). Cloned non-interactively with the host's credentials —
            MAIster stores no provider secrets. The URL is credential-redacted
            in logs and errors. Omit to register an existing local directory.
          example: https://github.com/org/my-app
        target:
          type: string
          minLength: 1
          maxLength: 4096
          description: |
            With `repoUrl`: overrides the clone's on-disk directory name (a
            single safe path segment, or an absolute path). Without `repoUrl`:
            the existing local directory to register (absolute, no `..`
            segment); `git init`-ed when it is not yet a git repo. With
            `mode: new` (and no `repoUrl`): the directory to create — a bare
            name placed under `MAISTER_REPOS_ROOT`, or an absolute path that
            must not already exist.
          example: /repos/my-app
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: |
            **(Implemented,
            [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons))**
            Explicit project name. Used **only when the resolved repo has no
            `maister.yaml`** — precedence is `yaml.project.name` >
            `body.name` > `path.basename(resolvedDir)`. The slug is derived
            from it server-side (kebab-case); never body-derived directly.
          example: My App
        mode:
          type: string
          enum: [clone, existing, new]
          description: |
            **(Implemented,
            [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons))**
            Onboarding mode. Optional and **inferred** when omitted: `clone`
            when `repoUrl` is present, `existing` when only `target` is present.
            `new` (greenfield `mkdir -p` + `git init`) MUST be explicit — it is
            never inferred, so a typo'd path never silently creates a directory.
            The server re-validates the resolved path against `mode` (intent,
            not blind trust).
          example: clone
        token:
          type: string
          format: password
          writeOnly: true
          minLength: 1
          maxLength: 4096
          description: |
            **(Implemented,
            [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons))**
            One-off HTTPS clone credential (PAT) for the `clone` mode only
            (http(s) `repoUrl`). Injected via a transient `GIT_ASKPASS` script
            in the git child-process env, then discarded — **never** placed in
            argv, written to a key file, stored in `.git/config` or
            `projects.repo_url`, logged, or persisted. For durable auth use the
            host's ssh-agent/keys or `gh`. See
            [`../system-analytics/git-integration.md`](../system-analytics/git-integration.md).
          example: ghp_exampleTokenValueRedacted
        taskKey:
          type: string
          pattern: "^[A-Z][A-Z0-9]{1,9}$"
          description: |
            (ADR-075, Implemented) Optional explicit task key for `KEY-N` task
            identities. Body-controlled but regex allow-listed and checked
            against the platform-wide UNIQUE — a collision (with an explicit
            OR derived key) refuses registration with `CONFLICT` (409).
            Omitted ⇒ derived from `project.name` (first 3 letters,
            uppercased). Immutable after registration in Stage 1.
          example: MAI
    PostProjectResponse:
      type: object
      required: [slug, projectId, gitStatus]
      properties:
        slug:
          type: string
          description: |
            Kebab-case slug derived server-side from `project.name` in
            `maister.yaml`. Never body-derived.
        projectId:
          type: string
          format: uuid
        gitStatus:
          type: string
          enum: [remote, no-remote, initialized]
          description: |
            Resolved source state: `remote` (cloned, or existing repo with an
            `origin`), `no-remote` (existing repo without an `origin` — PR
            promotion unavailable), or `initialized` (`git init` ran on a
            non-repo dir — unborn HEAD, needs a first commit before runs).
    AgentSummary:
      type: object
      description: |
        (M34 — Implemented, ADR-089 rework) Catalog projection of an `agents`
        row — package provenance + parsed frontmatter + enabled/quarantine
        state. Ids are package-qualified `<flowRefId>:<stem>`. Never includes
        token material or filesystem internals beyond `sourcePath`.
      required:
        [id, flowRefId, versionLabel, origin, name, description, workspace, mode, triggers, riskTier, enabled]
      properties:
        id: { type: string }
        flowRefId: { type: string }
        versionLabel: { type: string }
        origin: { type: string, enum: [git, authored] }
        name: { type: string }
        description: { type: string }
        runnerId: { type: string, nullable: true }
        workspace: { type: string, enum: [none, repo_read, worktree] }
        workspaceRef:
          type: string
          nullable: true
          description: "`trigger` or a literal branch; repo_read only (ADR-090 amendment)."
        mode: { type: string, enum: [session, subagent] }
        triggers:
          type: array
          items:
            type: string
            enum: [manual, cron, domain_event, webhook, flow]
        riskTier: { type: string, enum: [read_only, standard, destructive] }
        recommended:
          type: object
          nullable: true
          description: Package-recommended bindings — pre-fill the attach panel (RD5).
          additionalProperties: false
          properties:
            runner: { type: string }
            cron:
              type: object
              additionalProperties: false
              properties:
                expr: { type: string }
                timezone: { type: string }
            events:
              type: array
              items: { type: string }
        sourcePath: { type: string }
        enabled: { type: boolean }
        quarantinedAt: { type: string, format: date-time, nullable: true }
        quarantineReason: { type: string, nullable: true }
    AttachedAgent:
      type: object
      description: |
        (M34 — Implemented) Attach-panel row — the agent summary joined with its
        link and trigger bindings for this project.
      required: [agent, linkId, enabled, schedules]
      properties:
        agent: { $ref: "#/components/schemas/AgentSummary" }
        linkId: { type: string, format: uuid }
        enabled: { type: boolean }
        runnerOverrideId: { type: string, nullable: true }
        schedules:
          type: array
          items: { $ref: "#/components/schemas/AgentScheduleBody" }
    AgentScheduleBody:
      type: object
      description: |
        (M34 — Implemented) One trigger binding. Cron rows require
        `cronExpr` + `timezone`; event rows require `eventKinds` (subset of
        the ADR-086 taxonomy).
      required: [triggerType]
      properties:
        triggerType: { type: string, enum: [cron, event] }
        cronExpr: { type: string, description: "5-field cron, croner-validated." }
        timezone: { type: string, description: "IANA timezone." }
        eventKinds:
          type: array
          items: { type: string }
          description: Domain-event kinds (ADR-086 taxonomy subset).
        enabled: { type: boolean, default: true }
    AgentLaunchResult:
      type: object
      description: (M34 — Implemented) Result of an agent-run launch.
      required: [runId, status]
      properties:
        runId: { type: string, format: uuid }
        status: { type: string, enum: [Running, Pending] }
        queuePosition:
          type: integer
          minimum: 1
          description: Present when queued over the agent budget.
    PostTaskBody:
      type: object
      required: [title, prompt]
      properties:
        title:
          type: string
          minLength: 1
        prompt:
          type: string
          minLength: 1
        flowId:
          type: string
          minLength: 1
          description: |
            ID of a `flows` row belonging to the project identified by
            the URL `slug`. Any other flow ID returns `422 CONFIG`.
            (M34 — Implemented) OPTIONAL: a task created without `flowId` is a
            simple-intent task; it classifies as `unconfigured` until a triage
            verdict or the launch popover fills the flow.
    TaskCommentDTO:
      type: object
      description: |
        (ADR-075, Implemented) Comment projection. `body` is markdown with
        `KEY-N` mentions already expanded at write time. The actor is the
        polymorphic pair plus a render label resolved at read time
        ("former user" fallback for dangling ids; system actors label
        "system" — the writing token, when any, is recorded in the
        comment-activity payload).
      required: [id, taskId, body, actor, createdAt]
      properties:
        id: { type: string, format: uuid }
        taskId: { type: string, format: uuid }
        body:
          type: string
          description: Markdown; mentions stored expanded.
        actor: { $ref: "#/components/schemas/SocialActor" }
        createdAt: { type: string, format: date-time }
    SocialActor:
      type: object
      description: |
        (ADR-075, Implemented) Polymorphic actor pair projection. `id` is null
        exactly when `type` is `system`. Stage 1 never emits `agent`.
      required: [type, id, label]
      properties:
        type:
          type: string
          enum: [user, agent, system]
        id:
          type: string
          nullable: true
        label:
          type: string
          description: Display label resolved at read time.
    PostTaskCommentBody:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 10000
          description: |
            Markdown comment body. `KEY-N` tokens outside code fences,
            inline code, and existing links are expanded to task links at
            write time; unresolved tokens stay literal.
    TaskRelationBody:
      type: object
      required: [kind, toNumber]
      properties:
        kind:
          type: string
          enum: [blocks, depends_on, parent_of]
        toNumber:
          type: integer
          minimum: 1
          description: |
            Counterpart task number, resolved STRICTLY within the URL-param
            project. Missing ⇒ 404. Equal to the URL `{number}` ⇒ 400
            (`CONFIG`, self-relation).
    AssignmentReasonBody:
      type: object
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 1000
    AssignmentActor:
      type: object
      required: [id, kind, label]
      properties:
        id: { type: string, format: uuid }
        kind:
          type: string
          enum: [user, api_token, internal_agent, system]
        label: { type: string }
    Assignment:
      type: object
      required:
        - id
        - projectId
        - runId
        - status
        - roleRefs
        - title
        - assigneeActor
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        runId: { type: string, format: uuid }
        taskId: { type: string, format: uuid, nullable: true }
        nodeId: { type: string, nullable: true }
        stepId: { type: string, nullable: true }
        hitlRequestId: { type: string, format: uuid, nullable: true }
        actionKind:
          type: string
          enum:
            - permission
            - form
            - human_review
            - manual_takeover
            - merge_conflict
        status:
          type: string
          enum:
            - open
            - claimed
            - completed
            - cancelled
        roleRefs:
          type: array
          items: { type: string }
        title: { type: string }
        branch: { type: string, nullable: true }
        ref: { type: string, nullable: true }
        staleEvidenceSummary:
          type: object
          nullable: true
          additionalProperties: true
        claimedAt: { type: string, format: date-time, nullable: true }
        completedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        assigneeActor:
          type: object
          nullable: true
          allOf:
            - $ref: "#/components/schemas/AssignmentActor"
    AssignmentList:
      type: object
      required: [assignments]
      properties:
        assignments:
          type: array
          items: { $ref: "#/components/schemas/Assignment" }
    RegisterUserBody:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        email: { type: string, format: email }
        password: { type: string, minLength: 12 }
    RegisterUserResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending]
    AdminCreateUserBody:
      type: object
      required: [name, email, role, status]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        email:
          type: string
          format: email
        role:
          type: string
          enum: [viewer, member, admin]
        status:
          type: string
          enum: [active, pending]
        password:
          type: string
          minLength: 12
          description: |
            Optional explicit initial password. When omitted the server
            generates a secure temporary password returned in `tempPassword`.
    AdminCreateUserResponse:
      type: object
      required: [id, tempPassword]
      description: |
        Created user id and the one-time plaintext credential. `tempPassword`
        is never re-readable — the server stores only the bcrypt hash.
      properties:
        id: { type: string }
        tempPassword:
          type: string
          description: |
            Plaintext initial password shown once. Convey to the user
            immediately; the server cannot re-derive it.
    AdminUpdateUserBody:
      type: object
      description: |
        Aggregating user update. At least one field is required.
      minProperties: 1
      additionalProperties: false
      properties:
        role:
          type: string
          enum: [viewer, member, admin]
        status:
          type: string
          enum: [active, disabled]
        password:
          type: string
          minLength: 12
        mustChangePassword: { type: boolean }
        name:
          type: string
          minLength: 1
          maxLength: 120
        email:
          type: string
          format: email
    ProjectMemberRole:
      type: string
      enum: [owner, admin, member, viewer]
    ProjectMember:
      type: object
      required: [memberId, userId, email, role, createdAt]
      properties:
        memberId: { type: string }
        userId: { type: string }
        name: { type: string, nullable: true }
        email: { type: string, format: email }
        role: { $ref: "#/components/schemas/ProjectMemberRole" }
        createdAt: { type: string, format: date-time }
        addedBy: { type: string, nullable: true }
    MemberCandidate:
      type: object
      required: [id, email]
      properties:
        id: { type: string }
        name: { type: string, nullable: true }
        email: { type: string, format: email }
    AddProjectMemberBody:
      type: object
      required: [userId, role]
      additionalProperties: false
      properties:
        userId: { type: string }
        role: { $ref: "#/components/schemas/ProjectMemberRole" }
    UpdateProjectMemberRoleBody:
      type: object
      required: [role, expectedRole]
      additionalProperties: false
      properties:
        role: { $ref: "#/components/schemas/ProjectMemberRole" }
        expectedRole:
          allOf: [{ $ref: "#/components/schemas/ProjectMemberRole" }]
          description: |
            The role the caller observed in the roster. The update is a CAS:
            it only lands when the row still holds this role, else `409`
            (`CONFLICT`) on a concurrent stale-update race.
    DeliveryPolicy:
      type: object
      required: [strategy, push, trigger, targetBranch]
      additionalProperties: false
      properties:
        strategy:
          type: string
          enum: [merge, rebase_merge, pull_request, ai_rebase_merge]
        push:
          type: string
          enum: [never, on_success]
        trigger:
          type: string
          enum: [manual, auto_on_ready]
        targetBranch:
          type: string
          nullable: true
          minLength: 1
          maxLength: 255
          description: |
            Null means the project default branch at resolution time. Non-null
            values are server-validated against the project branch allow-list.
    DeliveryPolicyOverride:
      type: object
      additionalProperties: false
      properties:
        strategy:
          type: string
          enum: [merge, rebase_merge, pull_request, ai_rebase_merge]
        push:
          type: string
          enum: [never, on_success]
        trigger:
          type: string
          enum: [manual, auto_on_ready]
        targetBranch:
          type: string
          nullable: true
          minLength: 1
          maxLength: 255
    ExecutionPolicyOverrides:
      type: object
      additionalProperties: false
      description: |
        Sparse per-axis overrides. Keys map to the execution-control axes
        (A1 reworkExhaustion / A2 crashRetry / A3 checks / B1 permissions /
        B2 humanGate / B3 onStuck / C1 promotion / C2 commits / C3 dirtyResolve).
        Unset keys inherit the preset baseline.
      properties:
        reworkExhaustion:
          type: string
          enum: [escalate, ship_with_warning, fail]
        crashRetry:
          type: string
          enum: [fail, ralph_loop, auto_retry]
        checks:
          type: string
          enum: [strict, advisory, skip]
        permissions:
          type: string
          enum: [ask, auto_approve]
        humanGate:
          type: string
          enum: [stop, auto_pass]
        onStuck:
          type: string
          enum: [escalate, ship_with_warning, notify_only]
        promotion:
          type: string
          enum: [manual, auto_on_ready]
        commits:
          type: string
          enum: [keep_all, squash_rework, squash_on_promote, defer]
        dirtyResolve:
          type: string
          enum: [ask, commit, proceed]
    ExecutionPolicy:
      type: object
      required: [preset]
      additionalProperties: false
      description: |
        Flow execution-control policy snapshotted on the run (migration 0055).
        A preset sets every axis; `overrides` tune individual axes. The server
        rejects blind-ship combos (relaxed checks + auto-passed human gate or
        auto-promotion) with `PRECONDITION`, and a non-supervised resolved
        policy requires the `launchUnattended` project action.
      properties:
        preset:
          type: string
          enum: [supervised, assisted, unattended]
        overrides:
          $ref: "#/components/schemas/ExecutionPolicyOverrides"
    ProjectSettingsPatchBody:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        defaultRunnerId:
          type: string
          nullable: true
          description: Platform runner override; null inherits platform default.
        deliveryPolicyDefault:
          type: object
          allOf: [{ $ref: "#/components/schemas/DeliveryPolicy" }]
          nullable: true
          description: |
            Project default delivery policy. Null clears to the legacy
            promotion-mode compatibility mapping.
    ProjectSettingsResponse:
      type: object
      additionalProperties: false
      required: [project]
      properties:
        project:
          type: object
          additionalProperties: false
          required: [slug, defaultRunnerId, deliveryPolicyDefault]
          properties:
            slug: { type: string }
            defaultRunnerId: { type: string, nullable: true }
            deliveryPolicyDefault:
              type: object
              allOf: [{ $ref: "#/components/schemas/DeliveryPolicy" }]
              nullable: true
    PostRunBody:
      type: object
      required: [taskId]
      additionalProperties: false
      properties:
        taskId:
          type: string
          minLength: 1
        flowId:
          type: string
          minLength: 1
          description: |
            Optional per-launch Flow override. The server derives the project
            from `taskId` and refuses a Flow that is not enabled for that same
            project. Omitted means the task's current Flow.
        runnerId:
          type: string
          minLength: 1
          description: |
            Optional per-launch platform ACP runner override. Highest priority
            in the fail-closed runner resolution chain.
        baseBranch:
          type: string
          minLength: 1
          description: |
            (M18, Implemented) Optional base branch the run worktree is created
            from. Server-validated against the project's branch allow-list
            (`listBranches(project.repoPath)`) BEFORE use as a git
            `startPoint` — an unknown branch is refused `PRECONDITION` (409).
            Defaults to the project's `default_branch`.
        targetBranch:
          type: string
          minLength: 1
          description: |
            (M18, Implemented) Optional branch the run is promoted into after
            review. Server-validated against the same branch allow-list;
            unknown branch → `PRECONDITION` (409). Defaults to `baseBranch`.
        deliveryPolicy:
          allOf: [{ $ref: "#/components/schemas/DeliveryPolicy" }]
          description: |
            Optional per-launch policy override. Omitted means the project
            default. Any field differing from the default is shown as an
            override in the launch dialog and snapshotted on the run.
        executionPolicy:
          allOf: [{ $ref: "#/components/schemas/ExecutionPolicy" }]
          description: |
            Optional per-launch execution-control policy. Omitted resolves
            through task -> project defaults -> `supervised`. A blind-ship combo
            is refused `PRECONDITION` (409); a non-supervised resolved policy
            requires the `launchUnattended` action (403).
    PostRunResponse:
      type: object
      required: [runId, status]
      properties:
        runId:
          type: string
          format: uuid
        status:
          type: string
          enum: [Pending, Running]
        queuePosition:
          type: integer
          minimum: 1
          description: Present iff `status == "Pending"`.
    RecoverQueuedResponse:
      type: object
      description: |
        (Designed, M19) Returned by `POST /api/runs/{runId}/recover` with HTTP
        202 when the global concurrency cap was full at admission. The run
        flipped `Crashed→Pending` (retaining `acpSessionId`); the scheduler
        resumes it via `session/resume` when a slot frees.
      required: [state]
      properties:
        state:
          type: string
          enum: [queued]
        queuePosition:
          type: integer
          minimum: 1
          description: Optional queue position for the re-admitted resume.
    GcSweepSummary:
      type: object
      description: |
        (Designed, M19) Result of one GC sweep — the same shape the background
        sweeper logs and the cron route returns. Counts cover the worktree and
        revision sub-sweeps. A non-empty `errors` array accompanies the 207
        partial-failure response.
      required: [worktreesPreserved, worktreesRemoved, revisionsRemoved, errors]
      properties:
        worktreesPreserved:
          type: integer
          minimum: 0
          description: Worktrees archived to `maister/archive/<runId>` before removal.
        worktreesRemoved:
          type: integer
          minimum: 0
          description: Abandoned/Done worktrees pruned past `MAISTER_GC_AGE_DAYS`.
        revisionsRemoved:
          type: integer
          minimum: 0
          description: Unreferenced `Removed` flow revisions GC'd under the dual-FK guard.
        errors:
          type: array
          description: Per-row skip reasons when a sub-sweep partially failed (207).
          items: { type: string }
    SchedulerCommandHttpPingTarget:
      type: object
      additionalProperties: false
      required: [commandKind, url]
      properties:
        commandKind:
          type: string
          enum: [http_ping]
        url:
          type: string
          format: uri
          description: HTTP or HTTPS URL checked with a HEAD request.
        timeoutMs:
          type: number
          minimum: 1
          description: Optional request timeout in milliseconds.
    SchedulerCommandConsolePingTarget:
      type: object
      additionalProperties: false
      required: [commandKind, host]
      properties:
        commandKind:
          type: string
          enum: [console_ping]
        host:
          type: string
          description: Hostname or IP literal passed to `ping`.
        timeoutMs:
          type: number
          minimum: 1
          description: Optional process timeout in milliseconds.
    SchedulerFlowRunTarget:
      type: object
      additionalProperties: false
      required: [taskId]
      properties:
        taskId:
          type: string
          minLength: 1
          description: Engine jobs use an explicit task id; friendly task selection belongs to project `run_schedules`.
        runnerId:
          type: string
          minLength: 1
        baseBranch:
          type: string
          minLength: 1
        targetBranch:
          type: string
          minLength: 1
    SchedulerNoTarget:
      type: object
      additionalProperties: false
      maxProperties: 0
      description: Empty target for seeded/no-target jobs.
    SchedulerJobTarget:
      oneOf:
        - $ref: "#/components/schemas/SchedulerCommandHttpPingTarget"
        - $ref: "#/components/schemas/SchedulerCommandConsolePingTarget"
        - $ref: "#/components/schemas/SchedulerFlowRunTarget"
        - $ref: "#/components/schemas/SchedulerNoTarget"
      description: |
        Per-kind scheduler target payload. `command` jobs use one of the
        command shapes, `flow_run` uses `SchedulerFlowRunTarget`, and
        no-target jobs use `{}`.
    SchedulerTickSummary:
      type: object
      description: |
        (Implemented, M24) Result of one unified scheduler tick. `attempts` lists
        due jobs claimed by this tick; jobs skipped because another unexpired
        lease exists are not duplicated.
      required:
        [
          attemptedCount,
          claimedCount,
          succeededCount,
          failedCount,
          skippedCount,
          attempts,
        ]
      properties:
        attemptedCount: { type: integer, minimum: 0 }
        claimedCount: { type: integer, minimum: 0 }
        succeededCount: { type: integer, minimum: 0 }
        failedCount: { type: integer, minimum: 0 }
        skippedCount: { type: integer, minimum: 0 }
        jobKind:
          type: string
          nullable: true
          enum:
            [
              system_sweep,
              command,
              agent_tick,
              flow_run,
              run_schedule,
              webhook_delivery,
              domain_event_dispatch,
            ]
        attempts:
          type: array
          items:
            type: object
            required: [jobId, jobKind, status]
            properties:
              jobId: { type: string }
              attemptId: { type: string, nullable: true }
              jobKind:
                type: string
                enum:
                  [
                    system_sweep,
                    command,
                    agent_tick,
                    flow_run,
                    run_schedule,
                    webhook_delivery,
                    domain_event_dispatch,
                  ]
              status:
                type: string
                enum: [Claimed, Running, Succeeded, Failed, Skipped]
              errorCode:
                type: string
                nullable: true
              errorMessage:
                type: string
                nullable: true
              nextRunAt:
                type: string
                format: date-time
                nullable: true
    ScheduleOverlapPolicy:
      type: string
      enum: [skip, queue_one, start_anyway]
      description: |
        (M28) What a fire does when blocked. `skip` records the skip and
        waits for the next slot; `queue_one` flags a single non-stacking
        catch-up consumed by the next unblocked tick; `start_anyway`
        overrides only the CAP dimension (the run queues `Pending`) — a
        second concurrent run per task is structurally impossible.
    ScheduleFireOutcome:
      type: string
      enum:
        - launched
        - queued_pending
        - catchup_queued
        - skipped_task_busy
        - skipped_cap
        - skipped_target_terminal
        - skipped_crashed
        - skipped_blocked
        - skipped_unconfigured
        - launch_failed
        - dispatching
      description: |
        (M28) Dispatch decision recorded on the schedule row.
        `dispatching` is the durable in-flight intent marker written before
        `launchRun` (two-phase fire pipeline, ADR-071).
    ScheduleDTO:
      type: object
      required:
        - id
        - name
        - taskId
        - taskTitle
        - cronExpr
        - timezone
        - overlapPolicy
        - runnerId
        - enabled
        - nextFireAt
        - queueOnePending
        - queuedFireAt
        - lastFiredAt
        - lastFireOutcome
        - lastFireError
        - lastRunId
        - lastRunStatus
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        taskId: { type: string }
        taskTitle:
          type: string
          description: Joined from `tasks` at read time.
        cronExpr: { type: string }
        timezone: { type: string }
        overlapPolicy: { $ref: "#/components/schemas/ScheduleOverlapPolicy" }
        runnerId: { type: string, nullable: true }
        enabled: { type: boolean }
        nextFireAt: { type: string, format: date-time }
        queueOnePending: { type: boolean }
        queuedFireAt: { type: string, format: date-time, nullable: true }
        lastFiredAt: { type: string, format: date-time, nullable: true }
        lastFireOutcome:
          type: string
          nullable: true
          enum:
            - launched
            - queued_pending
            - catchup_queued
            - skipped_task_busy
            - skipped_cap
            - skipped_target_terminal
            - skipped_crashed
            - skipped_blocked
            - skipped_unconfigured
            - launch_failed
            - dispatching
            - null
        lastFireError:
          type: string
          nullable: true
          description: "Bounded `CODE: message` from a `launch_failed` fire (≤500 chars)."
        lastRunId: { type: string, nullable: true }
        lastRunStatus:
          type: string
          nullable: true
          enum:
            [
              Pending,
              Running,
              NeedsInput,
              NeedsInputIdle,
              HumanWorking,
              Review,
              Done,
              Abandoned,
              Crashed,
              Failed,
              null,
            ]
          description: Joined live from `runs` on `last_run_id` at read time.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    PostScheduleBody:
      type: object
      additionalProperties: false
      required: [name, taskId, cronExpr, timezone]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        taskId: { type: string, minLength: 1 }
        cronExpr:
          type: string
          minLength: 1
          maxLength: 100
          description: 5-field cron expression (no seconds field, no `@nicknames`).
        timezone:
          type: string
          minLength: 1
          description: IANA timezone name (e.g. `Europe/Moscow`).
        overlapPolicy:
          $ref: "#/components/schemas/ScheduleOverlapPolicy"
        runnerId:
          type: string
          nullable: true
          description: Optional `platform_acp_runners` launch override.
        enabled: { type: boolean, default: true }
    PatchScheduleBody:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        cronExpr: { type: string, minLength: 1, maxLength: 100 }
        timezone: { type: string, minLength: 1 }
        overlapPolicy:
          $ref: "#/components/schemas/ScheduleOverlapPolicy"
        runnerId:
          type: string
          nullable: true
          description: "`null` clears the override (SET/CLEAR/RE-SET symmetry)."
        enabled: { type: boolean }
    TriggerScheduleResponse:
      type: object
      required: [outcome]
      properties:
        outcome: { $ref: "#/components/schemas/ScheduleFireOutcome" }
        runId:
          type: string
          nullable: true
          description: Present when the dispatch launched (or queued) a run.
        queuePosition:
          type: integer
          minimum: 1
          nullable: true
          description: Present when the run landed `Pending` above the cap.
        errorCode:
          type: string
          nullable: true
          description: "`MaisterError` code recorded for a `launch_failed` outcome."
    AuthoredCapabilityKind:
      type: string
      enum: [rule, skill, flow]
    AuthoredCapabilityLifecycle:
      type: string
      enum: [DRAFT, PUBLISHED, ARCHIVED]
    AuthoredCapability:
      type: object
      required:
        - id
        - projectId
        - kind
        - slug
        - title
        - lifecycle
        - draftVersion
        - archivedAt
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        projectId: { type: string }
        kind: { $ref: "#/components/schemas/AuthoredCapabilityKind" }
        slug: { type: string }
        title: { type: string }
        lifecycle: { $ref: "#/components/schemas/AuthoredCapabilityLifecycle" }
        draftVersion: { type: integer, minimum: 1 }
        currentDraftRevisionId: { type: string, nullable: true }
        currentPublishedRevisionId: { type: string, nullable: true }
        archivedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    AuthoredCapabilityRevision:
      type: object
      required:
        - id
        - capabilityId
        - projectId
        - kind
        - revisionNumber
        - draftVersion
        - lifecycle
        - title
        - body
        - manifest
        - schemaVersion
        - contentHash
        - createdAt
      properties:
        id: { type: string }
        capabilityId: { type: string }
        projectId: { type: string }
        kind: { $ref: "#/components/schemas/AuthoredCapabilityKind" }
        revisionNumber: { type: integer, minimum: 1 }
        draftVersion: { type: integer, minimum: 1 }
        lifecycle: { $ref: "#/components/schemas/AuthoredCapabilityLifecycle" }
        title: { type: string }
        body: {}
        manifest: {}
        schemaVersion: { type: integer, minimum: 1 }
        contentHash: { type: string }
        publishedAt: { type: string, format: date-time, nullable: true }
        archivedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
    AuthoredCapabilityDetail:
      type: object
      required: [capability, revisions]
      properties:
        capability: { $ref: "#/components/schemas/AuthoredCapability" }
        draft:
          {
            $ref: "#/components/schemas/AuthoredCapabilityRevision",
            nullable: true,
          }
        published:
          {
            $ref: "#/components/schemas/AuthoredCapabilityRevision",
            nullable: true,
          }
        revisions:
          type: array
          items: { $ref: "#/components/schemas/AuthoredCapabilityRevision" }
    AuthoredCapabilityCreateBody:
      type: object
      additionalProperties: false
      required: [kind, slug, title]
      properties:
        kind: { $ref: "#/components/schemas/AuthoredCapabilityKind" }
        slug: { type: string, minLength: 1 }
        title: { type: string, minLength: 1 }
        body: {}
        manifest: {}
        schemaVersion: { type: integer, minimum: 1 }
    AuthoredCapabilityDraftBody:
      type: object
      additionalProperties: false
      required: [expectedDraftVersion]
      properties:
        expectedDraftVersion: { type: integer, minimum: 1 }
        title: { type: string, minLength: 1 }
        body: {}
        manifest: {}
        schemaVersion: { type: integer, minimum: 1 }
    ScratchCapabilityOption:
      type: object
      required:
        [
          id,
          recordId,
          kind,
          label,
          source,
          enforceability,
          selectedByDefault,
          agents,
        ]
      properties:
        id: { type: string, minLength: 1 }
        recordId: { type: string, format: uuid }
        label: { type: string, minLength: 1 }
        kind:
          type: string
          enum: [mcp, skill, rule, agent_definition, restriction]
        source:
          type: string
          enum: [platform, project, flow-package]
        enforceability:
          type: string
          enum: [enforced, instructed, unsupported]
        selectedByDefault: { type: boolean }
        agents:
          type: array
          items:
            type: string
            enum: [claude, codex, gemini, opencode, mimo]
    ScratchProjectOption:
      type: object
      required: [id, slug, name, mainBranch, branchPrefix]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        mainBranch: { type: string }
        branchPrefix: { type: string }
        defaultRunnerId:
          type: string
          nullable: true
    BranchOptions:
      type: object
      description: |
        (M18, Implemented) The session-authed, project-read-scoped branch subset
        the board task-launch UI consumes from
        `GET /api/scratch-runs/launch-options`. Field names match the live
        route (`branches`, `defaultBaseBranch`); `ScratchLaunchOptionsResponse`
        is a superset of this shape.
      required: [branches, defaultBaseBranch]
      properties:
        branches:
          type: array
          description: |
            All branches in the selected project's repository
            (`listBranches(project.repoPath)`), the server-state allow-list a
            base/target branch is validated against at launch and promote.
          items: { type: string }
        defaultBaseBranch:
          type: string
          nullable: true
          description: |
            The project's default branch — the base-branch default when the
            launcher leaves the advanced selector untouched. Null only when no
            project is visible/selected.
    TaskRunLaunchOptionsResponse:
      type: object
      additionalProperties: false
      required:
        [
          task,
          launchability,
          flows,
          selectedFlowId,
          runners,
          selectedRunnerId,
          branches,
          defaultBaseBranch,
          defaultTargetBranch,
          deliveryPolicyDefault,
        ]
      properties:
        task:
          type: object
          additionalProperties: false
          required: [id, projectId, projectSlug, number, status, flowId]
          properties:
            id: { type: string, format: uuid }
            projectId: { type: string, format: uuid }
            projectSlug: { type: string }
            number: { type: integer, minimum: 1 }
            status:
              type: string
              enum: [Backlog, InFlight, Done, Abandoned]
            flowId: { type: string, format: uuid }
        launchability:
          type: object
          additionalProperties: false
          required: [launchable, reason]
          properties:
            launchable: { type: boolean }
            reason:
              type: string
              enum:
                [
                  launchable,
                  busy,
                  blocked,
                  supervisor_unavailable,
                  runner_unavailable,
                  project_archived,
                ]
            blockers:
              type: array
              items:
                type: object
                additionalProperties: false
                required: [kind, label]
                properties:
                  kind: { type: string }
                  label: { type: string }
        flows:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [id, refId, name, enabled, isTaskDefault]
            properties:
              id: { type: string, format: uuid }
              refId: { type: string }
              name: { type: string }
              version: { type: string, nullable: true }
              enabled: { type: boolean }
              isTaskDefault: { type: boolean }
        selectedFlowId: { type: string, format: uuid }
        runners:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [id, label, model, readinessStatus, pinnedModel]
            properties:
              id: { type: string }
              label: { type: string }
              model: { type: string }
              readinessStatus:
                type: string
                enum: [Unknown, Ready, NotReady]
              pinnedModel:
                type: object
                nullable: true
                additionalProperties: false
                required: [model, source]
                properties:
                  model: { type: string }
                  source:
                    type: string
                    enum: [runner, flow, project-default, platform-default]
        selectedRunnerId: { type: string, nullable: true }
        branches:
          type: array
          items: { type: string }
        defaultBaseBranch: { type: string, nullable: true }
        defaultTargetBranch: { type: string, nullable: true }
        deliveryPolicyDefault: { $ref: "#/components/schemas/DeliveryPolicy" }
        executionPolicyDefault: { $ref: "#/components/schemas/ExecutionPolicy" }
    ScratchLaunchOptionsResponse:
      type: object
      required:
        [
          machine,
          projects,
          selectedProjectId,
          branches,
          runners,
          workModes,
          reasoningEfforts,
          capabilities,
        ]
      properties:
        machine:
          type: object
          required: [id, label, readOnly]
          properties:
            id: { type: string }
            label: { type: string }
            readOnly: { type: boolean, enum: [true] }
        projects:
          type: array
          items: { $ref: "#/components/schemas/ScratchProjectOption" }
        selectedProjectId:
          type: string
          format: uuid
          nullable: true
        defaultBaseBranch:
          type: string
          nullable: true
        defaultScratchBranch:
          type: string
          nullable: true
        defaultRunnerId:
          type: string
          nullable: true
        branches:
          type: array
          items: { type: string }
        runners:
          type: array
          items:
            type: object
            description: |
              Configured platform ACP runner profile. Secret values are never
              returned; provider secret refs stay server-side metadata.
            required:
              [
                id,
                displayLabel,
                adapter,
                capabilityAgent,
                model,
                providerKind,
                enabled,
                ready,
              ]
            properties:
              id: { type: string }
              displayLabel: { type: string }
              adapter: { type: string, enum: [claude, codex, gemini, opencode, mimo] }
              capabilityAgent: { type: string, enum: [claude, codex, gemini, opencode, mimo] }
              model: { type: string }
              providerKind: { type: string }
              permissionPolicy: { type: string }
              sidecarId: { type: string, nullable: true }
              enabled: { type: boolean }
              ready: { type: boolean }
        workModes:
          type: array
          items:
            type: object
            required: [id, label, selectedByDefault]
            properties:
              id: { type: string, enum: [auto, plan_first, manual_approval] }
              label: { type: string }
              selectedByDefault: { type: boolean }
        reasoningEfforts:
          type: array
          items:
            type: object
            required: [id, label, selectedByDefault]
            properties:
              id: { type: string, enum: [low, high, extra, ultra] }
              label: { type: string }
              selectedByDefault: { type: boolean }
        capabilities:
          type: object
          required:
            [
              mcps,
              skills,
              rules,
              agentDefinitions,
              restrictions,
              defaultSelectedMcpIds,
            ]
          properties:
            mcps:
              type: array
              items: { $ref: "#/components/schemas/ScratchCapabilityOption" }
            skills:
              type: array
              items: { $ref: "#/components/schemas/ScratchCapabilityOption" }
            rules:
              type: array
              items: { $ref: "#/components/schemas/ScratchCapabilityOption" }
            agentDefinitions:
              type: array
              items: { $ref: "#/components/schemas/ScratchCapabilityOption" }
            restrictions:
              type: array
              items: { $ref: "#/components/schemas/ScratchCapabilityOption" }
            defaultSelectedMcpIds:
              type: array
              items: { type: string }
    ScratchCapabilitySelection:
      type: object
      description: |
        Launch-time capability ids selected from `launch-options`. Unknown,
        hidden, disabled, untrusted, or cross-project ids return `400 CONFIG`.
      properties:
        mcpIds:
          type: array
          items: { type: string, minLength: 1 }
        skillIds:
          type: array
          items: { type: string, minLength: 1 }
          description: |
            IGNORED for scratch launch: scratch materializes ALL
            enabled+trusted+runner-supported project skills (broad policy, D7 /
            FR-C3), so a submitted skill selection has no effect and is not
            validated. The launch UI presents skills as read-only "all included".
            The "unknown/cross-project id → 400 CONFIG" rule above does NOT apply
            to `skillIds`.
        ruleIds:
          type: array
          items: { type: string, minLength: 1 }
        agentDefinitionIds:
          type: array
          items: { type: string, minLength: 1 }
        restrictionIds:
          type: array
          items: { type: string, minLength: 1 }
    ScratchAttachmentInput:
      type: object
      description: |
        Metadata-only attachment accepted in JSON bodies and the multipart
        `payload` field. Binary uploads are sent as multipart `files` parts.
      required: [kind, value]
      properties:
        kind:
          type: string
          enum: [issue_url, file_path, text_note]
        label:
          type: string
          maxLength: 200
        value:
          type: string
          minLength: 1
          maxLength: 20000
    ScratchAttachment:
      type: object
      required: [id, runId, kind, label, value, createdAt]
      properties:
        id: { type: string, format: uuid }
        runId: { type: string, format: uuid }
        messageId: { type: string, format: uuid, nullable: true }
        kind:
          type: string
          enum: [issue_url, file_path, text_note, uploaded_file]
        label: { type: string, nullable: true }
        value:
          type: string
          description: Metadata value or rootless artifact reference.
        fileName: { type: string, nullable: true }
        mimeType: { type: string, nullable: true }
        byteSize: { type: integer, minimum: 0, nullable: true }
        sha256: { type: string, nullable: true }
        artifactRef:
          type: string
          nullable: true
          description: Rootless artifact reference for uploaded files. Absolute storage paths are never returned.
        createdAt: { type: string, format: date-time }
    PostScratchRunBody:
      type: object
      required: [projectId, baseBranch]
      additionalProperties: false
      description: |
        Implemented scratch launch body. The schema intentionally excludes
        `runId`, `projectSlug`, `worktreePath`, `stepId`,
        `supervisorSessionId`, `acpSessionId`, and capability profile paths;
        the server derives those values after authz and validation. When
        `prompt` is omitted or empty, launch still prepares the worktree-backed
        ACP session and leaves the dialog waiting for the first user message.
      properties:
        projectId: { type: string, format: uuid }
        baseBranch: { type: string, minLength: 1, maxLength: 255 }
        branchName:
          type: string
          minLength: 0
          maxLength: 255
          description: Optional explicit branch. Omit or send an empty string to use the generated scratch branch fallback.
        name: { type: string, maxLength: 200 }
        runnerId:
          type: string
          description: Optional platform ACP runner override. Omit to use the project/platform default chain.
        workMode:
          type: string
          enum: [auto, plan_first, manual_approval]
          default: auto
        reasoningEffort:
          type: string
          enum: [low, high, extra, ultra]
          default: high
        planMode:
          type: string
          enum: [off, plan-first]
          deprecated: true
          description: Compatibility field derived from workMode.
        prompt:
          type: string
          minLength: 0
          maxLength: 60000
          default: ""
        linkedTaskId: { type: string, format: uuid }
        linkedIssueUrl: { type: string, maxLength: 2048 }
        attachments:
          type: array
          maxItems: 20
          items: { $ref: "#/components/schemas/ScratchAttachmentInput" }
        capabilities:
          $ref: "#/components/schemas/ScratchCapabilitySelection"
    ScratchRunMultipartBody:
      type: object
      required: [payload]
      properties:
        payload:
          type: string
          description: JSON-encoded PostScratchRunBody. Its attachments are metadata-only; binary files are supplied by `files`.
        files:
          type: array
          maxItems: 10
          items:
            type: string
            format: binary
    PostScratchMessageBody:
      type: object
      required: [content]
      additionalProperties: false
      description: |
        Implemented scratch message body. It excludes session ids, project slug,
        worktree path, step id, and sequence; the server derives those values.
      properties:
        content: { type: string, minLength: 1, maxLength: 60000 }
        attachments:
          type: array
          maxItems: 20
          items: { $ref: "#/components/schemas/ScratchAttachmentInput" }
        contentBlocks:
          type: array
          maxItems: 64
          description: >-
            (Designed — capability composer, FR-D5) Optional structured ACP
            content blocks assembled by the composer (a `text` block plus
            `resource_link`/`resource` blocks for @file mentions and
            attachments). When present the server forwards the assembled blocks
            verbatim to the supervisor (verbatim-forward invariant); `content`
            stays the plain-text transcript body / fallback. Skill/agent chips
            are NOT blocks — they normalize to wire text inside the `text` block
            (FR-E). `resource`/`resource_link` URIs MUST be confined to the run
            worktree server-side before becoming ACP blocks.
          items: { $ref: "#/components/schemas/PromptContentBlock" }
    PromptContentBlock:
      description: |
        (Designed — capability composer, FR-D4/D5) One ACP prompt content block,
        mirroring the ACP content-block union the supervisor forwards verbatim:
        a `text` block, or a file reference as `resource_link` (URI only) or
        `resource` (embedded contents).
      type: object
      required: [type]
      additionalProperties: true
      properties:
        type: { type: string, enum: [text, resource_link, resource] }
        text: { type: string, description: "Present for a text block." }
        uri:
          type: string
          description: >-
            Present for `resource_link`/`resource`; a worktree-confined path/URI
            (server validates confinement, reusing the artifacts payload
            confinement pattern).
        name: { type: string, description: Optional display name for a resource link. }
        mimeType: { type: string }
    AvailableCommand:
      description: |
        (Designed — capability composer, FR-A2) One entry of the live ACP
        `available_commands_update` snapshot, exposed scratch-only. Names are
        as-emitted by the adapter (codex bakes `$`; claude bare / `mcp:`); the
        composer maps them to canonical refs via the catalog.
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        hint: { type: string, nullable: true, description: From the ACP `input.hint`. }
    ProjectCapabilityCatalogEntry:
      description: |
        (Implemented — capability composer, FR-B2/B3) One entry of the unified
        composer autocomplete catalog: a project skill or a claude-only coder
        subagent. `canonicalToken` is the portable storage form (`@skill:<slug>` /
        `@agent:<slug>`); `surfaceForm` is the runner-specific wire form (`/slug`,
        `$slug`, `@name`); `supported` is false (advisory) when the capability is
        not available on the requested runner.
      type: object
      required:
        [
          kind,
          refId,
          slug,
          displayName,
          description,
          argHint,
          canonicalToken,
          surfaceForm,
          supported,
        ]
      properties:
        kind: { type: string, enum: [skill, subagent] }
        refId: { type: string }
        slug: { type: string }
        displayName: { type: string }
        description: { type: string, nullable: true }
        argHint: { type: string, nullable: true }
        canonicalToken: { type: string }
        surfaceForm: { type: string }
        supported: { type: boolean }
    ScratchMessageMultipartBody:
      type: object
      required: [payload]
      properties:
        payload:
          type: string
          description: JSON-encoded PostScratchMessageBody. Its attachments are metadata-only; binary files are supplied by `files`.
        files:
          type: array
          maxItems: 10
          items:
            type: string
            format: binary
    ScratchMessage:
      type: object
      required: [id, runId, sequence, role, content, createdAt]
      properties:
        id: { type: string, format: uuid }
        runId: { type: string, format: uuid }
        sequence: { type: integer, minimum: 1 }
        role: { type: string, enum: [user, assistant, tool, system] }
        content: { type: string }
        supervisorEventId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
    ScratchRun:
      type: object
      required:
        [
          runId,
          projectId,
          runStatus,
          dialogStatus,
          branchName,
          baseBranch,
          baseCommit,
          targetBranch,
          workMode,
          reasoningEffort,
          planMode,
        ]
      properties:
        runId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        name: { type: string, nullable: true }
        createdByUserId: { type: string, format: uuid, nullable: true }
        createdByDisplayName: { type: string, nullable: true }
        runStatus:
          type: string
          enum:
            [
              Pending,
              Running,
              NeedsInput,
              NeedsInputIdle,
              HumanWorking,
              Review,
              Crashed,
              Done,
              Abandoned,
              Failed,
            ]
        dialogStatus:
          type: string
          enum:
            [
              Starting,
              WaitingForUser,
              Running,
              NeedsInput,
              Review,
              Crashed,
              Done,
              Abandoned,
            ]
        branchName: { type: string }
        baseBranch: { type: string }
        baseCommit: { type: string }
        targetBranch: { type: string }
        workMode: { type: string, enum: [auto, plan_first, manual_approval] }
        reasoningEffort: { type: string, enum: [low, high, extra, ultra] }
        planMode: { type: string, enum: [off, plan-first] }
    ScratchRunResponse:
      type: object
      required: [runId, dialogUrl, status]
      properties:
        runId: { type: string, format: uuid }
        dialogUrl: { type: string }
        status: { $ref: "#/components/schemas/ScratchRun" }
    ScratchPendingHitl:
      type: object
      required: [hitlRequestId, kind, prompt, schema, options]
      properties:
        hitlRequestId: { type: string, format: uuid }
        kind: { type: string, enum: [permission, form, human] }
        prompt: { type: string }
        schema: {}
        options:
          type: array
          items:
            type: object
            required: [optionId, label]
            properties:
              optionId: { type: string }
              label: { type: string }
    ScratchRunDetail:
      type: object
      required:
        [
          run,
          scratch,
          workspace,
          messages,
          attachments,
          capabilityProfile,
          pendingHitl,
        ]
      properties:
        run:
          type: object
          required:
            [
              id,
              projectId,
              status,
              createdByUserId,
              currentStepId,
              startedAt,
              endedAt,
            ]
          properties:
            id: { type: string, format: uuid }
            projectId: { type: string, format: uuid }
            projectSlug: { type: string, nullable: true }
            runnerId: { type: string, nullable: true }
            runnerResolutionTier:
              type: string
              nullable: true
              enum:
                [
                  launchOverride,
                  stepTarget,
                  projectFlowDefault,
                  platformFlowDefault,
                  projectDefault,
                  platformDefault,
                ]
            capabilityAgent:
              type: string
              nullable: true
              enum: [claude, codex, gemini, opencode, mimo]
            createdByUserId: { type: string, format: uuid, nullable: true }
            createdByDisplayName: { type: string, nullable: true }
            status:
              type: string
              enum:
                [
                  Pending,
                  Running,
                  NeedsInput,
                  NeedsInputIdle,
                  HumanWorking,
                  Review,
                  Crashed,
                  Done,
                  Abandoned,
                  Failed,
                ]
            currentStepId: { type: string, nullable: true }
            startedAt: { type: string, format: date-time }
            endedAt: { type: string, format: date-time, nullable: true }
        scratch:
          type: object
          required:
            [
              name,
              workMode,
              reasoningEffort,
              planMode,
              linkedTaskId,
              linkedIssueUrl,
              baseBranch,
              baseCommit,
              targetBranch,
              dialogStatus,
            ]
          properties:
            name: { type: string, nullable: true }
            workMode:
              { type: string, enum: [auto, plan_first, manual_approval] }
            reasoningEffort: { type: string, enum: [low, high, extra, ultra] }
            planMode: { type: string, enum: [off, plan-first] }
            linkedTaskId: { type: string, format: uuid, nullable: true }
            linkedIssueUrl: { type: string, nullable: true }
            baseBranch: { type: string }
            baseCommit: { type: string }
            targetBranch: { type: string, nullable: true }
            dialogStatus:
              type: string
              enum:
                [
                  Starting,
                  WaitingForUser,
                  Running,
                  NeedsInput,
                  Review,
                  Crashed,
                  Done,
                  Abandoned,
                ]
            errorCode: { type: string, nullable: true }
            errorMessage: { type: string, nullable: true }
        workspace:
          type: object
          nullable: true
          required: [branch, removedAt]
          properties:
            id: { type: string, format: uuid }
            branch: { type: string }
            removedAt: { type: string, format: date-time, nullable: true }
        messages:
          type: array
          items: { $ref: "#/components/schemas/ScratchMessage" }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/ScratchAttachment" }
        capabilityProfile:
          type: object
          required:
            [
              profileDigest,
              selectedMcpIds,
              selectedSkillIds,
              selectedRuleIds,
              selectedAgentDefinitionIds,
              restrictions,
              downgradeNotes,
            ]
          properties:
            profileDigest: { type: string }
            selectedMcpIds:
              type: array
              items: { type: string }
            selectedSkillIds:
              type: array
              items: { type: string }
            selectedRuleIds:
              type: array
              items: { type: string }
            selectedAgentDefinitionIds:
              type: array
              items: { type: string }
            restrictions:
              type: object
              additionalProperties: true
            downgradeNotes:
              type: object
              nullable: true
              additionalProperties: true
        pendingHitl:
          type: object
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ScratchPendingHitl"
    ScratchMessageResponse:
      type: object
      required: [ok, messageId, sequence, dialogStatus, stopReason]
      properties:
        ok: { type: boolean, enum: [true] }
        messageId: { type: string, format: uuid }
        sequence: { type: integer, minimum: 1 }
        dialogStatus:
          type: string
          enum:
            [
              Starting,
              WaitingForUser,
              Running,
              NeedsInput,
              Review,
              Crashed,
              Done,
              Abandoned,
            ]
        stopReason:
          type: string
          description: |
            Scratch-dialog result. `cancelled` is a web/client-side dialog state
            only; supervisor prompt success responses do not return `cancelled`
            and map direct adapter cancellations to `ACP_PROTOCOL`.
          enum: [end_turn, max_tokens, max_turn_requests, refusal, cancelled]
    RunChangeSummaryResponse:
      type: object
      required:
        [
          runId,
          scope,
          scopes,
          baseCommit,
          sourceBranch,
          targetBranch,
          dirty,
          truncated,
          unavailable,
          fileCount,
          additions,
          deletions,
          files,
        ]
      properties:
        runId: { type: string, format: uuid }
        scope:
          type: string
          enum: [run, since-last-review, last-node, uncommitted]
        scopes:
          type: object
          required: [run, since-last-review, last-node, uncommitted]
          additionalProperties: false
          properties:
            run: { $ref: "#/components/schemas/RunChangeSummaryScopeAvailability" }
            since-last-review:
              { $ref: "#/components/schemas/RunChangeSummaryScopeAvailability" }
            last-node:
              { $ref: "#/components/schemas/RunChangeSummaryScopeAvailability" }
            uncommitted:
              { $ref: "#/components/schemas/RunChangeSummaryScopeAvailability" }
        baseCommit:
          type: string
          nullable: true
          description: Server-resolved base commit or ref label for the selected scope.
        sourceBranch:
          type: string
          nullable: true
          description: Repo-relative branch/ref display name only; never a filesystem path.
        targetBranch:
          type: string
          nullable: true
        dirty:
          type: boolean
          description: True when the selected scope includes uncommitted worktree changes.
        truncated:
          type: boolean
          description: True when git output exceeded the configured bounded read budget.
        unavailable:
          type: boolean
          description: True when the worktree or selected base metadata is unavailable.
        unavailableReason:
          type: string
          nullable: true
          description: Machine-readable inspector reason, e.g. `worktree-unavailable`.
        fileCount: { type: integer, minimum: 0 }
        additions: { type: integer, minimum: 0 }
        deletions: { type: integer, minimum: 0 }
        files:
          type: array
          items: { $ref: "#/components/schemas/RunChangeSummaryFile" }
    RunChangeSummaryScopeAvailability:
      type: object
      required: [available]
      properties:
        available: { type: boolean }
        reason:
          type: string
          nullable: true
    RunChangeSummaryFile:
      type: object
      required: [path, status, additions, deletions, binary]
      properties:
        path:
          type: string
          description: Repo-relative path only; never absolute.
        status:
          type: string
          description: Git status letter (`A`, `M`, `D`, `R`, `C`, or equivalent parsed status).
        oldPath:
          type: string
          nullable: true
          description: Previous repo-relative path for renames/copies.
        additions: { type: integer, minimum: 0 }
        deletions: { type: integer, minimum: 0 }
        binary: { type: boolean }
    RunDiffResponse:
      type: object
      required:
        [runId, scope, scopes, baseCommit, sourceBranch, targetBranch, diff, truncated]
      properties:
        runId: { type: string, format: uuid }
        scope:
          type: string
          enum: [run, since-last-review, last-node, uncommitted]
          description: |
            (M30 — Implemented, ADR-082) The effective diff scope for this
            response (the validated `scope` query value; default `run`). Scratch
            runs always report `run` — their single workspace base→branch scope.
        scopes:
          type: object
          required: [run]
          properties:
            run: { $ref: "#/components/schemas/RunChangeSummaryScopeAvailability" }
            since-last-review:
              { $ref: "#/components/schemas/RunChangeSummaryScopeAvailability" }
            last-node:
              { $ref: "#/components/schemas/RunChangeSummaryScopeAvailability" }
            uncommitted:
              { $ref: "#/components/schemas/RunChangeSummaryScopeAvailability" }
          description: |
            (M30 — Implemented, ADR-082) Per-scope availability map shared with
            `GET /api/runs/{runId}/change-summary`. Flow runs report all four
            scopes (unavailable ones disabled with a `reason`); scratch runs
            report only `{ run: { available: true } }`.
        baseCommit: { type: string }
        sourceBranch: { type: string }
        targetBranch: { type: string }
        diff: { type: string }
        truncated:
          type: boolean
          description: |
            (Implemented, ADR-066) True when the diff exceeded the server's
            `EXEC_MAX_BUFFER` (4 MiB) read bound, so `diff`/`files`/`perFile`
            cover only the bounded prefix instead of the full change. The
            workbench and review diff render a truncation banner; the review
            panel additionally blocks promotion behind an explicit
            acknowledgement so a run is never promoted on a partial diff.
            `false` for any diff that fit the bound.
        files:
          type: array
          description: |
            (M22) Changed-files summary from `git diff --name-status base..branch`,
            rendered beside the diff in the workbench. Present for flow and
            scratch runs (M35, T3.3 — scratch joined the prepared shape).
            (Implemented, ADR-066) Each entry additionally carries per-file
            `additions`/`deletions` line counts computed server-side.
          items: { $ref: "#/components/schemas/DiffFileEntry" }
        perFile:
          type: array
          description: |
            (Implemented, ADR-066) Per-file syntax payload for the client diff
            renderer (`@git-diff-view/react`): the file's repo-relative `path`,
            resolved `fileLang`, and a server-built `bundle` (Shiki-highlighted
            `DiffFile.getBundle()` output) hydrated on the client with no
            client-side highlighting. Present for flow and scratch runs (M35,
            T3.3). The `bundle` shape is the library's serialization detail and
            is not specified field by field here.
          items:
            type: object
            required: [path, fileLang, bundle]
            properties:
              path: { type: string }
              fileLang: { type: string }
              bundle: { type: object }
        renderUnavailableReason:
          type: string
          nullable: true
          description: |
            (Implemented, ADR-066) `null` on the normal path; the string
            `prepare-failed` when highlighted-diff preparation threw and the
            response fell back to a name-status-only `files` summary with an
            empty `perFile` (the raw `diff` is still returned). The client then
            renders the raw diff instead of the rich view.
    DiffFileEntry:
      type: object
      required: [path, status]
      properties:
        path: { type: string }
        status:
          type: string
          description: git name-status letter (`A` add, `M` modify, `D` delete, `R` rename, `C` copy).
        additions:
          type: integer
          description: |
            (Implemented, ADR-066) Added-line count for this file, computed
            server-side from the unified diff (`+` lines, excluding the `+++`
            file header). Populated for flow runs; absent on legacy rows.
        deletions:
          type: integer
          description: |
            (Implemented, ADR-066) Removed-line count for this file, computed
            server-side (`-` lines, excluding the `---` file header).
    RunGraphResponse:
      type: object
      required: [topology, layout]
      properties:
        topology: { $ref: "#/components/schemas/GraphTopology" }
        layout:
          type: object
          description: |
            (ADR-064) Authored layout from the manifest `presentation` section,
            keyed by node id; a node absent from the map is dagre-seeded
            client-side.
          additionalProperties: { $ref: "#/components/schemas/GraphNodePosition" }
    GraphTopology:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items: { $ref: "#/components/schemas/GraphTopologyNode" }
        edges:
          type: array
          items: { $ref: "#/components/schemas/GraphTopologyEdge" }
    GraphTopologyNode:
      type: object
      required:
        [
          id,
          nodeType,
          label,
          displayLabel,
          nodeTypeLabel,
          nodeRole,
          declaredGateSummary,
        ]
      properties:
        id: { type: string }
        nodeType:
          type: string
          enum: [ai_coding, cli, check, judge, human, guard]
        label: { type: string }
        displayLabel:
          type: string
          description: Human-readable label derived from the node id; additive.
        nodeTypeLabel:
          type: string
          description: Human-readable node type label; additive.
        nodeRole:
          type: string
          enum: [agent, command, check, judge, human, terminal, other]
        declaredGateSummary:
          $ref: "#/components/schemas/DeclaredGateSummary"
    GraphTopologyEdge:
      type: object
      required: [id, source, target, outcome, displayLabel, edgeRole]
      properties:
        id: { type: string }
        source: { type: string }
        target: { type: string }
        outcome: { type: string }
        displayLabel:
          type: string
          description: Human-readable outcome label; additive.
        edgeRole:
          type: string
          enum: [success, default, rework, reject, takeover, approve, other]
    DeclaredGateSummary:
      type: object
      required: [total, blocking, advisory, kinds]
      properties:
        total: { type: integer, minimum: 0 }
        blocking: { type: integer, minimum: 0 }
        advisory: { type: integer, minimum: 0 }
        kinds:
          type: array
          items: { type: string }
    GraphNodePosition:
      type: object
      required: [x, y]
      properties:
        x: { type: number }
        y: { type: number }
    RunGraphStatusResponse:
      type: object
      required: [currentStepId, runStatus, nodes]
      properties:
        currentStepId: { type: string, nullable: true }
        runStatus: { type: string }
        nodes:
          type: object
          description: Per-node status map keyed by node id.
          additionalProperties: { $ref: "#/components/schemas/GraphNodeStatus" }
    GraphNodeStatus:
      type: object
      required: [status, attempt, gates, rollup, gateSummary]
      properties:
        status:
          type: string
          enum: [Pending, Running, Succeeded, Failed, NeedsInput, Reworked, Stale]
        attempt: { type: integer }
        autoRetry:
          type: boolean
          description: |
            (M30 — Implemented, ADR-080) True when the latest attempt for this node
            was an automatic retry (`node_attempts.auto_retry`) scheduled by the
            node's `retry_policy`. Absent/false on manually-driven attempts.
        gates:
          type: array
          items: { $ref: "#/components/schemas/GraphGateStatus" }
        rollup:
          type: string
          description: Worst-blocking gate rollup driving the node badge tint.
        gateSummary:
          $ref: "#/components/schemas/RuntimeGateSummary"
    RuntimeGateSummary:
      type: object
      required: [total, blockingTotal, advisoryTotal, worstBlockingStatus, failedBlocking, staleBlocking]
      properties:
        total: { type: integer, minimum: 0 }
        blockingTotal: { type: integer, minimum: 0 }
        advisoryTotal: { type: integer, minimum: 0 }
        worstBlockingStatus:
          type: string
          nullable: true
          enum: [pending, running, passed, failed, stale, skipped, overridden, null]
        failedBlocking: { type: integer, minimum: 0 }
        staleBlocking: { type: integer, minimum: 0 }
    GraphGateStatus:
      type: object
      required: [blocking, status]
      properties:
        blocking: { type: boolean }
        status:
          type: string
          enum: [pending, running, passed, failed, stale, skipped, overridden]
    FileTreeResponse:
      type: object
      required: [path, entries]
      properties:
        path: { type: string }
        entries:
          type: array
          items: { $ref: "#/components/schemas/FileTreeEntry" }
    FileTreeEntry:
      type: object
      required: [name, type]
      properties:
        name: { type: string }
        type: { type: string, enum: [file, dir] }
    NotFoundBody:
      type: object
      required: [message]
      properties:
        message: { type: string }
    PromoteRunBody:
      type: object
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [local_merge, rebase_merge, pull_request]
          deprecated: true
          description: |
            M18 compatibility alias. `local_merge` maps to
            `deliveryPolicyOverride.strategy=merge`; `rebase_merge` and
            `pull_request` map to the same-named strategies. New clients send
            `deliveryPolicyOverride`.
        deliveryPolicyOverride:
          $ref: "#/components/schemas/DeliveryPolicyOverride"
          description: |
            Explicit promote-time override. Omitted means use the run snapshot.
            The UI preselects the snapshot and marks this field as an override
            when any value differs.
        targetBranch:
          type: string
          minLength: 1
          maxLength: 255
          description: |
            Optional target-branch override. Server-validated against the
            project branch allow-list; for flow runs it may differ from the
            base branch. Defaults to the workspace's stored target branch.
        reviewedTargetCommit:
          type: string
          minLength: 1
          description: |
            (M18, Implemented) The target-branch HEAD commit the ReviewPanel
            rendered the promote surface against (commit-sha shape).
            Required by the flow promote service for manual ReviewPanel
            promotions — compared to the live target HEAD at claim time
            (optimistic concurrency). A mismatch is refused `PRECONDITION`
            ("target advanced since review") unless `allowTargetDrift` is set;
            a manual flow body omitting it is refused `PRECONDITION`, never
            promoted blind.
        allowTargetDrift:
          type: boolean
          default: false
          description: |
            (M18, Implemented) Explicit "Promote anyway" override. When true the
            `reviewedTargetCommit`-vs-live-HEAD equality check is skipped,
            merging into the advanced target. A deliberate human action, never
            a default.
    PromoteRunResponse:
      type: object
      required: [ok, mode]
      properties:
        ok: { type: boolean, enum: [true] }
        mode:
          type: string
          enum: [local_merge, pull_request, merge, rebase_merge, ai_rebase_merge]
        deliveryPolicy: { $ref: "#/components/schemas/DeliveryPolicy" }
        commit: { type: string, nullable: true }
        pullRequestUrl:
          type: string
          format: uri
          nullable: true
          description: |
            (M18, Implemented) URL of the created/updated pull or merge request.
            Present (non-null) only for successful `pull_request` promotions;
            null for `local_merge`.
        prNumber:
          type: integer
          minimum: 1
          nullable: true
          description: |
            (M18, Implemented) Provider-assigned PR/MR number. Present only for
            successful `pull_request` promotions.
    PatchRunDeliveryPolicyBody:
      type: object
      required: [action]
      additionalProperties: false
      properties:
        action:
          type: string
          enum: [switch_to_manual]
    HitlResponseBody:
      type: object
      description: |
        Discriminated union. Exactly ONE of `optionId` (permission) or
        `response` (form/human) MUST be present, matching the row's
        `kind` field.
      properties:
        optionId:
          type: string
          minLength: 1
          description: |
            Required iff the HITL row has `kind == "permission"`. MUST
            match one of the options the supervisor declared on the
            `session.permission_request` event.
        response:
          description: |
            Required iff the HITL row has `kind == "form" | "human"`.
            Validated against the row's `schema` field (MAIster form
            schema — see `docs/configuration.md`). Returns 422 on
            failure.

            **`kind="human"` with `on_reject` (Implemented — M17):** the
            response is captured under the same atomic-claim + artifact-write
            contract as `kind="form"`. On an APPROVE response (`rejected`
            absent/false) the runner advances to the NEXT step with the response
            surfaced as `steps.<stepId>.vars`. On a REJECT response
            (`{ rejected: true, comments?: string }`) the runner executes the
            Flow step's `on_reject` clause: it atomically reparks
            `runs.current_step_id` to `on_reject.goto_step`, injects `comments`
            under the step's `comments_var` into the goto target's context, and
            re-enters there. UIs SHOULD present rejection as a loop-back /
            send-back-with-comments action. The reject→goto loop is bounded by
            `maxLoops` (default 5); exceeding it terminates the run with
            `MaisterError("CONFIG")`. (In a graph `nodes[]` flow this routing is
            superseded by the node's declared-decision rework loop, M11a.)

            **(M11a — Designed) graph `human_review`:** for a review HITL the
            `response` object additionally carries the review-decision
            sub-schema (`ReviewDecisionResponse`) — `decision`, optional
            `comments`, optional `workspacePolicy` — alongside any declared form
            fields. These are validated against the manifest-derived allow-list
            stored in `hitl_requests.schema` (`allowedDecisions`, `transitions`,
            `reworkTargets`, `workspacePolicies`); an undeclared value → 422.
            They remain part of the `response` payload — NOT new top-level body
            fields.
          anyOf:
            - type: object
              description: Structured form payload — keys match the row's form schema.
              additionalProperties: true
            - $ref: "#/components/schemas/ReviewDecisionResponse"
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: |
            **(M17 — Implemented)** Optional responder self-reported certainty
            (`0..1`) for a `kind == "form" | "human"` response, including a
            graph `human_review` decision. Distinct from the AI-judge machine
            `GateVerdict.confidence` (M15). When present it is bounded
            server-side and echoed into the stored `hitl_requests.response`
            jsonb and written to `hitl_requests.human_confidence`. Ignored for
            `kind == "permission"`. Annotates the response; it never re-gates
            readiness.
    ReviewDecisionResponse:
      type: object
      description: |
        (M11a — Designed) The review-decision fields a graph `human_review`
        HITL carries INSIDE the `respond` route's `response` object. Validated
        against the row's server-state allow-list in `hitl_requests.schema`;
        mirrored into `hitl_requests.decision`/`workspace_policy`/`rework_target`
        on success.
      required: [decision]
      properties:
        decision:
          type: string
          minLength: 1
          description: |
            Chosen decision; MUST be in the row's `schema.allowedDecisions`
            (e.g. `approve`, `rework`). Its resolved `transitions[decision]`
            MUST be a declared node.
        comments:
          type: string
          description: |
            Free-text review comments; injected into the rework target's
            context via the node's `rework.commentsVar` when `decision` reworks.
        workspacePolicy:
          type: string
          description: |
            Required when `decision` triggers rework; MUST be in
            `schema.workspacePolicies`. **(M30 — Implemented, ADR-076)** all three
            execute against the node's pre-attempt checkpoint — `keep` (no-op),
            `rewind-to-node-checkpoint`, `fresh-attempt`; pre-M30 only `keep` ran.
          enum: [keep, rewind-to-node-checkpoint, fresh-attempt]
    ReviewComment:
      type: object
      description: |
        (Implemented — ADR-072) One `review_comments` row as a wire DTO. A ROOT
        comment (`parentId` null) carries the anchor
        (`filePath`/`side`/`line`/`lineContent`) and the `open|resolved`
        status; a REPLY carries no anchor (DB CHECK: anchor fields non-null ⇔
        root). `lineContent` is the exact server-extracted diff-line snapshot
        captured at creation — never client-supplied. `authorLabel` is a
        snapshot that survives user deletion (`authorUserId` is a SET NULL
        FK).
      required:
        - id
        - runId
        - hitlRequestId
        - nodeId
        - gateAttempt
        - parentId
        - authorUserId
        - authorLabel
        - body
        - status
        - createdAt
      properties:
        id: { type: string, format: uuid }
        runId: { type: string, format: uuid }
        hitlRequestId:
          type: string
          format: uuid
          description: The review-gate `hitl_requests` row (gate visit) of authoring.
        nodeId: { type: string }
        gateAttempt:
          type: integer
          minimum: 1
          description: Gate visit number at authoring time (iteration tag).
        parentId:
          type: string
          format: uuid
          nullable: true
          description: Null for a root; the root comment's id for a reply (1-level threads).
        authorUserId: { type: string, nullable: true }
        authorLabel: { type: string }
        filePath:
          type: string
          nullable: true
          description: Anchor (root only). Opaque anchor data — never a filesystem path component.
        side:
          type: string
          enum: [old, new]
          nullable: true
          description: Anchor diff side (root only) — `old` = base, `new` = branch.
        line:
          type: integer
          minimum: 1
          nullable: true
          description: Anchor 1-based line number on that side (root only).
        lineContent:
          type: string
          nullable: true
          description: Server-extracted line snapshot (root only).
        body: { type: string }
        status:
          type: string
          enum: [open, resolved]
          description: Thread status; meaningful on roots only (default `open`).
        resolvedByUserId: { type: string, nullable: true }
        resolvedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }
    ReviewCommentThread:
      type: object
      description: |
        (Implemented — ADR-072) A root comment with its replies and the computed
        `placement` for the current diff.
      required: [root, placement, replies]
      properties:
        root: { $ref: "#/components/schemas/ReviewComment" }
        placement:
          type: string
          enum: [inline, outdated]
          description: |
            `inline` iff the stored `lineContent` exactly matches the current
            server-recomputed diff at the same `(filePath, side, line)`;
            `outdated` otherwise. Computed per GET request — never stored, no
            fuzzy re-anchoring.
        replies:
          type: array
          description: Replies in `createdAt` (then `id`) ascending order.
          items: { $ref: "#/components/schemas/ReviewComment" }
    ReviewCommentThreadsResponse:
      type: object
      required: [threads]
      properties:
        threads:
          type: array
          description: |
            (Implemented — ADR-072) All threads of the run (open and resolved),
            roots ordered by `(filePath, line, side old<new, createdAt, id)`.
          items: { $ref: "#/components/schemas/ReviewCommentThread" }
    ReviewCommentResponse:
      type: object
      required: [comment]
      properties:
        comment: { $ref: "#/components/schemas/ReviewComment" }
    PostReviewCommentBody:
      description: |
        (Implemented — ADR-072) Shape-discriminated union: a ROOT comment
        carries the anchor and no `parentId`; a REPLY carries `parentId` and
        `body` only. A body matching both (or neither) shape is rejected 400.
        `lineContent` is NEVER accepted from the client — the server
        extracts it from the recomputed diff.
      oneOf:
        - $ref: "#/components/schemas/ReviewCommentRootBody"
        - $ref: "#/components/schemas/ReviewCommentReplyBody"
    ReviewCommentRootBody:
      type: object
      required: [filePath, side, line, body]
      properties:
        filePath:
          type: string
          minLength: 1
          description: |
            Anchor path as it appears in the diff. Opaque anchor DATA —
            validated against the server-computed diff (absent file → 409
            `PRECONDITION`); never used as a filesystem path component.
        side:
          type: string
          enum: [old, new]
        line:
          type: integer
          minimum: 1
        body:
          type: string
          minLength: 1
          maxLength: 10000
    ReviewCommentReplyBody:
      type: object
      required: [parentId, body]
      properties:
        parentId:
          type: string
          format: uuid
          description: |
            Must resolve to a ROOT comment of the SAME run (server-state
            compare) — otherwise 409 `CONFLICT`.
        body:
          type: string
          minLength: 1
          maxLength: 10000
    PatchReviewCommentBody:
      description: |
        (Implemented — ADR-072) Exactly one of `{body}` (author-only edit) or
        `{status}` (root-only resolve/unresolve). A body carrying both (or
        neither) is rejected 400.
      oneOf:
        - type: object
          title: EditBody
          required: [body]
          properties:
            body:
              type: string
              minLength: 1
              maxLength: 10000
        - type: object
          title: SetStatus
          required: [status]
          properties:
            status:
              type: string
              enum: [open, resolved]
    RouterSidecarStateResponse:
      type: object
      required: [ok, state]
      additionalProperties: false
      description: |
        Result of an admin CCR sidecar start/stop. `state` is the
        supervisor-reported process state (ADR-094); no DB marker is persisted.
      properties:
        ok: { type: boolean, enum: [true] }
        state:
          type: string
          enum: [idle, starting, ready, failed, stopping]
    MaisterErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - PRECONDITION
            - SPAWN
            - NEEDS_INPUT
            - HITL_TIMEOUT
            - CRASH
            - CONFLICT
            - CONFIG
            - EXECUTOR_UNAVAILABLE
            - FLOW_INSTALL
            - ACP_PROTOCOL
            - CHECKPOINT
            - STEP_CHECKPOINTED
            - UNAUTHENTICATED
            - UNAUTHORIZED
            - PASSWORD_CHANGE_REQUIRED
            - ACCOUNT_INACTIVE
        message: { type: string }
        retryHint: { type: string }
        pushRejected:
          type: string
          enum: [non_fast_forward]
        canForce: { type: boolean }

    CloneFailureReason:
      type: string
      description: |
        **(Implemented,
        [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons))**
        Advisory classification of a clone-stage git failure. Carried on a
        `PRECONDITION` error (the `code` is unchanged); the UI maps it to a
        specific remediation and never string-matches the raw stderr. See
        [`../error-taxonomy.md`](../error-taxonomy.md).
      enum:
        - SSH_AUTH
        - SSH_HOSTKEY
        - HTTPS_AUTH
        - NOT_FOUND
        - NETWORK
        - UNKNOWN
    CloneFailureBody:
      description: |
        **(Implemented,
        [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons))**
        `MaisterErrorBody` plus optional advisory `reason` + `detail` for a
        clone-stage `PRECONDITION`. Both are absent for non-clone failures
        (`CONFLICT`, etc.), so this is a drop-in superset of `MaisterErrorBody`.
      allOf:
        - $ref: "#/components/schemas/MaisterErrorBody"
        - type: object
          properties:
            reason: { $ref: "#/components/schemas/CloneFailureReason" }
            detail:
              type: string
              description: |
                Redacted git stderr (credentials stripped via `redactUrl`,
                truncated). Never contains a token or `://user:pass@`.
    PersistConfigBody:
      type: object
      description: |
        **(Implemented,
        [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons))**
        Body for persist-config. All fields optional; an empty body commits
        without pushing.
      additionalProperties: false
      properties:
        push:
          type: boolean
          default: false
          description: |
            When `true`, push the persist commit to the remote after the DB
            flip (host-ambient auth). A push failure is non-fatal — the response
            is still `200` with a `pushWarning`.
    PersistConfigResponse:
      type: object
      description: |
        **(Implemented,
        [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons))**
        Success body for persist-config.
      additionalProperties: false
      required: [ok]
      properties:
        ok: { type: boolean, enum: [true] }
        usedDefaultAuthor:
          type: boolean
          description: |
            `true` when the host git author was unset and the commit used the
            default identity `maister <noreply@maister.local>`. Surfaced to the
            user (toast) so they can configure a real author.
        pushWarning:
          type: string
          description: |
            Present only when an opt-in `push` was requested and failed; the
            local commit + DB flip already succeeded and are never rolled back.
    RemoteItem:
      type: object
      description: |
        **(Implemented,
        [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons))**
        One git remote. `url` is always **credential-redacted**.
      additionalProperties: false
      required: [name, url]
      properties:
        name:
          type: string
          description: Remote name (the shared `remoteNameSchema` — dots/slashes allowed, no leading `-`).
          example: origin
        url:
          type: string
          description: Remote URL, credential-redacted.
          example: https://github.com/org/my-app.git
    RemotesListResponse:
      type: object
      additionalProperties: false
      required: [remotes]
      properties:
        remotes:
          type: array
          items: { $ref: "#/components/schemas/RemoteItem" }
    RemoteItemResponse:
      type: object
      additionalProperties: false
      required: [ok, remote]
      properties:
        ok: { type: boolean, enum: [true] }
        remote: { $ref: "#/components/schemas/RemoteItem" }
    RemoteActionResponse:
      type: object
      description: |
        **(Implemented,
        [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons))**
        Result of a `push` / `fetch` / `set-upstream` action. `warning` carries
        a non-fatal advisory (e.g. a rejected push) — host-ambient auth, nothing
        to roll back.
      additionalProperties: false
      required: [ok]
      properties:
        ok: { type: boolean, enum: [true] }
        warning: { type: string }
    RemoteAddBody:
      type: object
      description: Add a remote (`git remote add`).
      additionalProperties: false
      required: [name, url]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Remote name; validated by the shared `remoteNameSchema`.
          example: origin
        url:
          type: string
          minLength: 1
          maxLength: 2048
          description: Remote URL (scheme allow-listed; redacted in responses and logs).
          example: git@github.com:org/my-app.git
    RemoteActionBody:
      type: object
      description: |
        Run a remote action (`push` / `fetch` / `set-upstream`) reusing
        host-ambient auth. No DB write.
      additionalProperties: false
      required: [op, name]
      properties:
        op:
          type: string
          enum: [push, fetch, set-upstream]
        name:
          type: string
          minLength: 1
          description: Target remote name.
          example: origin
        branch:
          type: string
          minLength: 1
          description: Branch to push / set upstream for (required for `push` and `set-upstream`).
          example: main
    RemotePostBody:
      description: |
        **(Implemented,
        [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons))**
        `POST /remotes` union — either add a remote (`{ name, url }`) or run an
        action (`{ op, name, ... }`).
      oneOf:
        - $ref: "#/components/schemas/RemoteAddBody"
        - $ref: "#/components/schemas/RemoteActionBody"
    RemoteSetUrlBody:
      type: object
      description: Set a remote's URL (`name` in the body to allow `/` in names).
      additionalProperties: false
      required: [name, url]
      properties:
        name:
          type: string
          minLength: 1
          example: origin
        url:
          type: string
          minLength: 1
          maxLength: 2048
          example: git@github.com:org/my-app.git
    RemoteDeleteBody:
      type: object
      description: Remove a remote (`name` in the body to allow `/` in names).
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          example: upstream

    GateChatMessage:
      type: object
      description: |
        (M30, ADR-078) One persisted gate-chat turn. The DTO never includes
        `acp_session_id` or `author_user_id` (server-only).
      additionalProperties: false
      required: [id, role, authorLabel, body, seq, mutationReverted, createdAt]
      properties:
        id: { type: string }
        role: { type: string, enum: [user, agent] }
        authorLabel: { type: string }
        body: { type: string }
        seq: { type: integer }
        mutationReverted:
          type: boolean
          description: |
            True when the L3 neutrality sensor reverted a workspace mutation
            during this turn (agent turns only; always false on user turns).
        createdAt: { type: string, format: date-time }

    ArtifactInstance:
      type: object
      description: |
        (M12) Explicit DTO projection of one typed-artifact evidence row.
        Internal handles are intentionally excluded: this DTO NEVER carries
        `acp_session_id` or absolute worktree paths. Any file path in
        `locator` is run-relative.
      required:
        - id
        - runId
        - kind
        - producer
        - locator
        - validity
        - visibility
        - retention
        - createdAt
      properties:
        id: { type: string }
        runId: { type: string }
        nodeAttemptId: { type: string, nullable: true }
        nodeId: { type: string, nullable: true }
        attempt: { type: integer, nullable: true }
        artifactDefId: { type: string, nullable: true }
        kind:
          type: string
          description: Closed catalog of artifact kinds.
          enum:
            - diff
            - log
            - test_report
            - lint_report
            - ai_judgment
            - human_note
            - commit_set
            - checkpoint
            - preview
            - generic_file
        producer:
          type: string
          enum: [runner, projector, takeover, gate, human]
        locator:
          $ref: "#/components/schemas/ArtifactLocator"
        uri: { type: string, nullable: true }
        hash: { type: string, nullable: true }
        sizeBytes: { type: integer, nullable: true }
        validity:
          type: string
          enum: [current, stale, superseded, failed, skipped]
        requiredFor:
          type: array
          nullable: true
          description: |
            Declared/recorded in M12; access enforcement is M14.
          items:
            type: string
            enum: [review, merge]
        visibility:
          type: string
          description: |
            Declared/recorded in M12; access enforcement is M14.
          enum: [internal, shared]
        retention:
          type: string
          description: |
            Declared/recorded in M12; access enforcement is M14.
          enum: [run, ephemeral]
        createdAt: { type: string, format: date-time }

    ArtifactLocator:
      description: |
        (M12) Discriminated union locating an artifact's payload. The
        `kind` field selects the variant. File paths are run-relative —
        absolute worktree paths are never exposed.
      oneOf:
        - $ref: "#/components/schemas/ArtifactLocatorGitRange"
        - $ref: "#/components/schemas/ArtifactLocatorGitLog"
        - $ref: "#/components/schemas/ArtifactLocatorFile"
        - $ref: "#/components/schemas/ArtifactLocatorGateVerdict"
        - $ref: "#/components/schemas/ArtifactLocatorHitlResponse"
        - $ref: "#/components/schemas/ArtifactLocatorInline"
      discriminator:
        propertyName: kind
        mapping:
          git-range: "#/components/schemas/ArtifactLocatorGitRange"
          git-log: "#/components/schemas/ArtifactLocatorGitLog"
          file: "#/components/schemas/ArtifactLocatorFile"
          gate-verdict: "#/components/schemas/ArtifactLocatorGateVerdict"
          hitl-response: "#/components/schemas/ArtifactLocatorHitlResponse"
          inline: "#/components/schemas/ArtifactLocatorInline"

    ArtifactLocatorGitRange:
      type: object
      required: [kind, baseCommit, headRef]
      properties:
        kind: { type: string, enum: [git-range] }
        baseCommit: { type: string }
        headRef: { type: string }

    ArtifactLocatorGitLog:
      type: object
      required: [kind, baseRef, headRef]
      properties:
        kind: { type: string, enum: [git-log] }
        baseRef: { type: string }
        headRef: { type: string }

    ArtifactLocatorFile:
      type: object
      required: [kind, path]
      properties:
        kind: { type: string, enum: [file] }
        path:
          type: string
          description: Run-relative path inside the run directory.

    ArtifactLocatorGateVerdict:
      type: object
      required: [kind, gateResultId]
      properties:
        kind: { type: string, enum: [gate-verdict] }
        gateResultId: { type: string }

    ArtifactLocatorHitlResponse:
      type: object
      required: [kind, hitlRequestId]
      properties:
        kind: { type: string, enum: [hitl-response] }
        hitlRequestId: { type: string }

    ArtifactLocatorInline:
      type: object
      required: [kind, text]
      properties:
        kind: { type: string, enum: [inline] }
        text: { type: string }
        hitlRequestId:
          type: string
          description: |
            (Implemented — ADR-072) Present on the composed-rework-payload
            evidence row (`kind: human_note`, `producer: runner`): the
            authoring review-gate `hitl_requests` id. `text` carries the
            composed payload.
        threadIds:
          type: array
          items: { type: string }
          description: |
            (Implemented — ADR-072) Ids of the open root comments serialized
            into `text` at compose time.

    ArtifactInstanceList:
      type: object
      required: [artifacts]
      properties:
        artifacts:
          type: array
          items: { $ref: "#/components/schemas/ArtifactInstance" }

    InstallFlowPackageBody:
      type: object
      required: [flowRefId, source, version]
      properties:
        flowRefId: { type: string, minLength: 1, example: "bugfix" }
        source:
          type: string
          minLength: 1
          example: "github.com/my-org/maister-flow-bugfix"
        version: { type: string, minLength: 1, example: "v1.2.3" }

    InstallFlowPackageResult:
      type: object
      required: [flowRowId, revisionId, revision, trustStatus, enablementState]
      properties:
        flowRowId: { type: string, format: uuid }
        revisionId: { type: string, format: uuid }
        revision:
          type: string
          description: Resolved revision — git SHA (40 hex) or local manifest-digest prefix.
        trustStatus:
          type: string
          enum: [untrusted, trusted, trusted_by_policy]
        enablementState:
          type: string
          enum: [Enabled, Installed]

    UpgradeFlowPackageBody:
      type: object
      required: [source, version]
      properties:
        source: { type: string, minLength: 1 }
        version: { type: string, minLength: 1 }

    RevisionIdBody:
      type: object
      required: [revisionId]
      properties:
        revisionId: { type: string, minLength: 1, format: uuid }

    ContractDiff:
      type: object
      required: [added, removed]
      properties:
        added: { type: array, items: { type: string } }
        removed: { type: array, items: { type: string } }

    UpgradePreview:
      type: object
      required:
        - fromRevisionId
        - toRevisionId
        - schemaVersionChanged
        - setupChanged
        - steps
        - gates
        - artifacts
        - capabilities
        - externalOps
        - agents
      properties:
        fromRevisionId: { type: string, format: uuid, nullable: true }
        toRevisionId: { type: string, format: uuid }
        schemaVersionChanged: { type: boolean }
        setupChanged: { type: boolean }
        steps: { $ref: "#/components/schemas/ContractDiff" }
        gates: { $ref: "#/components/schemas/ContractDiff" }
        artifacts: { $ref: "#/components/schemas/ContractDiff" }
        capabilities: { $ref: "#/components/schemas/ContractDiff" }
        externalOps: { $ref: "#/components/schemas/ContractDiff" }
        agents: { $ref: "#/components/schemas/AgentUpgradeImpact" }

    AgentUpgradeImpact:
      type: object
      description: |
        (M34 — Implemented, ADR-089 rework, owner decision 7.) Agent
        break-impact between the enabled and candidate revisions: removed/
        changed agents joined against the requesting project's LIVE
        attachments (`agent_project_links`) and trigger bindings
        (`agent_schedules`) — "what stops working" is explicit before enable.
      required: [added, removed, changed]
      properties:
        added:
          type: array
          items: { type: string }
        removed:
          type: array
          items:
            type: object
            required: [id, attachedHere, scheduleCount]
            properties:
              id: { type: string }
              attachedHere: { type: boolean }
              scheduleCount: { type: integer }
        changed:
          type: array
          items:
            type: object
            required: [id, changes, droppedTriggers, attachedHere, scheduleCount]
            properties:
              id: { type: string }
              changes:
                type: array
                items: { type: string }
              droppedTriggers:
                type: array
                items: { type: string }
              attachedHere: { type: boolean }
              scheduleCount: { type: integer }

    TokenScope:
      type: string
      enum:
        - "*"
        - tasks:create
        - tasks:read
        - tasks:update
        - runs:launch
        - runs:read
        - readiness:read
        - gates:report
        - hitl:read
        - hitl:inbox:read
        - hitl:respond
        - hitl:respond:human
      description: |
        Route authorization label for `/api/v1/ext`. `*` grants the project
        external API except exact-only human-HITL approval:
        `hitl:respond:human` must be present explicitly.

    CreateAccountTokenBody:
      type: object
      description: |
        (0063 Implemented) Request body for creating an account-level personal API
        token. The body never accepts `projectId`; the owner is the active
        session user and the stored token has `project_id = NULL`.
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable label for the token.
        scopes:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/TokenScope"
          description: |
            Requested route scopes. Must not include `hitl:respond:human`;
            use `humanHitl=true` for that exact human capability. Omit or send
            an empty array to default to `["*"]`.
        humanHitl:
          type: boolean
          default: false
          description: |
            When true, the server appends exact `hitl:respond:human` to the
            stored scopes so this token can answer eligible human HITL as the
            owner user.
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Optional expiry timestamp. Omit or send null for none.

    AccountTokenListItem:
      type: object
      description: |
        (0063 Implemented) Account-level personal token metadata. NEVER includes
        plaintext `token` or `token_hash`.
      required: [id, name, kind, ownerUserId, ownerLabel, scopes, humanHitl, prefix, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        kind:
          type: string
          enum: [user]
        ownerUserId:
          type: string
        ownerLabel:
          type: string
          nullable: true
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/TokenScope"
        humanHitl:
          type: boolean
          description: True when stored scopes include exact `hitl:respond:human`.
        prefix:
          type: string
          description: First 12 characters of the token string.
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true

    CreateAccountTokenResponse:
      allOf:
        - $ref: "#/components/schemas/AccountTokenListItem"
        - type: object
          required: [token]
          properties:
            token:
              type: string
              description: |
                Full plaintext token (`mai_` + base64url(32 bytes)). Returned
                ONCE. Store it now; the server only keeps the sha256 hash.

    ListAccountTokensResponse:
      type: object
      description: (0063 Implemented) List of account-level personal API tokens without secrets.
      required: [tokens]
      properties:
        tokens:
          type: array
          items: { $ref: "#/components/schemas/AccountTokenListItem" }

    CreateProjectTokenBody:
      type: object
      description: (M16) Request body for creating a project API token.
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable label for the token (e.g. "CI pipeline").
        kind:
          type: string
          enum: [project, user]
          default: project
          description: |
            `project` is an automation identity for the project. `user` is a
            named personal/webhook token owned by the current session user.
        scopes:
          type: array
          minItems: 1
          default: ["*"]
          items:
            $ref: "#/components/schemas/TokenScope"
          description: Required route scopes. `*` is the full-project wildcard.
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Optional expiry timestamp (ISO 8601). Omit or send `null` for a
            non-expiring token. Tokens past `expiresAt` return 401 on use.

    CreateProjectTokenResponse:
      type: object
      description: |
        (M16) Created token metadata plus the plaintext secret. The `token`
        field is shown ONCE — the server does not store it and cannot re-derive
        it. Subsequent list responses omit `token`.
      required: [id, name, kind, ownerUserId, ownerLabel, scopes, prefix, token, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        kind:
          type: string
          enum: [project, user]
        ownerUserId:
          type: string
          nullable: true
          description: Token owner for `kind=user`; null for project tokens.
        ownerLabel:
          type: string
          nullable: true
          description: Display label for the user-token owner.
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/TokenScope"
        prefix:
          type: string
          description: First 12 characters of the token string (used for lookup).
        token:
          type: string
          description: |
            Full plaintext token (`mai_` + base64url(32 bytes)). Returned ONCE.
            Store it now — the server only keeps the sha256 hash.
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true

    ProjectTokenListItem:
      type: object
      description: |
        (M16) Token metadata for the list endpoint. NEVER includes `token_hash`
        or the plaintext secret.
      required: [id, name, kind, ownerUserId, ownerLabel, scopes, prefix, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        kind:
          type: string
          enum: [project, user]
        ownerUserId:
          type: string
          nullable: true
        ownerLabel:
          type: string
          nullable: true
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/TokenScope"
        prefix:
          type: string
          description: First 12 characters of the token string.
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true

    ListProjectTokensResponse:
      type: object
      description: (M16) List of project API tokens without secrets.
      required: [tokens]
      properties:
        tokens:
          type: array
          items: { $ref: "#/components/schemas/ProjectTokenListItem" }

    # ── M27 MCP schemas ──────────────────────────────────────────────────────

    McpTransport:
      type: string
      enum: [stdio, sse, http]
      description: |
        (M27) MCP server transport kind.
        `stdio` — spawns a local subprocess; `command` required; gated by
        `exec_trust` of the owning revision.
        `sse` / `http` — connects to a remote endpoint; `url` required.

    LocalPackage:
      type: object
      description: |
        (ADR-096 — Designed) A `local_packages` row (Flow Studio Phase C).
        `working_dir` is server-only and intentionally absent.
      required: [id, name, slug, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        status: { type: string, enum: [active, archived] }
        sourceInstallId: { type: string, nullable: true, description: "Fork lineage: the git-package install this was forked from." }
        sourceRepoUrl: { type: string, nullable: true }
        sourceRef: { type: string, nullable: true }
        branchName: { type: string, nullable: true }
        lastCutInstallId: { type: string, nullable: true }
        lockedByUserId: { type: string, nullable: true, description: "Current lock holder; null when unlocked." }
        lockExpiresAt: { type: string, format: date-time, nullable: true }
        createdBy: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    LocalPackageLock:
      type: object
      description: "(ADR-096 — Designed) Session edit-lock state for a local package."
      required: [held, heldByMe]
      properties:
        held: { type: boolean, description: "True if a live (non-expired) lock exists." }
        heldByMe: { type: boolean, description: "True if the caller's session holds it." }
        holderLabel: { type: string, nullable: true, description: "Display name of the holder (never the session id)." }
        expiresAt: { type: string, format: date-time, nullable: true }
    LocalPackageFile:
      type: object
      description: "(ADR-096 — Designed) A file inside the working dir."
      required: [path, kind]
      properties:
        path: { type: string, description: "Relative to the working dir." }
        kind: { type: string, description: "Inferred kind (flow|skill|agent|mcp|rule|schema|script|asset|readme)." }
        content: { type: string, nullable: true, description: "Present on single-file GET only." }
        contentHash: { type: string, nullable: true, description: "sha256 of content (informational)." }
    LocalPackageCreateBody:
      type: object
      required: [name]
      properties:
        name: { type: string }
        sourceInstallId: { type: string, nullable: true, description: "Fork: seed the working dir from this git-package install." }
    LocalPackagePatchBody:
      type: object
      properties:
        name: { type: string }
        status: { type: string, enum: [active, archived] }
    LocalPackageFileWriteBody:
      type: object
      required: [content]
      properties:
        content: { type: string }
    LocalPackageMoveBody:
      type: object
      required: [targetLocalPackageId]
      properties:
        targetLocalPackageId: { type: string }
        targetPath: { type: string, nullable: true, description: "Defaults to the same relative path in the target." }
    CutVersionBody:
      type: object
      properties:
        attachToProjectId: { type: string, minLength: 1, description: "Attach the cut version to this project id (caller must be a member; manageLocalPackages). Validated server-side before any irreversible side-effect." }
    CutVersionResult:
      type: object
      required: [installId, versionLabel]
      properties:
        installId: { type: string, description: "The immutable package_installs id the cut produced." }
        versionLabel: { type: string, description: "e.g. local-<digest12>." }
        attachmentId: { type: string, description: "Present only when attachToProjectId was supplied and the attach succeeded." }
    ForkElementBody:
      type: object
      required: [projectId, elementPath]
      properties:
        projectId: { type: string, minLength: 1, description: "Target project (body-controlled; validated against the caller's accessible projects). Its default local package receives the element." }
        elementPath: { type: string, minLength: 1, description: "Working-dir-relative path of the ONE element to copy (flow dir / skill bundle / agent .md / rule file). Confined; `..`/abs/`.git` rejected." }
    ForkResult:
      type: object
      required: [localPackageId]
      properties:
        localPackageId: { type: string, description: "The local package the fork landed in (a new `<ref>-local` for a package fork; the project default for an element fork)." }
    PackageSource:
      type: object
      description: |
        (ADR-088 — Implemented) A `package_sources` row with the cached
        discovery snapshot. Discovery failures keep the stale snapshot.
      required: [id, url, enabled, discovered, lastCheckedAt, builtIn, createdAt, updatedAt]
      properties:
        id: { type: string }
        url: { type: string, description: "Git monorepo URL (packages/<name>/ layout)." }
        enabled: { type: boolean }
        note: { type: string, nullable: true }
        discovered:
          type: array
          items: { $ref: "#/components/schemas/DiscoveredPackage" }
        lastCheckedAt: { type: string, format: date-time, nullable: true }
        builtIn:
          type: boolean
          description: >-
            True when the source URL is a built-in default (member of
            MAISTER_DEFAULT_PACKAGE_SOURCES, ensured at boot). Surfaced as the
            localized "Built-in" badge; does not block disable/delete.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DiscoveredPackage:
      type: object
      description: (ADR-088 — Implemented) One package found in a source's default branch.
      required: [name, tags]
      properties:
        name: { type: string }
        tags:
          type: array
          items: { type: string }
          description: "Per-package tags (<name>/vX.Y.Z), newest first."

    PackageSourceBody:
      type: object
      required: [url]
      properties:
        url: { type: string, minLength: 1 }
        note: { type: string }
        enabled: { type: boolean, default: true }

    PackageInstallSummary:
      type: object
      description: |
        (ADR-088 — Implemented) An immutable installed package revision.
        `installed_path` is NEVER projected to clients.
      required: [id, sourceUrl, name, versionLabel, resolvedRevision, packageStatus, trustStatus, flows]
      properties:
        id: { type: string }
        sourceUrl: { type: string }
        name: { type: string }
        versionLabel:
          type: string
          description: "Raw tag (e.g. aif/v2.0.0) or local-<digest12> for local versions."
        resolvedRevision: { type: string, description: "Tag SHA or package content digest." }
        packageStatus:
          type: string
          enum: [Installing, Installed, Failed, Removed]
        trustStatus:
          type: string
          enum: [untrusted, trusted, trusted_by_policy]
        flows:
          type: array
          items: { type: string }
          description: "Manifest flow ids."

    ProjectPackageAttachment:
      type: object
      description: (ADR-088 — Implemented) A project's enablement of one package install.
      required: [id, packageInstallId, packageName, versionLabel, attachedAt, updateAvailable, flows]
      properties:
        id: { type: string }
        packageInstallId: { type: string }
        packageName: { type: string }
        versionLabel: { type: string }
        attachedAt: { type: string, format: date-time }
        updateAvailable:
          type: boolean
          description: "A newer matching tag exists in the source's discovered snapshot."
        flows:
          type: array
          items: { type: string }
          description: "Member flow ref ids."

    PlatformMcpServer:
      type: object
      description: |
        (M27) A `platform_mcp_servers` row. Secret values are NEVER included
        — `envKeys` and `headerKeys` list only the env-var NAME strings.
      required:
        - id
        - transport
        - args
        - envKeys
        - headerKeys
        - supportedAgents
        - trustStatus
        - readinessStatus
        - readinessReasons
        - enabled
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        transport: { $ref: "#/components/schemas/McpTransport" }
        command:
          type: string
          nullable: true
          description: Subprocess command for `stdio` transport. Null for sse/http.
        args:
          type: array
          items: { type: string }
        envKeys:
          type: array
          items: { type: string }
          description: |
            Env-var NAME strings (`env:NAME` without the prefix) that the
            supervisor resolves from the host environment. Values are NEVER
            stored or returned.
        url:
          type: string
          nullable: true
          description: Endpoint URL for `sse`/`http` transport. Null for stdio.
        headerKeys:
          type: array
          items: { type: string }
          description: |
            HTTP header NAME strings whose values are resolved supervisor-side
            from `env:NAME` references.
        supportedAgents:
          type: array
          items: { type: string, enum: [claude, codex, gemini, opencode, mimo] }
        trustStatus:
          type: string
          enum: [untrusted, trusted, trusted_by_policy]
        readinessStatus:
          type: string
          enum: [Unknown, Ready, NotReady]
        readinessReasons:
          type: array
          items: { type: string }
        enabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PlatformMcpServerBody:
      type: object
      description: |
        (M27) Request body for creating a platform MCP server. Secret values
        MUST be supplied as `env:NAME` references (`^env:[A-Za-z_][A-Za-z0-9_]*$`).
        Plain secret values are refused with `422 CONFIG`.
      required: [id, transport]
      additionalProperties: false
      properties:
        id:
          type: string
          minLength: 1
          description: Unique platform-scoped id for this MCP server.
        transport: { $ref: "#/components/schemas/McpTransport" }
        command:
          type: string
          nullable: true
          description: Required when `transport=stdio`. Null/omitted for sse/http.
        args:
          type: array
          items: { type: string }
          default: []
        envKeys:
          type: array
          description: |
            Env-var NAME references for stdio transport. Each entry is an
            `env:NAME` reference or a bare `NAME`; plain secret values are
            refused (`422 CONFIG`). Only the NAME is stored; values resolve
            supervisor-side. Ignored for sse/http.
          items:
            type: string
            pattern: "^(env:)?[A-Za-z_][A-Za-z0-9_]*$"
        url:
          type: string
          nullable: true
          description: Required when `transport=sse` or `transport=http`. Null/omitted for stdio.
        headerKeys:
          type: array
          description: |
            HTTP header NAME references for sse/http transport. Each entry is
            an `env:NAME` reference or a bare `NAME`; values resolve
            supervisor-side and are never stored. Ignored for stdio.
          items:
            type: string
            pattern: "^(env:)?[A-Za-z_][A-Za-z0-9_]*$"
        supportedAgents:
          type: array
          items: { type: string, enum: [claude, codex, gemini, opencode, mimo] }
          default: ["claude", "codex"]
        enabled:
          type: boolean
          default: true

    ProjectMcpServer:
      type: object
      description: |
        (M27) A project-scoped MCP server capability record (`capability_records`
        row with `kind=mcp`, `source=project`). Secret values are NEVER
        included — only env-var NAME strings are returned.
      required:
        - id
        - refId
        - transport
        - args
        - envKeys
        - headerKeys
        - supportedAgents
        - createdAt
      properties:
        id: { type: string, format: uuid }
        refId:
          type: string
          description: Capability ref id — unique within the project.
        transport: { $ref: "#/components/schemas/McpTransport" }
        command:
          type: string
          nullable: true
        args:
          type: array
          items: { type: string }
        envKeys:
          type: array
          items: { type: string }
          description: Env-var NAME strings. Values are resolved supervisor-side.
        url:
          type: string
          nullable: true
        headerKeys:
          type: array
          items: { type: string }
        supportedAgents:
          type: array
          items: { type: string, enum: [claude, codex, gemini, opencode, mimo] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ProjectMcpServerBody:
      type: object
      description: |
        (M27) Request body for creating a project-scoped MCP server. Secret
        values MUST be `env:NAME` references.
      required: [refId, transport]
      additionalProperties: false
      properties:
        refId:
          type: string
          minLength: 1
          description: Capability ref id — must be unique within the project.
        transport: { $ref: "#/components/schemas/McpTransport" }
        command:
          type: string
          description: Required when `transport=stdio`.
        args:
          type: array
          items: { type: string }
          default: []
        env:
          type: object
          additionalProperties:
            type: string
            pattern: "^env:[A-Za-z_][A-Za-z0-9_]*$"
        url:
          type: string
          description: Required when `transport=sse` or `transport=http`.
        headers:
          type: object
          additionalProperties:
            type: string
            pattern: "^env:[A-Za-z_][A-Za-z0-9_]*$"
        supportedAgents:
          type: array
          items: { type: string, enum: [claude, codex, gemini, opencode, mimo] }
          default: ["claude", "codex"]

    ResolvedMcpEntry:
      type: object
      description: |
        (M27) One winner in the capability resolution result set.
        Produced by `selectedRecords` after applying project > platform >
        flow-package precedence. Secret values are NEVER included.
      required: [refId, scope, transport, args, envKeys, supportedAgents]
      properties:
        refId:
          type: string
          description: Capability ref id — unique in the resolved set.
        scope:
          type: string
          enum: [project, platform, flow-package]
          description: The winning precedence scope.
        transport: { $ref: "#/components/schemas/McpTransport" }
        command:
          type: string
          nullable: true
        args:
          type: array
          items: { type: string }
        envKeys:
          type: array
          items: { type: string }
          description: Env-var NAME strings resolved supervisor-side.
        url:
          type: string
          nullable: true
        headerKeys:
          type: array
          items: { type: string }
        supportedAgents:
          type: array
          items: { type: string, enum: [claude, codex, gemini, opencode, mimo] }
    ModelSuggestionsRequest:
      type: object
      additionalProperties: false
      required: [adapter, provider]
      description: |
        Runner draft for model discovery. `provider` is the web-side runner
        provider shape whose secret fields carry `env:NAME` references; the route
        converts them to bare names before forwarding to the supervisor. Raw
        (non-`env:`) secret values are rejected with `CONFIG` (422).
      properties:
        adapter: { type: string, enum: [claude, codex, gemini, opencode, mimo] }
        provider:
          type: object
          description: |
            RunnerProvider (web shape) — implemented kinds are `anthropic |
            anthropic_compatible | openai | openai_compatible`; ADR-084 designs
            `google_gemini | google_vertex | google_gateway | agent_native`.
            Secret fields use `env:NAME` refs only.
        router: { type: string, enum: [ccr] }
        sidecarId:
          type: string
          nullable: true
          description: Validated against the platform sidecar catalog when `router == "ccr"`.
        force:
          type: boolean
          default: false
          description: Bypass the supervisor's in-memory cache and repopulate it.
    ModelSuggestionsResponse:
      type: object
      additionalProperties: false
      required: [groups, resolvedAt, ttlSeconds]
      description: Model suggestions grouped by source for the runner-modal combobox. Never contains a secret value.
      properties:
        groups:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [source, label, status, models]
            properties:
              source:
                type: string
                enum: [acp_probe, provider_api, curated, ccr, agent_observed]
              label:
                type: string
                description: Localized-at-render group label (Agent / Provider / Curated / CCR / Observed).
              status:
                type: string
                enum: [ok, skipped, error]
              reason:
                type: string
                description: Detail for `skipped`/`error`. Never a secret.
              models:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required: [id]
                  properties:
                    id: { type: string }
                    displayName: { type: string }
        resolvedAt: { type: string, format: date-time }
        ttlSeconds: { type: integer, minimum: 0 }

    # ── ADR-077 Outbound webhooks ───────────────────────────────────────────────

    WebhookEventType:
      type: string
      description: |
        (ADR-077) The curated outbound event taxonomy (12 types). The full
        per-type `data` shapes are in `async/outbound-webhooks.asyncapi.yaml`.
      enum:
        - run.started
        - run.needs_input
        - hitl.requested
        - hitl.responded
        - run.review
        - run.promoted
        - run.done
        - run.failed
        - run.crashed
        - run.abandoned
        - gate.decided
        - ping

    WebhookEventTypeSelector:
      description: |
        (ADR-077) An `event_types` entry: either a single taxonomy type or the
        literal `"*"` (subscribe to all current and future types).
      oneOf:
        - $ref: "#/components/schemas/WebhookEventType"
        - type: string
          enum: ["*"]

    WebhookLastDelivery:
      type: object
      nullable: true
      description: |
        (ADR-077) Summary of the subscription's most recent delivery, or `null`
        when it has never produced one.
      required: [status, at]
      properties:
        status:
          type: string
          enum: [pending, delivered, dead]
        at:
          type: string
          format: date-time
          description: Timestamp of the latest delivery's last state change.

    WebhookSubscription:
      type: object
      description: |
        (ADR-077) A `webhook_subscriptions` row. `projectId` is `null` for
        platform-scoped subscriptions. Secret values are NEVER returned —
        `signing_secret_ref`, `secondary_signing_secret_ref`, and `headers`
        values persist as `env:NAME` references only and are echoed as those
        reference strings.
      required:
        - id
        - projectId
        - name
        - url
        - method
        - headers
        - event_types
        - signing_secret_ref
        - secondary_signing_secret_ref
        - enabled
        - createdAt
        - updatedAt
        - lastDelivery
      properties:
        id: { type: string }
        projectId:
          type: string
          format: uuid
          nullable: true
          description: Owning project id, or `null` for platform scope.
        name: { type: string }
        url:
          type: string
          format: uri
          description: Delivery endpoint (`http`/`https` only).
        method:
          type: string
          enum: [POST, PUT]
        headers:
          type: object
          additionalProperties: { type: string }
          description: |
            Static request headers merged with the signature/identity headers.
            Values MUST be `env:NAME` references — literal values are rejected
            (resolved server-side at send, returned here as the raw
            reference). Reserved `X-Maister-*` and signature headers cannot be
            overridden.
        event_types:
          type: array
          items: { $ref: "#/components/schemas/WebhookEventTypeSelector" }
          description: Subscribed types, or a single-element `["*"]` for all.
        signing_secret_ref:
          type: string
          pattern: "^env:[A-Za-z_][A-Za-z0-9_]*$"
          description: |
            `env:NAME` reference to the HMAC-SHA256 signing secret. The value is
            NEVER returned — only the reference string.
        secondary_signing_secret_ref:
          type: string
          pattern: "^env:[A-Za-z_][A-Za-z0-9_]*$"
          nullable: true
          description: |
            Optional second `env:NAME` reference used during signing-secret
            rotation; when set, a second `v1=` signature entry is appended.
        enabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        lastDelivery: { $ref: "#/components/schemas/WebhookLastDelivery" }

    WebhookSubscriptionCreate:
      type: object
      description: |
        (ADR-077) Create body for a webhook subscription. Config values only —
        NO cross-resource ids (scope comes from the route, not the body). Secret
        values are NEVER accepted; supply `env:NAME` references instead.
      required: [name, url, event_types, signing_secret_ref]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        url:
          type: string
          format: uri
          maxLength: 2048
          description: |
            Delivery endpoint. MUST be `http` or `https` and satisfy the
            destination egress policy — a loopback / private / link-local /
            metadata IP-literal destination is refused (`422 CONFIG`);
            hostnames are re-checked (resolved) at send time.
        method:
          type: string
          enum: [POST, PUT]
          default: POST
        headers:
          type: object
          additionalProperties:
            type: string
            pattern: "^env:[A-Za-z_][A-Za-z0-9_]*$"
            description: |
              Header value. MUST be an `env:NAME` reference
              (`^env:[A-Za-z_][A-Za-z0-9_]*$`), resolved server-side at send;
              a raw value is refused `422 CONFIG`.
          default: {}
        event_types:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/WebhookEventTypeSelector" }
          description: |
            One or more taxonomy types, or the single literal `["*"]`. An
            unknown type is refused `422 CONFIG`.
        signing_secret_ref:
          type: string
          pattern: "^env:[A-Za-z_][A-Za-z0-9_]*$"
          description: REQUIRED `env:NAME` reference to the HMAC signing secret.
        secondary_signing_secret_ref:
          type: string
          pattern: "^env:[A-Za-z_][A-Za-z0-9_]*$"
          nullable: true
          description: Optional second `env:NAME` reference for rotation overlap.
        enabled:
          type: boolean
          default: true

    WebhookSubscriptionUpdate:
      type: object
      description: |
        (ADR-077) Partial update for a webhook subscription. At least one field
        required. `signing_secret_ref` may be re-pointed but not cleared. Secret
        values are NEVER accepted (use `env:NAME` references).
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        url:
          type: string
          format: uri
          maxLength: 2048
          description: Same `http`/`https` + destination egress policy constraints as create.
        method:
          type: string
          enum: [POST, PUT]
        headers:
          type: object
          additionalProperties:
            type: string
            pattern: "^env:[A-Za-z_][A-Za-z0-9_]*$"
            description: MUST be an `env:NAME` reference; a raw value is refused `422 CONFIG`.
        event_types:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/WebhookEventTypeSelector" }
        signing_secret_ref:
          type: string
          pattern: "^env:[A-Za-z_][A-Za-z0-9_]*$"
        secondary_signing_secret_ref:
          type: string
          pattern: "^env:[A-Za-z_][A-Za-z0-9_]*$"
          nullable: true
        enabled: { type: boolean }

    WebhookDeliveryAttempt:
      type: object
      description: |
        (ADR-077) One row of the per-delivery attempt audit
        (`webhook_delivery_attempts`).
      required: [attemptNo, requestedAt, durationMs]
      properties:
        attemptNo:
          type: integer
          minimum: 1
          description: 1-based attempt ordinal; continues across replays.
        requestedAt: { type: string, format: date-time }
        durationMs:
          type: integer
          minimum: 0
          description: Wall-clock duration of the HTTP attempt.
        httpStatus:
          type: integer
          nullable: true
          description: Response status, or `null` on timeout/network failure.
        errorKind:
          type: string
          nullable: true
          enum: [timeout, network, http, config, null]
          description: Classified failure cause, or `null` on success.
        responseSnippet:
          type: string
          nullable: true
          description: First ≤1KB of the response body (truncated), or `null`.

    WebhookDelivery:
      type: object
      description: |
        (ADR-077) One `webhook_deliveries` row plus its `attempts[]` audit.
        At-least-once: a consumer de-dupes on `X-Maister-Idempotency-Key`.
      required:
        - id
        - eventId
        - type
        - status
        - attemptCount
        - nextAttemptAt
        - lastHttpStatus
        - lastErrorKind
        - deliveredAt
        - createdAt
        - attempts
      properties:
        id: { type: string }
        eventId:
          type: string
          description: The originating `webhook_events.id`.
        type: { $ref: "#/components/schemas/WebhookEventType" }
        status:
          type: string
          enum: [pending, delivered, dead]
          description: |
            `pending` (awaiting/retrying), `delivered` (2xx received), or `dead`
            (410 Gone or attempts exhausted — terminal DLQ state, replayable).
        attemptCount:
          type: integer
          minimum: 0
        nextAttemptAt:
          type: string
          format: date-time
          nullable: true
          description: Next scheduled send for a `pending` delivery; `null` once terminal.
        lastHttpStatus:
          type: integer
          nullable: true
        lastErrorKind:
          type: string
          nullable: true
          enum: [timeout, network, http, config, null]
        deliveredAt:
          type: string
          format: date-time
          nullable: true
        createdAt: { type: string, format: date-time }
        attempts:
          type: array
          items: { $ref: "#/components/schemas/WebhookDeliveryAttempt" }

    WebhookDeliveryPage:
      type: object
      description: (ADR-077) One newest-first page of the delivery log.
      required: [deliveries, nextCursor]
      properties:
        deliveries:
          type: array
          items: { $ref: "#/components/schemas/WebhookDelivery" }
        nextCursor:
          type: string
          nullable: true
          description: Cursor for the next page, or `null` at the end.

    WebhookSettings:
      type: object
      description: |
        (ADR-077) The global outbound-webhooks kill-switch
        (`platform_runtime_settings.webhooks_enabled`).
      required: [enabled]
      additionalProperties: false
      properties:
        enabled:
          type: boolean
          description: |
            When `false`, the `webhook_delivery` scheduler job runs a skip
            pass: un-fanned events are stamped consumed (`fanout_at` set,
            zero deliveries created — disabled-window events are never
            delivered retroactively) and no sends happen; already-pending
            deliveries pause and resume on re-enable.

    PingResult:
      type: object
      description: |
        (ADR-077) Live result of a synthetic ping POST. Never persisted (no
        `webhook_events`/`webhook_deliveries` rows are written).
      required: [ok, durationMs]
      properties:
        ok:
          type: boolean
          description: True when the endpoint returned a 2xx status.
        httpStatus:
          type: integer
          nullable: true
          description: Response status, or `null` on timeout/network failure.
        durationMs:
          type: integer
          minimum: 0
        errorKind:
          type: string
          enum: [timeout, network, http, config]
          description: Present only when `ok` is false; classified failure cause.
