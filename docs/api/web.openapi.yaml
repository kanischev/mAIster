  /api/projects/{slug}/catalog/caps/{capId}/publish-local:
    post:
      tags: [catalog, flow-studio]
      summary: (M25/M27) Publish an authored capability inside this MAIster instance
      description: |
        Implemented, M25. Extended by M27 for `kind=flow`.

        **M25 behavior (rule/skill):** local publish of a rule/skill projects
        an authored-origin `capability_records` row in the same transaction.
        Response is the published `AuthoredCapabilityRevision` only.

        **M27 extension (flow):** in addition to the M25 catalog commit, the
        route runs the two-phase executable bridge:
        `installAuthoredFlowPackageBridge(trusted_by_policy)` → intent row
        `Installing` → disk export → finalize `Installed`. The bridge produces
        a `flows` row + `flow_revisions` row with `trustStatus=trusted_by_policy`
        and `exec_trust=untrusted`. The `validateGraphManifest`+`compileManifest`
        hard-gate runs before the revision commit; an invalid manifest returns
        `422 CONFIG` without persisting anything. Requires `manageCatalog` project
        action (project admin or above).

        For non-flow kinds the response shape is the same as M25
        (`revision` only, no `flowRowId`/`revisionId`).
      operationId: publishLocalAuthoredCapability
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: capId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: |
            Published local revision. For `kind=flow` (M27), additionally
            includes the bridged `flows` and `flow_revisions` row ids.
          content:
            application/json:
              schema:
                type: object
                required: [revision]
                properties:
                  revision:
                    $ref: "#/components/schemas/AuthoredCapabilityRevision"
                  flowRowId:
                    type: string
                    format: uuid
                    description: |
                      (M27) Present only for `kind=flow`. The `flows.id` of
                      the bridged executable flow row.
                  revisionId:
                    type: string
                    format: uuid
                    description: |
                      (M27) Present only for `kind=flow`. The
                      `flow_revisions.id` produced by the bridge.
              examples:
                rule-skill-publish:
                  summary: Non-flow publish (M25)
                  value:
                    revision:
                      id: rev-abc123
                      capabilityId: cap-xyz
                      projectId: proj-000
                      kind: rule
                      revisionNumber: 1
                      draftVersion: 2
                      lifecycle: PUBLISHED
                      title: My rule
                      body: "Always respond in English."
                      manifest: null
                      schemaVersion: 1
                      contentHash: sha256:def
                      publishedAt: "2026-06-08T12:00:00Z"
                      archivedAt: null
                      createdAt: "2026-06-08T12:00:00Z"
                flow-publish-with-bridge:
                  summary: Flow publish with executable bridge (M27)
                  value:
                    revision:
                      id: rev-def456
                      capabilityId: cap-flow-001
                      projectId: proj-000
                      kind: flow
                      revisionNumber: 2
                      draftVersion: 4
                      lifecycle: PUBLISHED
                      title: Bugfix v2
                      body: null
                      manifest:
                        schemaVersion: 1
                        name: Bugfix
                        steps: []
                      schemaVersion: 1
                      contentHash: sha256:abc
                      publishedAt: "2026-06-08T12:00:00Z"
                      archivedAt: null
                      createdAt: "2026-06-08T12:00:00Z"
                    flowRowId: f1b2c3d4-0000-0000-0000-000000000001
                    revisionId: a1b2c3d4-0000-0000-0000-000000000002
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/catalog/caps/{capId}/archive:
    post:
      tags: [catalog]
      summary: (M25) Archive an authored capability
      description: |
        Implemented, M25. Archives the authored capability and disables only its
        authored-origin projection. Historic run snapshots remain valid.
      operationId: archiveAuthoredCapability
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: capId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Archived.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthoredCapability" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }

  /api/cron/tick:
    get:
      tags: [scheduler]
      summary: (M24) Run the unified scheduler tick
      description: |
        Implemented, M24. Token-guarded stateless scheduler clock. Claims due
        `scheduler_jobs` atomically, reaps expired leases, runs per-kind
        handlers, and records attempt results. Optional `jobKind` narrows due
        dispatch. Auth is `X-Maister-Cron-Token`; no Auth.js session.
      operationId: runSchedulerTick
      security:
        - cronToken: []
      parameters:
        - name: jobKind
          in: query
          required: false
          schema:
            type: string
            enum:
              [
                system_sweep,
                command,
                agent_tick,
                flow_run,
                run_schedule,
                webhook_delivery,
                domain_event_dispatch,
              ]
      responses:
        "200":
          description: Tick completed with no failed or skipped attempts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SchedulerTickSummary" }
        "207":
          description: Tick completed with one or more failed/skipped attempts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SchedulerTickSummary" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "422": { $ref: "#/components/responses/Config" }
        "503": { $ref: "#/components/responses/Config" }
    post:
      tags: [scheduler]
      summary: (M24) Run the unified scheduler tick
      description: POST variant of `GET /api/cron/tick`; behavior is identical.
      operationId: runSchedulerTickPost
      security:
        - cronToken: []
      parameters:
        - name: jobKind
          in: query
          required: false
          schema:
            type: string
            enum:
              [
                system_sweep,
                command,
                agent_tick,
                flow_run,
                run_schedule,
                webhook_delivery,
                domain_event_dispatch,
              ]
      responses:
        "200":
          description: Tick completed with no failed or skipped attempts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SchedulerTickSummary" }
        "207":
          description: Tick completed with one or more failed/skipped attempts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SchedulerTickSummary" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "422": { $ref: "#/components/responses/Config" }
        "503": { $ref: "#/components/responses/Config" }

  /api/cron/gc:
    get:
      tags: [reconciliation-gc, scheduler]
      summary: (M19/M24) Run the GC sweep compatibility route
      description: |
        (Implemented, M19; compatibility wrapper Designed, M24 — ADR-060.)

        Token-guarded HTTP entry point for the preserve-then-prune GC sweep —
        the same work the background sweeper performs
        (`MAISTER_GC_SWEEP_INTERVAL_SECONDS`), exposed for an external cron. The
        sweep collects Abandoned/Done worktrees and unreferenced `Removed` flow
        revisions past `MAISTER_GC_AGE_DAYS`, preserves dirty/divergent
        worktrees to a `maister/archive/<runId>` branch (optionally pushed when
        `MAISTER_GC_ARCHIVE_PUSH=true`), and only then prunes.

        M24 keeps this route as a compatibility wrapper over the unified
        `system_sweep` service while preserving the response shape and statuses.
        Auth is by the `X-Maister-Cron-Token` header, compared in constant time
        to `MAISTER_CRON_TOKEN` — NOT an Auth.js session. **No body / query
        cross-resource identifiers**: the sweep derives its candidate set from
        server state only.
      operationId: runGcCron
      security:
        - cronToken: []
      responses:
        "200":
          description: GC sweep completed; the summary reports per-sub-sweep counts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GcSweepSummary" }
        "207":
          description: |
            A sub-sweep (worktree GC or revision GC) partially failed; the
            summary's `errors` array names what was skipped. Successful work was
            still committed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GcSweepSummary" }
        "401":
          description: |
            Missing or mismatched `X-Maister-Cron-Token` (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            `MAISTER_CRON_TOKEN` is unset — the cron route is disabled
            (`CONFIG`). Configure the token to enable it.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    post:
      tags: [reconciliation-gc, scheduler]
      summary: (M19/M24) Run the GC sweep compatibility route
      description: |
        (Implemented, M19; compatibility wrapper Designed, M24 — ADR-060.)

        POST variant of `GET /api/cron/gc` — identical behavior, for cron
        runners that prefer a non-idempotent verb. Auth is the same
        `X-Maister-Cron-Token` header (constant-time compare to
        `MAISTER_CRON_TOKEN`). **Body is EMPTY**; the sweep derives its
        candidate set from server state only.
      operationId: runGcCronPost
      security:
        - cronToken: []
      responses:
        "200":
          description: GC sweep completed; the summary reports per-sub-sweep counts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GcSweepSummary" }
        "207":
          description: |
            A sub-sweep partially failed; the summary's `errors` array names what
            was skipped. Successful work was still committed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GcSweepSummary" }
        "401":
          description: |
            Missing or mismatched `X-Maister-Cron-Token` (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            `MAISTER_CRON_TOKEN` is unset — the cron route is disabled
            (`CONFIG`). Configure the token to enable it.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/activity:
    post:
      tags: [runs]
      summary: (M8) Keep-alive activity ping
      description: |
        Bumps `runs.keepalive_until` to `now + MAISTER_KEEPALIVE_MINUTES`
        so the keep-alive sweeper does not checkpoint a run while the
        operator is actively reviewing it. Identifier table:
        `runId` is a `url-param` (UUID v4); the body has NO
        cross-resource ids (optional `{kind?: "activity"}` marker only).
        Activity does NOT auto-resume idle runs — `NeedsInputIdle`
        rows return 409 with a hint to call
        `POST /api/runs/{runId}/hitl/{hitlRequestId}/respond` instead.
      operationId: activityPing
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Keep-alive bumped on a `Running` or `NeedsInput` row.
        "400":
          description: "`runId` is not a valid UUID v4."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "404":
          description: Run not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            Run is in `NeedsInputIdle` (caller must use `/respond`) or
            in `Pending` (no live window to bump).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "410":
          description: |
            Run is in a terminal status (`Done`, `Abandoned`, `Failed`,
            `Crashed`, `Review`). Hook should stop pinging.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/stream:
    get:
      tags: [runs]
      summary: SSE bridge — stream per-run events
      description: |
        Requires project membership at `viewer` or above
        (`requireProjectRole(run.projectId, "viewer")`). The `projectId`
        is derived from the run row, never from the query string.

        Server-Sent Events bridge. Tails a single per-run durable replay
        log at `.maister/<projectSlug>/runs/<runId>/run.events.jsonl`
        (written by the supervisor — see `supervisor.openapi.yaml`).

        Use the standard SSE `Last-Event-ID` header (or `?lastEventId=N`
        query string fallback) to resume after disconnect. Terminal
        states (`Done`, `Abandoned`, `Failed`, `Crashed`) close the
        stream cleanly after draining trailing events.

        Event shape is the supervisor's `SessionEvent` union. See the
        AsyncAPI doc at `async/web-runs.asyncapi.yaml`.
      operationId: streamRunEvents
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Last-Event-ID
          in: header
          required: false
          schema: { type: string }
        - name: lastEventId
          in: query
          required: false
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: SSE stream.
          headers:
            Content-Type:
              schema:
                type: string
                enum: [text/event-stream]
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller is not a `viewer` or above for the run's project
            (`UNAUTHORIZED`), or the authenticated account must change its
            password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "404":
          description: Run not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/projects/{slug}/flow-packages/install:
    post:
      tags: [flow-packages]
      summary: Install a Flow package into a project
      description: |
        M10 (ADR-021). Admin-only (`requireProjectAction("managePackages")`).
        Two-phase install via `installFlowPlugin` → `installRevision`: a
        `flow_revisions` row is written `Installing` before disk side-effects,
        then flipped to `Installed`/`Failed`. Trusted-by-policy sources
        (local/file:// or `MAISTER_TRUSTED_FLOW_SOURCE_PREFIXES` match)
        auto-enable; untrusted sources install as `Installed` (await
        `/trust` + `/enable`). `slug` = url-param (server-state); `flowRefId`/
        `source`/`version` are body-controlled, validated downstream.
        Source: `web/app/api/projects/[slug]/flow-packages/install/route.ts`.
      operationId: installFlowPackage
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InstallFlowPackageBody" }
      responses:
        "201":
          description: Package installed (and enabled when trusted-by-policy).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstallFlowPackageResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }
        "502": { $ref: "#/components/responses/FlowInstall" }

  /api/projects/{slug}/flow-packages/{flowRefId}/enable:
    post:
      tags: [flow-packages]
      summary: Enable a specific installed revision
      description: |
        M10. Admin-only. Sets the project's enabled revision to `revisionId`,
        refreshing the denormalized cache while preserving runner remaps.
        Refuses untrusted / incompatible /
        setup-incomplete revisions. `revisionId` is validated against the flow
        AND the project's declared source (cross-source enable is rejected).
        Source: `.../flow-packages/[flowRefId]/enable/route.ts`.
      operationId: enableFlowRevision
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: flowRefId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RevisionIdBody" }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/flow-packages/{flowRefId}/disable:
    post:
      tags: [flow-packages]
      summary: Disable a flow for new launches
      description: |
        M10. Admin-only. Sets `enablement_state='Disabled'`. In-flight runs
        keep their pinned revision. Source:
        `.../flow-packages/[flowRefId]/disable/route.ts`.
      operationId: disableFlowPackage
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: flowRefId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }

  /api/projects/{slug}/flow-packages/{flowRefId}/upgrade:
    post:
      tags: [flow-packages]
      summary: Install a new revision beside the current one
      description: |
        M10. Admin-only. Installs a new immutable revision (two-phase) from the
        SAME source as the project's flow and marks it `UpdateAvailable`. Does
        NOT auto-enable. Rejects a `source` that differs from the project's
        declared flow source (re-sourcing is install/re-install).
        Source: `.../flow-packages/[flowRefId]/upgrade/route.ts`.
      operationId: upgradeFlowPackage
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: flowRefId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpgradeFlowPackageBody" }
      responses:
        "201":
          description: Candidate revision installed.
          content:
            application/json:
              schema:
                type: object
                required: [revisionId]
                properties:
                  revisionId: { type: string, format: uuid }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }
        "502": { $ref: "#/components/responses/FlowInstall" }

  /api/projects/{slug}/flow-packages/{flowRefId}/rollback:
    post:
      tags: [flow-packages]
      summary: Roll the enabled revision back to an older installed revision
      description: |
        M10. Admin-only. Switches the enabled pointer to an older installed
        revision (same validation as enable, including source-scope). Never
        mutates completed/active run history. Source:
        `.../flow-packages/[flowRefId]/rollback/route.ts`.
      operationId: rollbackFlowPackage
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: flowRefId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RevisionIdBody" }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/flow-packages/{flowRefId}/trust:
    post:
      tags: [flow-packages]
      summary: Set or clear explicit trust for a flow package
      description: |
        M10. Admin-only. Sets `trust_status` to `trusted`/`untrusted`. Trust
        alone does NOT make a package launchable — the package must still be
        `/enable`d (launch requires `Enabled`/`UpdateAvailable`). Source:
        `.../flow-packages/[flowRefId]/trust/route.ts`.
      operationId: setFlowPackageTrust
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: flowRefId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trusted]
              properties:
                trusted: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/admin/package-sources:
    get:
      tags: [flow-packages, admin]
      summary: (ADR-088 — Implemented) List platform package sources
      description: |
        (ADR-088 — Implemented.) Admin-only (`requireGlobalRole("admin")`).
        Returns the platform package-source catalog with the cached
        `discovered` snapshot (packages × per-package tags from the last
        refresh) and `lastCheckedAt`. Never blocks on git — a stale snapshot
        is served as-is; freshness is the refresh endpoint's job.
      operationId: getAdminPackageSources
      responses:
        "200":
          description: Package source catalog.
          content:
            application/json:
              schema:
                type: object
                required: [sources]
                properties:
                  sources:
                    type: array
                    items: { $ref: "#/components/schemas/PackageSource" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [flow-packages, admin]
      summary: (ADR-088 — Implemented) Add a platform package source
      description: |
        (ADR-088 — Implemented.) Admin-only. Creates a `package_sources` row.
        `url` is the git monorepo URL (`packages/<name>/maister-package.yaml`
        layout). A duplicate `url` returns 409 (`CONFLICT`), never a raw 500.
        No discovery happens inline — call `/refresh` after creation.
      operationId: postAdminPackageSource
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PackageSourceBody" }
      responses:
        "201":
          description: Package source created.
          content:
            application/json:
              schema:
                type: object
                required: [ok, id]
                properties:
                  ok: { type: boolean, enum: [true] }
                  id: { type: string }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }

  /api/admin/package-sources/{id}:
    patch:
      tags: [flow-packages, admin]
      summary: (ADR-088 — Implemented) Update a platform package source
      description: |
        (ADR-088 — Implemented.) Admin-only. Mutable fields: `enabled`, `note`.
        The `url` is immutable (delete + re-add to change identity). `id` is
        a url-param resolved to the server row (404 on miss).
      operationId: patchAdminPackageSource
      parameters:
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
                note: { type: string }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Config" }
    delete:
      tags: [flow-packages, admin]
      summary: (ADR-088 — Implemented) Delete a platform package source
      description: |
        (ADR-088 — Implemented.) Admin-only. Usage-guarded hard delete: refused
        with 409 (`CONFLICT`) while any `package_installs` row from this
        source is attached to a project. Installed-but-unattached revisions
        survive (GC owns them).
      operationId: deleteAdminPackageSource
      parameters:
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/admin/package-sources/{id}/refresh:
    post:
      tags: [flow-packages, admin]
      summary: (ADR-088 — Implemented) Refresh package discovery for a source
      description: |
        (ADR-088 — Implemented.) Admin-only. Runs `git ls-remote --tags` plus a
        shallow default-branch scan of `packages/*/maister-package.yaml`,
        rewrites the source's `discovered` snapshot + `lastCheckedAt`. A git
        or scan failure degrades: the stale snapshot is kept and the response
        carries `degraded: true` (HTTP 200 — degradation is a result, not an
        error). The same routine runs at web startup for enabled sources
        older than `MAISTER_PACKAGE_DISCOVERY_STALE_HOURS` (default 24).
      operationId: refreshAdminPackageSource
      parameters:
        - {
            name: id,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      responses:
        "200":
          description: Refresh outcome (fresh or degraded-stale).
          content:
            application/json:
              schema:
                type: object
                required: [ok, degraded, packages]
                properties:
                  ok: { type: boolean, enum: [true] }
                  degraded:
                    type: boolean
                    description: True when git/scan failed and the stale snapshot was kept.
                  packages:
                    type: array
                    items: { $ref: "#/components/schemas/DiscoveredPackage" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/studio/local-packages:
    get:
      tags: [flow-packages]
      summary: (ADR-096 — Designed) List local packages
      description: |
        (ADR-096 — Designed, Flow Studio Phase C.) Authenticated users only
        (`requireSession`). Lists `active` local packages. `working_dir` is
        server-only and never returned.
      operationId: getStudioLocalPackages
      responses:
        "200":
          description: Local packages.
          content:
            application/json:
              schema:
                type: object
                required: [localPackages]
                properties:
                  localPackages:
                    type: array
                    items: { $ref: "#/components/schemas/LocalPackage" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
    post:
      tags: [flow-packages]
      summary: (ADR-096 — Designed) Create (or fork) a local package
      description: |
        (ADR-096 — Designed.) Creates a `local_packages` row and scaffolds a
        git-backed working directory (`git init` + initial commit). With
        `sourceInstallId`, seeds the working dir from that git-package install
        (fork). Authenticated users only.
      operationId: createStudioLocalPackage
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LocalPackageCreateBody" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LocalPackage" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }

  /api/studio/local-packages/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
        description: "`local_packages.id` (url-param; the editor route key)."
    get:
      tags: [flow-packages]
      summary: (ADR-096 — Designed) Get a local package + its working-dir files
      operationId: getStudioLocalPackage
      responses:
        "200":
          description: The local package, its file list, and the lock state.
          content:
            application/json:
              schema:
                type: object
                required: [localPackage, files, lock]
                properties:
                  localPackage: { $ref: "#/components/schemas/LocalPackage" }
                  files:
                    type: array
                    items: { $ref: "#/components/schemas/LocalPackageFile" }
                  lock: { $ref: "#/components/schemas/LocalPackageLock" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [flow-packages]
      summary: (ADR-096 — Designed) Rename / archive a local package
      operationId: patchStudioLocalPackage
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LocalPackagePatchBody" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LocalPackage" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }
    delete:
      tags: [flow-packages]
      summary: (ADR-096 — Designed) Delete a local package + its working dir
      operationId: deleteStudioLocalPackage
      responses:
        "204": { description: Deleted (row + working_dir removed). }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/studio/local-packages/{id}/lock-refresh:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [flow-packages]
      summary: (ADR-096 — Designed) Refresh the session edit-lock
      description: |
        (ADR-096 — Designed.) Editor keep-alive; mirrors
        `POST /api/runs/{runId}/activity`. Extends `lock_expires_at` for the
        caller's session iff it holds the live lock.
      operationId: refreshStudioLocalPackageLock
      responses:
        "200":
          description: Lock extended.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LocalPackageLock" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/studio/local-packages/{id}/files/{path}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
      - name: path
        in: path
        required: true
        schema: { type: string }
        description: |
          Artifact path RELATIVE to the working dir (**url-controlled —
          UNTRUSTED**). Resolved within `working_dir` via realpath containment;
          `..`, absolute paths, symlink escape, and any `.git/` path are rejected
          with `PRECONDITION` (409).
    get:
      tags: [flow-packages]
      summary: (ADR-096 — Designed) Read a working-dir file
      operationId: getStudioLocalPackageFile
      responses:
        "200":
          description: File content + content hash.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LocalPackageFile" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
    put:
      tags: [flow-packages]
      summary: (ADR-096 — Designed) Write a working-dir file (under the lock)
      description: |
        (ADR-096 — Designed.) Atomic, path-confined write. Requires the caller's
        session to hold the live edit-lock → else `CONFLICT` (409). A path that
        escapes the working dir → `PRECONDITION` (409).
      operationId: putStudioLocalPackageFile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LocalPackageFileWriteBody" }
      responses:
        "200": { description: Written. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }
    delete:
      tags: [flow-packages]
      summary: (ADR-096 — Designed) Delete a working-dir file (under the lock)
      operationId: deleteStudioLocalPackageFile
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/studio/local-packages/{id}/files/{path}/move:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
      - name: path
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [flow-packages]
      summary: (ADR-096 — Designed) Move an artifact to another local package
      description: |
        (ADR-096 — Designed.) Relocates a file to a target local package's
        working dir. Both source and target paths are confined; both require a
        live lock.
      operationId: moveStudioLocalPackageFile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LocalPackageMoveBody" }
      responses:
        "200": { description: Moved. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }

  /api/studio/local-packages/{id}/cut-version:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [flow-packages]
      summary: (ADR-096 — Designed) Cut an immutable version (+ optional attach)
      description: |
        (ADR-096 — Designed.) Exports the working dir cleanly (excluding `.git`)
        and installs it via the existing installer as a `local-<digest>`
        `package_installs` revision (`trusted_by_policy`); optionally attaches it
        to a project the caller is a **member** of (`manageLocalPackages`).
        Stamps `last_cut_install_id` after success.
      operationId: cutStudioLocalPackageVersion
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CutVersionBody" }
      responses:
        "201":
          description: Cut (and optionally attached).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CutVersionResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }

  /api/studio/local-packages/{id}/import:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [flow-packages]
      summary: (M36, ADR-096 — Designed) Batch-import a folder or zip/tar.gz
      description: |
        (M36, ADR-096.) `multipart/form-data`: `mode` (`preview` | `commit`),
        `sessionId` (required for `commit`), and either a set of files with
        relative paths (folder) or one `.zip`/`.tar.gz` archive. `preview`
        returns the resolved tree without writing (no lock). `commit` asserts the
        session edit-lock, then writes — but only after EVERY entry passes
        confinement (zip-slip rejected on the original path segments, then
        `resolveWithinWorkingDir`) and the caps
        (`MAISTER_IMPORT_MAX_{BYTES,ENTRIES,FILE_BYTES}`); a single violation
        rejects the whole import PRE-WRITE (nothing persisted).
      operationId: importStudioLocalPackage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                mode: { type: string, enum: [preview, commit] }
                sessionId: { type: string }
                archive: { type: string, format: binary }
                files:
                  type: array
                  items: { type: string, format: binary }
              required: [mode]
      responses:
        "200":
          description: Resolved import plan (preview tree or committed files).
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        path: { type: string }
                        size: { type: integer }
                  totalBytes: { type: integer }
                  mode: { type: string }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }

  /api/studio/local-packages/{id}/diff:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [flow-packages]
      summary: (M36, ADR-096 — Designed) Working-tree-vs-HEAD diff
      description: |
        (M36, ADR-096.) The local package's working dir is git-backed; this is the
        uncommitted working-tree-vs-`HEAD` diff (2-dot, incl. untracked) as a
        `@git-diff-view` DTO + `changedCount`. `truncated` flags an oversized diff.
        Read — `requireSession`, no lock. `working_dir` never returned.
      operationId: getStudioLocalPackageDiff
      responses:
        "200":
          description: The working-tree diff DTO.
          content:
            application/json:
              schema:
                type: object
                properties:
                  changedCount: { type: integer }
                  truncated: { type: boolean }
                  files: { type: array, items: { type: object } }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/studio/local-packages/{id}/commit:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [flow-packages]
      summary: (M36, ADR-096 — Designed) Commit working-dir changes
      description: |
        (M36, ADR-096.) Asserts the session edit-lock, then `git add -A` +
        `git commit` the working dir (changed-count → 0). Body `{ sessionId,
        message? }`.
      operationId: commitStudioLocalPackage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId: { type: string }
                message: { type: string }
              required: [sessionId]
      responses:
        "200": { description: Committed; returns the now-clean diff. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }

  /api/studio/local-packages/{id}/discard:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [flow-packages]
      summary: (M36, ADR-096 — Designed) Discard working-dir changes
      description: |
        (M36, ADR-096.) Asserts the session edit-lock, then restores the working
        dir to `HEAD` (`git checkout HEAD -- <paths>` + `git clean`). Body
        `{ sessionId, paths? }` — each `paths[]` entry is path-confined BEFORE git
        (reject `..`/abs/`.git`); omitted → discard all.
      operationId: discardStudioLocalPackage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId: { type: string }
                paths: { type: array, items: { type: string } }
              required: [sessionId]
      responses:
        "200": { description: Discarded; returns the now-clean diff. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }

  /api/studio/local-packages/{id}/assistant:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [flow-packages]
      summary: (M36 Phase 5, ADR-097 — backend foundation Implemented) Launch the docked AI authoring assistant
      description: |
        (M36 Phase 5, ADR-097.) Launch a **project-less scratch run** rooted at
        the local package's `working_dir` (`launchLocalPackageAssistant`). There
        is NO project and NO managed git worktree: `runs.project_id` /
        `scratch_runs.project_id` stay NULL and `local_package_id` carries the
        owner (DB CHECK = exactly one of project / local-package); the supervisor
        session confines content-block file URIs to the `working_dir`
        (`confineRoot`). Member-level RBAC (`requireActiveSession`, ADR-096).
        Counts against the scratch (flow-pool) concurrency cap. The right-panel
        AI tab + the working-dir lock coordination are a separate task.
      operationId: launchStudioLocalPackageAssistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt: { type: string, maxLength: 60000 }
                runnerId: { type: string, minLength: 1 }
                workMode:
                  type: string
                  enum: [auto, plan_first, manual_approval]
                reasoningEffort:
                  type: string
                  enum: [low, high, extra, ultra]
                planMode: { type: string, enum: [off, plan-first] }
              required: [prompt]
      responses:
        "201":
          description: Assistant run launched (project-less scratch run).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScratchRunResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }
        "503":
          description: Supervisor readiness or executor unavailable (`EXECUTOR_UNAVAILABLE`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/studio/local-packages/{id}/assistant/{runId}/messages:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
      - name: runId
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [flow-packages]
      summary: (M36 Phase 5, ADR-097 — Designed) Send a turn to the docked assistant
      description: |
        (M36 Phase 5, ADR-097 — Designed.) Continue the assistant conversation —
        reuses the scratch message substrate (`sendScratchUserMessage`) on a
        project-less run; RBAC falls back to `requireActiveSession` (member-level)
        when the run is project-less. Implemented as part of the separate AI-tab
        task; documented here for contract completeness.
      operationId: sendStudioLocalPackageAssistantMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content: { type: string, minLength: 1, maxLength: 60000 }
              required: [content]
      responses:
        "200": { description: Turn sent; returns the dialog status + stop reason. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }
        "503":
          description: Supervisor readiness or executor unavailable (`EXECUTOR_UNAVAILABLE`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/studio/packages/{ref}/fork:
    parameters:
      - name: ref
        in: path
        required: true
        schema: { type: string }
        description: "Package name (url-param). Resolved server-side to its newest install; the body controls nothing."
    post:
      tags: [flow-packages]
      summary: (ADR-096 — Designed) Fork a whole package to a local package
      description: |
        (ADR-096 — Designed, Flow Studio Phase C.) Resolves the installed
        package by `ref` server-side, then clean-copies ALL of that install's
        working files (excluding `.git`) into a fresh git-init'd local package
        auto-named `<ref>-local`, recording `source_install_id` + `source_ref`.
        Executes NOTHING (no `setup.sh`, no MCP). A missing/unreadable source
        bundle → `CONFIG` (400) with nothing persisted. Authenticated users only
        (`requireSession`; Studio authoring is member-accessible).
      operationId: forkStudioPackage
      responses:
        "201":
          description: Forked.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForkResult" }
        "400": { $ref: "#/components/responses/Config" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/studio/packages/{ref}/fork-element:
    parameters:
      - name: ref
        in: path
        required: true
        schema: { type: string }
        description: "Package name (url-param). Resolved server-side to its newest install."
    post:
      tags: [flow-packages]
      summary: (ADR-096 — Designed) Fork ONE element into a project default
      description: |
        (ADR-096 — Designed, Flow Studio Phase C.) Copies EXACTLY ONE element (a
        flow dir / skill bundle / agent `.md` / rule file at `elementPath`) from
        the package `ref` into the caller-project's per-project default
        ("virtual") local package, created on first use (race-safe on the
        partial-unique `(project_id) WHERE is_default`). The body `projectId` is
        validated against the caller's accessible projects — an inaccessible /
        unknown project → 404 with NO write. `elementPath` is confined inside the
        source bundle AND the destination working dir; an escape → `PRECONDITION`
        (409). Copying the rest of the source is forbidden. Executes NOTHING.
      operationId: forkStudioPackageElement
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForkElementBody" }
      responses:
        "201":
          description: Element forked into the project default.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForkResult" }
        "400": { $ref: "#/components/responses/Config" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }

  /api/admin/package-installs:
    get:
      tags: [flow-packages, admin]
      summary: (ADR-088 — Implemented) List installed package revisions
      description: |
        (ADR-088 — Implemented.) Admin-only. Platform catalog of immutable
        installed package revisions. `installed_path` is NEVER projected.
      operationId: getAdminPackageInstalls
      responses:
        "200":
          description: Installed package revisions.
          content:
            application/json:
              schema:
                type: object
                required: [installs]
                properties:
                  installs:
                    type: array
                    items: { $ref: "#/components/schemas/PackageInstallSummary" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [flow-packages, admin]
      summary: (ADR-088 — Implemented) Install a package revision platform-wide
      description: |
        (ADR-088 — Implemented.) Admin-only. Two forms: `{sourceId, name,
        version}` installs `name@version` from a configured source (one
        `git clone --branch <tag> --depth 1`); `{localPath, path?}` installs a
        **local version** from an absolute host directory (admin-only body
        field; content-digest addressed, label `local-<digest12>`). Idempotent
        on `(source_url, name, resolved_revision)` — re-installing the same
        revision returns the existing row. Member flow/capability sub-installs
        inherit the package's resolved revision; `setup.sh` is NEVER executed
        here (post-trust setup path only). Manifest failures → 422 (`CONFIG`);
        clone/copy failures → 502 (`FLOW_INSTALL`).
      operationId: postAdminPackageInstall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceId: { type: string, minLength: 1 }
                name: { type: string, minLength: 1 }
                version:
                  type: string
                  minLength: 1
                  description: "Per-package tag, e.g. aif/v2.0.0 (slash allowed)."
                localPath:
                  type: string
                  minLength: 1
                  description: "Absolute host directory for a local version (mutually exclusive with sourceId)."
                path:
                  type: string
                  description: "Package subdir inside localPath (e.g. packages/aif)."
      responses:
        "201":
          description: Package revision installed (or already present).
          content:
            application/json:
              schema:
                type: object
                required: [ok, id]
                properties:
                  ok: { type: boolean, enum: [true] }
                  id: { type: string }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Config" }
        "502": { $ref: "#/components/responses/FlowInstall" }

  /api/projects/{slug}/packages:
    get:
      tags: [flow-packages, projects]
      summary: (ADR-088 — Implemented) List package attachments of a project
      description: |
        (ADR-088 — Implemented.) Member-visible. Attachments with member flow
        ids and the `updateAvailable` derivation (a newer matching tag exists
        in the source's discovered snapshot).
      operationId: getProjectPackages
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      responses:
        "200":
          description: Project package attachments.
          content:
            application/json:
              schema:
                type: object
                required: [attachments]
                properties:
                  attachments:
                    type: array
                    items: { $ref: "#/components/schemas/ProjectPackageAttachment" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [flow-packages, projects]
      summary: (ADR-088 — Implemented) Attach a package install to a project
      description: |
        (ADR-088 — Implemented.) Admin-only (`managePackages`). One transaction
        writes member `flows` rows + `capability_imports` + MCP/restriction
        ingestion + the attachment + group FK links. Identifiers: `slug` =
        url-param → project row; `packageInstallId` = body id resolved to a
        server row (404 on miss). A manifest flow id colliding with an
        existing standalone flow (`flows_project_ref_uq`) → 409 (`CONFLICT`),
        no partial group. A same-`(kind, id)` MCP/restriction record already
        provided by another attached package → 409 (`CONFLICT`) as well
        (same-id different-kind records coexist). The `maister.yaml
        packages[]` pin is written back AFTER commit; a write-back failure is
        reported as `writeBack: "failed"`, never a rollback.
      operationId: attachProjectPackage
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [packageInstallId]
              properties:
                packageInstallId: { type: string, minLength: 1 }
      responses:
        "201":
          description: Package attached.
          content:
            application/json:
              schema:
                type: object
                required: [ok, attachmentId, writeBack]
                properties:
                  ok: { type: boolean, enum: [true] }
                  attachmentId: { type: string }
                  writeBack: { type: string, enum: [ok, failed] }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/packages/{attachmentId}:
    delete:
      tags: [flow-packages, projects]
      summary: (ADR-088 — Implemented) Detach a package from a project
      description: |
        (ADR-088 — Implemented.) Admin-only (`managePackages`). Refused with 409
        (`PRECONDITION`) while any member revision is pinned by a non-terminal
        run. One transaction removes the attachment, member `flows` rows, and
        the ingested MCP/restriction records this install owns
        (`material.packageInstallId` — a same-id record from another attached
        package survives); member revisions stay for in-flight
        runs and GC. Write-back removes the `packages[]` pin after commit.
      operationId: detachProjectPackage
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: attachmentId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      responses:
        "200":
          description: Package detached.
          content:
            application/json:
              schema:
                type: object
                required: [ok, writeBack]
                properties:
                  ok: { type: boolean, enum: [true] }
                  writeBack: { type: string, enum: [ok, failed] }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Precondition" }

  /api/projects/{slug}/packages/{attachmentId}/upgrade:
    post:
      tags: [flow-packages, projects]
      summary: (ADR-088 — Implemented) Upgrade an attachment to another install
      description: |
        (ADR-088 — Implemented.) Admin-only (`managePackages`). The target
        `packageInstallId` MUST be an installed revision of the SAME package
        name (mismatch → 409 `PRECONDITION`). One transaction flips the group
        pointers; in-flight runs keep their pinned revisions. Write-back
        rewrites the `packages[]` version pin after commit.
      operationId: upgradeProjectPackage
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: attachmentId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [packageInstallId]
              properties:
                packageInstallId: { type: string, minLength: 1 }
      responses:
        "200":
          description: Attachment upgraded.
          content:
            application/json:
              schema:
                type: object
                required: [ok, writeBack]
                properties:
                  ok: { type: boolean, enum: [true] }
                  writeBack: { type: string, enum: [ok, failed] }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/packages/{attachmentId}/trust:
    post:
      tags: [flow-packages, projects]
      summary: (ADR-088 — Implemented) Trust a package revision (fan-out)
      description: |
        (ADR-088 — Implemented.) GLOBAL-admin-only: the fan-out crosses every
        project attached to the install, so project-scoped `managePackages`
        is not sufficient (403 for project admins without the global role).
        One operator decision per package revision: the same transaction fans
        `trust_status`/`exec_trust='trusted'` onto every member
        `flow_revisions` + `capability_imports` row, THEN the existing
        post-trust setup path runs pending member `setup.sh` (after-tx
        side-effect; never at install). Setup failure marks the member
        revision Failed and surfaces on launch as today.
      operationId: trustProjectPackage
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: attachmentId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Precondition" }

  /api/projects/{slug}/flow-packages/{flowRefId}/revisions/{revisionId}/fork:
    post:
      tags: [flow-packages, flow-studio]
      summary: (Implemented) Fork an installed package revision to an authored flow draft
      description: |
        Implemented (Flow Studio Phase 2, ADR-075). Installed `flow_revisions` are
        immutable, so editing forks the revision into an M25 authored `flow`
        draft (`kind=flow`) carrying `source_flow_ref_id = flowRefId` lineage,
        then lands the caller in the existing editor. Admin-only
        (`manageCatalog`). `slug` / `flowRefId` / `revisionId` are URL parameters
        resolved to server-side state — the revision is asserted to belong to the
        flow under this project (mismatch → 404). The request body names ONLY the
        new authored cap; it never carries a filesystem path or cross-resource
        locator (`installed_path` is read from the resolved DB row). The bundle
        directory is read (`readAuthoredFlowPackageDirectory`) and the authored
        cap is created in a single transaction; `setup.sh` / scripts are copied as
        draft text and NEVER executed. Slug defaults to `flowRefId` and probes
        `-fork`/`-fork-N` on `(project_id, kind, slug)` collision; an EXPLICIT
        colliding `slug` returns 409. A missing/unreadable bundle directory
        returns 422 (nothing persisted). No new GET content routes accompany this
        (RSC disk reads, ADR-066). Source:
        `.../flow-packages/[flowRefId]/revisions/[revisionId]/fork/route.ts`.
      operationId: forkFlowPackageRevision
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: flowRefId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: revisionId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                slug:
                  type: string
                  description: Optional slug for the new authored cap (defaults to flowRefId; collision → probe).
                title:
                  type: string
                  description: Optional human title for the new authored cap.
      responses:
        "201":
          description: Authored flow draft seeded from the revision.
          content:
            application/json:
              schema:
                type: object
                required: [capId, projectSlug, slug]
                additionalProperties: false
                properties:
                  capId: { type: string }
                  projectSlug: { type: string }
                  slug: { type: string }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/flow-packages/{flowRefId}/revisions/{revisionId}/remove:
    post:
      tags: [flow-packages]
      summary: Remove an installed revision
      description: |
        M10. Admin-only. Marks the revision `Removed` and best-effort deletes
        its cache. Refused with `CONFLICT` (409) while any run references it or
        it is any project's enabled revision. `revisionId` is validated against
        the flow AND the project's declared source. Automatic GC of
        unreferenced revisions is M19. Source:
        `.../flow-packages/[flowRefId]/revisions/[revisionId]/remove/route.ts`.
      operationId: removeFlowRevision
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: flowRefId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: revisionId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }

  /api/projects/{slug}/flow-packages/{flowRefId}/upgrade-preview:
    get:
      tags: [flow-packages]
      summary: Diff the enabled revision against a candidate revision
      description: |
        M10. Admin-only. Returns a structured contract diff (steps, gates,
        artifacts, capabilities, external ops, schema/setup changes, and the
        M34 `agents` break-impact section joined against this project's live
        attachments/bindings) between the project's enabled revision and
        `revisionId`. `revisionId` is validated against the flow AND the
        project's declared source. Source:
        `.../flow-packages/[flowRefId]/upgrade-preview/route.ts`.
      operationId: getFlowUpgradePreview
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: flowRefId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: revisionId,
            in: query,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      responses:
        "200":
          description: Structured upgrade preview.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpgradePreview" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/capabilities/{capabilityRefId}/trust:
    post:
      tags: [capabilities]
      summary: Trust-confirm a capability import and run its setup
      description: |
        **Implemented (M14).** Admin-only
        (`requireProjectAction("managePackages")`). Establishes explicit trust
        for a `capability_imports[]` entry and, when trust is granted, executes
        the import's `setup.sh` (if present and not yet run).

        **Identifiers.** `slug` is a url-param resolved to a `projects` row
        (server-state). `capabilityRefId` is a url-param validated against the
        project's `capability_imports` rows (server-state) — it is NOT derived
        from the body.

        **Two-phase, retry-safe semantics (R-2PC).** The idempotency marker is
        `setupStatus`, NOT `trustStatus`. When `confirm: true`:

        1. Under `SELECT … FOR UPDATE`, write `trustStatus = 'trusted'` (BEFORE
           the side-effect).
        2. Execute `runCapabilityRevisionSetup` (the trust-gated, physically
           separate function — never called from `installCapabilityRevision`).
        3. Write `setupStatus = 'done'` (AFTER the side-effect).

        On any setup failure `setupStatus` is flipped to `'failed'` and the route
        returns 502 (`FLOW_INSTALL`, retryable via re-POST). Because `runCapabilityRevisionSetup` re-runs when
        `setupStatus ∈ {pending, failed}`, a re-POST restarts setup without a
        spurious 409. `409` is returned **ONLY** when `setupStatus = 'done'` or
        `'not_required'` (genuinely nothing to do), and NEVER merely because
        `trustStatus` is already `'trusted'`.

        Source: `web/app/api/projects/[slug]/capabilities/[capabilityRefId]/trust/route.ts`.
        See [ADR-043](../decisions.md) and
        [`configuration.md`](../configuration.md#capability_imports).
      operationId: confirmCapabilityImportTrust
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - name: capabilityRefId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            pattern: "^[A-Za-z0-9._-]+$"
            description: |
              Validated against SAFE_PATH_SEGMENT on the server; url-param only —
              not accepted from the body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm]
              properties:
                confirm:
                  type: boolean
                  enum: [true]
                  description: |
                    Must be `true` — grant trust and run setup (if pending/failed).
                    The handler body schema is `z.literal(true)`; any other value
                    is rejected with 422 (`CONFIG`).
      responses:
        "200":
          description: |
            Trust established and setup completed (`setupStatus = 'done'` or
            `'not_required'`).
          content:
            application/json:
              schema:
                type: object
                required: [ok, setupStatus, trustStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  setupStatus:
                    type: string
                    enum: [not_required, done]
                  trustStatus:
                    type: string
                    enum: [trusted, trusted_by_policy]
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: |
            Project or capability import not found for this project
            (`PRECONDITION`), or setup is already `done` or `not_required`
            (nothing to do, `CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: |
            Body is malformed or `capabilityRefId` fails `SAFE_PATH_SEGMENT`
            validation (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "502":
          description: |
            `setup.sh` execution failed (`setupStatus` flipped to `'failed'`).
            `trustStatus` remains `'trusted'` so a re-POST will retry setup
            (`FLOW_INSTALL`, retryable via re-POST). Carries structured detail
            `{source, version, stage:'setup', exitStatus, output}` in the message.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  # ── M27 Flow Studio ─────────────────────────────────────────────────────────

  /api/projects/{slug}/catalog/caps/{capId}/graph:
    get:
      tags: [flow-studio, catalog]
      summary: (M27) Get the flow-graph topology and authored layout for an authored capability
      description: |
        (M27 — Designed.) Requires project membership at `viewer` or above
        (`readBoard`). `slug` and `capId` are url-params resolved to server
        state; `capId` is asserted to belong to `slug`. Returns the compiled
        topology from `buildGraphTopology`, the authored layout from the
        manifest `presentation` section (ADR-064), the current draft version
        (for optimistic-concurrency on subsequent PATCH /draft), and the
        capability kind. Only `kind=flow` capabilities return topology; other
        kinds return `topology: null`.
      operationId: getCapabilityGraph
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: capId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Flow-graph topology, authored layout, draft version, and capability kind.
          content:
            application/json:
              schema:
                type: object
                required: [topology, layout, draftVersion, kind]
                properties:
                  topology:
                    type: object
                    nullable: true
                    description: |
                      Compiled graph topology (`GraphTopology` shape). Null for non-flow kinds.
                    properties:
                      nodes:
                        type: array
                        items: { $ref: "#/components/schemas/GraphTopologyNode" }
                      edges:
                        type: array
                        items: { $ref: "#/components/schemas/GraphTopologyEdge" }
                  layout:
                    type: object
                    description: |
                      Authored layout from the manifest `presentation` section
                      (ADR-064), keyed by node id; absent nodes are dagre-seeded
                      client-side. Empty object when no presentation is stored.
                    additionalProperties: { $ref: "#/components/schemas/GraphNodePosition" }
                  draftVersion:
                    type: integer
                    minimum: 1
                    description: |
                      Current `authored_capabilities.draft_version`. Used as
                      `expectedDraftVersion` in subsequent PATCH /draft calls.
                  kind:
                    $ref: "#/components/schemas/AuthoredCapabilityKind"
              examples:
                flow-graph:
                  summary: A two-step flow capability graph
                  value:
                    draftVersion: 3
                    kind: flow
                    topology:
                      nodes:
                        - id: plan
                          nodeType: ai_coding
                          label: plan
                          displayLabel: Plan
                          nodeTypeLabel: Agent
                          nodeRole: agent
                          declaredGateSummary:
                            total: 0
                            blocking: 0
                            advisory: 0
                            kinds: []
                        - id: review
                          nodeType: human
                          label: review
                          displayLabel: Review
                          nodeTypeLabel: Human
                          nodeRole: human
                          declaredGateSummary:
                            total: 0
                            blocking: 0
                            advisory: 0
                            kinds: []
                      edges:
                        - id: plan->review
                          source: plan
                          target: review
                          outcome: success
                          displayLabel: Success
                          edgeRole: success
                    layout:
                      plan: { x: 100, y: 100 }
                      review: { x: 300, y: 100 }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/projects/{slug}/catalog/caps/{capId}/diff:
    get:
      tags: [flow-studio, catalog]
      summary: (M27) Get published vs draft YAML diff for an authored capability
      description: |
        (M27 — Designed.) Requires project membership at `viewer` or above
        (`readBoard`). Returns the serialized YAML of the currently published
        revision and the current draft revision for side-by-side diffing in the
        Flow Studio editor. If no published revision exists, `publishedYaml` is
        null. If no draft revision exists, `draftYaml` is null.
      operationId: getCapabilityDiff
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: capId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Published and draft YAML strings for diff rendering.
          content:
            application/json:
              schema:
                type: object
                required: [publishedYaml, draftYaml]
                properties:
                  publishedYaml:
                    type: string
                    nullable: true
                    description: YAML-serialized manifest of the currently published revision. Null if no published revision exists.
                  draftYaml:
                    type: string
                    nullable: true
                    description: YAML-serialized manifest of the current draft revision. Null if no draft exists.
              examples:
                with-both:
                  summary: Both published and draft exist
                  value:
                    publishedYaml: "schemaVersion: 1\nname: Bugfix\nsteps:\n  - id: plan\n    type: agent\n"
                    draftYaml: "schemaVersion: 1\nname: Bugfix\nsteps:\n  - id: plan\n    type: agent\n  - id: review\n    type: human\n"
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/projects/{slug}/flows/{flowId}/version-binding:
    patch:
      tags: [flow-studio]
      summary: (M27) Set the version-binding for a project flow
      description: |
        (M27 — Designed.) Requires `managePackages` project action (project
        admin or above). Sets `flows.version_binding` to `pinned` or `latest`.

        - `pinned`: launch resolves `flows.enabled_revision_id` (the M10
          pointer).
        - `latest`: launch resolves the newest PUBLISHED `flow_revisions`
          for the `flow_ref_id`, never a draft; authored-wins tie-break.

        `slug` and `flowId` are url-params resolved server-side; no
        body-controlled project or flow identifiers.
      operationId: patchFlowVersionBinding
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: flowId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [binding]
              additionalProperties: false
              properties:
                binding:
                  type: string
                  enum: [pinned, latest]
                  description: |
                    `pinned` — resolve `flows.enabled_revision_id` at launch.
                    `latest` — resolve the newest PUBLISHED revision at launch.
            examples:
              set-latest:
                summary: Switch to always-latest resolution
                value:
                  binding: latest
              set-pinned:
                summary: Pin to the currently enabled revision
                value:
                  binding: pinned
      responses:
        "200":
          description: Version binding updated.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: Invalid `binding` enum value (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/projects/{slug}/flows/{flowId}/trust-executable:
    post:
      tags: [flow-studio]
      summary: (M27) Flip exec_trust to trusted on the enabled flow revision
      description: |
        (M27 — Designed.) Requires global `admin` role
        (`requireGlobalRole("admin")`). Flips `flow_revisions.exec_trust` to
        `trusted` on the currently enabled revision of the flow. This is the
        explicit operator gate before `setup.sh` runs and before any MCP stdio
        `command` may be spawned for this revision.

        **Invariant (§4.2):** `flows.trustStatus` (LOGIC) alone NEVER runs
        `setup.sh` or an MCP stdio command. A separate explicit exec-trust flip
        via this route is always required.

        After the flip, `runRevisionSetup` (physically separate, sentinel
        once-only) is queued server-side. Empty request body.
      operationId: trustExecutableFlowRevision
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: flowId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: exec_trust flipped to trusted on the enabled revision.
          content:
            application/json:
              schema:
                type: object
                required: [ok, exec_trust]
                properties:
                  ok: { type: boolean, enum: [true] }
                  exec_trust:
                    type: string
                    enum: [trusted]
                    description: The new exec_trust value of the enabled revision.
              examples:
                trusted:
                  summary: Exec trust granted
                  value:
                    ok: true
                    exec_trust: trusted
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ── M27 Platform MCP server admin ───────────────────────────────────────────

  /api/admin/mcp-servers:
    get:
      tags: [mcp-management, admin]
      summary: (M27) List platform MCP servers
      description: |
        (M27 — Designed.) Admin-only (`requireGlobalRole("admin")`). Returns
        the full `platform_mcp_servers` catalog with trust, readiness, and
        enabled state. Secret values are NEVER returned — `env_keys` contains
        env-var NAME strings only; actual values are resolved supervisor-side.
      operationId: getAdminMcpServers
      responses:
        "200":
          description: Platform MCP server catalog.
          content:
            application/json:
              schema:
                type: object
                required: [servers]
                properties:
                  servers:
                    type: array
                    items: { $ref: "#/components/schemas/PlatformMcpServer" }
              examples:
                list:
                  summary: Two platform MCP servers
                  value:
                    servers:
                      - id: filesystem
                        transport: stdio
                        command: npx
                        args: ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]
                        envKeys: []
                        url: null
                        headerKeys: []
                        supportedAgents: [claude, codex]
                        trustStatus: trusted
                        readinessStatus: Ready
                        readinessReasons: []
                        enabled: true
                        createdAt: "2026-06-01T10:00:00Z"
                        updatedAt: "2026-06-01T10:00:00Z"
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [mcp-management, admin]
      summary: (M27) Create a platform MCP server
      description: |
        (M27 — Designed.) Admin-only. Creates a `platform_mcp_servers` row.
        Mirrors the `POST /api/admin/acp-runners` pattern (ADR-065).

        **Secret constraint:** all env var values and header values MUST be
        supplied as `env:NAME` references (pattern `^env:[A-Za-z_][A-Za-z0-9_]*$`).
        Actual secret values are NEVER accepted, stored, or echoed. Only the
        NAME portion is stored in `env_keys`/`header_keys`.

        A duplicate `id` returns `409` (via `onConflictDoNothing().returning()`,
        never a raw 500).
      operationId: postAdminMcpServer
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlatformMcpServerBody" }
            examples:
              stdio-server:
                summary: Create a stdio MCP server
                value:
                  id: filesystem
                  transport: stdio
                  command: npx
                  args: ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]
                  envKeys: ["env:SOME_KEY"]
                  supportedAgents: [claude]
                  enabled: true
              sse-server:
                summary: Create an SSE MCP server
                value:
                  id: my-sse-server
                  transport: sse
                  url: "https://mcp.example.com/sse"
                  headerKeys: ["env:MY_SERVER_TOKEN"]
                  supportedAgents: [claude, codex]
                  enabled: true
      responses:
        "201":
          description: |
            MCP server created. Readiness is derived server-side (never
            accepted from the body). Fetch via GET to read the created row.
          content:
            application/json:
              schema:
                type: object
                required: [ok, id]
                properties:
                  ok: { type: boolean, enum: [true] }
                  id: { type: string }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: MCP server id already exists (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: |
            Invalid body — bad transport, missing required fields for the
            transport kind, or a secret value not in `env:NAME` form (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/admin/mcp-servers/{id}:
    patch:
      tags: [mcp-management, admin]
      summary: (M27) Update a platform MCP server
      description: |
        (M27 — Designed.) Admin-only. Mutates transport, command, args,
        envKeys, url, headerKeys, supportedAgents, or enabled. At least one
        field required. Disabling while active usage references exist is refused
        (`409 CONFLICT`, mirrors `assertCanDisable`). Secret values must remain
        `env:NAME` references.
      operationId: patchAdminMcpServer
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              minProperties: 1
              properties:
                transport: { type: string, enum: [stdio, sse, http] }
                command:
                  type: string
                  nullable: true
                  description: Required when `transport=stdio`. Ignored for sse/http.
                args:
                  type: array
                  items: { type: string }
                envKeys:
                  type: array
                  description: |
                    Env-var NAME references for stdio transport (`env:NAME` or
                    bare `NAME`). Replaces the stored set. Ignored for sse/http.
                  items:
                    type: string
                    pattern: "^(env:)?[A-Za-z_][A-Za-z0-9_]*$"
                url:
                  type: string
                  nullable: true
                  description: Required when `transport=sse` or `transport=http`. Ignored for stdio.
                headerKeys:
                  type: array
                  description: |
                    HTTP header NAME references for sse/http transport
                    (`env:NAME` or bare `NAME`). Replaces the stored set.
                    Ignored for stdio.
                  items:
                    type: string
                    pattern: "^(env:)?[A-Za-z_][A-Za-z0-9_]*$"
                supportedAgents:
                  type: array
                  items: { type: string, enum: [claude, codex, gemini, opencode, mimo] }
                enabled: { type: boolean }
      responses:
        "200":
          description: MCP server updated.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: |
            Disabling the server is refused because active usage references
            exist (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body or secret value not in `env:NAME` form (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    delete:
      tags: [mcp-management, admin]
      summary: (M27) Delete a platform MCP server
      description: |
        (M27 — Designed.) Admin-only. Deletes the `platform_mcp_servers` row.
        Refused (`409 CONFLICT`) while any usage reference exists (mirrors
        `assertCanDisable` pattern from the ACP runner admin surface). Zero
        references → `204`.
      operationId: deleteAdminMcpServer
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: MCP server deleted. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: |
            MCP server is still referenced by capability records, active runs,
            or project configurations (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  # ── M27 Project-scoped MCP management ───────────────────────────────────────

  /api/projects/{slug}/mcp:
    get:
      tags: [mcp-management]
      summary: (M27) List project-scoped MCP servers
      description: |
        (M27 — Designed.) Requires project membership at `viewer` or above
        (`readBoard`). Returns `capability_records` rows for this project with
        `kind=mcp` and `source=project`. Secret values are NEVER returned —
        env-var names are shown but their values are resolved supervisor-side.
      operationId: listProjectMcpServers
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Project-scoped MCP server capability records.
          content:
            application/json:
              schema:
                type: object
                required: [servers]
                properties:
                  servers:
                    type: array
                    items: { $ref: "#/components/schemas/ProjectMcpServer" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
    post:
      tags: [mcp-management]
      summary: (M27) Create a project-scoped MCP server
      description: |
        (M27 — Designed.) Requires the `manageCatalog` project action (project
        admin or global admin). Creates a `capability_records` row with
        `kind=mcp`, `source=project` for this project.

        Secret values MUST be `env:NAME` references; values are NEVER accepted
        or stored. A duplicate `refId` within the project returns `409 CONFLICT`.
      operationId: postProjectMcpServer
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectMcpServerBody" }
            examples:
              stdio-server:
                summary: Add a project stdio MCP server
                value:
                  refId: my-project-mcp
                  transport: stdio
                  command: node
                  args: ["./tools/my-mcp-server.js"]
                  env: {}
                  supportedAgents: [claude]
      responses:
        "201":
          description: Project MCP server created.
          content:
            application/json:
              schema:
                type: object
                required: [ok, id]
                properties:
                  ok: { type: boolean, enum: [true] }
                  id: { type: string, format: uuid }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: |
            Project not found/archived (`PRECONDITION`) or `refId` duplicate
            within this project (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body or secret value not in `env:NAME` form (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/projects/{slug}/mcp/{mcpId}:
    patch:
      tags: [mcp-management]
      summary: (M27) Update a project-scoped MCP server
      description: |
        (M27 — Designed.) Requires the `manageCatalog` project action (project
        admin or global admin). Mutates transport, command, args, env, url,
        headers, or supportedAgents. At least one field required. Disabling
        while referenced by active launches is refused (`409 CONFLICT`). Secret
        values must remain `env:NAME` references.
      operationId: patchProjectMcpServer
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: mcpId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              minProperties: 1
              properties:
                transport: { type: string, enum: [stdio, sse, http] }
                command: { type: string, nullable: true }
                args:
                  type: array
                  items: { type: string }
                env:
                  type: object
                  additionalProperties:
                    type: string
                    pattern: "^env:[A-Za-z_][A-Za-z0-9_]*$"
                url: { type: string, nullable: true }
                headers:
                  type: object
                  additionalProperties:
                    type: string
                    pattern: "^env:[A-Za-z_][A-Za-z0-9_]*$"
                supportedAgents:
                  type: array
                  items: { type: string, enum: [claude, codex, gemini, opencode, mimo] }
      responses:
        "200":
          description: Project MCP server updated.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: |
            Project not found/archived (`PRECONDITION`) or server referenced
            by active launches (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body or secret value not in `env:NAME` form (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    delete:
      tags: [mcp-management]
      summary: (M27) Delete a project-scoped MCP server
      description: |
        (M27 — Designed.) Requires the `manageCatalog` project action.
        Soft-deletes or hard-deletes the `capability_records` row. Refused
        (`409 CONFLICT`) while the server is referenced by in-flight run
        resolved-sets.
      operationId: deleteProjectMcpServer
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: mcpId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Project MCP server deleted. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Server is still referenced by in-flight run resolved-sets (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/projects/{slug}/mcp/resolve:
    post:
      tags: [mcp-management]
      summary: (M27) Resolve the effective MCP set for a project (setup wizard)
      description: |
        (M27 — Designed.) Requires project membership at `member` or above.
        Computes the MCP capability resolution for the project: applies
        project > platform > flow-package precedence (§6.1), deduplicates
        by `(kind, refId)`, and returns the resolved winner set plus a list
        of proposed additions (absent required MCPs that block launch).

        This route is used by the MCP setup wizard to show the operator
        what MCPs are resolved and what required MCPs are missing before
        launch. Confirmation of proposed additions (with `env:NAME`
        references for secrets) is the operator action.

        Secret values accepted in the body MUST be `env:NAME` references;
        values are NEVER stored or returned.
      operationId: resolveProjectMcpServers
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                context:
                  type: object
                  description: |
                    Optional operator-confirmed parameters (e.g. proposed MCP
                    configurations with `env:NAME` references) to evaluate
                    alongside the stored catalog.
                  additionalProperties: true
            examples:
              empty:
                summary: Resolve without context (read-only check)
                value: {}
      responses:
        "200":
          description: Resolved MCP winner set and list of missing required MCPs.
          content:
            application/json:
              schema:
                type: object
                required: [resolved, proposed]
                properties:
                  resolved:
                    type: array
                    description: |
                      The effective, deduplicated MCP set after applying
                      project > platform > flow-package precedence. Each
                      entry is the winning `capability_records` row for its
                      `(kind, refId)`.
                    items: { $ref: "#/components/schemas/ResolvedMcpEntry" }
                  proposed:
                    type: array
                    description: |
                      MCPs declared as REQUIRED by installed flows that
                      cannot currently be resolved — the operator must
                      configure these to unblock launch.
                    items:
                      type: object
                      required: [refId, declaredBy]
                      properties:
                        refId: { type: string }
                        declaredBy:
                          type: string
                          description: The flow ref id that declared this MCP as required.
              examples:
                resolved:
                  summary: One resolved MCP, one missing required
                  value:
                    resolved:
                      - refId: filesystem
                        scope: platform
                        transport: stdio
                        command: npx
                        args: ["-y", "@modelcontextprotocol/server-filesystem"]
                        envKeys: []
                        supportedAgents: [claude, codex]
                    proposed:
                      - refId: my-build-tool
                        declaredBy: bugfix-flow
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/schedules:
    get:
      tags: [run-schedules]
      summary: (M28) List run schedules for a project
      description: |
        (M28 — Implemented.) Requires project membership at `viewer` or above
        (`requireProjectAction("readBoard")`). Returns every `run_schedules`
        row for the project as `ScheduleDTO` — `taskTitle` and
        `lastRunStatus` are joined at read time (`tasks` + `runs` on
        `last_run_id`), never denormalized.

        Source: `web/app/api/projects/[slug]/schedules/route.ts` (Designed).
      operationId: getProjectSchedules
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Run schedules for the project.
          content:
            application/json:
              schema:
                type: object
                required: [schedules]
                properties:
                  schedules:
                    type: array
                    items: { $ref: "#/components/schemas/ScheduleDTO" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
    post:
      tags: [run-schedules]
      summary: (M28) Create a run schedule
      description: |
        (M28 — Implemented.) Requires `requireProjectAction("manageSchedules")`
        (`member` or above). The `projectId` is resolved from the URL `slug`
        (server-state). `taskId` is a body-controlled cross-resource id and is
        compared against server state: `task.projectId === project.id`,
        otherwise `409 PRECONDITION`. A task in a terminal status (`Done` or
        `Abandoned`) is refused (`409 PRECONDITION`). `runnerId`, when given,
        must exist in `platform_acp_runners` (`400 CONFIG`). `cronExpr` must be a 5-field
        cron expression and `timezone` a valid IANA name, validated through
        the croner wrapper (`400 CONFIG`). `next_fire_at` is precomputed from
        now in the schedule's timezone.
      operationId: postProjectSchedule
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostScheduleBody" }
            examples:
              nightly:
                summary: Nightly relaunch of a maintenance task
                value:
                  name: "Nightly dependency audit"
                  taskId: "task-uuid-here"
                  cronExpr: "0 3 * * *"
                  timezone: "Europe/Moscow"
                  overlapPolicy: skip
      responses:
        "201":
          description: Run schedule created.
          content:
            application/json:
              schema:
                type: object
                required: [schedule]
                properties:
                  schedule: { $ref: "#/components/schemas/ScheduleDTO" }
        "400":
          description: |
            Bad request (`CONFIG`): malformed body, invalid or non-5-field
            `cronExpr`, never-matching expression, unknown IANA `timezone`,
            or unknown `runnerId`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: |
            Precondition failed (`PRECONDITION`): project not found or
            archived, `taskId` not part of this project, or target task is
            terminal (`Done` / `Abandoned`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/projects/{slug}/schedules/{scheduleId}:
    patch:
      tags: [run-schedules]
      summary: (M28) Update a run schedule (single aggregating PATCH)
      description: |
        (M28 — Implemented.) Requires `manageSchedules` (`member` or above).
        ONE aggregating transactional PATCH accepting any subset of `name`,
        `cronExpr`, `timezone`, `overlapPolicy`, `runnerId`, `enabled` —
        never a per-field route fan-out. `runnerId: null` clears the
        override. Changing `cronExpr`/`timezone` or resuming
        (`enabled: true`) recomputes `next_fire_at` from now. Pausing
        (`enabled: false`) clears `queue_one_pending` and `queued_fire_at`.
        An empty body is `400 CONFIG`. A schedule belonging to a different
        project than `slug` is a bare `404`.
      operationId: patchProjectSchedule
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: scheduleId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchScheduleBody" }
      responses:
        "200":
          description: Run schedule updated.
          content:
            application/json:
              schema:
                type: object
                required: [schedule]
                properties:
                  schedule: { $ref: "#/components/schemas/ScheduleDTO" }
        "400":
          description: |
            Bad request (`CONFIG`): empty body, invalid `cronExpr` /
            `timezone`, or unknown `runnerId`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Precondition" }
    delete:
      tags: [run-schedules]
      summary: (M28) Delete a run schedule
      description: |
        (M28 — Implemented.) Requires `manageSchedules` (`member` or above).
        Hard delete of the schedule row; runs it launched are untouched.
      operationId: deleteProjectSchedule
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: scheduleId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Precondition" }
  /api/projects/{slug}/schedules/{scheduleId}/trigger:
    post:
      tags: [run-schedules]
      summary: (M28) Trigger a run schedule now
      description: |
        (M28 — Implemented.) Requires `manageSchedules` (`member` or above). No
        request body. Dispatches the schedule immediately through the SAME
        claim+fire core as the tick (`dispatchScheduleNow`): respects the
        overlap policy and the global cap (no bypass), does NOT advance
        `next_fire_at`, and is allowed on a paused schedule. The actor is the
        clicking user's id.

        A row currently being dispatched — row-locked, or
        `last_fire_outcome = 'dispatching'` fresher than the 300s scheduler
        attempt timeout — returns `409 CONFLICT`; an OLDER `dispatching`
        remnant (crash window W1) is past the window and may be triggered.

        A refused launch is NOT an HTTP error: the dispatch itself succeeded
        and recorded the outcome, so the response is `200` with
        `outcome: launch_failed` and the `MaisterError` code in `errorCode`
        (including `EXECUTOR_UNAVAILABLE` when the supervisor is down inside
        `launchRun`).
      operationId: triggerProjectSchedule
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: scheduleId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Dispatch decided; outcome reported for the UI toast.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TriggerScheduleResponse" }
              examples:
                launched:
                  summary: Run launched
                  value: { outcome: launched, runId: "run-uuid" }
                queued:
                  summary: Cap full with start_anyway — run queued Pending
                  value:
                    {
                      outcome: queued_pending,
                      runId: "run-uuid",
                      queuePosition: 2,
                    }
                refused:
                  summary: launchRun refused (dirty parent repo)
                  value: { outcome: launch_failed, errorCode: PRECONDITION }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: |
            Dispatch in progress (`CONFLICT`): the row is claimed by a
            concurrent tick/trigger or `last_fire_outcome = 'dispatching'`
            is fresher than the 300s attempt timeout. Project not
            found/archived is `PRECONDITION`.

  # ── ADR-077 Outbound webhooks — platform-admin subscriptions ────────────────

  /api/admin/webhooks:
    get:
      tags: [webhooks, admin]
      summary: (ADR-077) List platform webhook subscriptions
      description: |
        (ADR-077 — Implemented.) Admin-only (`requireGlobalRole("admin")`).
        Returns every platform-scoped `webhook_subscriptions` row
        (`project_id IS NULL`). Secret values are NEVER returned —
        `signing_secret_ref`, `secondary_signing_secret_ref`, and any
        `env:NAME` header values are echoed back as their reference strings
        only; actual values resolve server-side at send time.
      operationId: listAdminWebhooks
      responses:
        "200":
          description: Platform webhook subscription catalog.
          content:
            application/json:
              schema:
                type: object
                required: [subscriptions]
                properties:
                  subscriptions:
                    type: array
                    items: { $ref: "#/components/schemas/WebhookSubscription" }
              examples:
                list:
                  summary: One platform subscription
                  value:
                    subscriptions:
                      - id: "wh_5f3a8a2b7e34"
                        projectId: null
                        name: ops-notifier
                        url: "https://hooks.example.com/maister"
                        method: POST
                        headers: { "X-Team": "env:WEBHOOK_TEAM_HEADER" }
                        event_types: ["run.review", "run.failed"]
                        signing_secret_ref: "env:WEBHOOK_SIGNING_SECRET"
                        secondary_signing_secret_ref: null
                        enabled: true
                        createdAt: "2026-06-10T10:00:00Z"
                        updatedAt: "2026-06-10T10:00:00Z"
                        lastDelivery:
                          status: delivered
                          at: "2026-06-10T12:30:05Z"
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [webhooks, admin]
      summary: (ADR-077) Create a platform webhook subscription
      description: |
        (ADR-077 — Implemented.) Admin-only. Creates a platform-scoped
        `webhook_subscriptions` row (`project_id` stays NULL). Mirrors the
        `POST /api/admin/mcp-servers` identifier discipline: the body carries
        config values only — NO cross-resource ids.

        **Secret constraint:** `signing_secret_ref` is REQUIRED and MUST be an
        `env:NAME` reference (pattern `^env:[A-Za-z_][A-Za-z0-9_]*$`).
        `secondary_signing_secret_ref` (rotation overlap) is optional and
        follows the same pattern. `headers` values MUST be `env:NAME`
        references — a raw header value is refused `422 CONFIG`. Plain secret
        values are NEVER accepted, stored, or echoed (`422 CONFIG`).
        `url` MUST be `http`/`https` AND satisfy the destination egress policy
        (a loopback / private / link-local / metadata IP-literal destination is
        refused `422 CONFIG`; hostnames are re-checked at send time);
        `event_types` entries MUST be taxonomy types or the single literal
        `"*"`.
      operationId: postAdminWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookSubscriptionCreate" }
            examples:
              all-events:
                summary: Subscribe to every event type
                value:
                  name: ops-notifier
                  url: "https://hooks.example.com/maister"
                  method: POST
                  headers: { "X-Team": "env:WEBHOOK_TEAM_HEADER" }
                  event_types: ["*"]
                  signing_secret_ref: "env:WEBHOOK_SIGNING_SECRET"
                  enabled: true
              filtered:
                summary: Subscribe to a filtered set
                value:
                  name: review-pager
                  url: "https://hooks.example.com/review"
                  event_types: ["run.review", "run.failed", "run.crashed"]
                  signing_secret_ref: "env:PAGER_SECRET"
      responses:
        "201":
          description: Subscription created. Fetch via GET to read the stored row.
          content:
            application/json:
              schema:
                type: object
                required: [ok, id]
                properties:
                  ok: { type: boolean, enum: [true] }
                  id: { type: string }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422":
          description: |
            Invalid body — non-`http(s)` URL, unknown `event_types` entry,
            missing `signing_secret_ref`, or a secret value not in `env:NAME`
            form (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/admin/webhooks/{id}:
    get:
      tags: [webhooks, admin]
      summary: (ADR-077) Get a platform webhook subscription
      description: |
        (ADR-077 — Implemented.) Admin-only. Returns one platform-scoped
        subscription by id. A project-scoped row id (or an unknown id) is
        `404` — platform admin sees only `project_id IS NULL` rows here.
      operationId: getAdminWebhook
      parameters:
        - { $ref: "#/components/parameters/WebhookId" }
      responses:
        "200":
          description: The subscription.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebhookSubscription" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [webhooks, admin]
      summary: (ADR-077) Update a platform webhook subscription
      description: |
        (ADR-077 — Implemented.) Admin-only. Mutates any of name, url, method,
        headers, event_types, signing_secret_ref, secondary_signing_secret_ref,
        or enabled. At least one field required. Secret values must remain
        `env:NAME` references; `signing_secret_ref` may be re-pointed but not
        cleared. Disabling (`enabled: false`) takes effect at the next fanout —
        events in this window are skipped (not retroactively delivered); deliveries
        already fanned out pause and resume on re-enable.
      operationId: patchAdminWebhook
      parameters:
        - { $ref: "#/components/parameters/WebhookId" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookSubscriptionUpdate" }
            examples:
              disable:
                summary: Pause delivery
                value: { enabled: false }
              rotate-secret:
                summary: Begin signing-secret rotation
                value:
                  signing_secret_ref: "env:WEBHOOK_SIGNING_SECRET_NEW"
                  secondary_signing_secret_ref: "env:WEBHOOK_SIGNING_SECRET"
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: Invalid body or secret value not in `env:NAME` form (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    delete:
      tags: [webhooks, admin]
      summary: (ADR-077) Delete a platform webhook subscription
      description: |
        (ADR-077 — Implemented.) Admin-only. Usage-guarded hard delete: refused
        with `409 CONFLICT` while ANY delivery history (`webhook_deliveries`)
        references the subscription — the per-subscription delivery/attempt
        ledger is append-only audit and is never cascaded away. Retire a live
        endpoint with `enabled: false` instead. Hard delete succeeds (`204`)
        only for a subscription that has never produced a delivery.
      operationId: deleteAdminWebhook
      parameters:
        - { $ref: "#/components/parameters/WebhookId" }
      responses:
        "204": { description: Subscription deleted (no delivery history existed). }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: |
            Subscription has delivery history and cannot be hard-deleted
            (`CONFLICT`). Disable it instead.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/admin/webhooks/{id}/deliveries:
    get:
      tags: [webhooks, admin]
      summary: (ADR-077) List delivery log for a platform subscription
      description: |
        (ADR-077 — Implemented.) Admin-only. Paged, newest-first delivery log for
        the subscription, each delivery carrying its full `attempts[]` audit
        trail. `response_snippet`, `lastErrorKind`, and HTTP status are surfaced
        for DLQ inspection. Cursor paging via `cursor`/`limit`.
      operationId: listAdminWebhookDeliveries
      parameters:
        - { $ref: "#/components/parameters/WebhookId" }
        - { $ref: "#/components/parameters/DeliveryCursor" }
        - { $ref: "#/components/parameters/DeliveryLimit" }
      responses:
        "200":
          description: Delivery log page.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebhookDeliveryPage" }
              examples:
                page:
                  summary: One delivered, one dead
                  value:
                    deliveries:
                      - id: "del_9a4a7b9d0d6b"
                        eventId: "evt_8a4a7b9d"
                        type: run.review
                        status: delivered
                        attemptCount: 1
                        nextAttemptAt: null
                        lastHttpStatus: 200
                        lastErrorKind: null
                        deliveredAt: "2026-06-10T12:30:05Z"
                        createdAt: "2026-06-10T12:30:04Z"
                        attempts:
                          - attemptNo: 1
                            requestedAt: "2026-06-10T12:30:05Z"
                            durationMs: 142
                            httpStatus: 200
                            errorKind: null
                            responseSnippet: ok
                      - id: "del_1c2d3e4f5a6b"
                        eventId: "evt_1c2d3e4f"
                        type: run.failed
                        status: dead
                        attemptCount: 8
                        nextAttemptAt: null
                        lastHttpStatus: 500
                        lastErrorKind: http
                        deliveredAt: null
                        createdAt: "2026-06-09T20:00:00Z"
                        attempts:
                          - attemptNo: 8
                            requestedAt: "2026-06-11T13:30:00Z"
                            durationMs: 88
                            httpStatus: 500
                            errorKind: http
                            responseSnippet: "internal error"
                    nextCursor: null
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/admin/webhooks/{id}/ping:
    post:
      tags: [webhooks, admin]
      summary: (ADR-077) Send a synthetic ping to a platform subscription
      description: |
        (ADR-077 — Implemented.) Admin-only. Builds a synthetic `ping` envelope
        (fresh `id`/`deliveryId`, the real subscription), signs it, and POSTs it
        synchronously with the standard delivery headers and a
        `MAISTER_WEBHOOK_TIMEOUT_MS` timeout. The result is returned live and is
        NOT persisted — a ping creates no `webhook_events`/`webhook_deliveries`
        rows. Empty request body (no body-controlled ids).
      operationId: pingAdminWebhook
      parameters:
        - { $ref: "#/components/parameters/WebhookId" }
      responses:
        "200":
          description: Ping result (delivery outcome, never persisted).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PingResult" }
              examples:
                ok:
                  summary: Endpoint accepted the ping
                  value: { ok: true, httpStatus: 200, durationMs: 118 }
                refused:
                  summary: Endpoint returned an error status
                  value: { ok: false, httpStatus: 500, durationMs: 95, errorKind: http }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/admin/webhooks/{id}/deliveries/{deliveryId}/replay:
    post:
      tags: [webhooks, admin]
      summary: (ADR-077) Replay a platform webhook delivery
      description: |
        (ADR-077 — Implemented.) Admin-only. Re-queues a finished delivery for
        another send attempt: under one transaction the row is `SELECT … FOR
        UPDATE`, allow-listed to `status ∈ {delivered, dead}`, then reset to
        `status=pending, attempt_count=0, next_attempt_at=now()` with the
        prior outcome fields (`delivered_at`, `last_http_status`,
        `last_error_*`) cleared. A `pending`
        delivery is refused `409 CONFLICT` (already in flight). The stored event
        payload and `X-Maister-Idempotency-Key` are unchanged, so a consumer
        that already processed the event de-dupes the replay. The attempt audit
        keeps appending (`attemptNo` continues from the running total). Empty
        request body. The delivery MUST belong to `{id}` (server-state join;
        mismatch → `404`).
      operationId: replayAdminWebhookDelivery
      parameters:
        - { $ref: "#/components/parameters/WebhookId" }
        - { $ref: "#/components/parameters/DeliveryId" }
      responses:
        "202":
          description: Delivery re-queued; it will be re-sent on the next drain.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: |
            Delivery is currently `pending` and cannot be replayed (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/admin/webhook-settings:
    get:
      tags: [webhooks, admin]
      summary: (ADR-077) Read the global outbound-webhooks kill-switch
      description: |
        (ADR-077 — Implemented.) Admin-only. Reads `platform_runtime_settings.webhooks_enabled`
        on the singleton row. When `false`, the `webhook_delivery` scheduler job
        skips: un-fanned events are stamped consumed-and-dropped (never
        delivered retroactively) and the drain pauses until re-enabled.
      operationId: getAdminWebhookSettings
      responses:
        "200":
          description: Current webhook kill-switch state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebhookSettings" }
              examples:
                enabled:
                  value: { enabled: true }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    patch:
      tags: [webhooks, admin]
      summary: (ADR-077) Toggle the global outbound-webhooks kill-switch
      description: |
        (ADR-077 — Implemented.) Admin-only. Sets `platform_runtime_settings.webhooks_enabled`
        on the singleton row. Disabling pauses all fanout and delivery globally;
        re-enabling resumes pending deliveries from where they paused.
      operationId: patchAdminWebhookSettings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WebhookSettings" }
            examples:
              disable:
                value: { enabled: false }
      responses:
        "200":
          description: Updated kill-switch state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebhookSettings" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422":
          description: Invalid body (missing/invalid `enabled`) (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

