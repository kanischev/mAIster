openapi: 3.0.3
info:
  title: MAIster Web HTTP API
  version: "0.9.0"
  description: |
    HTTP surface exposed by the Next.js web tier under `app/api/`. Consumed
    by the MAIster UI and (in M7+) by any process that wants to drive HITL
    or stream run events without bypassing the web tier's trust boundary.

    **Milestone status: M10 (+ M14 Designed routes).**

    Routes shipped to date (plus routes Designed for M14, tagged inline):

    - `POST /api/projects/{slug}/flow-packages/install` and the
      `{flowRefId}/enable|disable|upgrade|rollback|trust`,
      `{flowRefId}/revisions/{revisionId}/remove`, and
      `GET {flowRefId}/upgrade-preview` routes (M10) — Flow package lifecycle.
      Admin-only (`requireProjectAction("managePackages")`). See
      [Flow packages](../system-analytics/flow-packages.md) and
      [ADR-021](../decisions.md#adr-021-flow-package-lifecycle-multi-revision-trust-and-compatibility).

    - `POST /api/projects` (M9) — register a project from a directory
      containing `maister.yaml`. Admin-only (global role `admin`). Validates
      the manifest, installs Flow plugins, persists DB rows.
    - `POST /api/projects/{slug}/tasks` (M9) — create a task on a project
      board. Requires project membership at `member` or above.
    - `/api/auth/{...nextauth}` (M9) — Auth.js v5 credentials handler.
      See [Authentication & RBAC](../configuration.md#authentication--rbac).
    - `POST /api/auth/register` — public registration. Creates a
      `pending` member account; an admin must activate it before sign-in.
    - `GET /api/admin/users` and `/api/admin/users/{userId}/*` —
      admin-only user activation, disable/re-enable, role change, and password
      reset. Returns no password hashes.
    - `POST /api/runs` (M5+) — launch a run from a Backlog task; precondition
      checks, executor resolution, worktree create, scheduler claim. Requires
      project membership at `member` or above (`launchRun`).
    - Scratch runs (Implemented) — `GET /api/scratch-runs/launch-options`,
      `POST /api/scratch-runs`, `GET /api/scratch-runs/{runId}`,
      `POST /api/scratch-runs/{runId}/messages`, `stop`, `recover`, and
      `discard`.
      These routes start and operate manual coding-agent dialog workspaces
      outside the task board while reusing the supervisor and run event stream.
    - Diff and promotion for run workspaces (Implemented) —
      `GET /api/runs/{runId}/diff` and `POST /api/runs/{runId}/promote`.
      Scratch runs use these routes from Review state.
    - `POST /api/runs/{runId}/hitl/{hitlRequestId}/respond` (M7) — durable
      HITL response surface. Permission-only flows resolve a supervisor
      deferred via the supervisor's `POST /sessions/{id}/input` and use a
      two-phase atomic claim (this file documents the contract). Form and
      human-review flows write `input-<stepId>.json` after a DB claim, and
      the runner's resume-from-existing-input branch picks it up. Requires
      project membership at `member` or above (`answerHitl`).
    - `GET /api/runs/{runId}/stream` (M7) — Server-Sent Events bridge.
      Tails the per-run durable replay log at
      `.maister/<projectSlug>/runs/<runId>/run.events.jsonl` (produced by
      the supervisor — see `supervisor.openapi.yaml`). Reconnect via
      `Last-Event-ID`. Event shape mirrors the supervisor SSE doc
      (`async/web-runs.asyncapi.yaml`). Requires project membership at
      `viewer` or above (`readBoard`).

    **Authentication.** All routes require a valid session (Auth.js v5
    credentials). Unauthenticated requests return `401 UNAUTHENTICATED`.
    Insufficient role returns `403 UNAUTHORIZED`. An authenticated account
    with a pending forced password change (seeded admin, admin-forced reset)
    is rejected on every role-gated route with `403 PASSWORD_CHANGE_REQUIRED`
    until it sets a new password. A valid session for a non-active account is
    rejected with `403 ACCOUNT_INACTIVE`. The `security` field below
    is left empty because Auth.js sessions are cookie-based and not
    expressible as an OpenAPI security scheme without a custom extension.

    See also:
      - [`./supervisor.openapi.yaml`](./supervisor.openapi.yaml)
      - [`./async/web-runs.asyncapi.yaml`](./async/web-runs.asyncapi.yaml)
      - [`./async/supervisor-sse.asyncapi.yaml`](./async/supervisor-sse.asyncapi.yaml)
      - [`../error-taxonomy.md`](../error-taxonomy.md)
      - [`../configuration.md`](../configuration.md) — Authentication & RBAC section
  contact:
    name: MAIster maintainers
    url: https://github.com/your-org/mAIster
  license:
    name: MIT
servers:
  - url: http://localhost:3000
    description: Local Next.js dev server (default).
security: []
tags:
  - name: projects
    description: Project registration and task creation.
  - name: auth
    description: Auth.js v5 session management.
  - name: admin
    description: Global admin account management.
  - name: runs
    description: Run launch, status, and event streaming.
  - name: scratch-runs
    description: Manual coding-agent dialog workspaces outside the task board.
  - name: hitl
    description: Human-in-the-loop response surface.
  - name: assignments
    description: M13 role-owned work queue and assignment ownership.
  - name: takeover
    description: Manual takeover — local worktree handoff (M11b, ADR-030).
  - name: flow-packages
    description: Flow package lifecycle — install, trust, enable, upgrade, rollback, remove.
  - name: reconciliation-gc
    description: Crash recover/discard and the token-guarded GC cron route (M19, ADR-033..036).
  - name: scheduler
    description: Unified token-guarded scheduler tick route (M24, ADR-060).
  - name: catalog
    description: Project-local authored capability catalog groundwork (M25, ADR-061).
  - name: capabilities
    description: Capability import trust-confirm route (M14, Designed, ADR-042).
paths:
  /api/admin/acp-runners:
    get:
      tags: [admin]
      summary: List platform ACP runners
      description: Admin-only. Returns platform runner catalog entries, readiness state, and usage references without exposing secret values.
      operationId: getAdminAcpRunners
      responses:
        "200":
          description: Platform ACP runner catalog.
          content:
            application/json:
              schema:
                type: object
                required: [runners, platformDefaultRunnerId, presets]
                properties:
                  runners:
                    type: array
                    items: { type: object }
                  platformDefaultRunnerId: { type: string, nullable: true }
                  presets:
                    type: array
                    items: { type: object }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [admin]
      summary: Create a platform ACP runner
      description: Admin-only. Creates an ACP runner and optionally updates the platform default. Secret material is accepted only as `env:NAME` references.
      operationId: postAdminAcpRunner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, adapter, model, provider]
              additionalProperties: false
              properties:
                id: { type: string }
                adapter: { type: string, enum: [claude, codex] }
                model: { type: string }
                provider: { type: object }
                permissionPolicy:
                  {
                    type: string,
                    enum: [default, dangerously_skip_permissions],
                    default: default,
                  }
                sidecarId: { type: string, nullable: true }
                enabled: { type: boolean, default: true }
                readinessStatus:
                  {
                    type: string,
                    enum: [Unknown, Ready, NotReady],
                    default: Unknown,
                  }
                readinessReasons:
                  type: array
                  items: { type: string }
      responses:
        "201":
          description: Runner created.
          content:
            application/json:
              schema:
                type: object
                required: [runner]
                properties:
                  runner: { type: object }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Runner id conflict or unsafe default transition.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid runner body or adapter/provider mismatch.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/admin/acp-runners/{runnerId}:
    patch:
      tags: [admin]
      summary: Update a platform ACP runner
      description: Admin-only. Mutates runner provider/model/sidecar/readiness/enabled fields. Disabling is refused while usage references exist.
      operationId: patchAdminAcpRunner
      parameters:
        - name: runnerId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Runner updated.
          content:
            application/json:
              schema:
                type: object
                required: [runner]
                properties:
                  runner: { type: object }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Runner is referenced or readiness precondition failed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    delete:
      tags: [admin]
      summary: Delete a platform ACP runner
      description: Admin-only. Refuses deletion while the runner is used by defaults, remaps, active runs, or historical run snapshots.
      operationId: deleteAdminAcpRunner
      parameters:
        - name: runnerId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Runner deleted. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Runner is still referenced.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/admin/scheduler-jobs:
    get:
      tags: [admin]
      summary: (M24) List scheduler jobs
      description: Admin-only. Returns scheduler jobs with cadence, target, next-run, disabled state, failure counters, and last-attempt status.
      operationId: getAdminSchedulerJobs
      responses:
        "200":
          description: Scheduler job catalog.
          content:
            application/json:
              schema:
                type: object
                required: [jobs]
                properties:
                  jobs:
                    type: array
                    items: { type: object }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [admin]
      summary: (M24) Create a scheduler job
      description: Admin-only. Creates a scheduler job. `agent_tick` jobs default `maxFailures` from `MAISTER_SCHEDULER_AGENT_TICK_MAX_FAILURES`. Per-kind `target` shape is validated (command requires `commandKind` + url/host; flow_run requires `taskId`).
      operationId: postAdminSchedulerJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jobKind, cadenceIntervalSeconds]
              additionalProperties: false
              properties:
                id: { type: string }
                jobKind:
                  {
                    type: string,
                    enum: [system_sweep, command, agent_tick, flow_run],
                  }
                target: { type: object }
                cadenceIntervalSeconds: { type: integer, minimum: 1 }
                maxFailures: { type: integer, minimum: 1 }
                nextRunAt: { type: string, format: date-time }
                projectId: { type: string, nullable: true }
      responses:
        "201":
          description: Scheduler job created.
          content:
            application/json:
              schema:
                type: object
                required: [ok, id]
                properties:
                  ok: { type: boolean }
                  id: { type: string }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Scheduler job id already exists.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body or per-kind target.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/admin/scheduler-jobs/{jobId}:
    patch:
      tags: [admin]
      summary: (M24) Update a scheduler job
      description: Admin-only. Mutates cadence, target, maxFailures, nextRunAt, or enabled state. `enabled=true` clears `disabledAt` and resets `consecutiveFailures`.
      operationId: patchAdminSchedulerJob
      parameters:
        - name: jobId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              minProperties: 1
              properties:
                target: { type: object }
                cadenceIntervalSeconds: { type: integer, minimum: 1 }
                maxFailures: { type: integer, minimum: 1 }
                nextRunAt: { type: string, format: date-time }
                enabled: { type: boolean }
      responses:
        "200":
          description: Scheduler job updated.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Scheduler job not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body or per-kind target.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    delete:
      tags: [admin]
      summary: (M24) Delete a scheduler job
      description: Admin-only. Deletes the job and cascades its attempt ledger. The default system_sweep job is re-seeded on the next tick.
      operationId: deleteAdminSchedulerJob
      parameters:
        - name: jobId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Scheduler job deleted.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Scheduler job not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/admin/router-sidecars:
    get:
      tags: [admin]
      summary: List router sidecars
      description: Admin-only. Returns CCR sidecar configuration and readiness state.
      operationId: getAdminRouterSidecars
      responses:
        "200":
          description: Router sidecars.
          content:
            application/json:
              schema:
                type: object
                required: [sidecars]
                properties:
                  sidecars:
                    type: array
                    items: { type: object }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [admin]
      summary: Create a router sidecar
      description: Admin-only. Creates a managed or external CCR sidecar; auth tokens are stored only as env references.
      operationId: postAdminRouterSidecar
      responses:
        "201":
          description: Sidecar created.
          content:
            application/json:
              schema:
                type: object
                required: [sidecar]
                properties:
                  sidecar: { type: object }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Sidecar id already exists.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/launch-options:
    get:
      tags: [runs]
      summary: List task-run launch options
      description: Requires project membership. Returns visible tasks, platform ACP runners, and effective defaults for the task launch form. Secret provider fields are never returned.
      operationId: getRunLaunchOptions
      parameters:
        - name: projectId
          in: query
          required: false
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Launch options visible to the caller.
          content:
            application/json:
              schema:
                type: object
                required: [projects, runners]
                properties:
                  projects:
                    type: array
                    items: { type: object }
                  runners:
                    type: array
                    items: { type: object }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/projects/{slug}/settings/runner:
    patch:
      tags: [projects]
      summary: Update project default runner
      description: Project owner/admin route. Sets or clears the project default runner, inheriting from the platform default when cleared.
      operationId: patchProjectRunnerSettings
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Project runner settings updated.
          content:
            application/json:
              schema:
                type: object
                required: [project]
                properties:
                  project: { type: object }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Runner does not exist or is not ready.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/projects/{slug}/flow-runner-remaps:
    get:
      tags: [projects]
      summary: List Flow runner remaps
      description: Project member route. Lists unresolved and mapped Flow step runner requirements for the project.
      operationId: getProjectFlowRunnerRemaps
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Flow runner remaps.
          content:
            application/json:
              schema:
                type: object
                required: [remaps]
                properties:
                  remaps:
                    type: array
                    items: { type: object }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    patch:
      tags: [projects]
      summary: Map a Flow runner requirement to a platform runner
      description: Project owner/admin route. Maps an imported Flow step runner id to an available platform ACP runner.
      operationId: patchProjectFlowRunnerRemap
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Remap updated.
          content:
            application/json:
              schema:
                type: object
                required: [remap]
                properties:
                  remap: { type: object }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Remap or target runner not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/projects:
    post:
      tags: [projects]
      summary: Register a project from a git URL or local directory
      description: |
        Admin-only (`requireGlobalRole("admin")`). Resolves the project
        source via `resolveProjectSource` (ADR-025): a `repoUrl` is cloned
        into `MAISTER_REPOS_ROOT` (refused with `PRECONDITION` if the target
        dir already exists — pass `target` to override), otherwise an
        existing local dir named by `target` is used (and `git init`-ed if it
        is not yet a repo). It then validates `maister.yaml` v2 at
        `{resolvedDir}/maister.yaml`, derives the project slug from
        `project.name` (kebab-case, server-side — never body-derived),
        checks `slug` and `repo_path` (the resolved on-disk dir) uniqueness,
        persists `projects` (incl. nullable `repo_url` + `provider`) +
        `executors` rows, installs each Flow plugin listed in `flows[]`, and
        inserts a `project_members` row for the caller with `role = "owner"`.

        Phases and their error codes:
        1. Auth/authz — `UNAUTHENTICATED` (401) / `UNAUTHORIZED` or
           `PASSWORD_CHANGE_REQUIRED` (403)
        2. Resolve project source (clone / existing / git-init) —
           `PRECONDITION` (409) on clone failure, missing dir, or a target
           path collision
        3. Load + validate `maister.yaml` — `CONFIG` (422)
        4. Slug/repo_path collision check — `CONFLICT` (409)
        5. DB write (project + executors + owner membership) in ONE
           transaction — `CONFIG` (422) on slug-derivation failure; a
           concurrent duplicate that races the collision check trips the
           unique constraint and is reported as `CONFLICT` (409).
        6. Flow plugin installs — `FLOW_INSTALL` (502). Registration is
           all-or-nothing: on any install failure the route fully
           compensates — deletes the `projects` row (FK cascade removes
           flows and the owner membership) and removes the
           slug-scoped artifact subtree — so the same `maister.yaml` can be
           retried with no leftover row. The shared, content-addressed system
           cache (`~/.maister/flows/<id>@<sha>`) is intentionally retained.

        Source: `web/app/api/projects/route.ts`.
      operationId: postProject
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostProjectBody" }
            examples:
              clone-from-url:
                summary: Clone a repo from a git URL
                value:
                  repoUrl: https://github.com/org/my-app
              clone-with-target-override:
                summary: Clone, overriding the on-disk directory name
                value:
                  repoUrl: https://github.com/org/my-app
                  target: my-app-fork
              register-existing-local:
                summary: Register an existing local directory
                value:
                  target: /repos/my-app
      responses:
        "201":
          description: |
            Project registered. Slug, ID, and the resolved `gitStatus` are
            returned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostProjectResponse" }
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller does not have global `admin` role (`UNAUTHORIZED`), or the
            authenticated account must change its password first
            (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            Either `slug` / `repo_path` already registered (`CONFLICT`), or
            project-source resolution failed (`PRECONDITION`) — clone error,
            missing directory, or a clone `target` path that already exists.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: |
            `maister.yaml` is missing, invalid YAML, fails schema
            validation, or `project.name` cannot be kebab-cased
            (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "502":
          description: |
            A Flow plugin `git clone` or manifest validation failed
            (`FLOW_INSTALL`). The whole registration is rolled back — the
            `projects` row is deleted (cascading to flows and the
            owner membership) and the slug-scoped artifact subtree is removed —
            so the identical request can be retried without a 409.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/projects/{slug}/files:
    get:
      tags: [projects]
      summary: Implemented (M22) — list git-tracked project-repo files (one level)
      description: |
        Requires the `readRepoFiles` action (project `member`). Lists git-tracked
        entries one level under `?path=` via `git ls-tree` against
        `projects.main_branch` HEAD (server-state `ref`) of `projects.repo_path`.
        Tracked-only (same boundary as the run file routes). `?path=` validated by
        `repoRelPathSchema`.
      operationId: listProjectFiles
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: path
          in: query
          required: false
          description: Repo-relative directory (default = repo root). Validated by `repoRelPathSchema`.
          schema: { type: string }
      responses:
        "200":
          description: One-level tracked file/dir listing.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FileTreeResponse" }
        "400":
          $ref: "#/components/responses/Config"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/projects/{slug}/files/content:
    get:
      tags: [projects]
      summary: Implemented (M22) — read a git-tracked project-repo file
      description: |
        Requires the `readRepoFiles` action (project `member`). Reads a single
        tracked blob via `git cat-file` against `projects.main_branch` HEAD,
        capped at `MAISTER_WORKBENCH_MAX_FILE_BYTES`. Over-cap → `413`; binary →
        `415`; untracked/unknown path → `404`; traversal → `400`.
      operationId: readProjectFile
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: path
          in: query
          required: true
          description: Repo-relative file path. Validated by `repoRelPathSchema`.
          schema: { type: string }
      responses:
        "200":
          description: Tracked text file content.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FileContentResponse" }
        "400":
          $ref: "#/components/responses/Config"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/FileTooLarge"
        "415":
          $ref: "#/components/responses/FileBinary"

  /api/projects/{slug}/tasks:
    post:
      tags: [projects]
      summary: Create a task on a project board
      description: |
        Requires project membership at `member` or above
        (`requireProjectAction("createTask")`). The `projectId` is
        resolved from the URL `slug` (server-state), never from the body.

        Validates that `flowId` belongs to the project. Runner selection is not
        part of task creation; one-run overrides belong to `POST /api/runs`.

        Source: `web/app/api/projects/[slug]/tasks/route.ts`.
      operationId: postTask
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostTaskBody" }
            examples:
              create-task:
                summary: Create a bugfix task
                value:
                  title: "Fix off-by-one in pagination"
                  prompt: "The `/users` endpoint returns page 2 when page 1 is requested..."
                  flowId: "flow-uuid-here"
      responses:
        "201":
          description: Task created in `Backlog`.
          content:
            application/json:
              schema:
                type: object
                required: [taskId]
                properties:
                  taskId:
                    type: string
                    format: uuid
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller is not a `member` or above for this project
            (`UNAUTHORIZED`), or the authenticated account must change its
            password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: Project not found or archived (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: |
            `flowId` not configured for this project, or a retired runner
            override field was supplied (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/projects/{slug}/members:
    get:
      tags: [projects]
      summary: List project members
      description: |
        Requires project membership at `viewer` or above
        (`requireProjectAction("readBoard")`). Returns all active members for
        the project. `slug` is resolved server-side; no body-controlled
        project identifiers are accepted.
      operationId: listProjectMembers
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Project member list.
          content:
            application/json:
              schema:
                type: object
                required: [members]
                properties:
                  members:
                    type: array
                    items: { $ref: "#/components/schemas/ProjectMember" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
    post:
      tags: [projects]
      summary: Add a member to a project
      description: |
        Requires the `manageMembers` action (project admin or global admin).
        Adds an existing platform user to the project with the specified role.
        `slug` is resolved server-side. Returns `409` if the user is already a
        member (`CONFLICT`) or the `userId` does not correspond to a known
        platform user (`PRECONDITION`).
      operationId: addProjectMember
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddProjectMemberBody" }
      responses:
        "201":
          description: Member added.
          content:
            application/json:
              schema:
                type: object
                required: [memberId]
                properties:
                  memberId: { type: string }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: |
            Project not found or archived (`PRECONDITION`), user is already a
            member of this project (`CONFLICT`), or the supplied `userId` does
            not match any platform user (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/projects/{slug}/members/candidates:
    get:
      tags: [projects]
      summary: List platform users eligible to be added as project members
      description: |
        Requires the `manageMembers` action (project admin or global admin).
        Returns platform users who are NOT already members of this project.
        Optional `q` filters by name or email prefix (case-insensitive).
        `slug` is resolved server-side.
      operationId: listMemberCandidates
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: q
          in: query
          required: false
          description: Optional name/email filter prefix.
          schema: { type: string }
      responses:
        "200":
          description: Candidate users not yet members of this project.
          content:
            application/json:
              schema:
                type: object
                required: [candidates]
                properties:
                  candidates:
                    type: array
                    items: { $ref: "#/components/schemas/MemberCandidate" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }

  /api/projects/{slug}/members/{memberId}:
    patch:
      tags: [projects]
      summary: Update a project member's role
      description: |
        Requires the `manageMembers` action (project admin or global admin).
        Changes the role of an existing project member. `slug` and `memberId`
        are resolved server-side. Returns `409` on a concurrent stale-update
        race (`CONFLICT`).
      operationId: updateProjectMemberRole
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: memberId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProjectMemberRoleBody" }
      responses:
        "200":
          description: Member role updated.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Project not found or archived (`PRECONDITION`), or concurrent update race (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body — bad/missing `role` or `expectedRole` (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    delete:
      tags: [projects]
      summary: Remove a member from a project
      description: |
        Requires the `manageMembers` action (project admin or global admin).
        Removes the project membership row. `slug` and `memberId` are resolved
        server-side. Returns `409` on a concurrent race (`CONFLICT`).
      operationId: removeProjectMember
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: memberId
          in: path
          required: true
          schema: { type: string }
        - name: expectedRole
          in: query
          required: true
          description: |
            The role the caller observed in the roster. The delete is a CAS:
            it only removes the row when it still holds this role, else `409`
            (`CONFLICT`) on a concurrent stale-remove race.
          schema: { $ref: "#/components/schemas/ProjectMemberRole" }
      responses:
        "200":
          description: Member removed.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Project not found or archived (`PRECONDITION`), or concurrent race (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Missing or invalid `expectedRole` query parameter (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/projects/{slug}/assignments:
    get:
      tags: [assignments]
      summary: List project assignments
      description: |
