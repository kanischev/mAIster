                        producer: runner
                        locator:
                          kind: git-range
                          baseCommit: 9c4e1f0a8b7d6c5e4f3a2b1c0d9e8f7a6b5c4d3e
                          headRef: maister/task-42-attempt-1
                        uri: null
                        hash: null
                        sizeBytes: 4096
                        validity: current
                        requiredFor: [review]
                        visibility: shared
                        retention: run
                        createdAt: "2026-06-01T10:15:00Z"
                      - id: 7a1b2c3d-...
                        runId: 8f1c2e34-...
                        nodeAttemptId: 1a2b3c4d-...
                        nodeId: implement
                        attempt: 1
                        artifactDefId: null
                        kind: log
                        producer: projector
                        locator:
                          kind: file
                          path: runs/8f1c2e34/implement.log
                        uri: null
