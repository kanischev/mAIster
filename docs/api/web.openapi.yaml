openapi: 3.0.3
info:
  title: MAIster Web HTTP API
  version: "0.9.0"
  description: |
    HTTP surface exposed by the Next.js web tier under `app/api/`. Consumed
    by the MAIster UI and (in M7+) by any process that wants to drive HITL
    or stream run events without bypassing the web tier's trust boundary.

    **Milestone status: M10.**

    Routes shipped to date:

    - `POST /api/projects/{slug}/flow-packages/install` and the
      `{flowRefId}/enable|disable|upgrade|rollback|trust`,
      `{flowRefId}/revisions/{revisionId}/remove`, and
      `GET {flowRefId}/upgrade-preview` routes (M10) â€” Flow package lifecycle.
      Admin-only (`requireProjectAction("managePackages")`). See
      [Flow packages](../system-analytics/flow-packages.md) and
      [ADR-021](../decisions.md#adr-021-flow-package-lifecycle-multi-revision-trust-and-compatibility).

    - `POST /api/projects` (M9) â€” register a project from a directory
      containing `maister.yaml`. Admin-only (global role `admin`). Validates
      the manifest, installs Flow plugins, persists DB rows.
    - `POST /api/projects/{slug}/tasks` (M9) â€” create a task on a project
      board. Requires project membership at `member` or above.
    - `/api/auth/{...nextauth}` (M9) â€” Auth.js v5 credentials handler.
      See [Authentication & RBAC](../configuration.md#authentication--rbac).
    - `POST /api/auth/register` â€” public registration. Creates a
      `pending` member account; an admin must activate it before sign-in.
    - `GET /api/admin/users` and `/api/admin/users/{userId}/*` â€”
      admin-only user activation, disable/re-enable, role change, and password
      reset. Returns no password hashes.
    - `POST /api/runs` (M5+) â€” launch a run from a Backlog task; precondition
      checks, executor resolution, worktree create, scheduler claim. Requires
      project membership at `member` or above (`launchRun`).
    - `POST /api/runs/{runId}/hitl/{hitlRequestId}/respond` (M7) â€” durable
      HITL response surface. Permission-only flows resolve a supervisor
      deferred via the supervisor's `POST /sessions/{id}/input` and use a
      two-phase atomic claim (this file documents the contract). Form and
      human-review flows write `input-<stepId>.json` after a DB claim, and
      the runner's resume-from-existing-input branch picks it up. Requires
      project membership at `member` or above (`answerHitl`).
    - `GET /api/runs/{runId}/stream` (M7) â€” Server-Sent Events bridge.
      Tails the per-run durable replay log at
      `.maister/<projectSlug>/runs/<runId>/run.events.jsonl` (produced by
      the supervisor â€” see `supervisor.openapi.yaml`). Reconnect via
      `Last-Event-ID`. Event shape mirrors the supervisor SSE doc
      (`async/web-runs.asyncapi.yaml`). Requires project membership at
      `viewer` or above (`readBoard`).

    **Authentication.** All routes require a valid session (Auth.js v5
    credentials). Unauthenticated requests return `401 UNAUTHENTICATED`.
    Insufficient role returns `403 UNAUTHORIZED`. An authenticated account
    with a pending forced password change (seeded admin, admin-forced reset)
    is rejected on every role-gated route with `403 PASSWORD_CHANGE_REQUIRED`
    until it sets a new password. A valid session for a non-active account is
    rejected with `403 ACCOUNT_INACTIVE`. The `security` field below
    is left empty because Auth.js sessions are cookie-based and not
    expressible as an OpenAPI security scheme without a custom extension.

    See also:
      - [`./supervisor.openapi.yaml`](./supervisor.openapi.yaml)
      - [`./async/web-runs.asyncapi.yaml`](./async/web-runs.asyncapi.yaml)
      - [`./async/supervisor-sse.asyncapi.yaml`](./async/supervisor-sse.asyncapi.yaml)
      - [`../error-taxonomy.md`](../error-taxonomy.md)
      - [`../configuration.md`](../configuration.md) â€” Authentication & RBAC section
  contact:
    name: MAIster maintainers
    url: https://github.com/your-org/mAIster
  license:
    name: MIT
servers:
  - url: http://localhost:3000
    description: Local Next.js dev server (default).
security: []
tags:
  - name: projects
    description: Project registration and task creation.
  - name: auth
    description: Auth.js v5 session management.
  - name: admin
    description: Global admin account management.
  - name: runs
    description: Run launch, status, and event streaming.
  - name: hitl
    description: Human-in-the-loop response surface.
  - name: flow-packages
    description: Flow package lifecycle â€” install, trust, enable, upgrade, rollback, remove.
paths:
  /api/projects:
    post:
      tags: [projects]
      summary: Register a project from a git URL or local directory
      description: |
        Admin-only (`requireGlobalRole("admin")`). Resolves the project
        source via `resolveProjectSource` (ADR-025): a `repoUrl` is cloned
        into `MAISTER_REPOS_ROOT` (refused with `PRECONDITION` if the target
        dir already exists â€” pass `target` to override), otherwise an
        existing local dir named by `target` is used (and `git init`-ed if it
        is not yet a repo). It then validates `maister.yaml` v2 at
        `{resolvedDir}/maister.yaml`, derives the project slug from
        `project.name` (kebab-case, server-side â€” never body-derived),
        checks `slug` and `repo_path` (the resolved on-disk dir) uniqueness,
        persists `projects` (incl. nullable `repo_url` + `provider`) +
        `executors` rows, installs each Flow plugin listed in `flows[]`, and
        inserts a `project_members` row for the caller with `role = "owner"`.

        Phases and their error codes:
        1. Auth/authz â€” `UNAUTHENTICATED` (401) / `UNAUTHORIZED` or
           `PASSWORD_CHANGE_REQUIRED` (403)
        2. Resolve project source (clone / existing / git-init) â€”
           `PRECONDITION` (409) on clone failure, missing dir, or a target
           path collision
        3. Load + validate `maister.yaml` â€” `CONFIG` (422)
        4. Slug/repo_path collision check â€” `CONFLICT` (409)
        5. DB write (project + executors + owner membership) in ONE
           transaction â€” `CONFIG` (422) on slug-derivation failure; a
           concurrent duplicate that races the collision check trips the
           unique constraint and is reported as `CONFLICT` (409).
        6. Flow plugin installs â€” `FLOW_INSTALL` (502). Registration is
           all-or-nothing: on any install failure the route fully
           compensates â€” deletes the `projects` row (FK cascade removes
           executors, flows, and the owner membership) and removes the
           slug-scoped artifact subtree â€” so the same `maister.yaml` can be
           retried with no leftover row. The shared, content-addressed system
           cache (`~/.maister/flows/<id>@<sha>`) is intentionally retained.

        Source: `web/app/api/projects/route.ts`.
      operationId: postProject
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostProjectBody" }
            examples:
              clone-from-url:
                summary: Clone a repo from a git URL
                value:
                  repoUrl: https://github.com/org/my-app
              clone-with-target-override:
                summary: Clone, overriding the on-disk directory name
                value:
                  repoUrl: https://github.com/org/my-app
                  target: my-app-fork
              register-existing-local:
                summary: Register an existing local directory
                value:
                  target: /repos/my-app
      responses:
        "201":
          description: |
            Project registered. Slug, ID, and the resolved `gitStatus` are
            returned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostProjectResponse" }
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller does not have global `admin` role (`UNAUTHORIZED`), or the
            authenticated account must change its password first
            (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            Either `slug` / `repo_path` already registered (`CONFLICT`), or
            project-source resolution failed (`PRECONDITION`) â€” clone error,
            missing directory, or a clone `target` path that already exists.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: |
            `maister.yaml` is missing, invalid YAML, fails schema
            validation, or `project.name` cannot be kebab-cased
            (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "502":
          description: |
            A Flow plugin `git clone` or manifest validation failed
            (`FLOW_INSTALL`). The whole registration is rolled back â€” the
            `projects` row is deleted (cascading to executors, flows, and the
            owner membership) and the slug-scoped artifact subtree is removed â€”
            so the identical request can be retried without a 409.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/projects/{slug}/tasks:
    post:
      tags: [projects]
      summary: Create a task on a project board
      description: |
        Requires project membership at `member` or above
        (`requireProjectAction("createTask")`). The `projectId` is
        resolved from the URL `slug` (server-state), never from the body.

        Validates that `flowId` belongs to the project and, when
        `executorOverrideId` is supplied, that it also belongs to the same
        project. Both checks return `CONFIG` (422) on failure.

        Source: `web/app/api/projects/[slug]/tasks/route.ts`.
      operationId: postTask
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostTaskBody" }
            examples:
              create-task:
                summary: Create a bugfix task
                value:
                  title: "Fix off-by-one in pagination"
                  prompt: "The `/users` endpoint returns page 2 when page 1 is requested..."
                  flowId: "flow-uuid-here"
      responses:
        "201":
          description: Task created in `Backlog`.
          content:
            application/json:
              schema:
                type: object
                required: [taskId]
                properties:
                  taskId:
                    type: string
                    format: uuid
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller is not a `member` or above for this project
            (`UNAUTHORIZED`), or the authenticated account must change its
            password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: Project not found or archived (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: |
            `flowId` not configured for this project, or
            `executorOverrideId` not registered for this project
            (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/auth/{nextauth}:
    get:
      tags: [auth]
      summary: Auth.js v5 credentials handler (GET)
      description: |
        Auth.js v5 catch-all handler at `/api/auth/[...nextauth]`. Handles
        the standard Auth.js sub-paths: `session`, `csrf`, `providers`,
        `signout` (GET form), and callback redirects.

        Implemented by `auth()` exported from `web/auth.ts` (the full
        Node.js runtime config with the Drizzle adapter). The edge-safe
        split config lives in `web/auth.config.ts` (credentials provider
        definition + `authorized` callback for middleware).

        MAIster ships **credentials-only** authentication. OAuth providers
        are not configured. The `accounts`, `sessions`, and
        `verification_tokens` tables exist for the Drizzle adapter
        contract.

        Do not enumerate sub-paths here â€” see the Auth.js v5 docs for the
        canonical path list. Source: `web/auth.ts`, `web/auth.config.ts`.
      operationId: authGet
      parameters:
        - name: nextauth
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Auth.js response (session JSON, CSRF token, etc.).
        "302":
          description: Redirect (sign-in / sign-out flow).
    post:
      tags: [auth]
      summary: Auth.js v5 credentials handler (POST)
      description: |
        Handles `signIn` (credentials), `signOut`, and callback POSTs.
        Sign-in validates `email` + `password` against the `users` table
        (`bcrypt` hash comparison). On success the session is persisted via
        the Drizzle adapter and the session cookie is set.

        `users.role` (global role: `admin | member | viewer`) is surfaced
        on the session, but `lib/authz.ts` re-reads the live role from the DB
        on every authorization check (the cached JWT role is not trusted; a
        deleted user invalidates the session). The single bootstrap admin is
        seeded by migration `0005` (`admin@maister.local`, `must_change_password
        = true`); public registration creates `member` with
        `account_status=pending`.
      operationId: authPost
      parameters:
        - name: nextauth
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
                csrfToken: { type: string }
      responses:
        "200":
          description: Auth.js response (session update, sign-out confirmation).
        "302":
          description: Redirect after sign-in / sign-out.
        "401":
          description: Invalid credentials.

  /api/auth/register:
    post:
      tags: [auth]
      summary: Register a pending user account
      description: |
        Public registration route. Body-controlled fields are `name`, `email`,
        and `password`; the server lowercases email, hashes the password, and
        creates `users.role = "member"` with `account_status = "pending"`.
        The route does not sign the user in. Admin activation through
        `/api/admin/users/{userId}/status` is required before credentials
        sign-in succeeds.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterUserBody" }
      responses:
        "201":
          description: Pending account created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegisterUserResponse" }
        "409":
          description: Email already registered (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/admin/users:
    get:
      tags: [admin]
      summary: List users for admin management
      description: |
        Admin-only (`requireGlobalRole("admin")`). Query identifiers are
        filters only: `status` and `q` are body/query-controlled and do not
        authorize access. The current admin comes from auth context. Response
        excludes `password_hash`.
      operationId: listAdminUsers
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, active, disabled]
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Users returned without password hashes.
          content:
            application/json:
              schema:
                type: object
                required: [users]
                properties:
                  users:
                    type: array
                    items: { $ref: "#/components/schemas/AdminUser" }
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: Not an active global admin.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/admin/users/{userId}/status:
    patch:
      tags: [admin]
      summary: Activate or disable a user
      description: |
        Admin-only. `userId` is a URL parameter. Current admin is auth-context.
        Body-controlled `status` may be `active` or `disabled`. The route
        prevents self-disable and disabling the last active admin.
      operationId: setUserStatus
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminSetStatusBody" }
      responses:
        "200":
          description: Status updated.
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: Not an active global admin.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: Invariant violation (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/admin/users/{userId}/role:
    patch:
      tags: [admin]
      summary: Change a user's global role
      description: |
        Admin-only. `userId` is a URL parameter. Body-controlled `role` may be
        `viewer`, `member`, or `admin`. The route prevents self-demotion and
        removing the last active admin.
      operationId: setUserRole
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminSetRoleBody" }
      responses:
        "200":
          description: Role updated.
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: Not an active global admin.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: Invariant violation (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/admin/users/{userId}/password-reset:
    post:
      tags: [admin]
      summary: Reset a user's password
      description: |
        Admin-only. `userId` is a URL parameter. Body-controlled `password` is
        bcrypt-hashed server-side. `mustChangePassword` can force the user
        through `/change-password` on next sign-in.
      operationId: resetUserPassword
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminPasswordResetBody" }
      responses:
        "200":
          description: Password updated.
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: Not an active global admin.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: Target user does not exist (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/runs:
    post:
      tags: [runs]
      summary: Launch a new run for a Backlog task
      description: |
        Requires an active session (`requireActiveSession` â€” authenticated and
        with no pending forced password change) AND project membership at
        `member` or above (`requireProjectAction("launchRun")`). The
        `projectId` is derived from the task row, never from the body.

        After auth, project, Flow, and executor checks pass, the web tier
        calls the supervisor `GET /health` through
        `web/lib/supervisor-client.ts`. If the supervisor is unreachable,
        times out, returns non-200, or returns a malformed body, this route
        fails with `503 EXECUTOR_UNAVAILABLE` before creating a git worktree,
        run row, workspace row, or task status transition.
      operationId: postRun
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostRunBody" }
      responses:
        "202":
          description: Run accepted. May be Pending (queued) or Running.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostRunResponse" }
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller is not a `member` or above for this project
            (`UNAUTHORIZED`), or the authenticated account must change its
            password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "400":
          description: Malformed request body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            Precondition failed. Examples: task not in Backlog, project
            archived, branch / worktree path already in use, scheduler
            cap full.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            Executor or platform unavailable (`EXECUTOR_UNAVAILABLE`).
            Includes missing project executor registration and supervisor
            readiness failure before launch side effects.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/hitl/{hitlRequestId}/respond:
    post:
      tags: [hitl]
      summary: Deliver an HITL response (permission / form / human)
      description: |
        Requires project membership at `member` or above
        (`requireProjectAction("answerHitl")`). The `projectId` is derived
        from the run row, never from the body.

        Single user-facing HITL endpoint. The handler dispatches on the
        stored `hitl_requests.kind`:

        - **permission**: two-phase atomic claim. Phase 1 stores
          `response = {optionId}` under a row-level lock and only if
          the row is unclaimed (or claimed with the same optionId).
          Phase 2 calls the supervisor; on success it marks
          `respondedAt`. Conflicting optionId on retry â†’ 409. Same
          optionId on retry â†’ idempotent 200. Supervisor 404 racing a
          concurrent winner â†’ 200 (no `runs.status = Failed`).
        - **form / human**: schema validation runs first (NEEDS_INPUT 422
          on failure). Then a row-level claim stores `response`. Only
          after the claim succeeds does the route write
          `input-<stepId>.json` atomically. `respondedAt` is marked
          after the artifact write succeeds. A losing concurrent
          submission gets 409 BEFORE it can corrupt the artifact.

        On every success path the body returns `runStatus: "NeedsInput"`
        â€” the runner (not this route) is the single owner of the
        `NeedsInput â†’ Running` transition.
      operationId: respondHitl
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: hitlRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HitlResponseBody" }
            examples:
              permission-select:
                summary: Approve a pending permission
                value:
                  optionId: "allow"
              form-typed:
                summary: Structured form response
                value:
                  response:
                    approved: true
                    comments: "lgtm"
      responses:
        "200":
          description: |
            Response durably recorded. For permission, the supervisor
            deferred was resolved. For form/human, the input artifact
            was written and `runFlow` was queued.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runStatus:
                    type: string
                    enum: [NeedsInput]
                    description: |
                      Row state at response time. The runner promotes
                      the run to `Running` as soon as it picks up the
                      work.
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller is not a `member` or above for the run's project
            (`UNAUTHORIZED`), or the authenticated account must change its
            password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "400":
          description: |
            Malformed body (`CONFIG`) â€” JSON parse failure or missing
            required field for the kind (e.g. permission without
            `optionId`, form/human without `response`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            One of: HITL row already delivered with a different payload
            (`CONFLICT`), run is in a terminal status (`CONFLICT`), or
            an `optionId` claim conflicts with a prior claim
            (`CONFLICT`). Identifies a retry contract violation, not a
            server bug.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "202":
          description: |
            M8 idle-branch: claim succeeded and `resumeRun` spawned a
            fresh supervisor session. Returns 202
            `{ ok: true, runStatus: "NeedsInput", state: "resume-in-progress" }`.
            Auto-delivery against the new requestId happens asynchronously
            inside the runner-agent (typically 5-60 s). Subsequent
            same-payload retries while `respondedAt IS NULL` keep
            returning 202; after auto-delivery completes the retries
            return 200 idempotent.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runStatus: { type: string, enum: ["NeedsInput"] }
                  state: { type: string, enum: ["resume-in-progress"] }
        "410":
          description: |
            Either (M7) permission deferred expired before delivery
            (`HITL_TIMEOUT`) â€” the run row was transitioned to `Failed`
            in the same transaction; or (M8 idle branch) `resumeRun`
            failed terminally (`CHECKPOINT`) â€” supervisor 400 / 404 /
            201-with-empty-acpSessionId. The idle-branch response
            includes `terminal: true`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: |
            Response payload did not validate against the stored HITL
            schema (`NEEDS_INPUT`). `respondedAt` remains null â€” the
            user can resubmit with a fixed payload.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            Retryable failure (`EXECUTOR_UNAVAILABLE`). Examples:
            supervisor unreachable on permission delivery, artifact
            write failed with I/O error. `respondedAt` remains null;
            response is durably stored so a retry replays the same
            value.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/activity:
    post:
      tags: [runs]
      summary: (M8) Keep-alive activity ping
      description: |
        Bumps `runs.keepalive_until` to `now + MAISTER_KEEPALIVE_MINUTES`
        so the keep-alive sweeper does not checkpoint a run while the
        operator is actively reviewing it. Identifier table:
        `runId` is a `url-param` (UUID v4); the body has NO
        cross-resource ids (optional `{kind?: "activity"}` marker only).
        Activity does NOT auto-resume idle runs â€” `NeedsInputIdle`
        rows return 409 with a hint to call
        `POST /api/runs/{runId}/hitl/{hitlRequestId}/respond` instead.
      operationId: activityPing
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Keep-alive bumped on a `Running` or `NeedsInput` row.
        "400":
          description: "`runId` is not a valid UUID v4."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "404":
          description: Run not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            Run is in `NeedsInputIdle` (caller must use `/respond`) or
            in `Pending` (no live window to bump).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "410":
          description: |
            Run is in a terminal status (`Done`, `Abandoned`, `Failed`,
            `Crashed`, `Review`). Hook should stop pinging.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/stream:
    get:
      tags: [runs]
      summary: SSE bridge â€” stream per-run events
      description: |
        Requires project membership at `viewer` or above
        (`requireProjectRole(run.projectId, "viewer")`). The `projectId`
        is derived from the run row, never from the query string.

        Server-Sent Events bridge. Tails a single per-run durable replay
        log at `.maister/<projectSlug>/runs/<runId>/run.events.jsonl`
        (written by the supervisor â€” see `supervisor.openapi.yaml`).

        Use the standard SSE `Last-Event-ID` header (or `?lastEventId=N`
        query string fallback) to resume after disconnect. Terminal
        states (`Done`, `Abandoned`, `Failed`, `Crashed`) close the
        stream cleanly after draining trailing events.

        Event shape is the supervisor's `SessionEvent` union. See the
        AsyncAPI doc at `async/web-runs.asyncapi.yaml`.
      operationId: streamRunEvents
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Last-Event-ID
          in: header
          required: false
          schema: { type: string }
        - name: lastEventId
          in: query
          required: false
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: SSE stream.
          headers:
            Content-Type:
              schema:
                type: string
                enum: [text/event-stream]
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller is not a `viewer` or above for the run's project
            (`UNAUTHORIZED`), or the authenticated account must change its
            password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "404":
          description: Run not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/projects/{slug}/flow-packages/install:
    post:
      tags: [flow-packages]
      summary: Install a Flow package into a project
      description: |
        M10 (ADR-021). Admin-only (`requireProjectAction("managePackages")`).
        Two-phase install via `installFlowPlugin` â†’ `installRevision`: a
        `flow_revisions` row is written `Installing` before disk side-effects,
        then flipped to `Installed`/`Failed`. Trusted-by-policy sources
        (local/file:// or `MAISTER_TRUSTED_FLOW_SOURCE_PREFIXES` match)
        auto-enable; untrusted sources install as `Installed` (await
        `/trust` + `/enable`). `slug` = url-param (server-state); `flowRefId`/
        `source`/`version` are body-controlled, validated downstream.
        Source: `web/app/api/projects/[slug]/flow-packages/install/route.ts`.
      operationId: installFlowPackage
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InstallFlowPackageBody" }
      responses:
        "201":
          description: Package installed (and enabled when trusted-by-policy).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstallFlowPackageResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }
        "502": { $ref: "#/components/responses/FlowInstall" }

  /api/projects/{slug}/flow-packages/{flowRefId}/enable:
    post:
      tags: [flow-packages]
      summary: Enable a specific installed revision
      description: |
        M10. Admin-only. Sets the project's enabled revision to `revisionId`,
        refreshing the denormalized cache and `recommended_executor_id` while
        PRESERVING `executor_override_id`. Refuses untrusted / incompatible /
        setup-incomplete revisions. `revisionId` is validated against the flow
        AND the project's declared source (cross-source enable is rejected).
        Source: `.../flow-packages/[flowRefId]/enable/route.ts`.
      operationId: enableFlowRevision
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: flowRefId, in: path, required: true, schema: { type: string, minLength: 1 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RevisionIdBody" }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/flow-packages/{flowRefId}/disable:
    post:
      tags: [flow-packages]
      summary: Disable a flow for new launches
      description: |
        M10. Admin-only. Sets `enablement_state='Disabled'`. In-flight runs
        keep their pinned revision. Source:
        `.../flow-packages/[flowRefId]/disable/route.ts`.
      operationId: disableFlowPackage
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: flowRefId, in: path, required: true, schema: { type: string, minLength: 1 } }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }

  /api/projects/{slug}/flow-packages/{flowRefId}/upgrade:
    post:
      tags: [flow-packages]
      summary: Install a new revision beside the current one
      description: |
        M10. Admin-only. Installs a new immutable revision (two-phase) from the
        SAME source as the project's flow and marks it `UpdateAvailable`. Does
        NOT auto-enable. Rejects a `source` that differs from the project's
        declared flow source (re-sourcing is install/re-install).
        Source: `.../flow-packages/[flowRefId]/upgrade/route.ts`.
      operationId: upgradeFlowPackage
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: flowRefId, in: path, required: true, schema: { type: string, minLength: 1 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpgradeFlowPackageBody" }
      responses:
        "201":
          description: Candidate revision installed.
          content:
            application/json:
              schema:
                type: object
                required: [revisionId]
                properties:
                  revisionId: { type: string, format: uuid }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }
        "502": { $ref: "#/components/responses/FlowInstall" }

  /api/projects/{slug}/flow-packages/{flowRefId}/rollback:
    post:
      tags: [flow-packages]
      summary: Roll the enabled revision back to an older installed revision
      description: |
        M10. Admin-only. Switches the enabled pointer to an older installed
        revision (same validation as enable, including source-scope). Never
        mutates completed/active run history. Source:
        `.../flow-packages/[flowRefId]/rollback/route.ts`.
      operationId: rollbackFlowPackage
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: flowRefId, in: path, required: true, schema: { type: string, minLength: 1 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RevisionIdBody" }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/flow-packages/{flowRefId}/trust:
    post:
      tags: [flow-packages]
      summary: Set or clear explicit trust for a flow package
      description: |
        M10. Admin-only. Sets `trust_status` to `trusted`/`untrusted`. Trust
        alone does NOT make a package launchable â€” the package must still be
        `/enable`d (launch requires `Enabled`/`UpdateAvailable`). Source:
        `.../flow-packages/[flowRefId]/trust/route.ts`.
      operationId: setFlowPackageTrust
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: flowRefId, in: path, required: true, schema: { type: string, minLength: 1 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trusted]
              properties:
                trusted: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/flow-packages/{flowRefId}/revisions/{revisionId}/remove:
    post:
      tags: [flow-packages]
      summary: Remove an installed revision
      description: |
        M10. Admin-only. Marks the revision `Removed` and best-effort deletes
        its cache. Refused with `CONFLICT` (409) while any run references it or
        it is any project's enabled revision. `revisionId` is validated against
        the flow AND the project's declared source. Automatic GC of
        unreferenced revisions is M19. Source:
        `.../flow-packages/[flowRefId]/revisions/[revisionId]/remove/route.ts`.
      operationId: removeFlowRevision
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: flowRefId, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: revisionId, in: path, required: true, schema: { type: string, minLength: 1 } }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }

  /api/projects/{slug}/flow-packages/{flowRefId}/upgrade-preview:
    get:
      tags: [flow-packages]
      summary: Diff the enabled revision against a candidate revision
      description: |
        M10. Admin-only. Returns a structured contract diff (steps, gates,
        artifacts, capabilities, external ops, schema/setup changes) between the
        project's enabled revision and `revisionId`. `revisionId` is validated
        against the flow AND the project's declared source. Source:
        `.../flow-packages/[flowRefId]/upgrade-preview/route.ts`.
      operationId: getFlowUpgradePreview
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: flowRefId, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: revisionId, in: query, required: true, schema: { type: string, minLength: 1 } }
      responses:
        "200":
          description: Structured upgrade preview.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpgradePreview" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }
components:
  responses:
    Unauthenticated:
      description: No valid session (`UNAUTHENTICATED`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    Forbidden:
      description: |
        Caller lacks the required project role (`UNAUTHORIZED`) or the account
        must change its password first (`PASSWORD_CHANGE_REQUIRED`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    Precondition:
      description: Precondition failed or conflict (`PRECONDITION` / `CONFLICT`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    Config:
      description: Invalid body or incompatible package (`CONFIG`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    FlowInstall:
      description: Flow package install/upgrade failed (`FLOW_INSTALL`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    OkResult:
      description: Action succeeded.
      content:
        application/json:
          schema:
            type: object
            required: [ok]
            properties:
              ok: { type: boolean, enum: [true] }
  schemas:
    PostProjectBody:
      type: object
      description: |
        Project source union (ADR-025). Supply at least one of `repoUrl`
        or `target`. With `repoUrl` and no `target`, MAIster clones into
        `MAISTER_REPOS_ROOT` under a name derived from the URL; pass
        `target` to override that name (or to register an existing local
        directory when `repoUrl` is omitted). Deep path/URL validation runs
        server-side before any filesystem access.
      minProperties: 1
      properties:
        repoUrl:
          type: string
          minLength: 1
          maxLength: 2048
          description: |
            Git URL to clone (https / http / ssh / scp `git@host:org/repo`
            / file). Cloned non-interactively with the host's credentials â€”
            MAIster stores no provider secrets. The URL is credential-redacted
            in logs and errors. Omit to register an existing local directory.
          example: https://github.com/org/my-app
        target:
          type: string
          minLength: 1
          maxLength: 4096
          description: |
            With `repoUrl`: overrides the clone's on-disk directory name (a
            single safe path segment, or an absolute path). Without `repoUrl`:
            the existing local directory to register (absolute, no `..`
            segment); `git init`-ed when it is not yet a git repo.
          example: /repos/my-app
    PostProjectResponse:
      type: object
      required: [slug, projectId, gitStatus]
      properties:
        slug:
          type: string
          description: |
            Kebab-case slug derived server-side from `project.name` in
            `maister.yaml`. Never body-derived.
        projectId:
          type: string
          format: uuid
        gitStatus:
          type: string
          enum: [remote, no-remote, initialized]
          description: |
            Resolved source state: `remote` (cloned, or existing repo with an
            `origin`), `no-remote` (existing repo without an `origin` â€” PR
            promotion unavailable), or `initialized` (`git init` ran on a
            non-repo dir â€” unborn HEAD, needs a first commit before runs).
    PostTaskBody:
      type: object
      required: [title, prompt, flowId]
      properties:
        title:
          type: string
          minLength: 1
        prompt:
          type: string
          minLength: 1
        flowId:
          type: string
          minLength: 1
          description: |
            ID of a `flows` row belonging to the project identified by
            the URL `slug`. Any other flow ID returns `422 CONFIG`.
        executorOverrideId:
          type: string
          minLength: 1
          description: |
            Optional. ID of an `executors` row belonging to this
            project. Stored in `tasks.executor_override_id`; enters the
            override chain at tier 2 (between run-launcher override and
            per-flow override). Any other executor ID returns `422
            CONFIG`.
    RegisterUserBody:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        email: { type: string, format: email }
        password: { type: string, minLength: 12 }
    RegisterUserResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending]
    AdminUser:
      type: object
      required: [id, email, role, status, mustChangePassword, createdAt]
      properties:
        id: { type: string }
        name: { type: string, nullable: true }
        email: { type: string, format: email }
        role:
          type: string
          enum: [viewer, member, admin]
        status:
          type: string
          enum: [pending, active, disabled]
        mustChangePassword: { type: boolean }
        statusUpdatedAt: { type: string, format: date-time, nullable: true }
        statusUpdatedBy: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
    AdminSetStatusBody:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, disabled]
    AdminSetRoleBody:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [viewer, member, admin]
    AdminPasswordResetBody:
      type: object
      required: [password, mustChangePassword]
      properties:
        password: { type: string, minLength: 12 }
        mustChangePassword: { type: boolean }
    PostRunBody:
      type: object
      required: [taskId]
      properties:
        taskId:
          type: string
          minLength: 1
        executorOverrideId:
          type: string
          minLength: 1
          description: |
            Per-launch executor override. Highest priority in the
            five-level resolution chain (see
            `docs/system-analytics/executors.md`).
    PostRunResponse:
      type: object
      required: [runId, status]
      properties:
        runId:
          type: string
          format: uuid
        status:
          type: string
          enum: [Pending, Running]
        queuePosition:
          type: integer
          minimum: 1
          description: Present iff `status == "Pending"`.
    HitlResponseBody:
      type: object
      description: |
        Discriminated union. Exactly ONE of `optionId` (permission) or
        `response` (form/human) MUST be present, matching the row's
        `kind` field.
      properties:
        optionId:
          type: string
          minLength: 1
          description: |
            Required iff the HITL row has `kind == "permission"`. MUST
            match one of the options the supervisor declared on the
            `session.permission_request` event.
        response:
          description: |
            Required iff the HITL row has `kind == "form" | "human"`.
            Validated against the row's `schema` field (MAIster form
            schema â€” see `docs/configuration.md`). Returns 422 on
            failure.

            **M7 behaviour for `kind="human"`:** the response is
            captured under the same atomic-claim + artifact-write
            contract as `kind="form"`. The runner advances to the
            NEXT step with the response surfaced as
            `steps.<stepId>.vars`. The Flow step's `on_reject` clause
            is recorded on the row (`hitl_requests.kind = "human"`)
            but the runner does NOT route on it â€” `on_reject.goto_step`
            rerouting is **Designed M8**. UIs SHOULD therefore not
            present rejection as a loop-back action in M7; record
            rejection intent in the response payload for audit, but
            understand the runner will not branch on it until M8.
    MaisterErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - PRECONDITION
            - SPAWN
            - NEEDS_INPUT
            - HITL_TIMEOUT
            - CRASH
            - CONFLICT
            - CONFIG
            - EXECUTOR_UNAVAILABLE
            - FLOW_INSTALL
            - ACP_PROTOCOL
            - CHECKPOINT
            - STEP_CHECKPOINTED
            - UNAUTHENTICATED
            - UNAUTHORIZED
            - PASSWORD_CHANGE_REQUIRED
            - ACCOUNT_INACTIVE
        message: { type: string }

    InstallFlowPackageBody:
      type: object
      required: [flowRefId, source, version]
      properties:
        flowRefId: { type: string, minLength: 1, example: "bugfix" }
        source:
          type: string
          minLength: 1
          example: "github.com/my-org/maister-flow-bugfix"
        version: { type: string, minLength: 1, example: "v1.2.3" }

    InstallFlowPackageResult:
      type: object
      required: [flowRowId, revisionId, revision, trustStatus, enablementState]
      properties:
        flowRowId: { type: string, format: uuid }
        revisionId: { type: string, format: uuid }
        revision:
          type: string
          description: Resolved revision â€” git SHA (40 hex) or local manifest-digest prefix.
        trustStatus:
          type: string
          enum: [untrusted, trusted, trusted_by_policy]
        enablementState:
          type: string
          enum: [Enabled, Installed]

    UpgradeFlowPackageBody:
      type: object
      required: [source, version]
      properties:
        source: { type: string, minLength: 1 }
        version: { type: string, minLength: 1 }

    RevisionIdBody:
      type: object
      required: [revisionId]
      properties:
        revisionId: { type: string, minLength: 1, format: uuid }

    ContractDiff:
      type: object
      required: [added, removed]
      properties:
        added: { type: array, items: { type: string } }
        removed: { type: array, items: { type: string } }

    UpgradePreview:
      type: object
      required:
        - fromRevisionId
        - toRevisionId
        - schemaVersionChanged
        - setupChanged
        - steps
        - gates
        - artifacts
        - capabilities
        - externalOps
      properties:
        fromRevisionId: { type: string, format: uuid, nullable: true }
        toRevisionId: { type: string, format: uuid }
        schemaVersionChanged: { type: boolean }
        setupChanged: { type: boolean }
        steps: { $ref: "#/components/schemas/ContractDiff" }
        gates: { $ref: "#/components/schemas/ContractDiff" }
        artifacts: { $ref: "#/components/schemas/ContractDiff" }
        capabilities: { $ref: "#/components/schemas/ContractDiff" }
        externalOps: { $ref: "#/components/schemas/ContractDiff" }
