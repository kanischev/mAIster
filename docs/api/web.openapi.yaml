        role:
          type: string
          enum: [viewer, member, admin]
        status:
          type: string
          enum: [pending, active, disabled]
        mustChangePassword: { type: boolean }
        statusUpdatedAt: { type: string, format: date-time, nullable: true }
        statusUpdatedBy: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
    AdminSetStatusBody:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, disabled]
    AdminSetRoleBody:
      type: object
      required: [role]
      properties:
        role:
          type: string
