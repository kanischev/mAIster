        "401": { $ref: "#/components/responses/Unauthenticated" }
        "422": { $ref: "#/components/responses/Config" }
        "503": { $ref: "#/components/responses/Config" }

  /api/cron/gc:
    get:
      tags: [reconciliation-gc, scheduler]
      summary: (M19/M24) Run the GC sweep compatibility route
      description: |
        (Implemented, M19; compatibility wrapper Designed, M24 — ADR-060.)

        Token-guarded HTTP entry point for the preserve-then-prune GC sweep —
        the same work the background sweeper performs
        (`MAISTER_GC_SWEEP_INTERVAL_SECONDS`), exposed for an external cron. The
        sweep collects Abandoned/Done worktrees and unreferenced `Removed` flow
        revisions past `MAISTER_GC_AGE_DAYS`, preserves dirty/divergent
        worktrees to a `maister/archive/<runId>` branch (optionally pushed when
        `MAISTER_GC_ARCHIVE_PUSH=true`), and only then prunes.

        M24 keeps this route as a compatibility wrapper over the unified
        `system_sweep` service while preserving the response shape and statuses.
        Auth is by the `X-Maister-Cron-Token` header, compared in constant time
        to `MAISTER_CRON_TOKEN` — NOT an Auth.js session. **No body / query
        cross-resource identifiers**: the sweep derives its candidate set from
        server state only.
      operationId: runGcCron
      security:
        - cronToken: []
      responses:
        "200":
          description: GC sweep completed; the summary reports per-sub-sweep counts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GcSweepSummary" }
        "207":
          description: |
            A sub-sweep (worktree GC or revision GC) partially failed; the
            summary's `errors` array names what was skipped. Successful work was
            still committed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GcSweepSummary" }
        "401":
          description: |
            Missing or mismatched `X-Maister-Cron-Token` (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            `MAISTER_CRON_TOKEN` is unset — the cron route is disabled
            (`CONFIG`). Configure the token to enable it.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    post:
      tags: [reconciliation-gc, scheduler]
      summary: (M19/M24) Run the GC sweep compatibility route
      description: |
        (Implemented, M19; compatibility wrapper Designed, M24 — ADR-060.)

        POST variant of `GET /api/cron/gc` — identical behavior, for cron
        runners that prefer a non-idempotent verb. Auth is the same
        `X-Maister-Cron-Token` header (constant-time compare to
        `MAISTER_CRON_TOKEN`). **Body is EMPTY**; the sweep derives its
        candidate set from server state only.
      operationId: runGcCronPost
      security:
        - cronToken: []
      responses:
        "200":
          description: GC sweep completed; the summary reports per-sub-sweep counts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GcSweepSummary" }
        "207":
          description: |
            A sub-sweep partially failed; the summary's `errors` array names what
            was skipped. Successful work was still committed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GcSweepSummary" }
        "401":
          description: |
            Missing or mismatched `X-Maister-Cron-Token` (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            `MAISTER_CRON_TOKEN` is unset — the cron route is disabled
            (`CONFIG`). Configure the token to enable it.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/activity:
    post:
      tags: [runs]
      summary: (M8) Keep-alive activity ping
      description: |
        Bumps `runs.keepalive_until` to `now + MAISTER_KEEPALIVE_MINUTES`
        so the keep-alive sweeper does not checkpoint a run while the
        operator is actively reviewing it. Identifier table:
        `runId` is a `url-param` (UUID v4); the body has NO
        cross-resource ids (optional `{kind?: "activity"}` marker only).
        Activity does NOT auto-resume idle runs — `NeedsInputIdle`
        rows return 409 with a hint to call
        `POST /api/runs/{runId}/hitl/{hitlRequestId}/respond` instead.
      operationId: activityPing
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Keep-alive bumped on a `Running` or `NeedsInput` row.
        "400":
          description: "`runId` is not a valid UUID v4."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "404":
          description: Run not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            Run is in `NeedsInputIdle` (caller must use `/respond`) or
            in `Pending` (no live window to bump).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "410":
          description: |
            Run is in a terminal status (`Done`, `Abandoned`, `Failed`,
            `Crashed`, `Review`). Hook should stop pinging.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/stream:
    get:
      tags: [runs]
      summary: SSE bridge — stream per-run events
      description: |
        Requires project membership at `viewer` or above
        (`requireProjectRole(run.projectId, "viewer")`). The `projectId`
        is derived from the run row, never from the query string.

        Server-Sent Events bridge. Tails a single per-run durable replay
        log at `.maister/<projectSlug>/runs/<runId>/run.events.jsonl`
        (written by the supervisor — see `supervisor.openapi.yaml`).

        Use the standard SSE `Last-Event-ID` header (or `?lastEventId=N`
        query string fallback) to resume after disconnect. Terminal
        states (`Done`, `Abandoned`, `Failed`, `Crashed`) close the
        stream cleanly after draining trailing events.

        Event shape is the supervisor's `SessionEvent` union. See the
        AsyncAPI doc at `async/web-runs.asyncapi.yaml`.
      operationId: streamRunEvents
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Last-Event-ID
          in: header
          required: false
          schema: { type: string }
        - name: lastEventId
          in: query
          required: false
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: SSE stream.
          headers:
            Content-Type:
              schema:
                type: string
                enum: [text/event-stream]
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller is not a `viewer` or above for the run's project
            (`UNAUTHORIZED`), or the authenticated account must change its
            password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "404":
          description: Run not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/projects/{slug}/flow-packages/install:
    post:
      tags: [flow-packages]
      summary: Install a Flow package into a project
      description: |
        M10 (ADR-021). Admin-only (`requireProjectAction("managePackages")`).
        Two-phase install via `installFlowPlugin` → `installRevision`: a
        `flow_revisions` row is written `Installing` before disk side-effects,
        then flipped to `Installed`/`Failed`. Trusted-by-policy sources
        (local/file:// or `MAISTER_TRUSTED_FLOW_SOURCE_PREFIXES` match)
        auto-enable; untrusted sources install as `Installed` (await
        `/trust` + `/enable`). `slug` = url-param (server-state); `flowRefId`/
        `source`/`version` are body-controlled, validated downstream.
        Source: `web/app/api/projects/[slug]/flow-packages/install/route.ts`.
      operationId: installFlowPackage
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InstallFlowPackageBody" }
      responses:
        "201":
          description: Package installed (and enabled when trusted-by-policy).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstallFlowPackageResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }
        "502": { $ref: "#/components/responses/FlowInstall" }

  /api/projects/{slug}/flow-packages/{flowRefId}/enable:
    post:
      tags: [flow-packages]
      summary: Enable a specific installed revision
      description: |
        M10. Admin-only. Sets the project's enabled revision to `revisionId`,
        refreshing the denormalized cache while preserving runner remaps.
        Refuses untrusted / incompatible /
        setup-incomplete revisions. `revisionId` is validated against the flow
        AND the project's declared source (cross-source enable is rejected).
        Source: `.../flow-packages/[flowRefId]/enable/route.ts`.
      operationId: enableFlowRevision
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: flowRefId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RevisionIdBody" }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/flow-packages/{flowRefId}/disable:
    post:
      tags: [flow-packages]
      summary: Disable a flow for new launches
      description: |
        M10. Admin-only. Sets `enablement_state='Disabled'`. In-flight runs
        keep their pinned revision. Source:
        `.../flow-packages/[flowRefId]/disable/route.ts`.
      operationId: disableFlowPackage
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: flowRefId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }

  /api/projects/{slug}/flow-packages/{flowRefId}/upgrade:
    post:
      tags: [flow-packages]
      summary: Install a new revision beside the current one
      description: |
        M10. Admin-only. Installs a new immutable revision (two-phase) from the
        SAME source as the project's flow and marks it `UpdateAvailable`. Does
        NOT auto-enable. Rejects a `source` that differs from the project's
        declared flow source (re-sourcing is install/re-install).
        Source: `.../flow-packages/[flowRefId]/upgrade/route.ts`.
      operationId: upgradeFlowPackage
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: flowRefId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpgradeFlowPackageBody" }
      responses:
        "201":
          description: Candidate revision installed.
          content:
            application/json:
              schema:
                type: object
                required: [revisionId]
                properties:
                  revisionId: { type: string, format: uuid }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }
        "502": { $ref: "#/components/responses/FlowInstall" }

  /api/projects/{slug}/flow-packages/{flowRefId}/rollback:
    post:
      tags: [flow-packages]
      summary: Roll the enabled revision back to an older installed revision
      description: |
        M10. Admin-only. Switches the enabled pointer to an older installed
        revision (same validation as enable, including source-scope). Never
        mutates completed/active run history. Source:
        `.../flow-packages/[flowRefId]/rollback/route.ts`.
      operationId: rollbackFlowPackage
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: flowRefId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RevisionIdBody" }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/flow-packages/{flowRefId}/trust:
    post:
      tags: [flow-packages]
      summary: Set or clear explicit trust for a flow package
      description: |
        M10. Admin-only. Sets `trust_status` to `trusted`/`untrusted`. Trust
        alone does NOT make a package launchable — the package must still be
        `/enable`d (launch requires `Enabled`/`UpdateAvailable`). Source:
        `.../flow-packages/[flowRefId]/trust/route.ts`.
      operationId: setFlowPackageTrust
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: flowRefId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trusted]
              properties:
                trusted: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/flow-packages/{flowRefId}/revisions/{revisionId}/remove:
    post:
      tags: [flow-packages]
      summary: Remove an installed revision
      description: |
        M10. Admin-only. Marks the revision `Removed` and best-effort deletes
        its cache. Refused with `CONFLICT` (409) while any run references it or
        it is any project's enabled revision. `revisionId` is validated against
        the flow AND the project's declared source. Automatic GC of
        unreferenced revisions is M19. Source:
        `.../flow-packages/[flowRefId]/revisions/[revisionId]/remove/route.ts`.
      operationId: removeFlowRevision
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: flowRefId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: revisionId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }

  /api/projects/{slug}/flow-packages/{flowRefId}/upgrade-preview:
    get:
      tags: [flow-packages]
      summary: Diff the enabled revision against a candidate revision
      description: |
        M10. Admin-only. Returns a structured contract diff (steps, gates,
        artifacts, capabilities, external ops, schema/setup changes) between the
        project's enabled revision and `revisionId`. `revisionId` is validated
        against the flow AND the project's declared source. Source:
        `.../flow-packages/[flowRefId]/upgrade-preview/route.ts`.
      operationId: getFlowUpgradePreview
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: flowRefId,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - {
            name: revisionId,
            in: query,
            required: true,
            schema: { type: string, minLength: 1 },
          }
      responses:
        "200":
          description: Structured upgrade preview.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpgradePreview" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/capabilities/{capabilityRefId}/trust:
    post:
      tags: [capabilities]
      summary: Trust-confirm a capability import and run its setup
      description: |
        **Implemented (M14).** Admin-only
        (`requireProjectAction("managePackages")`). Establishes explicit trust
        for a `capability_imports[]` entry and, when trust is granted, executes
        the import's `setup.sh` (if present and not yet run).

        **Identifiers.** `slug` is a url-param resolved to a `projects` row
        (server-state). `capabilityRefId` is a url-param validated against the
        project's `capability_imports` rows (server-state) — it is NOT derived
        from the body.

        **Two-phase, retry-safe semantics (R-2PC).** The idempotency marker is
        `setupStatus`, NOT `trustStatus`. When `confirm: true`:

        1. Under `SELECT … FOR UPDATE`, write `trustStatus = 'trusted'` (BEFORE
           the side-effect).
        2. Execute `runCapabilityRevisionSetup` (the trust-gated, physically
           separate function — never called from `installCapabilityRevision`).
        3. Write `setupStatus = 'done'` (AFTER the side-effect).

        On any setup failure `setupStatus` is flipped to `'failed'` and the route
        returns 502 (`FLOW_INSTALL`, retryable via re-POST). Because `runCapabilityRevisionSetup` re-runs when
        `setupStatus ∈ {pending, failed}`, a re-POST restarts setup without a
        spurious 409. `409` is returned **ONLY** when `setupStatus = 'done'` or
        `'not_required'` (genuinely nothing to do), and NEVER merely because
        `trustStatus` is already `'trusted'`.

        Source: `web/app/api/projects/[slug]/capabilities/[capabilityRefId]/trust/route.ts`.
        See [ADR-043](../decisions.md) and
        [`configuration.md`](../configuration.md#capability_imports).
      operationId: confirmCapabilityImportTrust
      parameters:
        - {
            name: slug,
            in: path,
            required: true,
            schema: { type: string, minLength: 1 },
          }
        - name: capabilityRefId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            pattern: "^[A-Za-z0-9._-]+$"
            description: |
              Validated against SAFE_PATH_SEGMENT on the server; url-param only —
              not accepted from the body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm]
              properties:
                confirm:
                  type: boolean
                  enum: [true]
                  description: |
                    Must be `true` — grant trust and run setup (if pending/failed).
                    The handler body schema is `z.literal(true)`; any other value
                    is rejected with 422 (`CONFIG`).
      responses:
        "200":
          description: |
            Trust established and setup completed (`setupStatus = 'done'` or
            `'not_required'`).
          content:
            application/json:
              schema:
                type: object
                required: [ok, setupStatus, trustStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  setupStatus:
                    type: string
                    enum: [not_required, done]
                  trustStatus:
                    type: string
                    enum: [trusted, trusted_by_policy]
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: |
            Project or capability import not found for this project
            (`PRECONDITION`), or setup is already `done` or `not_required`
            (nothing to do, `CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: |
            Body is malformed or `capabilityRefId` fails `SAFE_PATH_SEGMENT`
            validation (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "502":
          description: |
            `setup.sh` execution failed (`setupStatus` flipped to `'failed'`).
            `trustStatus` remains `'trusted'` so a re-POST will retry setup
            (`FLOW_INSTALL`, retryable via re-POST). Carries structured detail
            `{source, version, stage:'setup', exitStatus, output}` in the message.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

components:
  securitySchemes:
    cronToken:
      type: apiKey
      in: header
      name: X-Maister-Cron-Token
      description: |
        Shared-secret header for the GC cron route, compared in constant time
        to `MAISTER_CRON_TOKEN`. Server-only secret — never logged or streamed.
        Unset token disables the route (503). Not an Auth.js session.
    projectToken:
      type: http
      scheme: bearer
      description: |
        Project-scoped API token for the `/api/v1/ext/` surface (M16,
        ADR-041). Format: `mai_` + base64url(randomBytes(32)). Stored as
        sha256 hex at rest; compared with `timingSafeEqual`; never logged or
        streamed. In v1 a valid, active, non-expired, non-revoked token grants
        the full project API. Token failures all map to 401 or 404 per the
        existence-hide policy. Used only by `docs/api/external/operations.openapi.yaml`
        routes; session-auth routes do not accept tokens.
  responses:
    Unauthenticated:
      description: No valid session (`UNAUTHENTICATED`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    Forbidden:
      description: |
        Caller lacks the required project role (`UNAUTHORIZED`) or the account
        must change its password first (`PASSWORD_CHANGE_REQUIRED`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    NotFound:
      description: |
        (M22) Resource genuinely not found: unknown run/project, a run with no
        flow/manifest, or a path not in the git-tracked tree. A bare HTTP 404 —
        NOT a thrown `MaisterError` (it does not map `PRECONDITION`, whose status
        is 409). Access denied (non-member / below-`member` role) is 403, not 404.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/NotFoundBody" }
    FileTooLarge:
      description: |
        (M22) Tracked file exceeds `MAISTER_WORKBENCH_MAX_FILE_BYTES`; bytes are
        not served.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/FileTooLargeBody" }
    FileBinary:
      description: (M22) Tracked file is binary; content is not served.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/FileBinaryBody" }
    Precondition:
      description: Precondition failed or conflict (`PRECONDITION` / `CONFLICT`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    Conflict:
      description: State conflict (`PRECONDITION` / `CONFLICT`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    Config:
      description: Invalid body or incompatible package (`CONFIG`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    FlowInstall:
      description: Flow package install/upgrade failed (`FLOW_INSTALL`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    OkResult:
      description: Action succeeded.
      content:
        application/json:
          schema:
            type: object
            required: [ok]
            properties:
              ok: { type: boolean, enum: [true] }
  schemas:
    PostProjectBody:
      type: object
      description: |
        Project source union (ADR-025). Supply at least one of `repoUrl`
        or `target`. With `repoUrl` and no `target`, MAIster clones into
        `MAISTER_REPOS_ROOT` under a name derived from the URL; pass
        `target` to override that name (or to register an existing local
        directory when `repoUrl` is omitted). Deep path/URL validation runs
        server-side before any filesystem access.
      minProperties: 1
      properties:
        repoUrl:
          type: string
          minLength: 1
          maxLength: 2048
          description: |
            Git URL to clone (https / http / ssh / scp `git@host:org/repo`
            / file). Cloned non-interactively with the host's credentials —
            MAIster stores no provider secrets. The URL is credential-redacted
            in logs and errors. Omit to register an existing local directory.
          example: https://github.com/org/my-app
        target:
          type: string
          minLength: 1
          maxLength: 4096
          description: |
            With `repoUrl`: overrides the clone's on-disk directory name (a
            single safe path segment, or an absolute path). Without `repoUrl`:
            the existing local directory to register (absolute, no `..`
            segment); `git init`-ed when it is not yet a git repo.
          example: /repos/my-app
    PostProjectResponse:
      type: object
      required: [slug, projectId, gitStatus]
      properties:
        slug:
          type: string
          description: |
            Kebab-case slug derived server-side from `project.name` in
            `maister.yaml`. Never body-derived.
        projectId:
          type: string
          format: uuid
        gitStatus:
          type: string
          enum: [remote, no-remote, initialized]
          description: |
            Resolved source state: `remote` (cloned, or existing repo with an
            `origin`), `no-remote` (existing repo without an `origin` — PR
            promotion unavailable), or `initialized` (`git init` ran on a
            non-repo dir — unborn HEAD, needs a first commit before runs).
    PostTaskBody:
      type: object
      required: [title, prompt, flowId]
      properties:
        title:
          type: string
          minLength: 1
        prompt:
          type: string
          minLength: 1
        flowId:
          type: string
          minLength: 1
          description: |
            ID of a `flows` row belonging to the project identified by
            the URL `slug`. Any other flow ID returns `422 CONFIG`.
    AssignmentReasonBody:
      type: object
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 1000
    AssignmentActor:
      type: object
      required: [id, kind, label]
      properties:
        id: { type: string, format: uuid }
        kind:
          type: string
          enum: [user, api_token, internal_agent, system]
        label: { type: string }
    Assignment:
      type: object
      required:
        - id
        - projectId
        - runId
        - status
        - roleRefs
        - title
        - assigneeActor
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        runId: { type: string, format: uuid }
        taskId: { type: string, format: uuid, nullable: true }
        nodeId: { type: string, nullable: true }
        stepId: { type: string, nullable: true }
        hitlRequestId: { type: string, format: uuid, nullable: true }
        actionKind:
          type: string
          enum:
            - permission
            - form
            - human_review
            - manual_takeover
            - merge_conflict
        status:
          type: string
          enum:
            - open
            - claimed
            - completed
            - cancelled
        roleRefs:
          type: array
          items: { type: string }
        title: { type: string }
        branch: { type: string, nullable: true }
        ref: { type: string, nullable: true }
        staleEvidenceSummary:
          type: object
          nullable: true
          additionalProperties: true
        claimedAt: { type: string, format: date-time, nullable: true }
        completedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        assigneeActor:
          type: object
          nullable: true
          allOf:
            - $ref: "#/components/schemas/AssignmentActor"
    AssignmentList:
      type: object
      required: [assignments]
      properties:
        assignments:
          type: array
          items: { $ref: "#/components/schemas/Assignment" }
    RegisterUserBody:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        email: { type: string, format: email }
        password: { type: string, minLength: 12 }
    RegisterUserResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending]
    AdminCreateUserBody:
      type: object
      required: [name, email, role, status]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        email:
          type: string
          format: email
        role:
          type: string
          enum: [viewer, member, admin]
        status:
          type: string
          enum: [active, pending]
        password:
          type: string
          minLength: 12
          description: |
            Optional explicit initial password. When omitted the server
            generates a secure temporary password returned in `tempPassword`.
    AdminCreateUserResponse:
      type: object
      required: [id, tempPassword]
      description: |
        Created user id and the one-time plaintext credential. `tempPassword`
        is never re-readable — the server stores only the bcrypt hash.
      properties:
        id: { type: string }
        tempPassword:
          type: string
          description: |
            Plaintext initial password shown once. Convey to the user
            immediately; the server cannot re-derive it.
    AdminUpdateUserBody:
      type: object
      description: |
        Aggregating user update. At least one field is required.
      minProperties: 1
      additionalProperties: false
      properties:
        role:
          type: string
          enum: [viewer, member, admin]
        status:
          type: string
          enum: [active, disabled]
        password:
          type: string
          minLength: 12
        mustChangePassword: { type: boolean }
        name:
          type: string
          minLength: 1
          maxLength: 120
        email:
          type: string
          format: email
    ProjectMemberRole:
      type: string
      enum: [owner, admin, member, viewer]
    ProjectMember:
      type: object
      required: [memberId, userId, email, role, createdAt]
      properties:
        memberId: { type: string }
        userId: { type: string }
        name: { type: string, nullable: true }
        email: { type: string, format: email }
        role: { $ref: "#/components/schemas/ProjectMemberRole" }
        createdAt: { type: string, format: date-time }
        addedBy: { type: string, nullable: true }
    MemberCandidate:
      type: object
      required: [id, email]
      properties:
        id: { type: string }
        name: { type: string, nullable: true }
        email: { type: string, format: email }
    AddProjectMemberBody:
      type: object
      required: [userId, role]
      additionalProperties: false
      properties:
        userId: { type: string }
        role: { $ref: "#/components/schemas/ProjectMemberRole" }
    UpdateProjectMemberRoleBody:
      type: object
      required: [role, expectedRole]
      additionalProperties: false
      properties:
        role: { $ref: "#/components/schemas/ProjectMemberRole" }
        expectedRole:
          allOf: [{ $ref: "#/components/schemas/ProjectMemberRole" }]
          description: |
            The role the caller observed in the roster. The update is a CAS:
            it only lands when the row still holds this role, else `409`
            (`CONFLICT`) on a concurrent stale-update race.
    PostRunBody:
      type: object
      required: [taskId]
      properties:
        taskId:
          type: string
          minLength: 1
        runnerId:
          type: string
          minLength: 1
          description: |
            Optional per-launch platform ACP runner override. Highest priority
            in the fail-closed runner resolution chain.
        baseBranch:
          type: string
          minLength: 1
          description: |
            (M18, Implemented) Optional base branch the run worktree is created
            from. Server-validated against the project's branch allow-list
            (`listBranches(project.repoPath)`) BEFORE use as a git
            `startPoint` — an unknown branch is refused `PRECONDITION` (409).
            Defaults to the project's `default_branch`.
        targetBranch:
          type: string
          minLength: 1
          description: |
            (M18, Implemented) Optional branch the run is promoted into after
            review. Server-validated against the same branch allow-list;
            unknown branch → `PRECONDITION` (409). Defaults to `baseBranch`.
    PostRunResponse:
      type: object
      required: [runId, status]
      properties:
        runId:
          type: string
          format: uuid
        status:
          type: string
          enum: [Pending, Running]
        queuePosition:
          type: integer
          minimum: 1
          description: Present iff `status == "Pending"`.
    RecoverQueuedResponse:
      type: object
      description: |
        (Designed, M19) Returned by `POST /api/runs/{runId}/recover` with HTTP
        202 when the global concurrency cap was full at admission. The run
        flipped `Crashed→Pending` (retaining `acpSessionId`); the scheduler
        resumes it via `--resume` when a slot frees.
      required: [state]
      properties:
        state:
          type: string
          enum: [queued]
        queuePosition:
          type: integer
          minimum: 1
          description: Optional queue position for the re-admitted resume.
    GcSweepSummary:
      type: object
      description: |
        (Designed, M19) Result of one GC sweep — the same shape the background
        sweeper logs and the cron route returns. Counts cover the worktree and
        revision sub-sweeps. A non-empty `errors` array accompanies the 207
        partial-failure response.
      required: [worktreesPreserved, worktreesRemoved, revisionsRemoved, errors]
      properties:
        worktreesPreserved:
          type: integer
          minimum: 0
          description: Worktrees archived to `maister/archive/<runId>` before removal.
        worktreesRemoved:
          type: integer
          minimum: 0
          description: Abandoned/Done worktrees pruned past `MAISTER_GC_AGE_DAYS`.
        revisionsRemoved:
          type: integer
          minimum: 0
          description: Unreferenced `Removed` flow revisions GC'd under the dual-FK guard.
        errors:
          type: array
          description: Per-row skip reasons when a sub-sweep partially failed (207).
          items: { type: string }
    SchedulerTickSummary:
      type: object
      description: |
        (Implemented, M24) Result of one unified scheduler tick. `attempts` lists
        due jobs claimed by this tick; jobs skipped because another unexpired
        lease exists are not duplicated.
      required:
        [
          attemptedCount,
          claimedCount,
          succeededCount,
          failedCount,
          skippedCount,
          attempts,
        ]
      properties:
        attemptedCount: { type: integer, minimum: 0 }
        claimedCount: { type: integer, minimum: 0 }
        succeededCount: { type: integer, minimum: 0 }
        failedCount: { type: integer, minimum: 0 }
        skippedCount: { type: integer, minimum: 0 }
        jobKind:
          type: string
          nullable: true
          enum: [system_sweep, command, agent_tick, flow_run]
        attempts:
          type: array
          items:
            type: object
            required: [jobId, jobKind, status]
            properties:
              jobId: { type: string }
              attemptId: { type: string, nullable: true }
              jobKind:
                type: string
                enum: [system_sweep, command, agent_tick, flow_run]
              status:
                type: string
                enum: [Claimed, Running, Succeeded, Failed, Skipped]
              errorCode:
                type: string
                nullable: true
              errorMessage:
                type: string
                nullable: true
              nextRunAt:
                type: string
                format: date-time
                nullable: true
    AuthoredCapabilityKind:
      type: string
      enum: [rule, skill, flow]
    AuthoredCapabilityLifecycle:
      type: string
      enum: [DRAFT, PUBLISHED, ARCHIVED]
    AuthoredCapability:
      type: object
      required:
        - id
        - projectId
        - kind
        - slug
        - title
        - lifecycle
        - draftVersion
        - archivedAt
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        projectId: { type: string }
        kind: { $ref: "#/components/schemas/AuthoredCapabilityKind" }
        slug: { type: string }
        title: { type: string }
        lifecycle: { $ref: "#/components/schemas/AuthoredCapabilityLifecycle" }
        draftVersion: { type: integer, minimum: 1 }
        currentDraftRevisionId: { type: string, nullable: true }
        currentPublishedRevisionId: { type: string, nullable: true }
        archivedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    AuthoredCapabilityRevision:
      type: object
      required:
        - id
        - capabilityId
        - projectId
        - kind
        - revisionNumber
        - draftVersion
        - lifecycle
        - title
        - body
        - manifest
        - schemaVersion
        - contentHash
        - createdAt
      properties:
        id: { type: string }
        capabilityId: { type: string }
        projectId: { type: string }
        kind: { $ref: "#/components/schemas/AuthoredCapabilityKind" }
        revisionNumber: { type: integer, minimum: 1 }
        draftVersion: { type: integer, minimum: 1 }
        lifecycle: { $ref: "#/components/schemas/AuthoredCapabilityLifecycle" }
        title: { type: string }
        body: {}
        manifest: {}
        schemaVersion: { type: integer, minimum: 1 }
        contentHash: { type: string }
        publishedAt: { type: string, format: date-time, nullable: true }
        archivedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
    AuthoredCapabilityDetail:
      type: object
      required: [capability, revisions]
      properties:
        capability: { $ref: "#/components/schemas/AuthoredCapability" }
        draft:
          {
            $ref: "#/components/schemas/AuthoredCapabilityRevision",
            nullable: true,
          }
        published:
          {
            $ref: "#/components/schemas/AuthoredCapabilityRevision",
            nullable: true,
          }
        revisions:
          type: array
          items: { $ref: "#/components/schemas/AuthoredCapabilityRevision" }
    AuthoredCapabilityCreateBody:
      type: object
      additionalProperties: false
      required: [kind, slug, title]
      properties:
        kind: { $ref: "#/components/schemas/AuthoredCapabilityKind" }
        slug: { type: string, minLength: 1 }
        title: { type: string, minLength: 1 }
        body: {}
        manifest: {}
        schemaVersion: { type: integer, minimum: 1 }
    AuthoredCapabilityDraftBody:
      type: object
      additionalProperties: false
      required: [expectedDraftVersion]
      properties:
        expectedDraftVersion: { type: integer, minimum: 1 }
        title: { type: string, minLength: 1 }
        body: {}
        manifest: {}
        schemaVersion: { type: integer, minimum: 1 }
    ScratchCapabilityOption:
      type: object
      required:
        [
          id,
          recordId,
          kind,
          label,
          source,
          enforceability,
          selectedByDefault,
          agents,
        ]
      properties:
        id: { type: string, minLength: 1 }
        recordId: { type: string, format: uuid }
        label: { type: string, minLength: 1 }
        kind:
          type: string
          enum: [mcp, skill, rule, agent_definition, restriction]
        source:
          type: string
          enum: [platform, project, flow-package]
        enforceability:
          type: string
          enum: [enforced, instructed, unsupported]
        selectedByDefault: { type: boolean }
        agents:
          type: array
          items:
            type: string
            enum: [claude, codex]
    ScratchProjectOption:
      type: object
      required: [id, slug, name, mainBranch, branchPrefix]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        mainBranch: { type: string }
        branchPrefix: { type: string }
        defaultRunnerId:
          type: string
          nullable: true
    BranchOptions:
      type: object
      description: |
        (M18, Implemented) The session-authed, project-read-scoped branch subset
        the board task-launch UI consumes from
        `GET /api/scratch-runs/launch-options`. Field names match the live
        route (`branches`, `defaultBaseBranch`); `ScratchLaunchOptionsResponse`
        is a superset of this shape.
      required: [branches, defaultBaseBranch]
      properties:
        branches:
          type: array
          description: |
            All branches in the selected project's repository
            (`listBranches(project.repoPath)`), the server-state allow-list a
            base/target branch is validated against at launch and promote.
          items: { type: string }
        defaultBaseBranch:
          type: string
          nullable: true
          description: |
            The project's default branch — the base-branch default when the
            launcher leaves the advanced selector untouched. Null only when no
            project is visible/selected.
    ScratchLaunchOptionsResponse:
      type: object
      required:
        [
          machine,
          projects,
          selectedProjectId,
          branches,
          runners,
          workModes,
          reasoningEfforts,
          capabilities,
        ]
      properties:
        machine:
          type: object
          required: [id, label, readOnly]
          properties:
            id: { type: string }
            label: { type: string }
            readOnly: { type: boolean, enum: [true] }
        projects:
          type: array
          items: { $ref: "#/components/schemas/ScratchProjectOption" }
        selectedProjectId:
          type: string
          format: uuid
          nullable: true
        defaultBaseBranch:
          type: string
          nullable: true
        defaultScratchBranch:
          type: string
          nullable: true
        defaultRunnerId:
          type: string
          nullable: true
        branches:
          type: array
          items: { type: string }
        runners:
          type: array
          items:
            type: object
            description: |
              Configured platform ACP runner profile. Secret values are never
              returned; provider secret refs stay server-side metadata.
            required:
              [
                id,
                displayLabel,
                adapter,
                capabilityAgent,
                model,
                providerKind,
                enabled,
                ready,
              ]
            properties:
              id: { type: string }
              displayLabel: { type: string }
              adapter: { type: string, enum: [claude, codex] }
              capabilityAgent: { type: string, enum: [claude, codex] }
              model: { type: string }
              providerKind: { type: string }
              permissionPolicy: { type: string }
              sidecarId: { type: string, nullable: true }
              enabled: { type: boolean }
              ready: { type: boolean }
        workModes:
          type: array
          items:
            type: object
            required: [id, label, selectedByDefault]
            properties:
              id: { type: string, enum: [auto, plan_first, manual_approval] }
              label: { type: string }
              selectedByDefault: { type: boolean }
        reasoningEfforts:
          type: array
          items:
            type: object
            required: [id, label, selectedByDefault]
            properties:
              id: { type: string, enum: [low, high, extra, ultra] }
              label: { type: string }
              selectedByDefault: { type: boolean }
        capabilities:
          type: object
          required:
            [
              mcps,
              skills,
              rules,
              agentDefinitions,
              restrictions,
              defaultSelectedMcpIds,
            ]
          properties:
            mcps:
              type: array
              items: { $ref: "#/components/schemas/ScratchCapabilityOption" }
            skills:
              type: array
              items: { $ref: "#/components/schemas/ScratchCapabilityOption" }
            rules:
              type: array
              items: { $ref: "#/components/schemas/ScratchCapabilityOption" }
            agentDefinitions:
              type: array
              items: { $ref: "#/components/schemas/ScratchCapabilityOption" }
            restrictions:
              type: array
              items: { $ref: "#/components/schemas/ScratchCapabilityOption" }
            defaultSelectedMcpIds:
              type: array
              items: { type: string }
    ScratchCapabilitySelection:
      type: object
      description: |
        Launch-time capability ids selected from `launch-options`. Unknown,
        hidden, disabled, untrusted, or cross-project ids return `400 CONFIG`.
      properties:
        mcpIds:
          type: array
          items: { type: string, minLength: 1 }
        skillIds:
          type: array
          items: { type: string, minLength: 1 }
        ruleIds:
          type: array
          items: { type: string, minLength: 1 }
        agentDefinitionIds:
          type: array
          items: { type: string, minLength: 1 }
        restrictionIds:
          type: array
          items: { type: string, minLength: 1 }
    ScratchAttachmentInput:
      type: object
      description: |
        Metadata-only attachment accepted in JSON bodies and the multipart
        `payload` field. Binary uploads are sent as multipart `files` parts.
      required: [kind, value]
      properties:
        kind:
          type: string
          enum: [issue_url, file_path, text_note]
        label:
          type: string
          maxLength: 200
        value:
          type: string
          minLength: 1
          maxLength: 20000
    ScratchAttachment:
      type: object
      required: [id, runId, kind, label, value, createdAt]
      properties:
        id: { type: string, format: uuid }
        runId: { type: string, format: uuid }
        messageId: { type: string, format: uuid, nullable: true }
        kind:
          type: string
          enum: [issue_url, file_path, text_note, uploaded_file]
        label: { type: string, nullable: true }
        value:
          type: string
          description: Metadata value or rootless artifact reference.
        fileName: { type: string, nullable: true }
        mimeType: { type: string, nullable: true }
        byteSize: { type: integer, minimum: 0, nullable: true }
        sha256: { type: string, nullable: true }
        artifactRef:
          type: string
          nullable: true
          description: Rootless artifact reference for uploaded files. Absolute storage paths are never returned.
        createdAt: { type: string, format: date-time }
    PostScratchRunBody:
      type: object
      required: [projectId, baseBranch]
      additionalProperties: false
      description: |
        Implemented scratch launch body. The schema intentionally excludes
        `runId`, `projectSlug`, `worktreePath`, `stepId`,
        `supervisorSessionId`, `acpSessionId`, and capability profile paths;
        the server derives those values after authz and validation. When
        `prompt` is omitted or empty, launch still prepares the worktree-backed
        ACP session and leaves the dialog waiting for the first user message.
      properties:
        projectId: { type: string, format: uuid }
        baseBranch: { type: string, minLength: 1, maxLength: 255 }
        branchName:
          type: string
          minLength: 0
          maxLength: 255
          description: Optional explicit branch. Omit or send an empty string to use the generated scratch branch fallback.
        name: { type: string, maxLength: 200 }
        runnerId:
          type: string
          description: Optional platform ACP runner override. Omit to use the project/platform default chain.
        workMode:
          type: string
          enum: [auto, plan_first, manual_approval]
          default: auto
        reasoningEffort:
          type: string
          enum: [low, high, extra, ultra]
          default: high
        planMode:
          type: string
          enum: [off, plan-first]
          deprecated: true
          description: Compatibility field derived from workMode.
        prompt:
          type: string
          minLength: 0
          maxLength: 60000
          default: ""
        linkedTaskId: { type: string, format: uuid }
        linkedIssueUrl: { type: string, maxLength: 2048 }
        attachments:
          type: array
          maxItems: 20
          items: { $ref: "#/components/schemas/ScratchAttachmentInput" }
        capabilities:
          $ref: "#/components/schemas/ScratchCapabilitySelection"
    ScratchRunMultipartBody:
      type: object
      required: [payload]
      properties:
        payload:
          type: string
          description: JSON-encoded PostScratchRunBody. Its attachments are metadata-only; binary files are supplied by `files`.
        files:
          type: array
          maxItems: 10
          items:
            type: string
            format: binary
    PostScratchMessageBody:
      type: object
      required: [content]
      additionalProperties: false
      description: |
        Implemented scratch message body. It excludes session ids, project slug,
        worktree path, step id, and sequence; the server derives those values.
      properties:
        content: { type: string, minLength: 1, maxLength: 60000 }
        attachments:
          type: array
          maxItems: 20
          items: { $ref: "#/components/schemas/ScratchAttachmentInput" }
    ScratchMessageMultipartBody:
      type: object
      required: [payload]
      properties:
        payload:
          type: string
          description: JSON-encoded PostScratchMessageBody. Its attachments are metadata-only; binary files are supplied by `files`.
        files:
          type: array
          maxItems: 10
          items:
            type: string
            format: binary
    ScratchMessage:
      type: object
      required: [id, runId, sequence, role, content, createdAt]
      properties:
        id: { type: string, format: uuid }
        runId: { type: string, format: uuid }
        sequence: { type: integer, minimum: 1 }
        role: { type: string, enum: [user, assistant, tool, system] }
        content: { type: string }
        supervisorEventId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
    ScratchRun:
      type: object
      required:
        [
          runId,
          projectId,
          runStatus,
          dialogStatus,
          branchName,
          baseBranch,
          baseCommit,
          targetBranch,
          workMode,
          reasoningEffort,
          planMode,
        ]
      properties:
        runId: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        name: { type: string, nullable: true }
        createdByUserId: { type: string, format: uuid, nullable: true }
        createdByDisplayName: { type: string, nullable: true }
        runStatus:
          type: string
          enum:
            [
              Pending,
              Running,
              NeedsInput,
              NeedsInputIdle,
              HumanWorking,
              Review,
              Crashed,
              Done,
              Abandoned,
              Failed,
            ]
        dialogStatus:
          type: string
          enum:
            [
              Starting,
              WaitingForUser,
              Running,
              NeedsInput,
              Review,
              Crashed,
              Done,
              Abandoned,
            ]
        branchName: { type: string }
        baseBranch: { type: string }
        baseCommit: { type: string }
        targetBranch: { type: string }
        workMode: { type: string, enum: [auto, plan_first, manual_approval] }
        reasoningEffort: { type: string, enum: [low, high, extra, ultra] }
        planMode: { type: string, enum: [off, plan-first] }
    ScratchRunResponse:
      type: object
      required: [runId, dialogUrl, status]
      properties:
        runId: { type: string, format: uuid }
        dialogUrl: { type: string }
        status: { $ref: "#/components/schemas/ScratchRun" }
    ScratchPendingHitl:
      type: object
      required: [hitlRequestId, kind, prompt, schema, options]
      properties:
        hitlRequestId: { type: string, format: uuid }
        kind: { type: string, enum: [permission, form, human] }
        prompt: { type: string }
        schema: {}
        options:
          type: array
          items:
            type: object
            required: [optionId, label]
            properties:
              optionId: { type: string }
              label: { type: string }
    ScratchRunDetail:
      type: object
      required:
        [
          run,
          scratch,
          workspace,
          messages,
          attachments,
          capabilityProfile,
          pendingHitl,
        ]
      properties:
        run:
          type: object
          required:
            [
              id,
              projectId,
              status,
              createdByUserId,
              currentStepId,
              startedAt,
              endedAt,
            ]
          properties:
            id: { type: string, format: uuid }
            projectId: { type: string, format: uuid }
            runnerId: { type: string, nullable: true }
            runnerResolutionTier:
              type: string
              nullable: true
              enum:
                [
                  launchOverride,
                  stepTarget,
                  projectFlowDefault,
                  platformFlowDefault,
                  projectDefault,
                  platformDefault,
                ]
            capabilityAgent:
              type: string
              nullable: true
              enum: [claude, codex]
            createdByUserId: { type: string, format: uuid, nullable: true }
            createdByDisplayName: { type: string, nullable: true }
            status:
              type: string
              enum:
                [
                  Pending,
                  Running,
                  NeedsInput,
                  NeedsInputIdle,
                  HumanWorking,
                  Review,
                  Crashed,
                  Done,
                  Abandoned,
                  Failed,
                ]
            currentStepId: { type: string, nullable: true }
            startedAt: { type: string, format: date-time }
            endedAt: { type: string, format: date-time, nullable: true }
        scratch:
          type: object
          required:
            [
              name,
              workMode,
              reasoningEffort,
              planMode,
              linkedTaskId,
              linkedIssueUrl,
              baseBranch,
              baseCommit,
              targetBranch,
              dialogStatus,
            ]
          properties:
            name: { type: string, nullable: true }
            workMode:
              { type: string, enum: [auto, plan_first, manual_approval] }
            reasoningEffort: { type: string, enum: [low, high, extra, ultra] }
            planMode: { type: string, enum: [off, plan-first] }
            linkedTaskId: { type: string, format: uuid, nullable: true }
            linkedIssueUrl: { type: string, nullable: true }
            baseBranch: { type: string }
            baseCommit: { type: string }
            targetBranch: { type: string, nullable: true }
            dialogStatus:
              type: string
              enum:
                [
                  Starting,
                  WaitingForUser,
                  Running,
                  NeedsInput,
                  Review,
                  Crashed,
                  Done,
                  Abandoned,
                ]
            errorCode: { type: string, nullable: true }
            errorMessage: { type: string, nullable: true }
        workspace:
          type: object
          nullable: true
          required: [branch, removedAt]
          properties:
            id: { type: string, format: uuid }
            branch: { type: string }
            removedAt: { type: string, format: date-time, nullable: true }
        messages:
          type: array
          items: { $ref: "#/components/schemas/ScratchMessage" }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/ScratchAttachment" }
        capabilityProfile:
          type: object
          required:
            [
              profileDigest,
              selectedMcpIds,
              selectedSkillIds,
              selectedRuleIds,
              selectedAgentDefinitionIds,
              restrictions,
              downgradeNotes,
            ]
          properties:
            profileDigest: { type: string }
            selectedMcpIds:
              type: array
              items: { type: string }
            selectedSkillIds:
              type: array
              items: { type: string }
            selectedRuleIds:
              type: array
              items: { type: string }
            selectedAgentDefinitionIds:
              type: array
              items: { type: string }
            restrictions:
              type: object
              additionalProperties: true
            downgradeNotes:
              type: object
              nullable: true
              additionalProperties: true
        pendingHitl:
          type: object
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ScratchPendingHitl"
    ScratchMessageResponse:
      type: object
      required: [ok, messageId, sequence, dialogStatus, stopReason]
      properties:
        ok: { type: boolean, enum: [true] }
        messageId: { type: string, format: uuid }
        sequence: { type: integer, minimum: 1 }
        dialogStatus:
          type: string
          enum:
            [
              Starting,
              WaitingForUser,
              Running,
              NeedsInput,
              Review,
              Crashed,
              Done,
              Abandoned,
            ]
        stopReason:
          type: string
          enum: [end_turn, max_tokens, max_turn_requests, refusal, cancelled]
    RunDiffResponse:
      type: object
      required: [runId, baseCommit, sourceBranch, targetBranch, diff]
      properties:
        runId: { type: string, format: uuid }
        baseCommit: { type: string }
        sourceBranch: { type: string }
        targetBranch: { type: string }
        diff: { type: string }
        files:
          type: array
          description: |
            (M22) Changed-files summary from `git diff --name-status base..branch`,
            rendered beside the raw diff in the workbench. Present for flow runs.
          items: { $ref: "#/components/schemas/DiffFileEntry" }
    DiffFileEntry:
      type: object
      required: [path, status]
      properties:
        path: { type: string }
        status:
          type: string
          description: git name-status letter (`A` add, `M` modify, `D` delete, `R` rename, `C` copy).
    RunGraphResponse:
      type: object
      required: [topology, layout]
      properties:
        topology: { $ref: "#/components/schemas/GraphTopology" }
        layout:
          type: object
          description: |
            (ADR-064) Authored layout from the manifest `presentation` section,
            keyed by node id; a node absent from the map is dagre-seeded
            client-side.
          additionalProperties: { $ref: "#/components/schemas/GraphNodePosition" }
    GraphTopology:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items: { $ref: "#/components/schemas/GraphTopologyNode" }
        edges:
          type: array
          items: { $ref: "#/components/schemas/GraphTopologyEdge" }
    GraphTopologyNode:
      type: object
      required: [id, nodeType, label]
      properties:
        id: { type: string }
        nodeType:
          type: string
          enum: [ai_coding, cli, check, judge, human, guard]
        label: { type: string }
        displayLabel:
          type: string
          description: Human-readable label derived from the node id; additive.
        nodeTypeLabel:
          type: string
          description: Human-readable node type label; additive.
        nodeRole:
          type: string
          enum: [agent, command, check, judge, human, terminal, other]
        declaredGateSummary:
          $ref: "#/components/schemas/DeclaredGateSummary"
    GraphTopologyEdge:
      type: object
      required: [id, source, target, outcome]
      properties:
        id: { type: string }
        source: { type: string }
        target: { type: string }
        outcome: { type: string }
        displayLabel:
          type: string
          description: Human-readable outcome label; additive.
        edgeRole:
          type: string
          enum: [success, default, rework, reject, takeover, approve, other]
    DeclaredGateSummary:
      type: object
      required: [total, blocking, advisory, kinds]
      properties:
        total: { type: integer, minimum: 0 }
        blocking: { type: integer, minimum: 0 }
        advisory: { type: integer, minimum: 0 }
        kinds:
          type: array
          items: { type: string }
    GraphNodePosition:
      type: object
      required: [x, y]
      properties:
        x: { type: number }
        y: { type: number }
    RunGraphStatusResponse:
      type: object
      required: [currentStepId, runStatus, nodes]
      properties:
        currentStepId: { type: string, nullable: true }
        runStatus: { type: string }
        nodes:
          type: object
          description: Per-node status map keyed by node id.
          additionalProperties: { $ref: "#/components/schemas/GraphNodeStatus" }
    GraphNodeStatus:
      type: object
      required: [status, attempt, gates, rollup]
      properties:
        status:
          type: string
          enum: [Pending, Running, Succeeded, Failed, NeedsInput, Reworked, Stale]
        attempt: { type: integer }
        gates:
          type: array
          items: { $ref: "#/components/schemas/GraphGateStatus" }
        rollup:
          type: string
          description: Worst-blocking gate rollup driving the node badge tint.
        gateSummary:
          $ref: "#/components/schemas/RuntimeGateSummary"
    RuntimeGateSummary:
      type: object
      required: [total, blockingTotal, advisoryTotal, worstBlockingStatus, failedBlocking, staleBlocking]
      properties:
        total: { type: integer, minimum: 0 }
        blockingTotal: { type: integer, minimum: 0 }
        advisoryTotal: { type: integer, minimum: 0 }
        worstBlockingStatus:
          type: string
          nullable: true
          enum: [pending, running, passed, failed, stale, skipped, overridden, null]
        failedBlocking: { type: integer, minimum: 0 }
        staleBlocking: { type: integer, minimum: 0 }
    GraphGateStatus:
      type: object
      required: [blocking, status]
      properties:
        blocking: { type: boolean }
        status:
          type: string
          enum: [pending, running, passed, failed, stale, skipped, overridden]
    FileTreeResponse:
      type: object
      required: [path, entries]
      properties:
        path: { type: string }
        entries:
          type: array
          items: { $ref: "#/components/schemas/FileTreeEntry" }
    FileTreeEntry:
      type: object
      required: [name, type]
      properties:
        name: { type: string }
        type: { type: string, enum: [file, dir] }
    FileContentResponse:
      type: object
      required: [kind, content]
      properties:
        kind: { type: string, enum: [text] }
        content: { type: string }
    FileTooLargeBody:
      type: object
      required: [kind, size]
      properties:
        kind: { type: string, enum: [too-large] }
        size: { type: integer, description: Blob size in bytes. }
    FileBinaryBody:
      type: object
      required: [kind]
      properties:
        kind: { type: string, enum: [binary] }
    NotFoundBody:
      type: object
      required: [message]
      properties:
        message: { type: string }
    PromoteRunBody:
      type: object
      required: [mode, reviewedTargetCommit]
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [local_merge, pull_request]
        targetBranch:
          type: string
          minLength: 1
          maxLength: 255
          description: |
            Optional target-branch override. Server-validated against the
            project branch allow-list; for flow runs it may differ from the
            base branch. Defaults to the workspace's stored target branch.
        reviewedTargetCommit:
          type: string
          minLength: 1
          description: |
            (M18, Implemented) The target-branch HEAD commit the ReviewPanel
            rendered the promote surface against (commit-sha shape).
            **Required** — compared to the live target HEAD at claim time
            (optimistic concurrency). A mismatch is refused `PRECONDITION`
            ("target advanced since review") unless `allowTargetDrift` is set;
            a body omitting it is refused `PRECONDITION`, never promoted blind.
        allowTargetDrift:
          type: boolean
          default: false
          description: |
            (M18, Implemented) Explicit "Promote anyway" override. When true the
            `reviewedTargetCommit`-vs-live-HEAD equality check is skipped,
            merging into the advanced target. A deliberate human action, never
            a default.
    PromoteRunResponse:
      type: object
      required: [ok, mode]
      properties:
        ok: { type: boolean, enum: [true] }
        mode: { type: string, enum: [local_merge, pull_request] }
        commit: { type: string, nullable: true }
        pullRequestUrl:
          type: string
          format: uri
          nullable: true
          description: |
            (M18, Implemented) URL of the created/updated pull or merge request.
            Present (non-null) only for successful `pull_request` promotions;
            null for `local_merge`.
        prNumber:
          type: integer
          minimum: 1
          nullable: true
          description: |
            (M18, Implemented) Provider-assigned PR/MR number. Present only for
            successful `pull_request` promotions.
    HitlResponseBody:
      type: object
      description: |
        Discriminated union. Exactly ONE of `optionId` (permission) or
        `response` (form/human) MUST be present, matching the row's
        `kind` field.
      properties:
        optionId:
          type: string
          minLength: 1
          description: |
            Required iff the HITL row has `kind == "permission"`. MUST
            match one of the options the supervisor declared on the
            `session.permission_request` event.
        response:
          description: |
            Required iff the HITL row has `kind == "form" | "human"`.
            Validated against the row's `schema` field (MAIster form
            schema — see `docs/configuration.md`). Returns 422 on
            failure.

            **`kind="human"` with `on_reject` (Implemented — M17):** the
            response is captured under the same atomic-claim + artifact-write
            contract as `kind="form"`. On an APPROVE response (`rejected`
            absent/false) the runner advances to the NEXT step with the response
            surfaced as `steps.<stepId>.vars`. On a REJECT response
            (`{ rejected: true, comments?: string }`) the runner executes the
            Flow step's `on_reject` clause: it atomically reparks
            `runs.current_step_id` to `on_reject.goto_step`, injects `comments`
            under the step's `comments_var` into the goto target's context, and
            re-enters there. UIs SHOULD present rejection as a loop-back /
            send-back-with-comments action. The reject→goto loop is bounded by
            `maxLoops` (default 5); exceeding it terminates the run with
            `MaisterError("CONFIG")`. (In a graph `nodes[]` flow this routing is
            superseded by the node's declared-decision rework loop, M11a.)

            **(M11a — Designed) graph `human_review`:** for a review HITL the
            `response` object additionally carries the review-decision
            sub-schema (`ReviewDecisionResponse`) — `decision`, optional
            `comments`, optional `workspacePolicy` — alongside any declared form
            fields. These are validated against the manifest-derived allow-list
            stored in `hitl_requests.schema` (`allowedDecisions`, `transitions`,
            `reworkTargets`, `workspacePolicies`); an undeclared value → 422.
            They remain part of the `response` payload — NOT new top-level body
            fields.
          anyOf:
            - type: object
              description: Structured form payload — keys match the row's form schema.
              additionalProperties: true
            - $ref: "#/components/schemas/ReviewDecisionResponse"
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: |
            **(M17 — Implemented)** Optional responder self-reported certainty
            (`0..1`) for a `kind == "form" | "human"` response, including a
            graph `human_review` decision. Distinct from the AI-judge machine
            `GateVerdict.confidence` (M15). When present it is bounded
            server-side and echoed into the stored `hitl_requests.response`
            jsonb and written to `hitl_requests.human_confidence`. Ignored for
            `kind == "permission"`. Annotates the response; it never re-gates
            readiness.
    ReviewDecisionResponse:
      type: object
      description: |
        (M11a — Designed) The review-decision fields a graph `human_review`
        HITL carries INSIDE the `respond` route's `response` object. Validated
        against the row's server-state allow-list in `hitl_requests.schema`;
        mirrored into `hitl_requests.decision`/`workspace_policy`/`rework_target`
        on success.
      required: [decision]
      properties:
        decision:
          type: string
          minLength: 1
          description: |
            Chosen decision; MUST be in the row's `schema.allowedDecisions`
            (e.g. `approve`, `rework`). Its resolved `transitions[decision]`
            MUST be a declared node.
        comments:
          type: string
          description: |
            Free-text review comments; injected into the rework target's
            context via the node's `rework.commentsVar` when `decision` reworks.
        workspacePolicy:
          type: string
          description: |
            Required when `decision` triggers rework; MUST be in
            `schema.workspacePolicies`. M11a executes `keep`;
            `rewind-to-node-checkpoint` / `fresh-attempt` are recorded but their
            execution is M11b.
          enum: [keep, rewind-to-node-checkpoint, fresh-attempt]
    MaisterErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - PRECONDITION
            - SPAWN
            - NEEDS_INPUT
            - HITL_TIMEOUT
            - CRASH
            - CONFLICT
            - CONFIG
            - EXECUTOR_UNAVAILABLE
            - FLOW_INSTALL
            - ACP_PROTOCOL
            - CHECKPOINT
            - STEP_CHECKPOINTED
            - UNAUTHENTICATED
            - UNAUTHORIZED
            - PASSWORD_CHANGE_REQUIRED
            - ACCOUNT_INACTIVE
        message: { type: string }

    ArtifactInstance:
      type: object
      description: |
        (M12) Explicit DTO projection of one typed-artifact evidence row.
        Internal handles are intentionally excluded: this DTO NEVER carries
        `acp_session_id` or absolute worktree paths. Any file path in
        `locator` is run-relative.
      required:
        - id
        - runId
        - kind
        - producer
        - locator
        - validity
        - visibility
        - retention
        - createdAt
      properties:
        id: { type: string }
        runId: { type: string }
        nodeAttemptId: { type: string, nullable: true }
        nodeId: { type: string, nullable: true }
        attempt: { type: integer, nullable: true }
        artifactDefId: { type: string, nullable: true }
        kind:
          type: string
          description: Closed catalog of artifact kinds.
          enum:
            - diff
            - log
            - test_report
            - lint_report
            - ai_judgment
            - human_note
            - commit_set
            - checkpoint
            - preview
            - generic_file
        producer:
          type: string
          enum: [runner, projector, takeover, gate, human]
        locator:
          $ref: "#/components/schemas/ArtifactLocator"
        uri: { type: string, nullable: true }
        hash: { type: string, nullable: true }
        sizeBytes: { type: integer, nullable: true }
        validity:
          type: string
          enum: [current, stale, superseded, failed, skipped]
        requiredFor:
          type: array
          nullable: true
          description: |
            Declared/recorded in M12; access enforcement is M14.
          items:
            type: string
            enum: [review, merge]
        visibility:
          type: string
          description: |
            Declared/recorded in M12; access enforcement is M14.
          enum: [internal, shared]
        retention:
          type: string
          description: |
            Declared/recorded in M12; access enforcement is M14.
          enum: [run, ephemeral]
        createdAt: { type: string, format: date-time }

    ArtifactLocator:
      description: |
        (M12) Discriminated union locating an artifact's payload. The
        `kind` field selects the variant. File paths are run-relative —
        absolute worktree paths are never exposed.
      oneOf:
        - $ref: "#/components/schemas/ArtifactLocatorGitRange"
        - $ref: "#/components/schemas/ArtifactLocatorGitLog"
        - $ref: "#/components/schemas/ArtifactLocatorFile"
        - $ref: "#/components/schemas/ArtifactLocatorGateVerdict"
        - $ref: "#/components/schemas/ArtifactLocatorHitlResponse"
        - $ref: "#/components/schemas/ArtifactLocatorInline"
      discriminator:
        propertyName: kind
        mapping:
          git-range: "#/components/schemas/ArtifactLocatorGitRange"
          git-log: "#/components/schemas/ArtifactLocatorGitLog"
          file: "#/components/schemas/ArtifactLocatorFile"
          gate-verdict: "#/components/schemas/ArtifactLocatorGateVerdict"
          hitl-response: "#/components/schemas/ArtifactLocatorHitlResponse"
          inline: "#/components/schemas/ArtifactLocatorInline"

    ArtifactLocatorGitRange:
      type: object
      required: [kind, baseCommit, headRef]
      properties:
        kind: { type: string, enum: [git-range] }
        baseCommit: { type: string }
        headRef: { type: string }

    ArtifactLocatorGitLog:
      type: object
      required: [kind, baseRef, headRef]
      properties:
        kind: { type: string, enum: [git-log] }
        baseRef: { type: string }
        headRef: { type: string }

    ArtifactLocatorFile:
      type: object
      required: [kind, path]
      properties:
        kind: { type: string, enum: [file] }
        path:
          type: string
          description: Run-relative path inside the run directory.

    ArtifactLocatorGateVerdict:
      type: object
      required: [kind, gateResultId]
      properties:
        kind: { type: string, enum: [gate-verdict] }
        gateResultId: { type: string }

    ArtifactLocatorHitlResponse:
      type: object
      required: [kind, hitlRequestId]
      properties:
        kind: { type: string, enum: [hitl-response] }
        hitlRequestId: { type: string }

    ArtifactLocatorInline:
      type: object
      required: [kind, text]
      properties:
        kind: { type: string, enum: [inline] }
        text: { type: string }

    ArtifactInstanceList:
      type: object
      required: [artifacts]
      properties:
        artifacts:
          type: array
          items: { $ref: "#/components/schemas/ArtifactInstance" }

    InstallFlowPackageBody:
      type: object
      required: [flowRefId, source, version]
      properties:
        flowRefId: { type: string, minLength: 1, example: "bugfix" }
        source:
          type: string
          minLength: 1
          example: "github.com/my-org/maister-flow-bugfix"
        version: { type: string, minLength: 1, example: "v1.2.3" }

    InstallFlowPackageResult:
      type: object
      required: [flowRowId, revisionId, revision, trustStatus, enablementState]
      properties:
        flowRowId: { type: string, format: uuid }
        revisionId: { type: string, format: uuid }
        revision:
          type: string
          description: Resolved revision — git SHA (40 hex) or local manifest-digest prefix.
        trustStatus:
          type: string
          enum: [untrusted, trusted, trusted_by_policy]
        enablementState:
          type: string
          enum: [Enabled, Installed]

    UpgradeFlowPackageBody:
      type: object
      required: [source, version]
      properties:
        source: { type: string, minLength: 1 }
        version: { type: string, minLength: 1 }

    RevisionIdBody:
      type: object
      required: [revisionId]
      properties:
        revisionId: { type: string, minLength: 1, format: uuid }

    ContractDiff:
      type: object
      required: [added, removed]
      properties:
        added: { type: array, items: { type: string } }
        removed: { type: array, items: { type: string } }

    UpgradePreview:
      type: object
      required:
        - fromRevisionId
        - toRevisionId
        - schemaVersionChanged
        - setupChanged
        - steps
        - gates
        - artifacts
        - capabilities
        - externalOps
      properties:
        fromRevisionId: { type: string, format: uuid, nullable: true }
        toRevisionId: { type: string, format: uuid }
        schemaVersionChanged: { type: boolean }
        setupChanged: { type: boolean }
        steps: { $ref: "#/components/schemas/ContractDiff" }
        gates: { $ref: "#/components/schemas/ContractDiff" }
        artifacts: { $ref: "#/components/schemas/ContractDiff" }
        capabilities: { $ref: "#/components/schemas/ContractDiff" }
        externalOps: { $ref: "#/components/schemas/ContractDiff" }

    CreateProjectTokenBody:
      type: object
      description: (M16) Request body for creating a project API token.
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable label for the token (e.g. "CI pipeline").
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Optional expiry timestamp (ISO 8601). Omit or send `null` for a
            non-expiring token. Tokens past `expiresAt` return 401 on use.

    CreateProjectTokenResponse:
      type: object
      description: |
        (M16) Created token metadata plus the plaintext secret. The `token`
        field is shown ONCE — the server does not store it and cannot re-derive
        it. Subsequent list responses omit `token`.
      required: [id, name, prefix, token, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        prefix:
          type: string
          description: First 12 characters of the token string (used for lookup).
        token:
          type: string
          description: |
            Full plaintext token (`mai_` + base64url(32 bytes)). Returned ONCE.
            Store it now — the server only keeps the sha256 hash.
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true

    ProjectTokenListItem:
      type: object
      description: |
        (M16) Token metadata for the list endpoint. NEVER includes `token_hash`
        or the plaintext secret.
      required: [id, name, prefix, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        prefix:
          type: string
          description: First 12 characters of the token string.
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true

    ListProjectTokensResponse:
      type: object
      description: (M16) List of project API tokens without secrets.
      required: [tokens]
      properties:
        tokens:
          type: array
          items: { $ref: "#/components/schemas/ProjectTokenListItem" }
