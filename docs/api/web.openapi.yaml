  /api/projects:
    post:
      tags: [projects]
      summary: Register a project from a git URL or local directory
      description: |
        Admin-only (`requireGlobalRole("admin")`). Resolves the project
        source via `resolveProjectSource` (ADR-025) across **three onboarding
        modes** (Implemented,
        [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons)):
        `clone` (a `repoUrl` is cloned into `MAISTER_REPOS_ROOT`; refused with
        `PRECONDITION` if the target dir already exists — pass `target` to
        override; optional one-off HTTPS `token`), `existing` (an existing local
        dir named by `target`, `git init`-ed if not yet a repo), and `new`
        (greenfield `mkdir -p` + `git init`, only on an explicit `mode: new`).

        It then **stats `maister.yaml` v2** at `{resolvedDir}/maister.yaml`.
        **Present** → today's path (validate, derive slug from `project.name`
        kebab-case server-side, install each `flows[]` plugin). **Absent**
        (Implemented) → register from **DB defaults** with the repo untouched:
        `name = body.name || basename(resolvedDir)`, slug derived from it,
        `maister_yaml_path = null` (the "config lives only in the DB" signal),
        no flow/package install. Either path checks `slug` / `repo_path` /
        `taskKey` uniqueness, persists `projects` (incl. nullable `repo_url` +
        `provider`), and inserts a `project_members` row for the caller with
        `role = "owner"`.

        Phases and their error codes:
        1. Auth/authz — `UNAUTHENTICATED` (401) / `UNAUTHORIZED` or
           `PASSWORD_CHANGE_REQUIRED` (403)
        2. Resolve project source (clone / existing / new-empty git-init) —
           `PRECONDITION` (409) on clone failure (with advisory `reason` +
           redacted `detail`), missing dir, or a target/new path collision
        3. Stat `maister.yaml` — **present-but-invalid** → `CONFIG` (422);
           **missing** → DB-default branch (no 422)
        4. Slug/repo_path/taskKey collision check — `CONFLICT` (409)
        5. DB write (project + owner membership, plus executors/flows on the
           present-manifest path) in ONE transaction — `CONFIG` (422) on
           slug-derivation failure; a concurrent duplicate that races the
           collision check trips the unique constraint and is reported as
           `CONFLICT` (409).
        6. Flow plugin installs — `FLOW_INSTALL` (502). Registration is
           all-or-nothing: on any install failure the route fully
           compensates — deletes the `projects` row (FK cascade removes
           flows and the owner membership) and removes the
           slug-scoped artifact subtree — so the same `maister.yaml` can be
           retried with no leftover row. The shared, content-addressed system
           cache (`~/.maister/flows/<id>@<sha>`) is intentionally retained.

        Source: `web/app/api/projects/route.ts`.
      operationId: postProject
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostProjectBody" }
            examples:
              clone-from-url:
                summary: Clone a repo from a git URL
                value:
                  repoUrl: https://github.com/org/my-app
              clone-with-target-override:
                summary: Clone, overriding the on-disk directory name
                value:
                  repoUrl: https://github.com/org/my-app
                  target: my-app-fork
              clone-with-name-and-token:
                summary: (Implemented) Clone with explicit name + one-off HTTPS token
                value:
                  mode: clone
                  repoUrl: https://gitverse.ru/org/private-app
                  name: Private App
                  token: ghp_exampleTokenValueRedacted
              register-existing-local:
                summary: Register an existing local directory
                value:
                  target: /repos/my-app
              new-empty-project:
                summary: (Implemented) Create a brand-new empty local project
                value:
                  mode: new
                  name: greenfield-app
      responses:
        "201":
          description: |
            Project registered. Slug, ID, and the resolved `gitStatus` are
            returned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostProjectResponse" }
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller does not have global `admin` role (`UNAUTHORIZED`), or the
            authenticated account must change its password first
            (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            Either `slug` / `repo_path` / `taskKey` already registered
            (`CONFLICT`), or project-source resolution failed (`PRECONDITION`) —
            clone error, missing directory, a clone `target` path that already
            exists, or (`mode: new`) a path that already exists.

            **(Implemented)** A **clone-stage** `PRECONDITION` additionally carries
            advisory `reason` (classification of the git failure) and `detail`
            (redacted git stderr); `code` stays `PRECONDITION`. The UI maps
            `reason` → a specific remediation and never string-matches stderr.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CloneFailureBody" }
              examples:
                ssh-auth-failure:
                  summary: SSH key not loaded / rejected (clone PRECONDITION)
                  value:
                    code: PRECONDITION
                    message: Clone failed
                    reason: SSH_AUTH
                    detail: "git@host: Permission denied (publickey).\nfatal: Could not read from remote repository."
                slug-conflict:
                  summary: Slug already registered (CONFLICT — no clone reason)
                  value:
                    code: CONFLICT
                    message: A project with this slug is already registered.
        "422":
          description: |
            A **present** `maister.yaml` is invalid YAML, fails schema
            validation, or its `project.name` cannot be kebab-cased (`CONFIG`).
            A **missing** manifest does NOT 422 — it registers from DB defaults
            (Implemented,
            [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons)).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "502":
          description: |
            A Flow plugin `git clone` or manifest validation failed
            (`FLOW_INSTALL`). The whole registration is rolled back — the
            `projects` row is deleted (cascading to flows and the
            owner membership) and the slug-scoped artifact subtree is removed —
            so the identical request can be retried without a 409.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/projects/{slug}/persist-config:
    post:
      tags: [git]
      summary: (Implemented, ADR-093) Persist DB config to maister.yaml
      description: |
        **(Implemented,
        [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons).)**
        Opt-in: serialize the project's DB-held config into a complete,
        schema-valid `maister.yaml` v2 and **commit it on the main branch**,
        then flip `projects.maister_yaml_path`. The durable home for this
        action is **Project Settings → Git**; the dismissible banner is the
        nudge. `requireProjectAction(projectId, "editSettings")` — `slug` is a
        `url-param`, `projectId`/`repo_path` come from `server-state` (never the
        body).

        Order (multi-store; see ADR-093 crash-window recovery):
        (1) `atomicWriteText(maister.yaml)` → (2) commit (default identity
        `maister <noreply@maister.local>` only when the host author is unset →
        `usedDefaultAuthor: true`; a configured host author is never
        overridden) → (3) `UPDATE projects SET maister_yaml_path` →
        (4) optional `git push` when `push: true`. Idempotent-completing: if the
        file already exists at HEAD with identical content but the DB column is
        still null (a prior crash after commit), the route reconciles by
        flipping only. A push failure after the flip returns `200` with a
        `pushWarning` (persist already succeeded — never rolled back).

        Behavior contract:
        [`../system-analytics/projects.md`](../system-analytics/projects.md).
      operationId: postProjectPersistConfig
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PersistConfigBody" }
            examples:
              commit-only:
                summary: Commit the manifest, do not push
                value:
                  push: false
              commit-and-push:
                summary: Commit the manifest and push to the remote
                value:
                  push: true
      responses:
        "200":
          description: |
            Config persisted (file written + committed + DB flipped), or
            reconciled from a prior crash. `pushWarning` is present only when an
            opt-in push was requested and failed (persist still succeeded).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PersistConfigResponse" }
              examples:
                ok:
                  summary: Persisted, host author used, no push
                  value:
                    ok: true
                ok-default-author:
                  summary: Persisted with the default identity (host author unset)
                  value:
                    ok: true
                    usedDefaultAuthor: true
                ok-push-warning:
                  summary: Persisted, but the opt-in push failed
                  value:
                    ok: true
                    pushWarning: "push rejected (non-fast-forward); pull and retry"
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: |
            Either already persisted (`maister_yaml_path` is non-null →
            `CONFLICT`), or a precondition failed (`PRECONDITION`): the worktree
            is not a git repo, HEAD is not on the project's main branch, the
            tree is dirty, HEAD is detached, an unrelated `maister.yaml` already
            exists on disk, or the commit failed for a reason other than an
            unset author (e.g. hooks).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
              examples:
                already-persisted:
                  summary: maister.yaml already tracked
                  value:
                    code: CONFLICT
                    message: Project config is already persisted to maister.yaml.
                wrong-branch:
                  summary: HEAD is not on the main branch
                  value:
                    code: PRECONDITION
                    message: Persist requires HEAD on the project main branch.
  /api/projects/{slug}/remotes:
    get:
      tags: [git]
      summary: (Implemented, ADR-093) List git remotes
      description: |
        **(Implemented,
        [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons).)**
        Lists the repo's git remotes (`git remote -v`, de-duplicated to one row
        per name) with every URL **credential-redacted**.
        `requireProjectAction(projectId, "editSettings")`; `repo_path` from
        `server-state`. Behavior:
        [`../system-analytics/git-integration.md`](../system-analytics/git-integration.md).
      operationId: getProjectRemotes
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: The project's git remotes (URLs redacted).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RemotesListResponse" }
              examples:
                two-remotes:
                  summary: origin + a fork
                  value:
                    remotes:
                      - name: origin
                        url: https://github.com/org/my-app.git
                      - name: upstream
                        url: https://github.com/upstream/my-app.git
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [git]
      summary: (Implemented, ADR-093) Add a remote, or run a remote action
      description: |
        **(Implemented,
        [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons).)**
        Two shapes on one route. **Add** a remote with `{ name, url }`
        (`git remote add`); adding `origin` syncs `projects.repo_url` +
        `provider`. **Run an action** with
        `{ op: "push" | "fetch" | "set-upstream", name, ... }` — these reuse
        **host-ambient auth** and never write the DB; a failure is an advisory,
        nothing to roll back. `requireProjectAction(projectId, "editSettings")`;
        `repo_path` from `server-state`. Remote `name` is `body-controlled` →
        validated by the shared `remoteNameSchema` (dots/slashes allowed); `url`
        is scheme-allow-listed and redacted in every response.
      operationId: postProjectRemote
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RemotePostBody" }
            examples:
              add-origin:
                summary: Add origin (syncs repo_url + provider)
                value:
                  name: origin
                  url: git@github.com:org/my-app.git
              push:
                summary: Push a branch to a remote (host-ambient auth)
                value:
                  op: push
                  name: origin
                  branch: main
              fetch:
                summary: Fetch from a remote
                value:
                  op: fetch
                  name: origin
              set-upstream:
                summary: Set the upstream tracking branch
                value:
                  op: set-upstream
                  name: origin
                  branch: main
      responses:
        "200":
          description: |
            Action (`push` / `fetch` / `set-upstream`) completed, or completed
            with a non-fatal advisory in `warning`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RemoteActionResponse" }
              examples:
                pushed:
                  value:
                    ok: true
                push-warning:
                  value:
                    ok: true
                    warning: "push rejected (non-fast-forward)"
        "201":
          description: Remote added (URL redacted in the echoed row).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RemoteItemResponse" }
              examples:
                added:
                  value:
                    ok: true
                    remote:
                      name: origin
                      url: https://github.com/org/my-app.git
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: |
            `PRECONDITION` — invalid remote name/url, remote already exists
            (add), unknown remote (action), or the repo is not a git repo.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Malformed body (neither a valid add nor a known `op`) (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    patch:
      tags: [git]
      summary: (Implemented, ADR-093) Set a remote's URL
      description: |
        **(Implemented,
        [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons).)**
        `git remote set-url <name> <url>`. The remote `name` travels in the
        **body** (not the path) so names containing `/` or `.` work — the
        `[name]` path segment cannot represent them (owner decision). Setting
        `origin` syncs `projects.repo_url` + `provider`.
        `requireProjectAction(projectId, "editSettings")`; `repo_path` from
        `server-state`.
      operationId: patchProjectRemote
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RemoteSetUrlBody" }
            examples:
              set-origin-url:
                value:
                  name: origin
                  url: git@github.com:org/my-app.git
      responses:
        "200":
          description: Remote URL updated (URL redacted in the echoed row).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RemoteItemResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: "`PRECONDITION` — unknown remote, invalid url, or not a git repo."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Malformed body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    delete:
      tags: [git]
      summary: (Implemented, ADR-093) Remove a remote
      description: |
        **(Implemented,
        [ADR-093](../decisions.md#adr-093-project-onboarding--optional-maisteryaml-host-ambient-git-auth-onboarding-modes-advisory-clone-reasons).)**
        `git remote remove <name>`. The remote `name` travels in the **body**
        (same `/`-in-name reason as PATCH). Removing `origin` nulls
        `projects.repo_url` + `provider`.
        `requireProjectAction(projectId, "editSettings")`; `repo_path` from
        `server-state`.
      operationId: deleteProjectRemote
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RemoteDeleteBody" }
            examples:
              remove-upstream:
                value:
                  name: upstream
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: "`PRECONDITION` — unknown remote or not a git repo."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Malformed body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/projects/{slug}/agents:
    get:
      tags: [projects]
      summary: (M34 — Implemented) Attach-panel read model
      description: |
        Project membership `member`+. Returns agents attached to the project
        (link + overrides + trigger bindings) and agents available to
        attach — filtered to those whose providing package has a live
        enabled pin in THIS project (ADR-089 rework). `projectId` resolves
        from the URL slug (server-state).
      operationId: getProjectAgents
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Attached + available agents.
          content:
            application/json:
              schema:
                type: object
                required: [attached, available]
                properties:
                  attached:
                    type: array
                    items: { $ref: "#/components/schemas/AttachedAgent" }
                  available:
                    type: array
                    items: { $ref: "#/components/schemas/AgentSummary" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [projects]
      summary: (M34 — Implemented) Attach an agent to the project
      description: |
        Project `admin`+ (`editSettings`). Creates the
        `agent_project_links` row. `agentId` is package-qualified
        (`<flowRefId>:<stem>`) and its providing package must be
        configured+enabled in this project (`409 PRECONDITION` otherwise —
        ADR-089 rework); `runnerOverrideId` is validated against the
        enabled runner catalog. The attach panel pre-fills the bindings
        modal from the definition's `recommended` block; nothing applies
        without the explicit save.
      operationId: postProjectAgentLink
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agentId]
              additionalProperties: false
              properties:
                agentId: { type: string, pattern: "^[A-Za-z0-9._-]+(?::[A-Za-z0-9._-]+)?$" }
                enabled: { type: boolean, default: true }
                runnerOverrideId: { type: string, nullable: true }
      responses:
        "201":
          description: Attached.
          content:
            application/json:
              schema:
                type: object
                required: [ok, linkId]
                properties:
                  ok: { type: boolean }
                  linkId: { type: string, format: uuid }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Already attached, or unknown agent (`CONFLICT`/`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/projects/{slug}/agents/{agentId}:
    patch:
      tags: [projects]
      summary: (M34 — Implemented) Update an attachment (one aggregating endpoint)
      description: |
        Project `admin`+. Partial body in ONE server transaction: link
        fields (`enabled`, `runnerOverrideId` — explicit `null` clears) and
        the optional full replacement of the agent's trigger bindings for
        this project (`schedules` — cron rows croner-validated, event rows
        validated against the ADR-086 kind taxonomy).
      operationId: patchProjectAgentLink
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: agentId
          in: path
          required: true
          schema: { type: string, pattern: "^[A-Za-z0-9._-]+(?::[A-Za-z0-9._-]+)?$" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                enabled: { type: boolean }
                runnerOverrideId: { type: string, nullable: true }
                schedules:
                  type: array
                  items: { $ref: "#/components/schemas/AgentScheduleBody" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: No attachment for this (project, agent).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid cron expression / timezone / event kinds (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    delete:
      tags: [projects]
      summary: (M34 — Implemented) Detach an agent from the project
      description: |
        Project `admin`+. Removes the link and its trigger bindings, and
        revokes every live agent token for this (agent, project) pair
        (ADR-089 rotation guarantee).
      operationId: deleteProjectAgentLink
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: agentId
          in: path
          required: true
          schema: { type: string, pattern: "^[A-Za-z0-9._-]+(?::[A-Za-z0-9._-]+)?$" }
      responses:
        "204": { description: Detached. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: No attachment for this (project, agent).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/projects/{slug}/agents/{agentId}/launch:
    post:
      tags: [projects]
      summary: (M34 — Implemented) Manually launch an agent run
      description: |
        Project membership `member`+ (`launchRun`). Identifiers: `slug` and
        `agentId` are url-params; body `taskId` (optional task-bound context)
        is validated to belong to the project; body `runnerId` (optional
        launch override, tier 1 of the standalone chain) is validated against
        the enabled runner catalog. Refusals: disabled/quarantined agent,
        `risk_tier=destructive` (ADR-041 gate), `manual` missing from the
        agent's `triggers`, or a dirty `repo_read` baseline → `409
        PRECONDITION`; runner resolution/incompatibility → `503
        EXECUTOR_UNAVAILABLE`. Over-budget runs queue as `Pending`.
      operationId: postProjectAgentLaunch
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: agentId
          in: path
          required: true
          schema: { type: string, pattern: "^[A-Za-z0-9._-]+(?::[A-Za-z0-9._-]+)?$" }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                taskId: { type: string, format: uuid }
                runnerId: { type: string }
      responses:
        "202":
          description: Agent run created (`Running` or queued `Pending`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentLaunchResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Launch precondition failed (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body or route parameter encoding (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: Runner unavailable or incompatible (`EXECUTOR_UNAVAILABLE`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/agents/{agentId}/event:
    post:
      tags: [agents]
      summary: (M34 — Implemented) Inbound webhook trigger for an agent
      description: |
        Authenticated by a **bearer project token** carrying the
        `agents:trigger` scope (the only token-authenticated route outside
        `/api/v1/ext`). The project is derived from the token
        (auth-context) and validated against the agent's enabled
        attachments — no body-controlled project identifier. The JSON body
        (≤ 32 KB) is stored verbatim as `runs.trigger_payload` and appended
        to the agent's prompt context. Refusals mirror the manual launch
        (`webhook` must be in the agent's `triggers`).
      operationId: postAgentEvent
      parameters:
        - name: agentId
          in: path
          required: true
          schema: { type: string, pattern: "^[A-Za-z0-9._-]+(?::[A-Za-z0-9._-]+)?$" }
        - name: X-Maister-Trigger-Event-Id
          in: header
          required: false
          description: Optional positive integer idempotency key. When present, redelivery converges through the run claim key `(agent_id, trigger_event_id)`.
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Free-form JSON payload, ≤ 32 KB serialized.
      responses:
        "202":
          description: Agent run created (`Running` or queued `Pending`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentLaunchResult" }
        "401":
          description: Missing/invalid token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: Token lacks `agents:trigger`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "404":
          description: Agent unknown or not attached to the token's project.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: Launch precondition failed or trigger already claimed (`PRECONDITION`/`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "413":
          description: Payload over 32 KB.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid JSON, route parameter encoding, or trigger id header (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: Runner unavailable or incompatible (`EXECUTOR_UNAVAILABLE`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/projects/{slug}/files:
    get:
      tags: [projects]
      summary: Implemented (M22) — list git-tracked project-repo files (one level)
      description: |
        Requires the `readRepoFiles` action (project `member`). Lists git-tracked
        entries one level under `?path=` via `git ls-tree` against
        `projects.main_branch` HEAD (server-state `ref`) of `projects.repo_path`.
        Tracked-only (same boundary as the run file routes). `?path=` validated by
        `repoRelPathSchema`.
      operationId: listProjectFiles
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: path
          in: query
          required: false
          description: Repo-relative directory (default = repo root). Validated by `repoRelPathSchema`.
          schema: { type: string }
      responses:
        "200":
          description: One-level tracked file/dir listing.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FileTreeResponse" }
        "400":
          $ref: "#/components/responses/Config"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/projects/{slug}/capability-catalog:
    get:
      tags: [projects]
      summary: Implemented — unified composer capability catalog (skills ∪ claude-only subagents) (FR-B2)
      description: |
        (Implemented — capability composer, FR-B2/B3) Returns the project's
        enabled+trusted skills — each with its install-captured
        `description`/`argHint` and the per-runner `surfaceForm` — plus claude-only
        coder subagents, for the unified composer's static autocomplete. Requires
        the `readBoard` action (project `viewer`); the project is resolved from
        `slug` (server-state) and 404s when missing/archived. `?agent=` selects the
        runner whose surface forms + subagent inclusion are computed; an unknown
        value falls back to `claude`. Switching `?agent=` flips skill surface forms
        and subagent inclusion with no other change.
      operationId: getProjectCapabilityCatalog
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: agent
          in: query
          required: false
          description: Capability runner id (claude/codex/gemini/opencode/mimo). Unknown → claude.
          schema: { type: string, default: claude }
      responses:
        "200":
          description: The project+runner capability catalog (possibly empty).
          content:
            application/json:
              schema:
                type: object
                required: [capabilities]
                properties:
                  capabilities:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectCapabilityCatalogEntry"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/projects/{slug}/tasks:
    post:
      tags: [projects]
      summary: Create a task on a project board
      description: |
        Requires project membership at `member` or above
        (`requireProjectAction("createTask")`). The `projectId` is
        resolved from the URL `slug` (server-state), never from the body.

        Validates that `flowId` belongs to the project. Runner selection is not
        part of task creation; one-run overrides belong to `POST /api/runs`.

        Source: `web/app/api/projects/[slug]/tasks/route.ts`.
      operationId: postTask
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostTaskBody" }
            examples:
              create-task:
                summary: Create a bugfix task
                value:
                  title: "Fix off-by-one in pagination"
                  prompt: "The `/users` endpoint returns page 2 when page 1 is requested..."
                  flowId: "flow-uuid-here"
      responses:
        "201":
          description: |
            Task created in `Backlog`. (ADR-075, Implemented) `number` and
            `taskKey` are returned additively — the task's `KEY-N` identity.
          content:
            application/json:
              schema:
                type: object
                required: [taskId]
                properties:
                  taskId:
                    type: string
                    format: uuid
                  number:
                    type: integer
                    minimum: 1
                    description: (ADR-075, Implemented) Per-project task number.
                  taskKey:
                    type: string
                    pattern: "^[A-Z][A-Z0-9]{1,9}$"
                    description: (ADR-075, Implemented) The project's task key.
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller is not a `member` or above for this project
            (`UNAUTHORIZED`), or the authenticated account must change its
            password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: Project not found or archived (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: |
            `flowId` not configured for this project, or a retired runner
            override field was supplied (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/projects/{slug}/tasks/{number}:
    patch:
      tags: [projects]
      summary: (M34 — Implemented) Update task launch-verdict fields (one aggregating endpoint)
      description: |
        Project membership `member`+. The board card's launch popover persists
        flow/runner/branch/policy edits here in ONE transaction before
        launching. Partial body, at least one field; an explicit `null`
        CLEARS a field (SET/CLEAR symmetric). `flowId` is validated against
        the project's flows, `runnerId` against the enabled runner catalog,
        `targetBranch` against git ref-name shape. Does NOT touch
        `triage_status` — that is the triager's mark (ext triage op) or the
        send-to-triage action.
      operationId: patchTask
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: number
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              minProperties: 1
              properties:
                flowId: { type: string, nullable: true }
                runnerId: { type: string, nullable: true }
                targetBranch: { type: string, nullable: true, maxLength: 255 }
                promotionMode:
                  type: string
                  nullable: true
                  enum: [local_merge, pull_request, null]
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Unknown task number for this project.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Unknown `flowId`/`runnerId`, bad ref name, or empty body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/projects/{slug}/tasks/{number}/send-to-triage:
    post:
      tags: [projects]
      summary: (M34 — Implemented) Re-queue a task for triage
      description: |
        Project membership `member`+. In ONE transaction: sets
        `tasks.triage_status = NULL`, emits the first `task.triage_requeued`
        domain event (the kind ADR-086 registered emitter-less), and records
        a `triage_requeued` activity entry. Subscribed triager agents pick
        the event up on the next dispatch tick.
      operationId: postTaskSendToTriage
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: number
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Re-queued.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Unknown task number for this project.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/projects/{slug}/tasks/{number}/comments:
    get:
      tags: [social-board]
      summary: (ADR-075, Implemented) List comments on a task
      description: |
        Requires project membership at `viewer` or above
        (`requireProjectAction("readBoard")`). The project is resolved from
        the URL `slug` and the task from `(project_id, number)` — both
        server-state; no body identifiers. Bodies are returned as stored:
        markdown with `KEY-N` mentions already expanded at write time
        (ADR-075 D6). Ordered by `created_at` ascending.

        Source: `web/app/api/projects/[slug]/tasks/[number]/comments/route.ts`.
      operationId: listTaskComments
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: number
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Comment list (ascending `created_at`).
          content:
            application/json:
              schema:
                type: object
                required: [comments]
                properties:
                  comments:
                    type: array
                    items: { $ref: "#/components/schemas/TaskCommentDTO" }
        "400":
          $ref: "#/components/responses/Config"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [social-board]
      summary: (ADR-075, Implemented) Add a comment to a task
      description: |
        Requires project membership at `member` or above
        (`requireProjectAction("commentTask")`). The project is resolved
        from the URL `slug`, the task from `(project_id, number)` — both
        server-state. The actor is the session user (auth-context). The body
        carries only `{ body }`; `KEY-N` tokens inside it are content,
        resolved against the DB at write time (unresolved tokens stay
        literal text).

        Runs the full ADR-075 D7 pipeline in ONE transaction: mention
        expansion → comment insert → `comment_added` / `task_mentioned`
        activity → subscription upserts (commenter + mention rule) → inbox
        fanout excluding the actor.

        Source: `web/app/api/projects/[slug]/tasks/[number]/comments/route.ts`.
      operationId: postTaskComment
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: number
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostTaskCommentBody" }
            examples:
              comment-with-mention:
                summary: Comment mentioning another task
                value:
                  body: "Blocked until MAI-12 ships the schema."
      responses:
        "201":
          description: Comment created; stored body has mentions expanded.
          content:
            application/json:
              schema:
                type: object
                required: [comment]
                properties:
                  comment: { $ref: "#/components/schemas/TaskCommentDTO" }
        "400":
          description: Empty or oversized body, invalid shape (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/projects/{slug}/tasks/{number}/relations:
    post:
      tags: [social-board]
      summary: (ADR-075, Implemented) Add a typed relation from this task
      description: |
        Requires `requireProjectAction("manageTaskRelations")` (`member`).
        Creates the canonical one-direction relation
        `(from = task {number}, kind, to = task {toNumber})`. `kind` is
        allow-list validated; `toNumber` is body-controlled but resolved
        STRICTLY within the URL-param project via `(project_id, number)` —
        cross-project reach is impossible by construction. Duplicate
        relations are idempotent no-ops (`ON CONFLICT DO NOTHING`).
        Inverse labels ("blocked by", "required by", "child of") are
        render-time only — to remove an inverse-rendered relation, address
        the counterpart task's route (the canonical `from` end).

        Writes `relation_added` activity in the same transaction.

        Source: `web/app/api/projects/[slug]/tasks/[number]/relations/route.ts`.
      operationId: postTaskRelation
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: number
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskRelationBody" }
            examples:
              blocks:
                summary: This task blocks task 5
                value: { kind: blocks, toNumber: 5 }
      responses:
        "200":
          description: |
            Relation exists (created now, or already present — idempotent).
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "400":
          description: |
            Invalid `kind`, self-relation (`toNumber` equals `{number}`),
            or malformed body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: |
            Project, task, or counterpart task (`toNumber`) not found in
            this project.
    delete:
      tags: [social-board]
      summary: (ADR-075, Implemented) Remove a typed relation from this task
      description: |
        Requires `requireProjectAction("manageTaskRelations")` (`member`).
        Deletes the canonical row `(from = task {number}, kind,
        to = task {toNumber})`. Removing an absent relation is an idempotent
        no-op. Writes `relation_removed` activity when a row was deleted.

        Source: `web/app/api/projects/[slug]/tasks/[number]/relations/route.ts`.
      operationId: deleteTaskRelation
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: number
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskRelationBody" }
      responses:
        "200":
          description: Relation absent (deleted now, or never existed).
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "400":
          $ref: "#/components/responses/Config"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/projects/{slug}/tasks/{number}/subscription:
    post:
      tags: [social-board]
      summary: (ADR-075, Implemented) Follow a task (manual subscription)
      description: |
        Requires project membership at `viewer` or above
        (`requireProjectAction("readBoard")`). Subscribes the SESSION USER
        (auth-context — never a body-supplied subscriber) to the task with
        reason `manual`. Idempotent: an existing subscription (any reason)
        is kept — the first reason wins.

        Source: `web/app/api/projects/[slug]/tasks/[number]/subscription/route.ts`.
      operationId: followTask
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: number
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Session user is subscribed.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [social-board]
      summary: (ADR-075, Implemented) Unfollow a task
      description: |
        Requires project membership at `viewer` or above. Removes the
        SESSION USER's subscription regardless of reason. Idempotent.

        Source: `web/app/api/projects/[slug]/tasks/[number]/subscription/route.ts`.
      operationId: unfollowTask
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, minLength: 1 }
        - name: number
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Session user is not subscribed.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/inbox/{itemId}/read:
    patch:
      tags: [social-board]
      summary: (ADR-075, Implemented) Mark an inbox item read
      description: |
        Session-auth. Sets `read_at` on the addressed `inbox_items` row ONLY
        when its recipient pair equals `('user', session user id)`
        (auth-context ownership). Another user's item — or a missing one —
        answers 404 (existence-hide). Already-read items are idempotent
        no-ops.

        Source: `web/app/api/inbox/[itemId]/read/route.ts`.
      operationId: markInboxItemRead
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Item is read.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          description: |
            Item not found, or owned by a different recipient
            (existence-hide).
  /api/inbox/read-all:
    post:
      tags: [social-board]
      summary: (ADR-075, Implemented) Mark all of the caller's inbox items read
      description: |
        Session-auth. Sets `read_at` on every unread `inbox_items` row whose
        recipient pair equals `('user', session user id)`. Scope is the
        session user only — no body identifiers.

        Source: `web/app/api/inbox/read-all/route.ts`.
      operationId: markInboxAllRead
      responses:
        "200":
          description: All of the caller's items are read.
          content:
            application/json:
              schema:
                type: object
                required: [ok, updated]
                properties:
                  ok: { type: boolean, enum: [true] }
                  updated:
                    type: integer
                    minimum: 0
                    description: Number of rows transitioned to read.
        "401":
          $ref: "#/components/responses/Unauthenticated"
  /api/projects/{slug}/members:
    get:
      tags: [projects]
      summary: List project members
      description: |
        Requires project membership at `viewer` or above
        (`requireProjectAction("readBoard")`). Returns all active members for
        the project. `slug` is resolved server-side; no body-controlled
        project identifiers are accepted.
      operationId: listProjectMembers
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Project member list.
          content:
            application/json:
              schema:
                type: object
                required: [members]
                properties:
                  members:
                    type: array
                    items: { $ref: "#/components/schemas/ProjectMember" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
    post:
      tags: [projects]
      summary: Add a member to a project
      description: |
        Requires the `manageMembers` action (project admin or global admin).
        Adds an existing platform user to the project with the specified role.
        `slug` is resolved server-side. Returns `409` if the user is already a
        member (`CONFLICT`) or the `userId` does not correspond to a known
        platform user (`PRECONDITION`).
      operationId: addProjectMember
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddProjectMemberBody" }
      responses:
        "201":
          description: Member added.
          content:
            application/json:
              schema:
                type: object
                required: [memberId]
                properties:
                  memberId: { type: string }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: |
            Project not found or archived (`PRECONDITION`), user is already a
            member of this project (`CONFLICT`), or the supplied `userId` does
            not match any platform user (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/projects/{slug}/members/candidates:
    get:
      tags: [projects]
      summary: List platform users eligible to be added as project members
      description: |
        Requires the `manageMembers` action (project admin or global admin).
        Returns platform users who are NOT already members of this project.
        Optional `q` filters by name or email prefix (case-insensitive).
        `slug` is resolved server-side.
      operationId: listMemberCandidates
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: q
          in: query
          required: false
          description: Optional name/email filter prefix.
          schema: { type: string }
      responses:
        "200":
          description: Candidate users not yet members of this project.
          content:
            application/json:
              schema:
                type: object
                required: [candidates]
                properties:
                  candidates:
                    type: array
                    items: { $ref: "#/components/schemas/MemberCandidate" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }

  /api/projects/{slug}/members/{memberId}:
    patch:
      tags: [projects]
      summary: Update a project member's role
      description: |
        Requires the `manageMembers` action (project admin or global admin).
        Changes the role of an existing project member. `slug` and `memberId`
        are resolved server-side. Returns `409` on a concurrent stale-update
        race (`CONFLICT`).
      operationId: updateProjectMemberRole
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: memberId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProjectMemberRoleBody" }
      responses:
        "200":
          description: Member role updated.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Project not found or archived (`PRECONDITION`), or concurrent update race (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body — bad/missing `role` or `expectedRole` (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    delete:
      tags: [projects]
      summary: Remove a member from a project
      description: |
        Requires the `manageMembers` action (project admin or global admin).
        Removes the project membership row. `slug` and `memberId` are resolved
        server-side. Returns `409` on a concurrent race (`CONFLICT`).
      operationId: removeProjectMember
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: memberId
          in: path
          required: true
          schema: { type: string }
        - name: expectedRole
          in: query
          required: true
          description: |
            The role the caller observed in the roster. The delete is a CAS:
            it only removes the row when it still holds this role, else `409`
            (`CONFLICT`) on a concurrent stale-remove race.
          schema: { $ref: "#/components/schemas/ProjectMemberRole" }
      responses:
        "200":
          description: Member removed.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Project not found or archived (`PRECONDITION`), or concurrent race (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Missing or invalid `expectedRole` query parameter (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/projects/{slug}/assignments:
    get:
      tags: [assignments]
      summary: List project assignments
      description: |
        M13 work-queue read model. Requires project visibility
        (`requireProjectAction("readBoard")`). The URL `slug` resolves the
        project id from server state; the route accepts no body-controlled
        project/run/user identifiers.
      operationId: getProjectAssignments
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Project assignments visible to the caller.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssignmentList" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/Precondition" }
  /api/assignments/{assignmentId}/claim:
    post:
      tags: [assignments]
      summary: Claim an open assignment
      description: |
        Claims an assignment for the current Auth.js user actor. The route
        derives project, run, and actor ids from server state and ignores any
        cross-resource ids in the body.
      operationId: claimAssignment
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Claimed assignment DTO.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Assignment" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/Precondition" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/assignments/{assignmentId}/release:
    post:
      tags: [assignments]
      summary: Release a claimed assignment
      description: |
        Reopens a claim held by the current actor. Body may carry a reason
        string only; actor/project/run ids are always server-derived.
      operationId: releaseAssignment
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssignmentReasonBody" }
      responses:
        "200":
          description: Reopened assignment DTO.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Assignment" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/Precondition" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }
  /api/assignments/{assignmentId}/take-over:
    post:
      tags: [assignments]
      summary: Deliberately take over another actor's assignment claim
      description: |
        Transfers a claim from its current actor to the current Auth.js user
        actor and appends a `taken_over` assignment event. Body may carry a
        reason string only.
      operationId: takeOverAssignment
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssignmentReasonBody" }
      responses:
        "200":
          description: Transferred assignment DTO.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Assignment" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/Precondition" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }
  /api/auth/{nextauth}:
    get:
      tags: [auth]
      summary: Auth.js v5 credentials handler (GET)
      description: |
        Auth.js v5 catch-all handler at `/api/auth/[...nextauth]`. Handles
        the standard Auth.js sub-paths: `session`, `csrf`, `providers`,
        `signout` (GET form), and callback redirects.

        Implemented by `auth()` exported from `web/auth.ts` (the full
        Node.js runtime config with the Drizzle adapter). The edge-safe
        split config lives in `web/auth.config.ts` (credentials provider
        definition + `authorized` callback for middleware).

        MAIster ships **credentials-only** authentication. OAuth providers
        are not configured. The `accounts`, `sessions`, and
        `verification_tokens` tables exist for the Drizzle adapter
        contract.

        Do not enumerate sub-paths here — see the Auth.js v5 docs for the
        canonical path list. Source: `web/auth.ts`, `web/auth.config.ts`.
      operationId: authGet
      parameters:
        - name: nextauth
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Auth.js response (session JSON, CSRF token, etc.).
        "302":
          description: Redirect (sign-in / sign-out flow).
    post:
      tags: [auth]
      summary: Auth.js v5 credentials handler (POST)
      description: |
        Handles `signIn` (credentials), `signOut`, and callback POSTs.
        Sign-in validates `email` + `password` against the `users` table
        (`bcrypt` hash comparison). On success the session is persisted via
        the Drizzle adapter and the session cookie is set.

        `users.role` (global role: `admin | member | viewer`) is surfaced
        on the session, but `lib/authz.ts` re-reads the live role from the DB
        on every authorization check (the cached JWT role is not trusted; a
        deleted user invalidates the session). The single bootstrap admin is
        seeded by migration `0005` (`admin@maister.local`, `must_change_password
        = true`); public registration creates `member` with
        `account_status=pending`.
      operationId: authPost
      parameters:
        - name: nextauth
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
                csrfToken: { type: string }
      responses:
        "200":
          description: Auth.js response (session update, sign-out confirmation).
        "302":
          description: Redirect after sign-in / sign-out.
        "401":
          description: Invalid credentials.

  /api/auth/register:
    post:
      tags: [auth]
      summary: Register a pending user account
      description: |
        Public registration route. Body-controlled fields are `name`, `email`,
        and `password`; the server lowercases email, hashes the password, and
        creates `users.role = "member"` with `account_status = "pending"`.
        The route does not sign the user in. Admin activation through
        `PATCH /api/admin/users/{userId}` (`status: active`) is required
        before credentials sign-in succeeds.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterUserBody" }
      responses:
        "201":
          description: Pending account created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegisterUserResponse" }
        "409":
          description: Email already registered (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/admin/users:
    post:
      tags: [admin]
      summary: Create a user account
      description: |
        Admin-only (`requireGlobalRole("admin")`). Creates a new user account.
        When `password` is omitted the server generates a secure temporary
        password. The `tempPassword` in the response is shown once in
        plaintext and is never re-readable — store or convey it immediately.
      operationId: createAdminUser
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminCreateUserBody" }
      responses:
        "201":
          description: |
            User created. `tempPassword` is the plaintext credential shown
            once — the server stores only its bcrypt hash.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminCreateUserResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Email already registered (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/admin/users/{userId}:
    patch:
      tags: [admin]
      summary: Update a user account (aggregating)
      description: |
        Admin-only (`requireGlobalRole("admin")`). Aggregating PATCH — supply
        any combination of `role`, `status`, `password`, `mustChangePassword`,
        `name`, or `email`; at least one field is required. The route prevents
        self-disable, self-demotion, and removing the last active admin
        (`PRECONDITION`). A duplicate `email` returns `CONFLICT` (409).
      operationId: updateAdminUser
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminUpdateUserBody" }
      responses:
        "200":
          description: User updated.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: |
            Duplicate email (`CONFLICT`), or self-disable / self-demote /
            last-active-admin invariant violated (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body or no fields supplied (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    delete:
      tags: [admin]
      summary: Hard-delete an unused user account
      description: |
        Admin-only (`requireGlobalRole("admin")`). Permanently removes the
        account. Eligible accounts are those that are `pending`, have never
        signed in, and have no content references (runs, tasks, assignments,
        project memberships, token ownership/creation metadata). Accounts that
        do not meet this predicate should be disabled instead. The route
        prevents self-delete (`PRECONDITION`).
      operationId: deleteAdminUser
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: User deleted.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: |
            Account is not eligible for hard-delete — it is not `pending`,
            has signed in, or has content references (`PRECONDITION`); or
            the caller is attempting to self-delete (`PRECONDITION`). Use
            the aggregating PATCH to disable instead.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/runs:
    post:
      tags: [runs]
      summary: Launch a new run or rerun for a task
      description: |
        Requires an active session (`requireActiveSession` — authenticated and
        with no pending forced password change) AND project membership at
        `member` or above (`requireProjectAction("launchRun")`). The
        `projectId` is derived from the task row, never from the body.

        ADR-085 broadens manual launchability: `Done`, `Review`, `Failed`,
        `Abandoned`, and `Crashed` tasks/runs can launch a new attempt through
        the same `launchRun` service. Actively executing states and
        relation-blocked tasks are refused with typed disabled reasons that the
        UI also receives from `GET /api/runs/launch-options`.

        Body-controlled `flowId`, `runnerId`, branches, and
        `deliveryPolicy` are validated against server-state for the task's
        project. A selected Flow must be enabled for the same project; policy
        defaults are resolved project default -> launch override and snapshotted
        on the created run.

        After auth, project, Flow, and platform runner checks pass, the web tier
        calls the supervisor `GET /health` through
        `web/lib/supervisor-client.ts`. If the supervisor is unreachable,
        times out, returns non-200, or returns a malformed body, this route
        fails with `503 EXECUTOR_UNAVAILABLE` before creating a git worktree,
        run row, workspace row, or task status transition.

        Implemented (FR-F1/F2, T6.3): content-negotiated. A board client that
        sends `Accept: text/event-stream` receives the staged launch progress on
        this response (`scratch.launch_progress` frames in order `precondition →
        worktree_created → materializing(<adapter>)` — flow launch has NO
        synchronous session spawn, so `spawning`/`session_ready` are scratch-only
        — then a terminal `scratch.launch_result` frame wrapping
        `PostRunResponse`, or an `error` frame on post-open failure). Every other
        caller gets the unchanged JSON 202. Preconditions throw BEFORE the stream
        opens either way → JSON error with the HTTP status below.
      operationId: postRun
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostRunBody" }
      responses:
        "200":
          description: |
            Staged launch-progress stream (`text/event-stream`), returned only
            when the request `Accept`s it. Emits `scratch.launch_progress` frames
            then a terminal `scratch.launch_result` frame wrapping
            `PostRunResponse`, or an `error` frame carrying a `MaisterError` code.
          content:
            text/event-stream:
              schema:
                type: string
                description: >-
                  SSE frames, one per `data: <json>\n\n` line (no `id:` —
                  not durable). See the operation description for the frame union.
        "202":
          description: Run accepted (JSON path). May be Pending (queued) or Running.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostRunResponse" }
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller is not a `member` or above for this project
            (`UNAUTHORIZED`), or the authenticated account must change its
            password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "400":
          description: |
            Bad request (`CONFIG`): a malformed request body, an unsupported
            manifest `schemaVersion` / engine incompatibility, unresolved
            Flow runner remapping, or a node whose `enforcement: strict` declares a
            capability class the build cannot strictly enforce
            (settings-enforcement refusal, M11c — see error-taxonomy.md).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            Precondition failed. Examples: task is busy or relation-blocked,
            project archived, flow not enabled for this project, runner not
            valid for the chosen Flow, branch / worktree path already in use,
            target/base branch not in the allow-list, scheduler cap full, or
            delivery policy target invalid.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            Platform runner or supervisor unavailable (`EXECUTOR_UNAVAILABLE`).
            Includes missing platform runner/default resolution and supervisor
            readiness failure before launch side effects.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/scratch-runs/launch-options:
    get:
      tags: [scratch-runs]
      summary: Implemented — list scratch-run launch choices (also the M18 board branch source)
      description: |
        Requires an active session (`requireActiveSession` — session-authed and
        project-read-scoped; an unauthenticated request returns `401`). Returns
        only projects, platform ACP runners, base branches, and capabilities
        visible to the caller. Secret provider fields are never returned.
        Optional `projectId` filters the response after membership is verified
        — a project outside the caller's visible set returns `409`
        (`PRECONDITION`). Response values are hints for the launcher;
        `POST /api/scratch-runs` revalidates every identifier from server state.

        Task launch uses `GET /api/runs/launch-options` as of ADR-085. Scratch
        launch-options remain the scratch-workspace source and still expose the
        reusable `branches` + `defaultBaseBranch` subset formalized as
        `BranchOptions`.
      operationId: getScratchRunLaunchOptions
      parameters:
        - name: projectId
          in: query
          required: false
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: |
            Launch options visible to the caller. The `branches` +
            `defaultBaseBranch` subset is the `BranchOptions` shape the M18
            board task-launch UI consumes (the full DTO is a superset).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BranchOptions"
                  - $ref: "#/components/schemas/ScratchLaunchOptionsResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Filtered project not found or not visible (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/scratch-runs:
    post:
      tags: [scratch-runs]
      summary: Implemented — launch a manual scratch workspace
      description: |
        Requires project membership at `member` or above
        (`requireProjectAction("launchRun")`). Body-controlled identifiers are
        limited to project, optional runner override, optional linked task,
        branch choices,
        attachments, and selected capability ids. The body MUST NOT include
        `runId`, `projectSlug`, `worktreePath`, `stepId`,
        `supervisorSessionId`, `acpSessionId`, or capability profile paths.

        No-side-effect gates run before filesystem, DB, capability, or
        supervisor side effects: auth/authz, project archived check, executor
        ownership, optional task ownership, branch/base-ref safety, selected
        capability visibility, supervisor readiness, and shared live-session
        capacity. Scratch v1 rejects when capacity is full and does not queue.

        Accepts JSON for text/metadata-only launches and multipart form data
        for binary uploads. Multipart requests carry a JSON `payload` field
        matching `PostScratchRunBody` plus `files` parts. Uploaded files are
        stored under the run artifact tree, never in the git worktree; accepted
        upload count/bytes are INFO logged, and rejected uploads are WARN
        logged without file contents.

        Implemented (FR-F1/F2, sub-plan 2026-06-17, Option 2): once the
        no-side-effect gates pass, the launch streams staged progress on its OWN
        `text/event-stream` response — `data: {"type":"scratch.launch_progress",
        "stage":…,"adapter"?}` frames in order `precondition → worktree_created
        → materializing(<adapter>) → spawning → session_ready`, then a terminal
        `data: {"type":"scratch.launch_result","result":<ScratchRunResponse>}`
        frame. A failure AFTER the stream opens is a
        `data: {"type":"error","code":<MaisterError>,"message"}` frame; a client
        disconnect cancels the launch and GCs the worktree/session. Frames carry
        no `id:` line (not durable). The gate failures BELOW stay JSON errors
        with their HTTP status because they precede the stream.
      operationId: postScratchRun
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostScratchRunBody" }
          multipart/form-data:
            schema: { $ref: "#/components/schemas/ScratchRunMultipartBody" }
      responses:
        "200":
          description: |
            Staged launch-progress stream (`text/event-stream`). Emits
            `scratch.launch_progress` frames then a terminal
            `scratch.launch_result` frame wrapping `ScratchRunResponse`, or an
            `error` frame carrying a `MaisterError` code on post-open failure.
          content:
            text/event-stream:
              schema:
                type: string
                description: >-
                  SSE frames, one per `data: <json>\n\n` line (no `id:` —
                  not durable). See the operation description for the frame union.
        "400":
          description: Malformed JSON, multipart payload, or schema (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: |
            Branch/worktree/capacity conflict or precondition failure
            (`CONFLICT` / `PRECONDITION`). Includes invisible project,
            invalid branch, invalid filename/path, too many files, oversized
            file, and oversized total multipart payload.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: Supervisor readiness, executor unavailable, or file-storage infrastructure failure (`EXECUTOR_UNAVAILABLE`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/scratch-runs/{runId}:
    get:
      tags: [scratch-runs]
      summary: Implemented — read scratch dialog state
      description: |
        Requires project membership at `viewer` or above. `runId` comes from
        the URL; project, workspace, supervisor session, ACP session, and
        capability profile paths are derived from server state.
      operationId: getScratchRun
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Scratch run detail, messages, attachments, and capability snapshot.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScratchRunDetail" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Scratch run not found or not scratch (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    patch:
      tags: [scratch-runs]
      summary: Implemented — rename a scratch run
      description: |
        Requires project membership at `member` or above (`renameScratchRun`).
        `runId` comes from the URL; the project is derived from server state
        (the run row), never the body. The body carries only the new `name`
        (trimmed, 1..200 chars). Flow / agent runs are renamed by editing their
        task, not here.
      operationId: renameScratchRun
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 200
                  pattern: "\\S"
                  description: >-
                    New scratch-run name. The server trims surrounding
                    whitespace before validating; the trimmed value must be
                    1..200 characters and contain at least one non-whitespace
                    character (a blank or whitespace-only name is rejected with
                    `CONFIG`/400). Unknown properties in the body are ignored.
      responses:
        "200":
          description: Scratch run renamed; echoes the stored (trimmed) name.
          content:
            application/json:
              schema:
                type: object
                required: [ok, name]
                properties:
                  ok: { type: boolean, enum: [true] }
                  name: { type: string }
        "400":
          description: Missing, empty, or over-long name (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Scratch run not found or not scratch (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/scratch-runs/{runId}/messages:
    post:
      tags: [scratch-runs]
      summary: Implemented — send a scratch dialog message
      description: |
        Requires project membership at `member` or above. The route appends the
        next user message under a row lock, rejects concurrent prompts, then
        calls supervisor `POST /sessions/{sessionId}/prompt`. The body carries
        message content and attachment refs only. It MUST NOT include session
        ids, project slug, worktree path, step id, or message sequence.
        Accepts JSON for text/metadata-only messages and multipart form data
        with a JSON `payload` plus binary `files` parts.
      operationId: postScratchRunMessage
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostScratchMessageBody" }
          multipart/form-data:
            schema: { $ref: "#/components/schemas/ScratchMessageMultipartBody" }
      responses:
        "202":
          description: Message accepted and prompt dispatch started.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScratchMessageResponse" }
        "400":
          description: Malformed JSON, multipart payload, or schema (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: |
            Scratch run not found, not scratch, already has a prompt running,
            not input-ready, invalid upload filename/path, too many files,
            oversized file, or oversized total multipart payload
            (`PRECONDITION` / `CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: Supervisor prompt delivery or file-storage infrastructure failed retryably (`EXECUTOR_UNAVAILABLE`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/scratch-runs/{runId}/commands:
    get:
      tags: [scratch-runs]
      summary: Designed — live availableCommands snapshot for a scratch run (FR-A2)
      description: |
        (Designed — capability composer, FR-A1…A3) Returns the latest ACP
        `available_commands_update` snapshot captured for the run's live session
        (last-write-wins), for the running-scratch composer's autocomplete.
        Requires project membership at `viewer` or above. `runId` is the URL
        param; the supervisor session is resolved from server state (the run
        row / registry) — no body, no body-controlled cross-resource id.
        Scratch-only: flow nodes are non-interactive (static-catalog autocomplete).
      operationId: getScratchRunCommands
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Latest availableCommands snapshot (possibly empty before the session emits one).
          content:
            application/json:
              schema:
                type: object
                required: [commands]
                properties:
                  commands:
                    type: array
                    items: { $ref: "#/components/schemas/AvailableCommand" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Scratch run not found or not scratch (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/scratch-runs/{runId}/stop:
    post:
      tags: [scratch-runs]
      summary: Implemented — stop live scratch supervisor session
      operationId: stopScratchRun
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/OkResult"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Scratch run not found, not scratch, terminal, or not stoppable (`PRECONDITION` / `CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/scratch-runs/{runId}/discard:
    post:
      tags: [scratch-runs]
      summary: Implemented — discard scratch workspace
      description: |
        Stops any live supervisor session, removes only the worktree and
        artifacts proven to belong to this scratch run, and transitions the run
        to `Abandoned`.
      operationId: discardScratchRun
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/OkResult"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Scratch run not found, not scratch, or cannot be discarded in its current state (`PRECONDITION` / `CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/scratch-runs/{runId}/recover:
    post:
      tags: [scratch-runs]
      summary: Implemented — recover a scratch supervisor session
      description: |
        Requires project membership at `member` or above. If the stored
        supervisor session is still live, the route returns `action = open`.
        If the supervisor session is missing but the run has an
        `acp_session_id`, the route resumes through the supervisor, stores the
        new supervisor session id, sends the supplied prompt, and returns the
        resulting dialog status. Permission or crash events observed during the
        prompt are preserved instead of being overwritten to `WaitingForUser`.
      operationId: recoverScratchRun
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt: { type: string, minLength: 1, maxLength: 60000 }
      responses:
        "200":
          description: Existing live session can be opened.
          content:
            application/json:
              schema:
                type: object
                required: [runId, action, dialogStatus]
                properties:
                  runId: { type: string, format: uuid }
                  action: { type: string, enum: [open] }
                  dialogStatus:
                    type: string
                    enum:
                      [
                        Starting,
                        WaitingForUser,
                        Running,
                        NeedsInput,
                        Review,
                        Crashed,
                        Done,
                        Abandoned,
                      ]
        "202":
          description: Scratch session resumed and prompt dispatched.
          content:
            application/json:
              schema:
                type: object
                required: [runId, action, dialogStatus, stopReason]
                properties:
                  runId: { type: string, format: uuid }
                  action: { type: string, enum: [recover] }
                  dialogStatus:
                    type: string
                    enum:
                      [
                        Starting,
                        WaitingForUser,
                        Running,
                        NeedsInput,
                        Review,
                        Crashed,
                        Done,
                        Abandoned,
                      ]
                  stopReason:
                    type: string
                    description: |
                      Scratch-dialog result. `cancelled` is a web/client-side
                      dialog state only; supervisor prompt success responses do
                      not return `cancelled` and map direct adapter cancellations
                      to `ACP_PROTOCOL`.
                    enum:
                      [
                        end_turn,
                        max_tokens,
                        max_turn_requests,
                        refusal,
                        cancelled,
                      ]
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Scratch run has no resume handle or cannot be recovered.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/runs/{runId}/diff:
    get:
      tags: [runs]
      summary: Implemented (scratch + flow-run, M22) — read workspace diff
      description: |
        Returns the diff between the run workspace branch and its
        server-resolved base commit, plus a changed-files summary (`files`).
        **Flow runs (M22):** base = `workspaces.base_commit ?? resolveBaseRef(...)`,
        branch = `workspaces.branch`, gated `readBoard` (project `viewer` — the diff
        is run-scoped, matching the M18 review panel; run state is NOT restricted to
        `Review`). **Scratch runs:** base metadata comes from `scratch_runs`, gated
        `readScratchRun`; the response carries the same prepared
        `files`/`perFile`/`scope`/`scopes` shape as flow runs (M35, T3.3).
      operationId: getRunDiff
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [run, since-last-review, last-node, uncommitted]
            default: run
          description: |
            **(M30 — Implemented, ADR-082)** Diff base selection (allow-list
            validated; default `run`). `run`: `workspace.baseCommit..branch`
            (current behavior). `since-last-review`: `<prev-review-visit-sha>..branch`
            from `hitl_requests.review_tip_sha`. `last-node`:
            `<pre-attempt-checkpoint-sha>..branch` for the latest completed agent
            node (ADR-079 checkpoint ref). `uncommitted`: `HEAD` vs working tree
            (tracked) + untracked as additions, rendered under a temp
            `GIT_INDEX_FILE` intent-to-add — the real index is NEVER mutated. A
            scope whose base ref is missing is hidden/disabled with a reason,
            never an error. All scopes share the ADR-066 `prepareDiff` pipeline +
            byte-cap truncation guard.
      responses:
        "200":
          description: Workspace diff + changed-files summary.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunDiffResponse" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Workspace metadata missing, workspace removed, or base metadata unavailable (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

