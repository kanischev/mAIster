openapi: 3.0.3
info:
  title: MAIster Web HTTP API
  version: "0.9.0"
  description: |
    HTTP surface exposed by the Next.js web tier under `app/api/`. Consumed
    by the MAIster UI and (in M7+) by any process that wants to drive HITL
    or stream run events without bypassing the web tier's trust boundary.

    **Milestone status: M10 (+ M14 Designed routes).**

    Routes shipped to date (plus routes Designed for M14, tagged inline):

    - `POST /api/projects/{slug}/flow-packages/install` and the
      `{flowRefId}/enable|disable|upgrade|rollback|trust`,
      `{flowRefId}/revisions/{revisionId}/remove`, and
      `GET {flowRefId}/upgrade-preview` routes (M10) — Flow package lifecycle.
      Admin-only (`requireProjectAction("managePackages")`). See
      [Flow packages](../system-analytics/flow-packages.md) and
      [ADR-021](../decisions.md#adr-021-flow-package-lifecycle-multi-revision-trust-and-compatibility).

    - `POST /api/projects` (M9) — register a project from a directory
      containing `maister.yaml`. Admin-only (global role `admin`). Validates
      the manifest, installs Flow plugins, persists DB rows.
    - `POST /api/projects/{slug}/tasks` (M9) — create a task on a project
      board. Requires project membership at `member` or above.
    - `/api/auth/{...nextauth}` (M9) — Auth.js v5 credentials handler.
      See [Authentication & RBAC](../configuration.md#authentication--rbac).
    - `POST /api/auth/register` — public registration. Creates a
      `pending` member account; an admin must activate it before sign-in.
    - `GET /api/admin/users` and `/api/admin/users/{userId}/*` —
      admin-only user activation, disable/re-enable, role change, and password
      reset. Returns no password hashes.
    - `POST /api/runs` (M5+) — launch a run from a Backlog task; precondition
      checks, executor resolution, worktree create, scheduler claim. Requires
      project membership at `member` or above (`launchRun`).
    - Scratch runs (Implemented) — `GET /api/scratch-runs/launch-options`,
      `POST /api/scratch-runs`, `GET /api/scratch-runs/{runId}`,
      `POST /api/scratch-runs/{runId}/messages`, `stop`, `recover`, and
      `discard`.
      These routes start and operate manual coding-agent dialog workspaces
      outside the task board while reusing the supervisor and run event stream.
    - Diff and promotion for run workspaces (Implemented) —
      `GET /api/runs/{runId}/diff` and `POST /api/runs/{runId}/promote`.
      Scratch runs use these routes from Review state.
    - `POST /api/runs/{runId}/hitl/{hitlRequestId}/respond` (M7) — durable
      HITL response surface. Permission-only flows resolve a supervisor
      deferred via the supervisor's `POST /sessions/{id}/input` and use a
      two-phase atomic claim (this file documents the contract). Form and
      human-review flows write `input-<stepId>.json` after a DB claim, and
      the runner's resume-from-existing-input branch picks it up. Requires
      project membership at `member` or above (`answerHitl`).
    - `GET /api/runs/{runId}/stream` (M7) — Server-Sent Events bridge.
      Tails the per-run durable replay log at
      `.maister/<projectSlug>/runs/<runId>/run.events.jsonl` (produced by
      the supervisor — see `supervisor.openapi.yaml`). Reconnect via
      `Last-Event-ID`. Event shape mirrors the supervisor SSE doc
      (`async/web-runs.asyncapi.yaml`). Requires project membership at
      `viewer` or above (`readBoard`).

    **Authentication.** All routes require a valid session (Auth.js v5
    credentials). Unauthenticated requests return `401 UNAUTHENTICATED`.
    Insufficient role returns `403 UNAUTHORIZED`. An authenticated account
    with a pending forced password change (seeded admin, admin-forced reset)
    is rejected on every role-gated route with `403 PASSWORD_CHANGE_REQUIRED`
    until it sets a new password. A valid session for a non-active account is
    rejected with `403 ACCOUNT_INACTIVE`. The `security` field below
    is left empty because Auth.js sessions are cookie-based and not
    expressible as an OpenAPI security scheme without a custom extension.

    See also:
      - [`./supervisor.openapi.yaml`](./supervisor.openapi.yaml)
      - [`./async/web-runs.asyncapi.yaml`](./async/web-runs.asyncapi.yaml)
      - [`./async/supervisor-sse.asyncapi.yaml`](./async/supervisor-sse.asyncapi.yaml)
      - [`../error-taxonomy.md`](../error-taxonomy.md)
      - [`../configuration.md`](../configuration.md) — Authentication & RBAC section
  contact:
    name: MAIster maintainers
    url: https://github.com/your-org/mAIster
  license:
    name: MIT
servers:
  - url: http://localhost:3000
    description: Local Next.js dev server (default).
security: []
tags:
  - name: projects
    description: Project registration and task creation.
  - name: auth
    description: Auth.js v5 session management.
  - name: admin
    description: Global admin account management.
  - name: runs
    description: Run launch, status, and event streaming.
  - name: scratch-runs
    description: Manual coding-agent dialog workspaces outside the task board.
  - name: hitl
    description: Human-in-the-loop response surface.
  - name: assignments
    description: M13 role-owned work queue and assignment ownership.
  - name: takeover
    description: Manual takeover — local worktree handoff (M11b, ADR-030).
  - name: flow-packages
    description: Flow package lifecycle — install, trust, enable, upgrade, rollback, remove.
  - name: reconciliation-gc
    description: Crash recover/discard and the token-guarded GC cron route (M19, ADR-033..036).
  - name: capabilities
    description: Capability import trust-confirm route (M14, Designed, ADR-042).
paths:
  /api/projects:
    post:
      tags: [projects]
      summary: Register a project from a git URL or local directory
      description: |
        Admin-only (`requireGlobalRole("admin")`). Resolves the project
        source via `resolveProjectSource` (ADR-025): a `repoUrl` is cloned
        into `MAISTER_REPOS_ROOT` (refused with `PRECONDITION` if the target
        dir already exists — pass `target` to override), otherwise an
        existing local dir named by `target` is used (and `git init`-ed if it
        is not yet a repo). It then validates `maister.yaml` v2 at
        `{resolvedDir}/maister.yaml`, derives the project slug from
        `project.name` (kebab-case, server-side — never body-derived),
        checks `slug` and `repo_path` (the resolved on-disk dir) uniqueness,
        persists `projects` (incl. nullable `repo_url` + `provider`) +
        `executors` rows, installs each Flow plugin listed in `flows[]`, and
        inserts a `project_members` row for the caller with `role = "owner"`.

        Phases and their error codes:
        1. Auth/authz — `UNAUTHENTICATED` (401) / `UNAUTHORIZED` or
           `PASSWORD_CHANGE_REQUIRED` (403)
        2. Resolve project source (clone / existing / git-init) —
           `PRECONDITION` (409) on clone failure, missing dir, or a target
           path collision
        3. Load + validate `maister.yaml` — `CONFIG` (422)
        4. Slug/repo_path collision check — `CONFLICT` (409)
        5. DB write (project + executors + owner membership) in ONE
           transaction — `CONFIG` (422) on slug-derivation failure; a
           concurrent duplicate that races the collision check trips the
           unique constraint and is reported as `CONFLICT` (409).
        6. Flow plugin installs — `FLOW_INSTALL` (502). Registration is
           all-or-nothing: on any install failure the route fully
           compensates — deletes the `projects` row (FK cascade removes
           executors, flows, and the owner membership) and removes the
           slug-scoped artifact subtree — so the same `maister.yaml` can be
           retried with no leftover row. The shared, content-addressed system
           cache (`~/.maister/flows/<id>@<sha>`) is intentionally retained.

        Source: `web/app/api/projects/route.ts`.
      operationId: postProject
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostProjectBody" }
            examples:
              clone-from-url:
                summary: Clone a repo from a git URL
                value:
                  repoUrl: https://github.com/org/my-app
              clone-with-target-override:
                summary: Clone, overriding the on-disk directory name
                value:
                  repoUrl: https://github.com/org/my-app
                  target: my-app-fork
              register-existing-local:
                summary: Register an existing local directory
                value:
                  target: /repos/my-app
      responses:
        "201":
          description: |
            Project registered. Slug, ID, and the resolved `gitStatus` are
            returned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostProjectResponse" }
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller does not have global `admin` role (`UNAUTHORIZED`), or the
            authenticated account must change its password first
            (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            Either `slug` / `repo_path` already registered (`CONFLICT`), or
            project-source resolution failed (`PRECONDITION`) — clone error,
            missing directory, or a clone `target` path that already exists.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: |
            `maister.yaml` is missing, invalid YAML, fails schema
            validation, or `project.name` cannot be kebab-cased
            (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "502":
          description: |
            A Flow plugin `git clone` or manifest validation failed
            (`FLOW_INSTALL`). The whole registration is rolled back — the
            `projects` row is deleted (cascading to executors, flows, and the
            owner membership) and the slug-scoped artifact subtree is removed —
            so the identical request can be retried without a 409.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/projects/{slug}/tasks:
    post:
      tags: [projects]
      summary: Create a task on a project board
      description: |
        Requires project membership at `member` or above
        (`requireProjectAction("createTask")`). The `projectId` is
        resolved from the URL `slug` (server-state), never from the body.

        Validates that `flowId` belongs to the project and, when
        `executorOverrideId` is supplied, that it also belongs to the same
        project. Both checks return `CONFIG` (422) on failure.

        Source: `web/app/api/projects/[slug]/tasks/route.ts`.
      operationId: postTask
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostTaskBody" }
            examples:
              create-task:
                summary: Create a bugfix task
                value:
                  title: "Fix off-by-one in pagination"
                  prompt: "The `/users` endpoint returns page 2 when page 1 is requested..."
                  flowId: "flow-uuid-here"
      responses:
        "201":
          description: Task created in `Backlog`.
          content:
            application/json:
              schema:
                type: object
                required: [taskId]
                properties:
                  taskId:
                    type: string
                    format: uuid
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller is not a `member` or above for this project
            (`UNAUTHORIZED`), or the authenticated account must change its
            password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: Project not found or archived (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: |
            `flowId` not configured for this project, or
            `executorOverrideId` not registered for this project
            (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/projects/{slug}/assignments:
    get:
      tags: [assignments]
      summary: List project assignments
      description: |
        M13 work-queue read model. Requires project visibility
        (`requireProjectAction("readBoard")`). The URL `slug` resolves the
        project id from server state; the route accepts no body-controlled
        project/run/user identifiers.
      operationId: getProjectAssignments
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Project assignments visible to the caller.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssignmentList" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/Precondition" }
  /api/assignments/{assignmentId}/claim:
    post:
      tags: [assignments]
      summary: Claim an open assignment
      description: |
        Claims an assignment for the current Auth.js user actor. The route
        derives project, run, and actor ids from server state and ignores any
        cross-resource ids in the body.
      operationId: claimAssignment
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Claimed assignment DTO.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Assignment" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/Precondition" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/assignments/{assignmentId}/release:
    post:
      tags: [assignments]
      summary: Release a claimed assignment
      description: |
        Reopens a claim held by the current actor. Body may carry a reason
        string only; actor/project/run ids are always server-derived.
      operationId: releaseAssignment
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssignmentReasonBody" }
      responses:
        "200":
          description: Reopened assignment DTO.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Assignment" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/Precondition" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }
  /api/assignments/{assignmentId}/take-over:
    post:
      tags: [assignments]
      summary: Deliberately take over another actor's assignment claim
      description: |
        Transfers a claim from its current actor to the current Auth.js user
        actor and appends a `taken_over` assignment event. Body may carry a
        reason string only.
      operationId: takeOverAssignment
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssignmentReasonBody" }
      responses:
        "200":
          description: Transferred assignment DTO.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Assignment" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/Precondition" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Config" }
  /api/auth/{nextauth}:
    get:
      tags: [auth]
      summary: Auth.js v5 credentials handler (GET)
      description: |
        Auth.js v5 catch-all handler at `/api/auth/[...nextauth]`. Handles
        the standard Auth.js sub-paths: `session`, `csrf`, `providers`,
        `signout` (GET form), and callback redirects.

        Implemented by `auth()` exported from `web/auth.ts` (the full
        Node.js runtime config with the Drizzle adapter). The edge-safe
        split config lives in `web/auth.config.ts` (credentials provider
        definition + `authorized` callback for middleware).

        MAIster ships **credentials-only** authentication. OAuth providers
        are not configured. The `accounts`, `sessions`, and
        `verification_tokens` tables exist for the Drizzle adapter
        contract.

        Do not enumerate sub-paths here — see the Auth.js v5 docs for the
        canonical path list. Source: `web/auth.ts`, `web/auth.config.ts`.
      operationId: authGet
      parameters:
        - name: nextauth
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Auth.js response (session JSON, CSRF token, etc.).
        "302":
          description: Redirect (sign-in / sign-out flow).
    post:
      tags: [auth]
      summary: Auth.js v5 credentials handler (POST)
      description: |
        Handles `signIn` (credentials), `signOut`, and callback POSTs.
        Sign-in validates `email` + `password` against the `users` table
        (`bcrypt` hash comparison). On success the session is persisted via
        the Drizzle adapter and the session cookie is set.

        `users.role` (global role: `admin | member | viewer`) is surfaced
        on the session, but `lib/authz.ts` re-reads the live role from the DB
        on every authorization check (the cached JWT role is not trusted; a
        deleted user invalidates the session). The single bootstrap admin is
        seeded by migration `0005` (`admin@maister.local`, `must_change_password
        = true`); public registration creates `member` with
        `account_status=pending`.
      operationId: authPost
      parameters:
        - name: nextauth
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
                csrfToken: { type: string }
      responses:
        "200":
          description: Auth.js response (session update, sign-out confirmation).
        "302":
          description: Redirect after sign-in / sign-out.
        "401":
          description: Invalid credentials.

  /api/auth/register:
    post:
      tags: [auth]
      summary: Register a pending user account
      description: |
        Public registration route. Body-controlled fields are `name`, `email`,
        and `password`; the server lowercases email, hashes the password, and
        creates `users.role = "member"` with `account_status = "pending"`.
        The route does not sign the user in. Admin activation through
        `/api/admin/users/{userId}/status` is required before credentials
        sign-in succeeds.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterUserBody" }
      responses:
        "201":
          description: Pending account created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegisterUserResponse" }
        "409":
          description: Email already registered (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/admin/users:
    get:
      tags: [admin]
      summary: List users for admin management
      description: |
        Admin-only (`requireGlobalRole("admin")`). Query identifiers are
        filters only: `status` and `q` are body/query-controlled and do not
        authorize access. The current admin comes from auth context. Response
        excludes `password_hash`.
      operationId: listAdminUsers
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, active, disabled]
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Users returned without password hashes.
          content:
            application/json:
              schema:
                type: object
                required: [users]
                properties:
                  users:
                    type: array
                    items: { $ref: "#/components/schemas/AdminUser" }
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: Not an active global admin.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/admin/users/{userId}/status:
    patch:
      tags: [admin]
      summary: Activate or disable a user
      description: |
        Admin-only. `userId` is a URL parameter. Current admin is auth-context.
        Body-controlled `status` may be `active` or `disabled`. The route
        prevents self-disable and disabling the last active admin.
      operationId: setUserStatus
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminSetStatusBody" }
      responses:
        "200":
          description: Status updated.
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: Not an active global admin.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: Invariant violation (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/admin/users/{userId}/role:
    patch:
      tags: [admin]
      summary: Change a user's global role
      description: |
        Admin-only. `userId` is a URL parameter. Body-controlled `role` may be
        `viewer`, `member`, or `admin`. The route prevents self-demotion and
        removing the last active admin.
      operationId: setUserRole
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminSetRoleBody" }
      responses:
        "200":
          description: Role updated.
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: Not an active global admin.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: Invariant violation (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/admin/users/{userId}/password-reset:
    post:
      tags: [admin]
      summary: Reset a user's password
      description: |
        Admin-only. `userId` is a URL parameter. Body-controlled `password` is
        bcrypt-hashed server-side. `mustChangePassword` can force the user
        through `/change-password` on next sign-in.
      operationId: resetUserPassword
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminPasswordResetBody" }
      responses:
        "200":
          description: Password updated.
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: Not an active global admin.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: Target user does not exist (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/runs:
    post:
      tags: [runs]
      summary: Launch a new run for a Backlog task
      description: |
        Requires an active session (`requireActiveSession` — authenticated and
        with no pending forced password change) AND project membership at
        `member` or above (`requireProjectAction("launchRun")`). The
        `projectId` is derived from the task row, never from the body.

        After auth, project, Flow, and executor checks pass, the web tier
        calls the supervisor `GET /health` through
        `web/lib/supervisor-client.ts`. If the supervisor is unreachable,
        times out, returns non-200, or returns a malformed body, this route
        fails with `503 EXECUTOR_UNAVAILABLE` before creating a git worktree,
        run row, workspace row, or task status transition.
      operationId: postRun
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostRunBody" }
      responses:
        "202":
          description: Run accepted. May be Pending (queued) or Running.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostRunResponse" }
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller is not a `member` or above for this project
            (`UNAUTHORIZED`), or the authenticated account must change its
            password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "400":
          description: |
            Bad request (`CONFIG`): a malformed request body, an unsupported
            manifest `schemaVersion` / engine incompatibility, a node whose
            `settings.executors[]` names an executor absent from the project's
            `executors[]`, or a node whose `enforcement: strict` declares a
            capability class the build cannot strictly enforce
            (settings-enforcement refusal, M11c — see error-taxonomy.md).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            Precondition failed. Examples: task not in Backlog, project
            archived, branch / worktree path already in use, scheduler
            cap full.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            Executor or platform unavailable (`EXECUTOR_UNAVAILABLE`).
            Includes missing project executor registration and supervisor
            readiness failure before launch side effects.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/scratch-runs/launch-options:
    get:
      tags: [scratch-runs]
      summary: Implemented — list scratch-run launch choices
      description: |
        Requires an active session. Returns only projects, executors, base
        branches, and capabilities visible to the caller. Optional
        `projectId` filters the response after membership is verified.
        Response values are hints for the launcher; `POST /api/scratch-runs`
        revalidates every identifier from server state.
      operationId: getScratchRunLaunchOptions
      parameters:
        - name: projectId
          in: query
          required: false
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Launch options visible to the caller.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScratchLaunchOptionsResponse" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Filtered project not found or not visible (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/scratch-runs:
    post:
      tags: [scratch-runs]
      summary: Implemented — launch a manual scratch workspace
      description: |
        Requires project membership at `member` or above
        (`requireProjectAction("launchRun")`). Body-controlled identifiers are
        limited to project, executor, optional linked task, branch choices,
        attachments, and selected capability ids. The body MUST NOT include
        `runId`, `projectSlug`, `worktreePath`, `stepId`,
        `supervisorSessionId`, `acpSessionId`, or capability profile paths.

        No-side-effect gates run before filesystem, DB, capability, or
        supervisor side effects: auth/authz, project archived check, executor
        ownership, optional task ownership, branch/base-ref safety, selected
        capability visibility, supervisor readiness, and shared live-session
        capacity. Scratch v1 rejects when capacity is full and does not queue.

        Accepts JSON for text/metadata-only launches and multipart form data
        for binary uploads. Multipart requests carry a JSON `payload` field
        matching `PostScratchRunBody` plus `files` parts. Uploaded files are
        stored under the run artifact tree, never in the git worktree; accepted
        upload count/bytes are INFO logged, and rejected uploads are WARN
        logged without file contents.
      operationId: postScratchRun
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostScratchRunBody" }
          multipart/form-data:
            schema: { $ref: "#/components/schemas/ScratchRunMultipartBody" }
      responses:
        "201":
          description: Scratch run created and initial prompt dispatched.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScratchRunResponse" }
        "400":
          description: Malformed JSON, multipart payload, or schema (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: |
            Branch/worktree/capacity conflict or precondition failure
            (`CONFLICT` / `PRECONDITION`). Includes invisible project,
            invalid branch, invalid filename/path, too many files, oversized
            file, and oversized total multipart payload.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: Supervisor readiness, executor unavailable, or file-storage infrastructure failure (`EXECUTOR_UNAVAILABLE`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/scratch-runs/{runId}:
    get:
      tags: [scratch-runs]
      summary: Implemented — read scratch dialog state
      description: |
        Requires project membership at `viewer` or above. `runId` comes from
        the URL; project, workspace, supervisor session, ACP session, and
        capability profile paths are derived from server state.
      operationId: getScratchRun
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Scratch run detail, messages, attachments, and capability snapshot.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScratchRunDetail" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Scratch run not found or not scratch (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/scratch-runs/{runId}/messages:
    post:
      tags: [scratch-runs]
      summary: Implemented — send a scratch dialog message
      description: |
        Requires project membership at `member` or above. The route appends the
        next user message under a row lock, rejects concurrent prompts, then
        calls supervisor `POST /sessions/{sessionId}/prompt`. The body carries
        message content and attachment refs only. It MUST NOT include session
        ids, project slug, worktree path, step id, or message sequence.
        Accepts JSON for text/metadata-only messages and multipart form data
        with a JSON `payload` plus binary `files` parts.
      operationId: postScratchRunMessage
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostScratchMessageBody" }
          multipart/form-data:
            schema: { $ref: "#/components/schemas/ScratchMessageMultipartBody" }
      responses:
        "202":
          description: Message accepted and prompt dispatch started.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScratchMessageResponse" }
        "400":
          description: Malformed JSON, multipart payload, or schema (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: |
            Scratch run not found, not scratch, already has a prompt running,
            not input-ready, invalid upload filename/path, too many files,
            oversized file, or oversized total multipart payload
            (`PRECONDITION` / `CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: Supervisor prompt delivery or file-storage infrastructure failed retryably (`EXECUTOR_UNAVAILABLE`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/scratch-runs/{runId}/stop:
    post:
      tags: [scratch-runs]
      summary: Implemented — stop live scratch supervisor session
      operationId: stopScratchRun
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/OkResult"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Scratch run not found, not scratch, terminal, or not stoppable (`PRECONDITION` / `CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/scratch-runs/{runId}/discard:
    post:
      tags: [scratch-runs]
      summary: Implemented — discard scratch workspace
      description: |
        Stops any live supervisor session, removes only the worktree and
        artifacts proven to belong to this scratch run, and transitions the run
        to `Abandoned`.
      operationId: discardScratchRun
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/OkResult"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Scratch run not found, not scratch, or cannot be discarded in its current state (`PRECONDITION` / `CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/scratch-runs/{runId}/recover:
    post:
      tags: [scratch-runs]
      summary: Implemented — recover a scratch supervisor session
      description: |
        Requires project membership at `member` or above. If the stored
        supervisor session is still live, the route returns `action = open`.
        If the supervisor session is missing but the run has an
        `acp_session_id`, the route resumes through the supervisor, stores the
        new supervisor session id, sends the supplied prompt, and returns the
        resulting dialog status. Permission or crash events observed during the
        prompt are preserved instead of being overwritten to `WaitingForUser`.
      operationId: recoverScratchRun
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt: { type: string, minLength: 1, maxLength: 60000 }
      responses:
        "200":
          description: Existing live session can be opened.
          content:
            application/json:
              schema:
                type: object
                required: [runId, action, dialogStatus]
                properties:
                  runId: { type: string, format: uuid }
                  action: { type: string, enum: [open] }
                  dialogStatus:
                    type: string
                    enum: [Starting, WaitingForUser, Running, NeedsInput, Review, Crashed, Done, Abandoned]
        "202":
          description: Scratch session resumed and prompt dispatched.
          content:
            application/json:
              schema:
                type: object
                required: [runId, action, dialogStatus, stopReason]
                properties:
                  runId: { type: string, format: uuid }
                  action: { type: string, enum: [recover] }
                  dialogStatus:
                    type: string
                    enum: [Starting, WaitingForUser, Running, NeedsInput, Review, Crashed, Done, Abandoned]
                  stopReason:
                    type: string
                    enum: [end_turn, max_tokens, max_turn_requests, refusal, cancelled]
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Scratch run has no resume handle or cannot be recovered.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/runs/{runId}/diff:
    get:
      tags: [runs]
      summary: Implemented — read workspace diff for a run
      description: |
        Requires project membership at `viewer` or above. Returns the diff
        between the run workspace branch and its server-resolved base commit.
        For scratch runs, base metadata comes from `scratch_runs`.
      operationId: getRunDiff
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Workspace diff.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunDiffResponse" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Run/workspace not found, workspace removed, or base metadata unavailable (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/runs/{runId}/artifacts:
    get:
      tags: [runs]
      summary: (M12) List the typed-artifact evidence index for a run
      description: |
        Requires project membership at `viewer` or above. Returns the
        typed-artifact evidence index for a run as an explicit DTO
        projection — never raw internal handles (no `acp_session_id`, no
        absolute worktree paths). All `locator.path` values are
        run-relative. The optional `node`, `kind`, and `validity` query
        params are filters only; they do not authorize access — the
        `projectId` is derived from the run row.
      operationId: listRunArtifacts
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string }
        - name: node
          in: query
          required: false
          description: Filter by node id (`ArtifactInstance.nodeId`).
          schema: { type: string }
        - name: kind
          in: query
          required: false
          description: Filter by artifact kind.
          schema:
            type: string
            enum:
              - diff
              - log
              - test_report
              - lint_report
              - ai_judgment
              - human_note
              - commit_set
              - checkpoint
              - preview
              - generic_file
        - name: validity
          in: query
          required: false
          description: Filter by validity state.
          schema:
            type: string
            enum: [current, stale, superseded, failed, skipped]
      responses:
        "200":
          description: Typed-artifact evidence index for the run.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArtifactInstanceList" }
              examples:
                index:
                  summary: Two artifacts on one node attempt
                  value:
                    artifacts:
                      - id: 6f0a1b2c-...
                        runId: 8f1c2e34-...
                        nodeAttemptId: 1a2b3c4d-...
                        nodeId: implement
                        attempt: 1
                        artifactDefId: workspace-diff
                        kind: diff
                        producer: runner
                        locator:
                          kind: git-range
                          baseCommit: 9c4e1f0a8b7d6c5e4f3a2b1c0d9e8f7a6b5c4d3e
                          headRef: maister/task-42-attempt-1
                        uri: null
                        hash: null
                        sizeBytes: 4096
                        validity: current
                        requiredFor: [review]
                        visibility: shared
                        retention: run
                        createdAt: "2026-06-01T10:15:00Z"
                      - id: 7a1b2c3d-...
                        runId: 8f1c2e34-...
                        nodeAttemptId: 1a2b3c4d-...
                        nodeId: implement
                        attempt: 1
                        artifactDefId: null
                        kind: log
                        producer: projector
                        locator:
                          kind: file
                          path: runs/8f1c2e34/implement.log
                        uri: null
                        hash: null
                        sizeBytes: 20480
                        validity: current
                        requiredFor: null
                        visibility: internal
                        retention: ephemeral
                        createdAt: "2026-06-01T10:16:30Z"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Run not found, or not visible to the caller's projects.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/runs/{runId}/artifacts/{artifactId}/payload:
    get:
      tags: [runs]
      summary: (M12) Fetch the raw payload for one artifact
      description: |
        Requires project membership at `viewer` or above. Resolves the
        artifact's `locator` to a file path that is **path-confined to the
        run directory** and streams its raw payload. Diff / log / git / inline
        output is served as `text/plain`; gate-verdict / hitl-response
        payloads are served as `application/json`. A `locator` that resolves
        outside the run dir is treated as not found (404), never served.
      operationId: getRunArtifactPayload
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string }
        - name: artifactId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Raw artifact payload.
          content:
            text/plain:
              schema: { type: string }
              example: |
                diff --git a/src/app.ts b/src/app.ts
                @@ -1,3 +1,4 @@
                +import { z } from "zod";
            application/json:
              schema: {}
              examples:
                gate-verdict:
                  summary: Gate verdict payload
                  value:
                    verdict: pass
                    confidence: 1
                    reasons:
                      - all required checks passed
                    recommendedAction: merge
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: |
            Artifact not found under this run, not visible to the caller's
            projects, or its `locator` resolves to a path outside the run
            directory (path-confinement violation — never served).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
              examples:
                not-found:
                  summary: Unknown artifact or out-of-run-dir locator
                  value:
                    code: PRECONDITION
                    message: Artifact not found under this run.
        "410":
          description: |
            The index row still exists but its backing payload file was
            deleted (`gone`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
              examples:
                gone:
                  summary: Payload file deleted while index row remains
                  value:
                    code: PRECONDITION
                    message: Artifact payload is gone (file deleted).

  /api/runs/{runId}/promote:
    post:
      tags: [runs]
      summary: Implemented — promote run branch to target branch
      description: |
        Requires project membership at `member` or above. Body controls only
        promotion mode and optional target branch. Run id, workspace path,
        source branch, base commit, and default target branch are derived from
        server state. Current implementation supports `local_merge`;
        `pull_request` returns `CONFIG` until PR hosting is wired.
      operationId: promoteRun
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PromoteRunBody" }
      responses:
        "200":
          description: Promotion completed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PromoteRunResponse" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Run/workspace not found, merge conflict, removed workspace, terminal state, or invalid promotion target (`PRECONDITION` / `CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/hitl/{hitlRequestId}/respond:
    post:
      tags: [hitl]
      summary: Deliver an HITL response (permission / form / human)
      description: |
        Requires project membership at `member` or above
        (`requireProjectAction("answerHitl")`). The `projectId` is derived
        from the run row, never from the body.

        Scratch runs reuse this endpoint for permission cards rendered inside
        the scratch dialog. The URL `runId` and `hitlRequestId` identify the
        pending request; supervisor session id, ACP request id, allowed options,
        and scratch dialog state are read from server state.

        Single user-facing HITL endpoint. The handler dispatches on the
        stored `hitl_requests.kind`:

        - **permission**: two-phase atomic claim. Phase 1 stores
          `response = {optionId}` under a row-level lock and only if
          the row is unclaimed (or claimed with the same optionId).
          Phase 2 calls the supervisor; on success it marks
          `respondedAt`. Conflicting optionId on retry → 409. Same
          optionId on retry → idempotent 200. Supervisor 404 racing a
          concurrent winner → 200 (no `runs.status = Failed`).
        - **form / human**: schema validation runs first (NEEDS_INPUT 422
          on failure). Then a row-level claim stores `response`. Only
          after the claim succeeds does the route write
          `input-<stepId>.json` atomically. `respondedAt` is marked
          after the artifact write succeeds. A losing concurrent
          submission gets 409 BEFORE it can corrupt the artifact.

        **(M11a — Designed) graph `human_review` decisions.** For a graph
        review HITL the reviewer's `decision` / `comments` / `workspacePolicy`
        ride **inside** the existing `response` form payload — there are NO new
        top-level body fields (the body schema stays `{ optionId?, response? }`).
        The route validates `response.decision` against `allowedDecisions`, the
        resolved transition target against `transitions`, and (when reworking)
        `response.workspacePolicy` against `workspacePolicies` and the target
        against `reworkTargets` — all read from the manifest-derived allow-list
        stored in `hitl_requests.schema` at creation (server-state, never
        body-trusted). Validation happens BEFORE any artifact write or state
        mutation; an undeclared/invalid decision returns 422 (`NEEDS_INPUT`)
        with `respondedAt` still null and no `input-<stepId>.json` written. On
        success the route copies the resolved values into the
        `decision`/`workspace_policy`/`rework_target` columns; the graph runner
        reads them on resume to drive the rework loop. No new `MaisterError`
        code is introduced.

        On every success path the body returns `runStatus: "NeedsInput"`
        — the runner (not this route) is the single owner of the
        `NeedsInput → Running` transition.
      operationId: respondHitl
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: hitlRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HitlResponseBody" }
            examples:
              permission-select:
                summary: Approve a pending permission
                value:
                  optionId: "allow"
              form-typed:
                summary: Structured form response
                value:
                  response:
                    approved: true
                    comments: "lgtm"
              review-rework:
                summary: (M11a) Graph review — rework with comments
                value:
                  response:
                    decision: "rework"
                    comments: "Tighten the error handling in the parser."
                    workspacePolicy: "keep"
              review-approve:
                summary: (M11a) Graph review — approve
                value:
                  response:
                    decision: "approve"
      responses:
        "200":
          description: |
            Response durably recorded. For permission, the supervisor
            deferred was resolved. For form/human, the input artifact
            was written and `runFlow` was queued.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runStatus:
                    type: string
                    enum: [NeedsInput]
                    description: |
                      Row state at response time. The runner promotes
                      the run to `Running` as soon as it picks up the
                      work.
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller is not a `member` or above for the run's project
            (`UNAUTHORIZED`), or the authenticated account must change its
            password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "400":
          description: |
            Malformed body (`CONFIG`) — JSON parse failure or missing
            required field for the kind (e.g. permission without
            `optionId`, form/human without `response`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            One of: HITL row already delivered with a different payload
            (`CONFLICT`), run is in a terminal status (`CONFLICT`), or
            an `optionId` claim conflicts with a prior claim
            (`CONFLICT`). Identifies a retry contract violation, not a
            server bug.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "202":
          description: |
            M8 idle-branch: claim succeeded and `resumeRun` spawned a
            fresh supervisor session. Returns 202
            `{ ok: true, runStatus: "NeedsInput", state: "resume-in-progress" }`.
            Auto-delivery against the new requestId happens asynchronously
            inside the runner-agent (typically 5-60 s). Subsequent
            same-payload retries while `respondedAt IS NULL` keep
            returning 202; after auto-delivery completes the retries
            return 200 idempotent.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runStatus: { type: string, enum: ["NeedsInput"] }
                  state: { type: string, enum: ["resume-in-progress"] }
        "410":
          description: |
            Either (M7) permission deferred expired before delivery
            (`HITL_TIMEOUT`) — flow runs transition to `Failed`, while
            scratch runs transition to `Crashed` and record
            `scratch_runs.error_code = HITL_TIMEOUT`; or (M8 idle branch)
            `resumeRun` failed terminally (`CHECKPOINT`) — supervisor
            400 / 404 / 201-with-empty-acpSessionId. The idle-branch
            response includes `terminal: true`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: |
            Response payload did not validate against the stored HITL
            schema (`NEEDS_INPUT`). `respondedAt` remains null — the
            user can resubmit with a fixed payload. **(M11a — Designed)**
            also returned when a graph `human_review` `response.decision`
            (or its resolved target / `workspacePolicy`) is not in the
            allow-list stored in `hitl_requests.schema`; no artifact is
            written and no state is mutated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            Retryable failure (`EXECUTOR_UNAVAILABLE`). Examples:
            supervisor unreachable on permission delivery, artifact
            write failed with I/O error. `respondedAt` remains null;
            response is durably stored so a retry replays the same
            value.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/takeover/claim:
    post:
      tags: [takeover]
      summary: (M11b) Claim a run for manual takeover (local worktree handoff)
      description: |
        (M11b — Implemented. Reflects HEAD-after-M11b.)

        Claims a run parked at an M11a `human_review` node for a LOCAL worktree
        handoff (ADR-030). The run transitions `NeedsInput → HumanWorking` (a real
        `runs.status`). The EXISTING worktree path + run branch are exposed; NO new
        branch, target, PR, remote, or supervisor session is created — the reviewer
        edits in place on the same host.

        Requires project membership at `member` or above
        (`requireProjectAction("answerHitl")`); role-restricted claim is M13.
        The claim is a status-guarded CAS
        (`UPDATE runs SET status='HumanWorking' WHERE id=:id AND status='NeedsInput'`);
        a concurrent loser returns 409 `CONFLICT`. The current node must be a
        `human_review` node whose pinned-manifest `finish.human.decisions` includes
        `takeover`, else 409 `PRECONDITION`.

        **Identifier trust (per-route).** No body-controlled field — the body is
        empty:

        | Identifier | Source | Trust |
        | ---------- | ------ | ----- |
        | `runId` | path parameter, route-shape validated | `url-param` |
        | `userId` (claim owner) | Auth.js session | `auth-context` |
        | `projectId` | DB join from the run row | `server-state` |
        | current `human_review` node id | `runs.current_step_id` | `server-state` |

        No new `MaisterError` code (ADR-008 closed union): wrong state /
        non-`human_review` node → `PRECONDITION`; concurrent claim → `CONFLICT`.
      operationId: claimTakeover
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: |
            Claim recorded. The run is now `HumanWorking`; the response carries the
            checkout context (the EXISTING worktree path + run branch).
          content:
            application/json:
              schema:
                type: object
                required: [worktreePath, branch, ownerUserId]
                properties:
                  worktreePath:
                    type: string
                    description: Existing `workspaces.worktree_path` (server-state).
                  branch:
                    type: string
                    description: Existing `workspaces.branch` — the run branch (no new branch).
                  ownerUserId:
                    type: string
                    description: The claiming user (`users.id` from the Auth.js session).
              examples:
                claimed:
                  summary: Claim succeeded
                  value:
                    worktreePath: /repos/my-app/.maister/my-app/runs/abc/worktree
                    branch: maister/task-42-attempt-1
                    ownerUserId: 8f1c2e34-...
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Run not found, or not visible to the caller's projects.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            One of (`MaisterErrorBody`):
            - run is not `NeedsInput`, or the current node is not a `human_review`
              node offering the `takeover` decision (`PRECONDITION`);
            - a concurrent claim won the CAS first (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/takeover/return:
    post:
      tags: [takeover]
      summary: (M11b) Return a manually-taken-over run for re-validation
      description: |
        (M11b — Implemented. Reflects HEAD-after-M11b.)

        Returns a `HumanWorking` run after the reviewer has committed locally in the
        exposed worktree (ADR-030). The route runs `git log <base>..<branch>` +
        `git diff <base>..<branch>` against the EXISTING worktree, records the
        returned commit set + raw diff on the takeover `node_attempts` row, marks the
        validation re-entry node and its downstream STALE (M11a
        `markDownstreamStale`), flips the run `HumanWorking → Running`, and resumes
        the graph runner at the `human_review` node's `transitions.takeover` target
        (a validation node — `checks`) so the staled gates rerun over the human's
        commits and a fresh `human_review` gate is produced.

        Requires the session user to equal the recorded `owner_user_id`
        (owner-only in M11b; "take over stale work" by another user is M13).

        **Body is EMPTY.** The worktree path, branch, base ref, and owner are ALL
        derived server-side — the route NEVER accepts a body field naming a
        filesystem path, branch, or ref.

        **Identifier trust (per-route).**

        | Identifier | Source | Trust |
        | ---------- | ------ | ----- |
        | `runId` | path parameter | `url-param` |
        | `userId` (must equal current owner) | Auth.js session | `auth-context` |
        | `projectId`, `worktreePath`, `branch`, `mainBranch` | DB join run → workspace → project | `server-state` |
        | `baseRef` | `resolveBaseRef` over server-state branch/mainBranch | `server-state` |

        **Two-phase commit (downstream side-effect).**
        1. **Phase 1 — intent read.** Under `SELECT … FOR UPDATE` on the run row,
           assert `status='HumanWorking'` AND `owner_user_id = session.userId` AND
           not terminal. No AFTER-side marker yet.
        2. **Phase 2 — side-effect.** `resolveBaseRef` → `logRange` → `diffRange` →
           write `returned_commits`/`returned_diff`/`base_ref` on the takeover
           `node_attempts` row → `markDownstreamStale(runId, [reentryNode,
           …downstreamOf(reentryNode)])` (re-entry node INCLUDED).
        3. **Phase 3 — AFTER-side marker.** `markReturnedToRunning` (the
           `status='Running'` flip + the takeover row's `ended_at`) is the
           idempotency marker — set ONLY after Phase 2 fully succeeds. Then the
           runner resume is queued.

        A retry against an already-returned run (now `Running`/later) returns 409
        `PRECONDITION`, never a re-import.

        **Failure classification.**

        | Failure class | HTTP | Run/ledger state | Retry |
        | ------------- | ---- | ---------------- | ----- |
        | Run not `HumanWorking` (already returned / wrong state) | 409 `PRECONDITION` | unchanged | terminal — no re-import |
        | Session user ≠ `owner_user_id` | 403 `UNAUTHORIZED` | unchanged | not retryable by this actor |
        | Worktree dirty (uncommitted tracked edits or untracked files, `git status --porcelain` non-empty) | 409 `CONFLICT` | stays `HumanWorking`; NO ledger write; NO status flip | retryable after the operator commits or discards the changes |
        | Empty return (`base..branch` has zero commits) | 409 `CONFLICT` | stays `HumanWorking`; NO ledger write; NO status flip | retryable after the operator commits, or release instead |
        | `git log`/`git diff`/`merge-base` fails (worktree gone, git error) | 409 `CONFLICT` | stays `HumanWorking`; NO ledger write; NO status flip | retryable after operator fixes the worktree |
        | `markDownstreamStale` / ledger write throws mid-side-effect | 503 `EXECUTOR_UNAVAILABLE` | stays `HumanWorking`; partial write guarded by transaction; status NOT flipped | retryable — `FOR UPDATE` re-read still finds `HumanWorking` |
        | Graph-runner resume kickoff fails AFTER the status flip | 200 (return recorded) | `Running` | if the process dies after the AFTER-side flip but before the runner attaches, the run is recovered on startup by the takeover-return recovery sweep (idempotent re-dispatch) — see `manual-takeover.md` |

        No new `MaisterError` code (ADR-008 closed union).
      operationId: returnTakeover
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: |
            Return recorded. The takeover `node_attempts` row holds the returned
            commits + raw diff + base ref; downstream gates are stale; the run is now
            `Running` and the runner has been queued to rerun the validation path.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runStatus:
                    type: string
                    enum: [Running]
                    description: |
                      AFTER-side marker. The runner reruns the staled validation
                      path and re-opens a fresh `human_review` HITL.
                  returnedCommitCount:
                    type: integer
                    description: Number of commits in `git log <base>..<branch>` (display only).
              examples:
                returned:
                  summary: Return succeeded
                  value:
                    ok: true
                    runStatus: Running
                    returnedCommitCount: 3
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          description: |
            Session user is not the recorded takeover owner (`UNAUTHORIZED`), or the
            account must change its password first (`PASSWORD_CHANGE_REQUIRED`). Run
            unchanged.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "404":
          description: Run not found, or not visible to the caller's projects.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            One of (`MaisterErrorBody`):
            - run is not `HumanWorking` (already returned / wrong state)
              (`PRECONDITION`);
            - the worktree has uncommitted tracked edits or untracked files
              (`git status --porcelain` non-empty) (`CONFLICT`) — no ledger write,
              no status flip; retryable after the operator commits or discards;
            - the return is empty (`base..branch` has zero commits) (`CONFLICT`) —
              no ledger write, no status flip; retryable after the operator commits
              or releases instead;
            - a `git log`/`git diff`/`merge-base` op failed against the worktree
              (`CONFLICT`) — no ledger write, no status flip; retryable.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            Retryable failure (`EXECUTOR_UNAVAILABLE`): a ledger / staleness write
            threw mid-side-effect. The run stays `HumanWorking` (status NOT flipped);
            the `FOR UPDATE` re-read on retry finds it still `HumanWorking` and
            replays.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/abandon:
    post:
      tags: [runs]
      summary: (M11b) Abandon a run (user-initiated terminal stop)
      description: |
        (M11b — Implemented. Reflects HEAD-after-M11b.)

        User-facing run abandon. Flips the run to the terminal `Abandoned`
        status (`markAbandoned` sets `runs.status='Abandoned'` + `ended_at`) and
        then promotes the next queued `Pending` run to free the slot
        (`promoteNextPending`). The promote step is best-effort — a failure is
        logged and swallowed, never surfaced to the caller (the abandon already
        committed).

        **`HumanWorking`-specific behavior.** A `HumanWorking` run is first
        released back to `NeedsInput` (`releaseHumanWorking`, the
        release-without-changes path) so the standard abandon transition fires
        from a known non-terminal status — `markAbandoned`'s status guard does
        NOT include `HumanWorking`. The original review HITL re-opening is moot
        once the run is abandoned. Releasing the takeover claim before abandoning
        also frees its held concurrency slot for `promoteNextPending`.

        Requires project membership at `member` or above
        (`requireProjectAction("answerHitl")`). Run-level abandon is NOT
        task-level abandon — the task may auto-return to `Backlog` for a retry.

        **Body is EMPTY.**

        **Identifier trust (per-route).**

        | Identifier | Source | Trust |
        | ---------- | ------ | ----- |
        | `runId` | path parameter, route-shape validated | `url-param` |
        | `projectId` | DB join from the run row | `server-state` |
        | current `runs.status` | DB row, CAS-guarded by `markAbandoned` | `server-state` |

        The abandon transition is a status-guarded CAS over the abandonable set
        `{Pending, Running, NeedsInput, NeedsInputIdle, Review, Crashed}`
        (`HumanWorking` is reached via the release path above). A row already in
        a terminal status (`Done`/`Abandoned`/`Failed`) loses the CAS → 409
        `PRECONDITION`.

        No new `MaisterError` code (ADR-008 closed union): not-found → 404
        `PRECONDITION`; non-abandonable status → 409 `PRECONDITION`.
      operationId: abandonRun
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: |
            Run abandoned. The run is now terminal `Abandoned`; the next queued
            `Pending` run (if any) has been promoted to fill the freed slot.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runStatus:
                    type: string
                    enum: [Abandoned]
                    description: Terminal AFTER-side status.
              examples:
                abandoned:
                  summary: Abandon succeeded
                  value:
                    ok: true
                    runStatus: Abandoned
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Run not found (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            Run is not in an abandonable status — it is already terminal
            (`Done`/`Abandoned`/`Failed`) and lost the status-guarded CAS
            (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/recover:
    post:
      tags: [reconciliation-gc]
      summary: (M19) Recover a Crashed run
      description: |
        (Implemented, M19 — ADR-034.)

        Recovers a `Crashed` flow run via a hybrid plan decided by
        `classifyRecover(run, nodeKind, retrySafe)` over the **recover target
        node** — `runs.resume_target_step_id` (the node id retained at crash
        time; `current_step_id` is nulled on crash), falling back to
        `current_step_id` for live/hand-seeded rows:

        | recover target node | `acpSessionId` | node `retry_safe` | plan | result |
        | ------------------- | -------------- | ----------------- | ---- | ------ |
        | `ai_coding` (agent) | present | ignored | `resume-agent` — `--resume <acpSessionId>` | 200 resumed / 202 queued |
        | `ai_coding` (agent) | null | ignored | `discard-only` | 409 |
        | session-less (`cli`/`check`/`judge`/`guard`/`human`) | irrelevant | `true` | `redispatch` — re-run the node | 200 redispatched / 202 queued |
        | session-less | irrelevant | `false` (default) | `discard-only` | 409 |
        | unresolvable target node | — | — | `discard-only` | 409 |

        An agent node is recovered by continuing its prior ACP session; a
        session-less node has no resumable session and is only redispatchable
        when its manifest config opts in with `retry_safe: true` (re-running a
        session-less node repeats its side effects — accepted-risk). Otherwise
        the run is discard-only.

        Requires project membership at `member` or above
        (`requireProjectAction("recoverRun")`). The `projectId` is derived from
        the run row (`server-state`); `runId` is the URL parameter
        (`url-param`). **Body is EMPTY** — base/target refs, current node, and
        `acpSessionId` are all derived server-side.

        **Durable-marker-before-side-effect (ADR-034 / §3.2).** Phase 1 (one tx
        under the scheduler advisory lock): `SELECT … FOR UPDATE`, CAS
        `WHERE status='Crashed'`, then re-admit through the global concurrency
        cap (a `Crashed` run already released its slot — Recover is a re-launch,
        NOT a cap bypass). On a free slot the run flips `Crashed→Running` with
        `runs.resume_started_at = now()` and proceeds to Phase 2
        (`createSession({resumeSessionId})`). On a full cap the run flips
        `Crashed→Pending` (retaining `acpSessionId`, stamping
        `resume_started_at`) and returns `202 {state:"queued"}` with NO
        supervisor call — the scheduler resumes it when a slot frees. The
        reconcile engine (ADR-033) is the single recovery mechanism for every
        crash/ambiguity window thereafter.

        No new `MaisterError` code (ADR-008 closed union): unresumable acp
        session → `CHECKPOINT` (410); not `Crashed` / concurrent recover →
        `CONFLICT` (409); transient supervisor failure → `EXECUTOR_UNAVAILABLE`
        (503), run left `Running` for the reconciler to re-attach or re-crash.

        **Identifier trust (per-route).**

        | Identifier | Source | Trust |
        | ---------- | ------ | ----- |
        | `runId` | path parameter, route-shape validated | `url-param` |
        | `userId` | Auth.js session | `auth-context` |
        | `projectId` | DB join from the run row | `server-state` |
        | `acpSessionId`, recover target node (`resume_target_step_id`) | DB row / pinned manifest | `server-state` |
      operationId: recoverRun
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: |
            Run resumed now. A slot was free, so the run flipped
            `Crashed→Running` and the supervisor `--resume` session was
            dispatched.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runStatus:
                    type: string
                    enum: [Running]
                    description: AFTER-side marker — the driver attaches at the resume target node.
        "202":
          description: |
            Cap full at admission. The run flipped `Crashed→Pending` (retaining
            `acpSessionId`); the scheduler resumes it via the same `--resume`
            path when a slot frees. No supervisor session was created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecoverQueuedResponse" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: |
            Run is not in `Crashed`, or a concurrent Recover won the Phase-1 CAS
            first (run is now `Running`/`Pending`) — a duplicate `createSession`
            is impossible — or `classifyRecover` resolved to `discard-only` (an
            agent target node with no `acpSessionId`, a session-less target node
            that is not `retry_safe`, or an unresolvable target node), so only
            Discard is offered (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "410":
          description: |
            The stored acp session is unresumable — supervisor refused the
            `--resume` (`CHECKPOINT`). The run is `Crashed`; surface discard-only.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            Transient supervisor failure (5xx / network / timeout) during the
            `createSession` side-effect (`EXECUTOR_UNAVAILABLE`). The run is
            left `Running` — NO rollback (an ack may have been lost and a
            session may be live); the reconciler re-attaches if it came up, else
            re-crashes past the grace window. Retryable.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/discard:
    post:
      tags: [reconciliation-gc]
      summary: (M19) Discard a run into the GC countdown
      description: |
        (Designed, M19 — ADR-034 / ADR-035. Code lands in Phase 3.)

        Marks a run `Abandoned` and enters the workspace GC countdown. This is a
        single terminal action — it does **NOT** synchronously remove the
        worktree. The worktree is left in place showing the TTL color-ramp
        countdown and is preserved-then-pruned by the GC sweep
        (`MAISTER_GC_AGE_DAYS`), exactly like any other Abandoned run.

        One tx: `markAbandoned` (allow-list incl. `Crashed`) stamps
        `workspaces.scheduled_removal_at = endedAt + MAISTER_GC_AGE_DAYS`, then
        `promoteNextPending` frees the slot. Idempotent on an already-terminal
        run: a same-state retry returns 200; a conflicting non-terminal state
        returns 409. No worktree side-effect means no removal-failure path.

        Requires project membership at `member` or above
        (`requireProjectAction("recoverRun")`). The `projectId` is derived from
        the run row (`server-state`); `runId` is the URL parameter
        (`url-param`). **Body is EMPTY.**

        No new `MaisterError` code (ADR-008 closed union): conflicting
        non-terminal state → `CONFLICT` (409).
      operationId: discardRun
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: |
            Run marked `Abandoned` and entered the GC countdown (the worktree
            stays for preserve-then-prune). Returned unchanged on an idempotent
            same-state retry.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runStatus:
                    type: string
                    enum: [Abandoned]
                    description: Terminal AFTER-side status.
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: |
            Run is in a conflicting non-terminal state that is not discardable
            (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/cron/gc:
    get:
      tags: [reconciliation-gc]
      summary: (M19) Run the GC sweep (token-guarded cron)
      description: |
        (Designed, M19 — ADR-035 / ADR-036. Code lands in Phase 4.)

        Token-guarded HTTP entry point for the preserve-then-prune GC sweep —
        the same work the background sweeper performs
        (`MAISTER_GC_SWEEP_INTERVAL_SECONDS`), exposed for an external cron. The
        sweep collects Abandoned/Done worktrees and unreferenced `Removed` flow
        revisions past `MAISTER_GC_AGE_DAYS`, preserves dirty/divergent
        worktrees to a `maister/archive/<runId>` branch (optionally pushed when
        `MAISTER_GC_ARCHIVE_PUSH=true`), and only then prunes.

        Auth is by the `X-Maister-Cron-Token` header, compared in constant time
        to `MAISTER_CRON_TOKEN` — NOT an Auth.js session. **No body / query
        cross-resource identifiers**: the sweep derives its candidate set from
        server state only.
      operationId: runGcCron
      security:
        - cronToken: []
      responses:
        "200":
          description: GC sweep completed; the summary reports per-sub-sweep counts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GcSweepSummary" }
        "207":
          description: |
            A sub-sweep (worktree GC or revision GC) partially failed; the
            summary's `errors` array names what was skipped. Successful work was
            still committed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GcSweepSummary" }
        "401":
          description: |
            Missing or mismatched `X-Maister-Cron-Token` (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            `MAISTER_CRON_TOKEN` is unset — the cron route is disabled
            (`CONFIG`). Configure the token to enable it.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    post:
      tags: [reconciliation-gc]
      summary: (M19) Run the GC sweep (token-guarded cron)
      description: |
        (Designed, M19 — ADR-035 / ADR-036. Code lands in Phase 4.)

        POST variant of `GET /api/cron/gc` — identical behavior, for cron
        runners that prefer a non-idempotent verb. Auth is the same
        `X-Maister-Cron-Token` header (constant-time compare to
        `MAISTER_CRON_TOKEN`). **Body is EMPTY**; the sweep derives its
        candidate set from server state only.
      operationId: runGcCronPost
      security:
        - cronToken: []
      responses:
        "200":
          description: GC sweep completed; the summary reports per-sub-sweep counts.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GcSweepSummary" }
        "207":
          description: |
            A sub-sweep partially failed; the summary's `errors` array names what
            was skipped. Successful work was still committed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GcSweepSummary" }
        "401":
          description: |
            Missing or mismatched `X-Maister-Cron-Token` (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            `MAISTER_CRON_TOKEN` is unset — the cron route is disabled
            (`CONFIG`). Configure the token to enable it.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/activity:
    post:
      tags: [runs]
      summary: (M8) Keep-alive activity ping
      description: |
        Bumps `runs.keepalive_until` to `now + MAISTER_KEEPALIVE_MINUTES`
        so the keep-alive sweeper does not checkpoint a run while the
        operator is actively reviewing it. Identifier table:
        `runId` is a `url-param` (UUID v4); the body has NO
        cross-resource ids (optional `{kind?: "activity"}` marker only).
        Activity does NOT auto-resume idle runs — `NeedsInputIdle`
        rows return 409 with a hint to call
        `POST /api/runs/{runId}/hitl/{hitlRequestId}/respond` instead.
      operationId: activityPing
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Keep-alive bumped on a `Running` or `NeedsInput` row.
        "400":
          description: "`runId` is not a valid UUID v4."
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "404":
          description: Run not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            Run is in `NeedsInputIdle` (caller must use `/respond`) or
            in `Pending` (no live window to bump).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "410":
          description: |
            Run is in a terminal status (`Done`, `Abandoned`, `Failed`,
            `Crashed`, `Review`). Hook should stop pinging.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/stream:
    get:
      tags: [runs]
      summary: SSE bridge — stream per-run events
      description: |
        Requires project membership at `viewer` or above
        (`requireProjectRole(run.projectId, "viewer")`). The `projectId`
        is derived from the run row, never from the query string.

        Server-Sent Events bridge. Tails a single per-run durable replay
        log at `.maister/<projectSlug>/runs/<runId>/run.events.jsonl`
        (written by the supervisor — see `supervisor.openapi.yaml`).

        Use the standard SSE `Last-Event-ID` header (or `?lastEventId=N`
        query string fallback) to resume after disconnect. Terminal
        states (`Done`, `Abandoned`, `Failed`, `Crashed`) close the
        stream cleanly after draining trailing events.

        Event shape is the supervisor's `SessionEvent` union. See the
        AsyncAPI doc at `async/web-runs.asyncapi.yaml`.
      operationId: streamRunEvents
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Last-Event-ID
          in: header
          required: false
          schema: { type: string }
        - name: lastEventId
          in: query
          required: false
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: SSE stream.
          headers:
            Content-Type:
              schema:
                type: string
                enum: [text/event-stream]
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller is not a `viewer` or above for the run's project
            (`UNAUTHORIZED`), or the authenticated account must change its
            password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "404":
          description: Run not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/projects/{slug}/flow-packages/install:
    post:
      tags: [flow-packages]
      summary: Install a Flow package into a project
      description: |
        M10 (ADR-021). Admin-only (`requireProjectAction("managePackages")`).
        Two-phase install via `installFlowPlugin` → `installRevision`: a
        `flow_revisions` row is written `Installing` before disk side-effects,
        then flipped to `Installed`/`Failed`. Trusted-by-policy sources
        (local/file:// or `MAISTER_TRUSTED_FLOW_SOURCE_PREFIXES` match)
        auto-enable; untrusted sources install as `Installed` (await
        `/trust` + `/enable`). `slug` = url-param (server-state); `flowRefId`/
        `source`/`version` are body-controlled, validated downstream.
        Source: `web/app/api/projects/[slug]/flow-packages/install/route.ts`.
      operationId: installFlowPackage
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InstallFlowPackageBody" }
      responses:
        "201":
          description: Package installed (and enabled when trusted-by-policy).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstallFlowPackageResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }
        "502": { $ref: "#/components/responses/FlowInstall" }

  /api/projects/{slug}/flow-packages/{flowRefId}/enable:
    post:
      tags: [flow-packages]
      summary: Enable a specific installed revision
      description: |
        M10. Admin-only. Sets the project's enabled revision to `revisionId`,
        refreshing the denormalized cache and `recommended_executor_id` while
        PRESERVING `executor_override_id`. Refuses untrusted / incompatible /
        setup-incomplete revisions. `revisionId` is validated against the flow
        AND the project's declared source (cross-source enable is rejected).
        Source: `.../flow-packages/[flowRefId]/enable/route.ts`.
      operationId: enableFlowRevision
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: flowRefId, in: path, required: true, schema: { type: string, minLength: 1 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RevisionIdBody" }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/flow-packages/{flowRefId}/disable:
    post:
      tags: [flow-packages]
      summary: Disable a flow for new launches
      description: |
        M10. Admin-only. Sets `enablement_state='Disabled'`. In-flight runs
        keep their pinned revision. Source:
        `.../flow-packages/[flowRefId]/disable/route.ts`.
      operationId: disableFlowPackage
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: flowRefId, in: path, required: true, schema: { type: string, minLength: 1 } }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }

  /api/projects/{slug}/flow-packages/{flowRefId}/upgrade:
    post:
      tags: [flow-packages]
      summary: Install a new revision beside the current one
      description: |
        M10. Admin-only. Installs a new immutable revision (two-phase) from the
        SAME source as the project's flow and marks it `UpdateAvailable`. Does
        NOT auto-enable. Rejects a `source` that differs from the project's
        declared flow source (re-sourcing is install/re-install).
        Source: `.../flow-packages/[flowRefId]/upgrade/route.ts`.
      operationId: upgradeFlowPackage
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: flowRefId, in: path, required: true, schema: { type: string, minLength: 1 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpgradeFlowPackageBody" }
      responses:
        "201":
          description: Candidate revision installed.
          content:
            application/json:
              schema:
                type: object
                required: [revisionId]
                properties:
                  revisionId: { type: string, format: uuid }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }
        "502": { $ref: "#/components/responses/FlowInstall" }

  /api/projects/{slug}/flow-packages/{flowRefId}/rollback:
    post:
      tags: [flow-packages]
      summary: Roll the enabled revision back to an older installed revision
      description: |
        M10. Admin-only. Switches the enabled pointer to an older installed
        revision (same validation as enable, including source-scope). Never
        mutates completed/active run history. Source:
        `.../flow-packages/[flowRefId]/rollback/route.ts`.
      operationId: rollbackFlowPackage
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: flowRefId, in: path, required: true, schema: { type: string, minLength: 1 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RevisionIdBody" }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/flow-packages/{flowRefId}/trust:
    post:
      tags: [flow-packages]
      summary: Set or clear explicit trust for a flow package
      description: |
        M10. Admin-only. Sets `trust_status` to `trusted`/`untrusted`. Trust
        alone does NOT make a package launchable — the package must still be
        `/enable`d (launch requires `Enabled`/`UpdateAvailable`). Source:
        `.../flow-packages/[flowRefId]/trust/route.ts`.
      operationId: setFlowPackageTrust
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: flowRefId, in: path, required: true, schema: { type: string, minLength: 1 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [trusted]
              properties:
                trusted: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/flow-packages/{flowRefId}/revisions/{revisionId}/remove:
    post:
      tags: [flow-packages]
      summary: Remove an installed revision
      description: |
        M10. Admin-only. Marks the revision `Removed` and best-effort deletes
        its cache. Refused with `CONFLICT` (409) while any run references it or
        it is any project's enabled revision. `revisionId` is validated against
        the flow AND the project's declared source. Automatic GC of
        unreferenced revisions is M19. Source:
        `.../flow-packages/[flowRefId]/revisions/[revisionId]/remove/route.ts`.
      operationId: removeFlowRevision
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: flowRefId, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: revisionId, in: path, required: true, schema: { type: string, minLength: 1 } }
      responses:
        "200": { $ref: "#/components/responses/OkResult" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }

  /api/projects/{slug}/flow-packages/{flowRefId}/upgrade-preview:
    get:
      tags: [flow-packages]
      summary: Diff the enabled revision against a candidate revision
      description: |
        M10. Admin-only. Returns a structured contract diff (steps, gates,
        artifacts, capabilities, external ops, schema/setup changes) between the
        project's enabled revision and `revisionId`. `revisionId` is validated
        against the flow AND the project's declared source. Source:
        `.../flow-packages/[flowRefId]/upgrade-preview/route.ts`.
      operationId: getFlowUpgradePreview
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: flowRefId, in: path, required: true, schema: { type: string, minLength: 1 } }
        - { name: revisionId, in: query, required: true, schema: { type: string, minLength: 1 } }
      responses:
        "200":
          description: Structured upgrade preview.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpgradePreview" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Precondition" }
        "422": { $ref: "#/components/responses/Config" }

  /api/projects/{slug}/capabilities/{capabilityRefId}/trust:
    post:
      tags: [capabilities]
      summary: Trust-confirm a capability import and run its setup
      description: |
        **Implemented (M14).** Admin-only
        (`requireProjectAction("managePackages")`). Establishes explicit trust
        for a `capability_imports[]` entry and, when trust is granted, executes
        the import's `setup.sh` (if present and not yet run).

        **Identifiers.** `slug` is a url-param resolved to a `projects` row
        (server-state). `capabilityRefId` is a url-param validated against the
        project's `capability_imports` rows (server-state) — it is NOT derived
        from the body.

        **Two-phase, retry-safe semantics (R-2PC).** The idempotency marker is
        `setupStatus`, NOT `trustStatus`. When `confirm: true`:

        1. Under `SELECT … FOR UPDATE`, write `trustStatus = 'trusted'` (BEFORE
           the side-effect).
        2. Execute `runCapabilityRevisionSetup` (the trust-gated, physically
           separate function — never called from `installCapabilityRevision`).
        3. Write `setupStatus = 'done'` (AFTER the side-effect).

        On any setup failure `setupStatus` is flipped to `'failed'` and the route
        returns 502 (`FLOW_INSTALL`, retryable via re-POST). Because `runCapabilityRevisionSetup` re-runs when
        `setupStatus ∈ {pending, failed}`, a re-POST restarts setup without a
        spurious 409. `409` is returned **ONLY** when `setupStatus = 'done'` or
        `'not_required'` (genuinely nothing to do), and NEVER merely because
        `trustStatus` is already `'trusted'`.

        Source: `web/app/api/projects/[slug]/capabilities/[capabilityRefId]/trust/route.ts`.
        See [ADR-043](../decisions.md) and
        [`configuration.md`](../configuration.md#capability_imports).
      operationId: confirmCapabilityImportTrust
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string, minLength: 1 } }
        - name: capabilityRefId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            pattern: '^[A-Za-z0-9._-]+$'
            description: |
              Validated against SAFE_PATH_SEGMENT on the server; url-param only —
              not accepted from the body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm]
              properties:
                confirm:
                  type: boolean
                  enum: [true]
                  description: |
                    Must be `true` — grant trust and run setup (if pending/failed).
                    The handler body schema is `z.literal(true)`; any other value
                    is rejected with 422 (`CONFIG`).
      responses:
        "200":
          description: |
            Trust established and setup completed (`setupStatus = 'done'` or
            `'not_required'`).
          content:
            application/json:
              schema:
                type: object
                required: [ok, setupStatus, trustStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  setupStatus:
                    type: string
                    enum: [not_required, done]
                  trustStatus:
                    type: string
                    enum: [trusted, trusted_by_policy]
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: |
            Project or capability import not found for this project
            (`PRECONDITION`), or setup is already `done` or `not_required`
            (nothing to do, `CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: |
            Body is malformed or `capabilityRefId` fails `SAFE_PATH_SEGMENT`
            validation (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "502":
          description: |
            `setup.sh` execution failed (`setupStatus` flipped to `'failed'`).
            `trustStatus` remains `'trusted'` so a re-POST will retry setup
            (`FLOW_INSTALL`, retryable via re-POST). Carries structured detail
            `{source, version, stage:'setup', exitStatus, output}` in the message.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

components:
  securitySchemes:
    cronToken:
      type: apiKey
      in: header
      name: X-Maister-Cron-Token
      description: |
        Shared-secret header for the GC cron route, compared in constant time
        to `MAISTER_CRON_TOKEN`. Server-only secret — never logged or streamed.
        Unset token disables the route (503). Not an Auth.js session.
  responses:
    Unauthenticated:
      description: No valid session (`UNAUTHENTICATED`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    Forbidden:
      description: |
        Caller lacks the required project role (`UNAUTHORIZED`) or the account
        must change its password first (`PASSWORD_CHANGE_REQUIRED`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    Precondition:
      description: Precondition failed or conflict (`PRECONDITION` / `CONFLICT`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    Conflict:
      description: State conflict (`PRECONDITION` / `CONFLICT`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    Config:
      description: Invalid body or incompatible package (`CONFIG`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    FlowInstall:
      description: Flow package install/upgrade failed (`FLOW_INSTALL`).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    OkResult:
      description: Action succeeded.
      content:
        application/json:
          schema:
            type: object
            required: [ok]
            properties:
              ok: { type: boolean, enum: [true] }
  schemas:
    PostProjectBody:
      type: object
      description: |
        Project source union (ADR-025). Supply at least one of `repoUrl`
        or `target`. With `repoUrl` and no `target`, MAIster clones into
        `MAISTER_REPOS_ROOT` under a name derived from the URL; pass
        `target` to override that name (or to register an existing local
        directory when `repoUrl` is omitted). Deep path/URL validation runs
        server-side before any filesystem access.
      minProperties: 1
      properties:
        repoUrl:
          type: string
          minLength: 1
          maxLength: 2048
          description: |
            Git URL to clone (https / http / ssh / scp `git@host:org/repo`
            / file). Cloned non-interactively with the host's credentials —
            MAIster stores no provider secrets. The URL is credential-redacted
            in logs and errors. Omit to register an existing local directory.
          example: https://github.com/org/my-app
        target:
          type: string
          minLength: 1
          maxLength: 4096
          description: |
            With `repoUrl`: overrides the clone's on-disk directory name (a
            single safe path segment, or an absolute path). Without `repoUrl`:
            the existing local directory to register (absolute, no `..`
            segment); `git init`-ed when it is not yet a git repo.
          example: /repos/my-app
    PostProjectResponse:
      type: object
      required: [slug, projectId, gitStatus]
      properties:
        slug:
          type: string
          description: |
            Kebab-case slug derived server-side from `project.name` in
            `maister.yaml`. Never body-derived.
        projectId:
          type: string
          format: uuid
        gitStatus:
          type: string
          enum: [remote, no-remote, initialized]
          description: |
            Resolved source state: `remote` (cloned, or existing repo with an
            `origin`), `no-remote` (existing repo without an `origin` — PR
            promotion unavailable), or `initialized` (`git init` ran on a
            non-repo dir — unborn HEAD, needs a first commit before runs).
    PostTaskBody:
      type: object
      required: [title, prompt, flowId]
      properties:
        title:
          type: string
          minLength: 1
        prompt:
          type: string
          minLength: 1
        flowId:
          type: string
          minLength: 1
          description: |
            ID of a `flows` row belonging to the project identified by
            the URL `slug`. Any other flow ID returns `422 CONFIG`.
        executorOverrideId:
          type: string
          minLength: 1
          description: |
            Optional. ID of an `executors` row belonging to this
            project. Stored in `tasks.executor_override_id`; enters the
            override chain at tier 2 (between run-launcher override and
            per-flow override). Any other executor ID returns `422
            CONFIG`.
    AssignmentReasonBody:
      type: object
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 1000
    AssignmentActor:
      type: object
      required: [id, kind, label]
      properties:
        id: { type: string, format: uuid }
        kind:
          type: string
          enum: [user, api_token, internal_agent, system]
        label: { type: string }
    Assignment:
      type: object
      required:
        - id
        - projectId
        - runId
        - status
        - roleRefs
        - title
        - assigneeActor
      properties:
        id: { type: string, format: uuid }
        projectId: { type: string, format: uuid }
        runId: { type: string, format: uuid }
        taskId: { type: string, format: uuid, nullable: true }
        nodeId: { type: string, nullable: true }
        stepId: { type: string, nullable: true }
        hitlRequestId: { type: string, format: uuid, nullable: true }
        actionKind:
          type: string
          enum:
            - permission
            - form
            - human_review
            - manual_takeover
            - merge_conflict
        status:
          type: string
          enum:
            - open
            - claimed
            - completed
            - cancelled
        roleRefs:
          type: array
          items: { type: string }
        title: { type: string }
        branch: { type: string, nullable: true }
        ref: { type: string, nullable: true }
        staleEvidenceSummary:
          type: object
          nullable: true
          additionalProperties: true
        claimedAt: { type: string, format: date-time, nullable: true }
        completedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        assigneeActor:
          nullable: true
