openapi: 3.0.3
info:
  title: MAIster Web HTTP API
  version: "0.9.0"
  description: |
    HTTP surface exposed by the Next.js web tier under `app/api/`. Consumed
    by the MAIster UI and (in M7+) by any process that wants to drive HITL
    or stream run events without bypassing the web tier's trust boundary.

    **Milestone status: M34 Platform Agents Stage 3, with earlier routes retained.**

    Routes shipped to date:

    - `POST /api/projects/{slug}/flow-packages/install` and the
      `{flowRefId}/enable|disable|upgrade|rollback|trust`,
      `{flowRefId}/revisions/{revisionId}/remove`, and
      `GET {flowRefId}/upgrade-preview` routes (M10) — Flow package lifecycle.
      Admin-only (`requireProjectAction("managePackages")`). See
      [Flow packages](../system-analytics/flow-packages.md) and
      [ADR-021](../decisions.md#adr-021-flow-package-lifecycle-multi-revision-trust-and-compatibility).

    - `POST /api/projects` (M9) — register a project from a directory
      containing `maister.yaml`. Admin-only (global role `admin`). Validates
      the manifest, installs Flow plugins, persists DB rows.
    - `POST /api/projects/{slug}/tasks` (M9) — create a task on a project
      board. Requires project membership at `member` or above.
    - `/api/auth/{...nextauth}` (M9) — Auth.js v5 credentials handler.
      See [Authentication & RBAC](../configuration.md#authentication--rbac).
    - `POST /api/auth/register` — public registration. Creates a
      `pending` member account; an admin must activate it before sign-in.
    - `GET /api/admin/users` and `/api/admin/users/{userId}/*` —
      admin-only user activation, disable/re-enable, role change, and password
      reset. Returns no password hashes.
    - `POST /api/runs` (M5+) — launch a run from a Backlog task; precondition
      checks, executor resolution, worktree create, scheduler claim. Requires
      project membership at `member` or above (`launchRun`).
    - Scratch runs (Implemented) — `GET /api/scratch-runs/launch-options`,
      `POST /api/scratch-runs`, `GET /api/scratch-runs/{runId}`,
      `POST /api/scratch-runs/{runId}/messages`,
      `PATCH /api/scratch-runs/{runId}` (rename), `stop`, `recover`, and
      `discard`.
      These routes start and operate manual coding-agent dialog workspaces
      outside the task board while reusing the supervisor and run event stream.
    - Diff, promotion, and lifecycle for run workspaces (Implemented) —
      `GET /api/runs/{runId}/diff`,
      `GET /api/runs/{runId}/change-summary`,
      `POST /api/runs/{runId}/promote`, `POST /api/runs/{runId}/stop`,
      `archive`, `drop`, and `export-branch`, plus `handoff-metadata`,
      `snapshot-commit`, and `handoff-branch` for local continuation. Scratch
      runs use the shared archive/export/drop service from Review state and the
      scratch-specific stop route while live. The combined
      `POST /api/runs/{runId}/stop-archive` and `stop-drop` (Implemented) stop a
      live run then run the worktree op in one call, and `stop` is generalized
      to dispatch on run kind (flow → Review, scratch → Review/Abandoned,
      agent → Abandoned).
    - `POST /api/runs/{runId}/hitl/{hitlRequestId}/respond` (M7) — durable
      HITL response surface. Permission-only flows resolve a supervisor
      deferred via the supervisor's `POST /sessions/{id}/input` and use a
      two-phase atomic claim (this file documents the contract). Form and
      human-review flows write `input-<stepId>.json` after a DB claim, and
      the runner's resume-from-existing-input branch picks it up. Requires
      project membership at `member` or above (`answerHitl`).
    - `GET /api/runs/{runId}/stream` (M7) — Server-Sent Events bridge.
      Tails the per-run durable replay log at
      `.maister/<projectSlug>/runs/<runId>/run.events.jsonl` (produced by
      the supervisor — see `supervisor.openapi.yaml`). Reconnect via
      `Last-Event-ID`. Event shape mirrors the supervisor SSE doc
      (`async/web-runs.asyncapi.yaml`). Requires project membership at
      `viewer` or above (`readBoard`).

    **Authentication.** All routes require a valid session (Auth.js v5
    credentials). Unauthenticated requests return `401 UNAUTHENTICATED`.
    Insufficient role returns `403 UNAUTHORIZED`. An authenticated account
    with a pending forced password change (seeded admin, admin-forced reset)
    is rejected on every role-gated route with `403 PASSWORD_CHANGE_REQUIRED`
    until it sets a new password. A valid session for a non-active account is
    rejected with `403 ACCOUNT_INACTIVE`. The `security` field below
    is left empty because Auth.js sessions are cookie-based and not
    expressible as an OpenAPI security scheme without a custom extension.

    See also:
      - [`./supervisor.openapi.yaml`](./supervisor.openapi.yaml)
      - [`./async/web-runs.asyncapi.yaml`](./async/web-runs.asyncapi.yaml)
      - [`./async/supervisor-sse.asyncapi.yaml`](./async/supervisor-sse.asyncapi.yaml)
      - [`../error-taxonomy.md`](../error-taxonomy.md)
      - [`../configuration.md`](../configuration.md) — Authentication & RBAC section
  contact:
    name: MAIster maintainers
    url: https://github.com/your-org/mAIster
  license:
    name: MIT
servers:
  - url: http://localhost:3000
    description: Local Next.js dev server (default).
security: []
tags:
  - name: projects
    description: Project registration and task creation.
  - name: auth
    description: Auth.js v5 session management.
  - name: account
    description: Signed-in user's own profile, password, and personal API-token settings.
  - name: admin
    description: Global admin account management.
  - name: runs
    description: Run launch, status, and event streaming.
  - name: scratch-runs
    description: Manual coding-agent dialog workspaces outside the task board.
  - name: hitl
    description: Human-in-the-loop response surface.
  - name: assignments
    description: M13 role-owned work queue and assignment ownership.
  - name: takeover
    description: Manual takeover — local worktree handoff (M11b, ADR-030).
  - name: review-comments
    description: Line-anchored review-comment threads on the review-gate diff (Implemented, ADR-072).
  - name: flow-packages
    description: Flow package lifecycle — install, trust, enable, upgrade, rollback, remove.
  - name: reconciliation-gc
    description: Crash recover/discard and the token-guarded GC cron route (M19, ADR-033..036).
  - name: scheduler
    description: Unified token-guarded scheduler tick route (M24, ADR-060).
  - name: catalog
    description: Project-local authored capability catalog groundwork (M25, ADR-061).
  - name: capabilities
    description: Capability import trust-confirm route (M14, Designed, ADR-042).
  - name: flow-studio
    description: M27 Flow Studio — graph editor, draft/publish, version-binding, exec-trust.
  - name: agents
    description: M34 (Implemented) platform-agent catalog, attachments, launches, and the inbound webhook trigger (ADR-089/090).
  - name: mcp-management
    description: M27 MCP capability management — platform-admin and project-scoped MCP servers.
  - name: webhooks
    description: >-
      Outbound webhooks (ADR-077, Implemented) — platform-admin and project-scoped
      event-delivery subscriptions, delivery log, ping, replay, and the global
      kill-switch. The wire contract for the delivered payload is in
      `async/outbound-webhooks.asyncapi.yaml`.
  - name: social-board
    description: ADR-078 (Implemented) — task comments, relations, subscriptions, inbox.
  - name: git
    description: >-
      (Implemented, ADR-093) Per-project git surface — persist the DB config back
      to `maister.yaml` (commit + opt-in push) and manage git remotes
      (list/add/edit/remove + push/fetch/set-upstream). Host-ambient auth.
paths:
  /api/admin/acp-runners:
    get:
      tags: [admin]
      summary: List platform ACP runners
      description: Admin-only. Returns platform runner catalog entries, readiness state, and usage references without exposing secret values.
      operationId: getAdminAcpRunners
      responses:
        "200":
          description: Platform ACP runner catalog.
          content:
            application/json:
              schema:
                type: object
                required: [runners, defaultRunnerId, presets, adapters, sidecars]
                properties:
                  runners:
                    type: array
                    items: { type: object }
                  defaultRunnerId: { type: string, nullable: true }
                  presets:
                    type: array
                    items: { type: object }
                  adapters:
                    type: array
                    items: { type: object }
                  sidecars:
                    type: array
                    items: { type: object }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    patch:
      tags: [admin]
      summary: Set the platform default ACP runner
      description: Admin-only. Updates `platform_runtime_settings.defaultRunnerId`. Refuses a runner that is not Ready (by stored status and live supervisor diagnostics).
      operationId: patchAdminAcpDefaultRunner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [defaultRunnerId]
              additionalProperties: false
              properties:
                defaultRunnerId: { type: string }
      responses:
        "200":
          description: Default runner updated.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Target runner is missing or not Ready.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    post:
      tags: [admin]
      summary: Create a platform ACP runner
      description: |
        Admin-only. Creates an ACP runner and optionally updates the platform
        default. Secret material is accepted only as `env:NAME` references.
        Runner env overrides may be raw values or `env:NAME` references.
        ADR-084 designs `gemini` and `opencode` runner rows; readiness may keep
        them `NotReady` until supervisor diagnostics and ACP smoke pass.
      operationId: postAdminAcpRunner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, adapter, model, provider]
              additionalProperties: false
              properties:
                id: { type: string }
                adapter: { type: string, enum: [claude, codex, gemini, opencode, mimo] }
                model: { type: string }
                env:
                  type: object
                  additionalProperties: { type: string }
                  description: |
                    Child-process env override map. Keys are target env var
                    names passed to the spawned ACP adapter. Raw values are
                    passed as-is; values with `env:NAME` form resolve from the
                    supervisor host environment.
                provider: { type: object }
                permissionPolicy:
                  {
                    type: string,
                    enum: [default, dangerously_skip_permissions],
                    default: default,
                  }
                sidecarId: { type: string, nullable: true }
                enabled: { type: boolean, default: true }
      responses:
        "201":
          description: Runner created. Readiness is derived server-side (never accepted from the body). The created runner is fetched via GET, not echoed here (avoids leaking the stored row).
          content:
            application/json:
              schema:
                type: object
                required: [ok, id]
                properties:
                  ok: { type: boolean, enum: [true] }
                  id: { type: string }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Runner id conflict or unsafe default transition.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid runner body, raw secret, or adapter/provider mismatch.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/admin/acp-runners/{runnerId}:
    patch:
      tags: [admin]
      summary: Update a platform ACP runner
      description: |
        Admin-only. Mutates runner provider/model/env/sidecar/readiness/enabled
        fields. Disabling is refused while usage references exist. Adapter and
        capability-agent identity are immutable after create.
      operationId: patchAdminAcpRunner
      parameters:
        - name: runnerId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              minProperties: 1
              properties:
                model: { type: string }
                env:
                  type: object
                  additionalProperties: { type: string }
                  description: |
                    Full replacement child-process env override map. Keys are
                    target env var names. Raw values pass as-is; `env:NAME`
                    values resolve from the supervisor host environment.
                provider: { type: object }
                permissionPolicy:
                  { type: string, enum: [default, dangerously_skip_permissions] }
                sidecarId: { type: string, nullable: true }
                enabled: { type: boolean }
      responses:
        "200":
          description: Runner updated. Readiness is derived server-side (never accepted from the body).
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Runner is referenced or readiness precondition failed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    delete:
      tags: [admin]
      summary: Delete a platform ACP runner
      description: Admin-only. Refuses deletion while the runner is used by defaults, remaps, active runs, or historical run snapshots.
      operationId: deleteAdminAcpRunner
      parameters:
        - name: runnerId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Runner deleted. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Runner is still referenced.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/admin/acp-runners/model-suggestions:
    post:
      tags: [admin]
      summary: Resolve model suggestions for a runner draft
      description: |
        Admin-only. Proxies a runner **draft** to the supervisor's
        `POST /model-catalog/resolve` and returns model suggestions **grouped by
        source** for the runner modal's combobox. Secret material is accepted
        ONLY as `env:NAME` references — converted to bare names via `envRefName()`
        before forwarding — and is never returned to the client. `sidecarId` is
        validated against the platform sidecar catalog (server-state) before
        forwarding. Discovery never blocks a save: `model` stays free text and an
        unknown model is an advisory hint, not a validation error. See
        [ADR-076](../decisions.md#adr-076-acp-runner-model-discovery-resolver-on-supervisor--configured-model-application) and
        [`../system-analytics/model-catalog.md`](../system-analytics/model-catalog.md).
      operationId: postAdminAcpRunnerModelSuggestions
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ModelSuggestionsRequest" }
      responses:
        "200":
          description: Model suggestions grouped by source.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelSuggestionsResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422":
          description: |
            Invalid body, a raw (non-`env:`) secret, or an unknown `sidecarId`
            (`CONFIG`). A missing/unset env-ref degrades to a per-source
            `status:"error"` inside a 200, not a 422 (ADR-076 §2).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            Supervisor unreachable or returned 5xx (`EXECUTOR_UNAVAILABLE`). The
            modal keeps the offline preset layer and a retry affordance.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/admin/scheduler-jobs:
    get:
      tags: [admin]
      summary: (M24) List scheduler jobs
      description: Admin-only. Returns scheduler jobs with cadence, target, next-run, disabled state, failure counters, and last-attempt status.
      operationId: getAdminSchedulerJobs
      responses:
        "200":
          description: Scheduler job catalog.
          content:
            application/json:
              schema:
                type: object
                required: [jobs]
                properties:
                  jobs:
                    type: array
                    items: { type: object }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [admin]
      summary: (M24) Create a scheduler job
      description: |
        Admin-only. Creates a scheduler job. Per-kind `target` shape is
        validated: `command` uses `http_ping` or `console_ping`; `flow_run`
        requires `taskId`; no-target jobs use `{}`. `run_schedule`,
        `domain_event_dispatch`, and `agent_tick` are deliberately NOT
        creatable here — the singletons `run_schedule.dispatcher` (M28,
        ADR-071), `domain_event_dispatch.default` (ADR-086), and
        `agent_tick.dispatcher` (M34 — Implemented, ADR-089) are seeded by
        the tick; all three kinds are rejected at the schema.
      operationId: postAdminSchedulerJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jobKind, cadenceIntervalSeconds]
              additionalProperties: false
              properties:
                id: { type: string }
                jobKind:
                  {
                    type: string,
                    enum:
                      [
                        system_sweep,
                        command,
                        flow_run,
                        webhook_delivery,
                      ],
                  }
                target:
                  $ref: "#/components/schemas/SchedulerJobTarget"
                cadenceIntervalSeconds: { type: integer, minimum: 1 }
                maxFailures: { type: integer, minimum: 1 }
                nextRunAt: { type: string, format: date-time }
                projectId: { type: string, nullable: true }
            examples:
              command-http:
                value:
                  id: healthcheck
                  jobKind: command
                  target:
                    commandKind: http_ping
                    url: https://example.com/healthz
                    timeoutMs: 5000
                  cadenceIntervalSeconds: 300
              command-console:
                value:
                  jobKind: command
                  target:
                    commandKind: console_ping
                    host: example.com
                  cadenceIntervalSeconds: 300
              flow-run:
                value:
                  jobKind: flow_run
                  target:
                    taskId: 7f6f7c99-4f47-4dc3-9e31-dca2044d1c5b
                    runnerId: codex-default
                  cadenceIntervalSeconds: 900
              webhook-delivery:
                value:
                  jobKind: webhook_delivery
                  target: {}
                  cadenceIntervalSeconds: 60
      responses:
        "201":
          description: Scheduler job created.
          content:
            application/json:
              schema:
                type: object
                required: [ok, id]
                properties:
                  ok: { type: boolean }
                  id: { type: string }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Scheduler job id already exists.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body or per-kind target.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/admin/scheduler-jobs/{jobId}:
    patch:
      tags: [admin]
      summary: (M24) Update a scheduler job
      description: |
        Admin-only. Mutates cadence, target, maxFailures, nextRunAt, or
        enabled state. `enabled=true` clears `disabledAt` and resets
        `consecutiveFailures`. The refined `/admin/scheduler` UI builds
        `target` through typed controls; raw JSON is not the primary write
        path.
      operationId: patchAdminSchedulerJob
      parameters:
        - name: jobId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              minProperties: 1
              properties:
                target:
                  $ref: "#/components/schemas/SchedulerJobTarget"
                cadenceIntervalSeconds: { type: integer, minimum: 1 }
                maxFailures: { type: integer, minimum: 1 }
                nextRunAt: { type: string, format: date-time }
                enabled: { type: boolean }
      responses:
        "200":
          description: Scheduler job updated.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Scheduler job not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body or per-kind target.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    delete:
      tags: [admin]
      summary: (M24) Delete a scheduler job
      description: |
        Admin-only. Deletes the job and cascades its attempt ledger. The
        default seeded jobs are re-seeded on the next tick. The designed
        `/admin/scheduler` UI hides delete on seeded singleton rows and
        confirmation-gates delete for custom jobs.
      operationId: deleteAdminSchedulerJob
      parameters:
        - name: jobId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Scheduler job deleted.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Scheduler job not found.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/admin/agents:
    get:
      tags: [admin]
      summary: (M34 — Implemented) List the platform agent catalog
      description: |
        Admin-only. Returns every registered agent with parsed frontmatter
        columns, package provenance, enabled state, and quarantine state.
        Definitions are `agents/<stem>.md` files INSIDE flow packages
        (ADR-089 rework); rows are the catalog projection of each package's
        newest Installed revision under package-qualified ids
        (`<flowRefId>:<stem>`). There is NO create/edit/delete endpoint —
        definitions change only through their providing package (git push +
        upgrade, or Studio draft→publish).
      operationId: getAdminAgents
      responses:
        "200":
          description: Agent catalog.
          content:
            application/json:
              schema:
                type: object
                required: [agents]
                properties:
                  agents:
                    type: array
                    items: { $ref: "#/components/schemas/AgentSummary" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/admin/agents/resync:
    post:
      tags: [admin]
      summary: (M34 — Implemented) Re-project the catalog from installed packages
      description: |
        Admin-only. Re-scans `agents/*.md` in the NEWEST Installed revision
        of every flow_ref and re-syncs rows with SET/CLEAR symmetry (a
        removed frontmatter field resets its column). Invalid definitions
        are reported and left untouched in the DB; rows whose providing
        package vanished are disabled (`enabled=false`), never silently
        deleted.
      operationId: postAdminAgentsResync
      responses:
        "200":
          description: Re-sync summary.
          content:
            application/json:
              schema:
                type: object
                required: [ok, synced]
                properties:
                  ok: { type: boolean }
                  synced: { type: integer }
                  invalid:
                    type: array
                    items:
                      type: object
                      required: [id, error]
                      properties:
                        id: { type: string }
                        error: { type: string }
                  missing:
                    type: array
                    items: { type: string }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/admin/agents/{agentId}:
    get:
      tags: [admin]
      summary: (M34 — Implemented) Read one agent (row + prompt body)
      description: |
        Admin-only. The catalog row plus the `.md` body (the prompt lives
        only in the canonical definition file inside the installed package
        revision). A missing/invalid file still returns the row with an
        empty prompt; the resync surface reports the drift.
      operationId: getAdminAgent
      parameters:
        - name: agentId
          in: path
          required: true
          schema: { type: string, pattern: "^[A-Za-z0-9._-]+(?::[A-Za-z0-9._-]+)?$" }
      responses:
        "200":
          description: Agent + prompt.
          content:
            application/json:
              schema:
                type: object
                required: [agent, prompt]
                properties:
                  agent: { $ref: "#/components/schemas/AgentSummary" }
                  prompt: { type: string }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Unknown agent.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    patch:
      tags: [admin]
      summary: (M34 — Implemented) Platform kill-switches — toggle / un-quarantine
      description: |
        Admin-only. `enabled` toggles the row; `unquarantine: true` clears
        `quarantined_at` + `quarantine_reason`. Definition edits are NOT
        accepted here (ADR-089 rework) — definitions change only through the
        providing package.
      operationId: patchAdminAgent
      parameters:
        - name: agentId
          in: path
          required: true
          schema: { type: string, pattern: "^[A-Za-z0-9._-]+(?::[A-Za-z0-9._-]+)?$" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                enabled: { type: boolean }
                unquarantine: { type: boolean }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Unknown agent.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/admin/router-sidecars:
    get:
      tags: [admin]
      summary: List router sidecars
      description: Admin-only. Returns CCR sidecar configuration and readiness state.
      operationId: getAdminRouterSidecars
      responses:
        "200":
          description: Router sidecars.
          content:
            application/json:
              schema:
                type: object
                required: [sidecars]
                properties:
                  sidecars:
                    type: array
                    items: { type: object }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [admin]
      summary: Create a router sidecar
      description: Admin-only. Creates a managed or external CCR sidecar; auth tokens are stored only as env references.
      operationId: postAdminRouterSidecar
      responses:
        "201":
          description: Sidecar created.
          content:
            application/json:
              schema:
                type: object
                required: [sidecar]
                properties:
                  sidecar: { type: object }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Sidecar id already exists.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/admin/router-sidecars/{sidecarId}:
    patch:
      tags: [admin]
      summary: Update a router sidecar
      description: |
        Admin-only. Mutates sidecar lifecycle/config/enabled fields; auth tokens
        persist only as env references. Disabling is refused while a runner
        references the sidecar. Readiness is recomputed server-side and is never
        accepted from the request body.
      operationId: patchAdminRouterSidecar
      parameters:
        - name: sidecarId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                lifecycle: { type: string, enum: [managed, external] }
                commandPreset: { type: string, nullable: true }
                configPath: { type: string, nullable: true }
                baseUrl: { type: string, nullable: true }
                healthcheckUrl: { type: string, nullable: true }
                authTokenRef: { type: string, nullable: true }
                enabled: { type: boolean }
      responses:
        "200":
          description: Sidecar updated. Readiness is derived server-side (never accepted from the body).
          content:
            application/json:
              schema:
                type: object
                required: [ok, id]
                properties:
                  ok: { type: boolean, enum: [true] }
                  id: { type: string }
                  readinessStatus:
                    { type: string, enum: [Unknown, Ready, NotReady] }
                  readinessReasons: { type: array, items: { type: string } }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Sidecar not found (`PRECONDITION`) or referenced while disabling (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    delete:
      tags: [admin]
      summary: Delete a router sidecar
      description: |
        Admin-only. The usage-guard, the managed stop, and the row delete run in
        one serialized transaction holding a `FOR UPDATE` lock on the sidecar
        row. Refuses deletion (`CONFLICT`) while any runner references the sidecar
        via `sidecar_id`; the FK is `ON DELETE SET NULL`, and the lock prevents a
        concurrent runner bind from being silently unbound by the delete. A
        managed sidecar is stopped before the row is removed; an unconfirmed stop
        aborts the delete with `503` so the config row — the only handle to stop
        the process — survives for a retry.
      operationId: deleteAdminRouterSidecar
      parameters:
        - name: sidecarId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Sidecar deleted. }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Sidecar is still referenced (`CONFLICT`) or not found (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: Managed sidecar stop not confirmed (`EXECUTOR_UNAVAILABLE`); the row was not deleted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/admin/router-sidecars/{sidecarId}/start:
    post:
      tags: [admin]
      summary: Start a managed CCR router sidecar
      description: |
        Admin-only (ADR-094). Loads the sidecar from `platform_router_sidecars`,
        forwards its config to the supervisor `POST /sidecars/{id}/start`, and
        returns the supervisor-reported process state. No DB idempotency marker is
        written — CCR process state is owned by the supervisor. Start only
        launches the process; CCR routing configuration is a separate, deferred
        concern, so a started-without-config sidecar reports `state: "failed"`.
      operationId: startAdminRouterSidecar
      parameters:
        - name: sidecarId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Start initiated; supervisor process state echoed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RouterSidecarStateResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Sidecar not found (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: Supervisor or CCR unavailable (`EXECUTOR_UNAVAILABLE`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/admin/router-sidecars/{sidecarId}/stop:
    post:
      tags: [admin]
      summary: Stop a managed CCR router sidecar
      description: |
        Admin-only (ADR-094). Loads the sidecar, forwards to the supervisor
        per-instance `POST /sidecars/{id}/stop` (stops ONLY this instance, not the
        manager-wide shutdown), and returns the supervisor-reported state.
      operationId: stopAdminRouterSidecar
      parameters:
        - name: sidecarId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Stop completed; supervisor process state echoed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RouterSidecarStateResponse" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Sidecar not found (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: Supervisor or CCR unavailable (`EXECUTOR_UNAVAILABLE`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/launch-options:
    get:
      tags: [runs]
      summary: List task-run launch options
      description: |
        Requires project membership. Returns the server-derived choices for one
