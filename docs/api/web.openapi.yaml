  /api/runs/{runId}/artifacts/{artifactId}/payload:
    get:
      tags: [runs]
      summary: (M12) Fetch the raw payload for one artifact
      description: |
        Requires project membership at `viewer` or above. Resolves the
        artifact's `locator` to a file path that is **path-confined to the
        run directory** and streams its raw payload. Diff / log / git / inline
        output is served as `text/plain`; gate-verdict / hitl-response
        payloads are served as `application/json`. A `locator` that resolves
        outside the run dir is treated as not found (404), never served.
      operationId: getRunArtifactPayload
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string }
        - name: artifactId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Raw artifact payload.
          content:
            text/plain:
              schema: { type: string }
              example: |
                diff --git a/src/app.ts b/src/app.ts
                @@ -1,3 +1,4 @@
                +import { z } from "zod";
            application/json:
              schema: {}
              examples:
                gate-verdict:
                  summary: Gate verdict payload
                  value:
                    verdict: pass
                    confidence: 1
                    reasons:
                      - all required checks passed
                    recommendedAction: merge
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: |
            Artifact not found under this run, not visible to the caller's
            projects, or its `locator` resolves to a path outside the run
            directory (path-confinement violation — never served).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
              examples:
                not-found:
                  summary: Unknown artifact or out-of-run-dir locator
                  value:
                    code: PRECONDITION
                    message: Artifact not found under this run.
        "410":
          description: |
            The index row still exists but its backing payload file was
            deleted (`gone`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
              examples:
                gone:
                  summary: Payload file deleted while index row remains
                  value:
                    code: PRECONDITION
                    message: Artifact payload is gone (file deleted).

  /api/runs/{runId}/promote:
    post:
      tags: [runs]
      summary: Implemented — promote run branch to target branch
      description: |
        Requires project membership at `member` or above. Serves **both flow
        and scratch** runs (M18 — a shared promotion service dispatches on
        `runKind`; previously scratch-only). Body controls only the explicit
        policy override, optional target-branch override, the reviewed target
        HEAD, and the drift override. Run id, workspace path, source branch,
        base commit, resolved policy snapshot, and default target branch are
        derived from server state.

        M18 compatibility modes `local_merge`, `rebase_merge`, and
        `pull_request` map to ADR-085 delivery strategies `merge`,
        `rebase_merge`, and `pull_request`. ADR-085 also adds optional
        `push='on_success'`. Merge conflicts surface the same failing command
        and path data as the current conflict UX. The separable
        `ai_rebase_merge` strategy executes through the rebase-merge side
        effect, preserves the resolved policy mode for audit/API responses, and
        surfaces conflicts through the standard `merge_conflict`
        assignment/inbox path.

        Promotion is gated at promote time by the M16 readiness chokepoint
        (`assertEvidenceReady(runId, "review")`) and by a target-drift guard:
        `reviewedTargetCommit` MUST equal the live target HEAD unless
        `allowTargetDrift` is set, else `PRECONDITION` (the target advanced
        since review). A body omitting `reviewedTargetCommit` is refused
        `PRECONDITION` — never promoted blind.

        On success all strategies terminate the run at `Done` (no new run
        status); `pull_request` additionally records `pullRequestUrl`/`prNumber`.
      operationId: promoteRun
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PromoteRunBody" }
      responses:
        "200":
          description: Promotion completed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PromoteRunResponse" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: |
            Promotion refused (`PRECONDITION` / `CONFLICT`). `PRECONDITION`:
            run/workspace not found, removed workspace, non-`Review` terminal
            state, readiness not ready/stale, invalid/missing target branch,
            target advanced since review without `allowTargetDrift`, invalid
            policy override, push rejected, or PR-mode preflight failure
            (provider CLI missing / `*_TOKEN` unset / remote not configured /
            `generic` provider). `CONFLICT`:
            merge/rebase textual conflict (a manual-resolution assignment is
            created and the run stays `Review`), a concurrent promotion already
            in progress, or a promotion superseded by a stale-claim reclaim.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            Retryable transient failure (`EXECUTOR_UNAVAILABLE`) — a `git push`
            rejection or a provider PR-API 5xx during `pull_request` promotion.
            No `pullRequestUrl` is stored; the run stays `Review` and the
            promotion is idempotent on retry. Reuses the closed `MaisterError`
            union (ADR-008) — `EXECUTOR_UNAVAILABLE` is an existing member, no
            new error code.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/delivery-policy:
    patch:
      tags: [runs]
      summary: Switch an auto delivery policy to manual
      description: |
        Requires project membership at `member` or above. Used by the run-detail
        auto-delivery banner. No body-controlled project/workspace ids are
        accepted; the route CAS-updates only a run in `Review` whose current
        `deliveryPolicySnapshot.trigger` is `auto_on_ready`, changing the
        trigger to `manual` and preserving the strategy, push, and target.
      operationId: patchRunDeliveryPolicy
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchRunDeliveryPolicyBody" }
      responses:
        "200":
          description: Delivery policy trigger switched to manual.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, runId, deliveryPolicy]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runId: { type: string, format: uuid }
                  deliveryPolicy: { $ref: "#/components/schemas/DeliveryPolicy" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Run is not in Review, has no auto trigger, or was updated concurrently.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid action body.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/hitl/{hitlRequestId}/chat:
    get:
      tags: [hitl]
      summary: (M30 — Implemented, ADR-078) List gate-chat messages for a HITL pause
      description: |
        Requires project membership at `member` or above
        (`requireProjectAction("answerHitl")`). Returns the ordered
        `gate_chat_messages` for this pause plus the DD2 `available` flag.
        `runId`/`hitlRequestId` are url-params. The response DTO never includes
        `acp_session_id` or `author_user_id` (server-only).
      operationId: getRunHitlChat
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: hitlRequestId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Ordered gate-chat messages + availability.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  [runId, hitlRequestId, availability, idleResumeCost, messages]
                properties:
                  runId: { type: string, format: uuid }
                  hitlRequestId: { type: string, format: uuid }
                  availability:
                    type: object
                    additionalProperties: false
                    required: [available]
                    description: DD2 availability for this pause.
                    properties:
                      available: { type: boolean }
                      reason:
                        type: string
                        description: Present when `available` is false.
                  idleResumeCost:
                    type: boolean
                    description: |
                      True when the run is `NeedsInputIdle` — the first chat
                      turn pays the ~$0.28 respawn (DD3), surfaced before the
                      question is sent.
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/GateChatMessage"
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [hitl]
      summary: (M30 — Implemented, ADR-078) Send an answer-only gate-chat turn
      description: |
        Requires project membership at `member` or above
        (`requireProjectAction("answerHitl")`). Sends an answer-only question to
        the parked agent at a `human`/`form` pause and waits for the reply: the
        response returns both persisted turns synchronously. The reply is also
        emitted as a `session.chat_turn` SSE event for streaming chat surfaces
        (see the supervisor AsyncAPI). The body carries ONLY `{message}`; the
        supervisor session id, run slug, and the server-derived `stepId`
        (`gate-chat-<hitlRequestId>`, dash not colon) are server-state.

        **Availability (DD2):** `runs.status ∈ {NeedsInput, NeedsInputIdle}` AND
        the open HITL `kind ∈ {human, form}` AND `runs.acp_session_id ≠ null`; a
        `permission`-kind pause, a `HumanWorking` run, or a session-less run
        returns 409 `PRECONDITION` (the UI renders a disabled empty-state).

        **Never resolves the HITL / never `→Running` (DD3):** the turn persists a
        `gate_chat_messages` user row, prompts the session (live), or chat-resumes
        (`NeedsInputIdle` → `markResumed` claim Idle→NeedsInput BEFORE the respawn
        with `session/resume`, then keepalive bump — ~$0.28, surfaced in the UI; a
        lost claim is 409 `CONFLICT`, a failed spawn rolls the claim back to
        `NeedsInputIdle`), then persists the agent row with the next `seq`. It
        NEVER writes `hitl_requests.responded_at` and NEVER drives `→Running`.

        **Workspace-neutrality (DD11):** L1 read-only preamble (server-side), L2
        best-effort permission auto-deny (`readOnlyTurn`), and the unconditional
        fail-closed L3 mutation sensor; a detected mutation is reverted to the
        first-turn baseline and the reply carries `mutationReverted: true`. Chat
        input is NEVER Mustache-evaluated.

        **X-2PC:** the user row is written BEFORE the prompt; the agent row + `seq`
        AFTER; the in-flight prompt deferred is released on every failure path.
      operationId: postRunHitlChat
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: hitlRequestId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              additionalProperties: false
              properties:
                message: { type: string, minLength: 1 }
      responses:
        "200":
          description: |
            Turn completed — both persisted turns returned synchronously.
            `resumed` is true when this turn paid the idle chat-resume.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  [runId, hitlRequestId, userMessage, agentMessage, resumed]
                properties:
                  runId: { type: string, format: uuid }
                  hitlRequestId: { type: string, format: uuid }
                  userMessage:
                    $ref: "#/components/schemas/GateChatMessage"
                  agentMessage:
                    $ref: "#/components/schemas/GateChatMessage"
                  resumed: { type: boolean }
        "400":
          description: Malformed body — expected `{message}` (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: |
            Gate-chat unavailable for this pause (permission-kind,
            HumanWorking, or no session — `PRECONDITION`), or a concurrent
            resume won the idle `markResumed` claim (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "502":
          description: |
            Upstream turn failure: the L3 neutrality baseline cannot be
            captured / sensed (`CHECKPOINT`), or the supervisor respawn /
            prompt delivery failed (`ACP_PROTOCOL`). On a failed idle respawn
            the resume claim is rolled back to `NeedsInputIdle`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/runs/{runId}/hitl/{hitlRequestId}/dirty-resolution:
    post:
      tags: [hitl]
      summary: (M30 — Implemented, ADR-082) Resolve a dirty worktree at a review gate
      description: |
        Requires project membership at `member` or above
        (`requireProjectAction("answerHitl")`). Records the reviewer's chosen
        resolution for a dirty worktree surfaced in the review gate's
        `dirtySummary`. `runId` and `hitlRequestId` are url-params; the worktree
        path, run slug, and node id are server-state (never body-trusted). The
        body carries only `{choice}`.

        The gate is NEVER blocked by a dirty worktree — this resolution is part
        of review, not a precondition. Choices:
        - **commit**: snapshot the dirty worktree via `snapshotDirtyWorktree`
          (auto-message `"wip after node <id>"`); the branch tip moves and diff
          scopes recompute.
        - **discard**: `git restore --staged --worktree . && git clean -fd`
          (`-fd`, never `-fdx`), scoped `-C <worktree>` with a hard
          `.maister/`-containment assert, then re-runs launch materialization
          (ADR-079). v1 is all-or-nothing.
        - **proceed**: review the committed state; a persistent dirty badge stays.

        Order of operations (X-2PC): the `dirty_resolution` intent is claimed
        via a write-once CAS (guarded on unclaimed visit + unresolved pause +
        run still parked) BEFORE the git side-effect; a concurrent second
        resolution loses the claim with 409 `CONFLICT` and never runs git. A
        git failure (discard escapes the worktree, snapshot/clean fails) rolls
        the claim back, maps to 409 (`CONFLICT`/`PRECONDITION`), leaves the
        gate open, and records no resolution. Every executed choice also
        deletes the gate-chat checkpoint ref so the ADR-078 L3 sensor
        re-anchors — for `discard` the ref dies the moment the tree is cleaned
        (no false un-discard even if re-materialization fails).
      operationId: postRunHitlDirtyResolution
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: hitlRequestId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [choice]
              additionalProperties: false
              properties:
                choice:
                  type: string
                  enum: [commit, discard, proceed]
                  description: Reviewer's dirty-worktree resolution (server validates against the allow-list).
      responses:
        "200":
          description: Resolution recorded (and the git side-effect applied for commit/discard).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [runId, hitlRequestId, choice, committed]
                properties:
                  runId: { type: string, format: uuid }
                  hitlRequestId: { type: string, format: uuid }
                  choice: { type: string, enum: [commit, discard, proceed] }
                  committed:
                    type: boolean
                    description: |
                      True when a `commit` choice actually created a snapshot
                      commit (false on a clean tree or for discard/proceed).
        "400":
          description: Malformed body — expected `{choice}` from the allow-list (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            A concurrent resolution won the write-once claim (`CONFLICT`), or
            the git side-effect failed (discard escaped the worktree, or
            snapshot/clean failed) and the claim was rolled back — the gate
            stays open and no resolution is recorded (`CONFLICT` /
            `PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/runs/{runId}/hitl/{hitlRequestId}/respond:
    post:
      tags: [hitl]
      summary: Deliver an HITL response (permission / form / human)
      description: |
        Requires project membership at `member` or above
        (`requireProjectAction("answerHitl")`). The `projectId` is derived
        from the run row, never from the body.

        Scratch runs reuse this endpoint for permission cards rendered inside
        the scratch dialog. The URL `runId` and `hitlRequestId` identify the
        pending request; supervisor session id, ACP request id, allowed options,
        and scratch dialog state are read from server state.

        Single user-facing HITL endpoint. The handler dispatches on the
        stored `hitl_requests.kind`:

        - **permission**: two-phase atomic claim. Phase 1 stores
          `response = {optionId}` under a row-level lock and only if
          the row is unclaimed (or claimed with the same optionId).
          Phase 2 calls the supervisor; on success it marks
          `respondedAt`. Conflicting optionId on retry → 409. Same
          optionId on retry → idempotent 200. Supervisor 404 racing a
          concurrent winner → 200 (no `runs.status = Failed`).
        - **form / human**: schema validation runs first (NEEDS_INPUT 422
          on failure). Then a row-level claim stores `response`. Only
          after the claim succeeds does the route write
          `input-<stepId>.json` atomically. `respondedAt` is marked
          after the artifact write succeeds. A losing concurrent
          submission gets 409 BEFORE it can corrupt the artifact.

        **(M11a — Designed) graph `human_review` decisions.** For a graph
        review HITL the reviewer's `decision` / `comments` / `workspacePolicy`
        ride **inside** the existing `response` form payload — there are NO new
        top-level body fields (the body schema stays `{ optionId?, response? }`).
        The route validates `response.decision` against `allowedDecisions`, the
        resolved transition target against `transitions`, and (when reworking)
        `response.workspacePolicy` against `workspacePolicies` and the target
        against `reworkTargets` — all read from the manifest-derived allow-list
        stored in `hitl_requests.schema` at creation (server-state, never
        body-trusted). Validation happens BEFORE any artifact write or state
        mutation; an undeclared/invalid decision returns 422 (`NEEDS_INPUT`)
        with `respondedAt` still null and no `input-<stepId>.json` written. On
        success the route copies the resolved values into the
        `decision`/`workspace_policy`/`rework_target` columns; the graph runner
        reads them on resume to drive the rework loop. No new `MaisterError`
        code is introduced.

        **(Implemented — ADR-072) review-gate loop fields.** For a review gate
        the stored `hitl_requests.schema` additionally carries the
        server-state fields `maxLoops` (the node's `rework.maxLoops`; `null`
        when the node declares no rework) and `gateAttempt` (the 1-based
        visit number of the current gate — initial visit = 1). They surface
        through the pending-HITL read model so the UI can render
        "Rework loop N of M" and disable rework at the boundary. The
        validation step rejects a `rework` decision with 422 (`NEEDS_INPUT`)
        when `gateAttempt > maxLoops` (total allowed gate visits =
        `maxLoops + 1`); the engine's `CONFIG` re-entry throw remains the
        backstop. Line-anchored review comments are drafted through the
        separate `/api/runs/{runId}/review-comments` routes BEFORE the
        decision — never through this route; at rework consumption the
        runner composes the open threads into the node's `commentsVar`
        payload (zero open threads ⇒ byte-identical to the raw `comments`
        summary).

        On every success path the body returns `runStatus: "NeedsInput"`
        — the runner (not this route) is the single owner of the
        `NeedsInput → Running` transition.
      operationId: respondHitl
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: hitlRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HitlResponseBody" }
            examples:
              permission-select:
                summary: Approve a pending permission
                value:
                  optionId: "allow"
              form-typed:
                summary: Structured form response
                value:
                  response:
                    approved: true
                    comments: "lgtm"
              review-rework:
                summary: (M11a) Graph review — rework with comments
                value:
                  response:
                    decision: "rework"
                    comments: "Tighten the error handling in the parser."
                    workspacePolicy: "keep"
              review-approve:
                summary: (M11a) Graph review — approve
                value:
                  response:
                    decision: "approve"
      responses:
        "200":
          description: |
            Response durably recorded. For permission, the supervisor
            deferred was resolved. For form/human, the input artifact
            was written and `runFlow` was queued.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runStatus:
                    type: string
                    enum: [NeedsInput]
                    description: |
                      Row state at response time. The runner promotes
                      the run to `Running` as soon as it picks up the
                      work.
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller is not a `member` or above for the run's project
            (`UNAUTHORIZED`), or the authenticated account must change its
            password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "400":
          description: |
            Malformed body (`CONFIG`) — JSON parse failure or missing
            required field for the kind (e.g. permission without
            `optionId`, form/human without `response`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            One of: HITL row already delivered with a different payload
            (`CONFLICT`), run is in a terminal status (`CONFLICT`), or
            an `optionId` claim conflicts with a prior claim
            (`CONFLICT`). Identifies a retry contract violation, not a
            server bug.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "202":
          description: |
            M8 idle-branch: claim succeeded and `resumeRun` spawned a
            fresh supervisor session. Returns 202
            `{ ok: true, runStatus: "NeedsInput", state: "resume-in-progress" }`.
            Auto-delivery against the new requestId happens asynchronously
            inside the runner-agent (typically 5-60 s). Subsequent
            same-payload retries while `respondedAt IS NULL` keep
            returning 202; after auto-delivery completes the retries
            return 200 idempotent.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runStatus: { type: string, enum: ["NeedsInput"] }
                  state: { type: string, enum: ["resume-in-progress"] }
        "410":
          description: |
            Either (M7) permission deferred expired before delivery
            (`HITL_TIMEOUT`) — flow runs transition to `Failed`, while
            scratch runs transition to `Crashed` and record
            `scratch_runs.error_code = HITL_TIMEOUT`; or (M8 idle branch)
            `resumeRun` failed terminally (`CHECKPOINT`) — supervisor
            400 / 404 / 201-with-empty-acpSessionId. The idle-branch
            response includes `terminal: true`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: |
            Response payload did not validate against the stored HITL
            schema (`NEEDS_INPUT`). `respondedAt` remains null — the
            user can resubmit with a fixed payload. **(M11a — Designed)**
            also returned when a graph `human_review` `response.decision`
            (or its resolved target / `workspacePolicy`) is not in the
            allow-list stored in `hitl_requests.schema`; no artifact is
            written and no state is mutated. **(Implemented — ADR-072)** also
            returned when a `rework` decision is submitted past the loop
            boundary (`schema.gateAttempt > schema.maxLoops`; total visits =
            `maxLoops + 1`) — rejected at validate time instead of letting
            the engine `CONFIG`-fail the whole run.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            Retryable failure (`EXECUTOR_UNAVAILABLE`). Examples:
            supervisor unreachable on permission delivery, artifact
            write failed with I/O error. `respondedAt` remains null;
            response is durably stored so a retry replays the same
            value.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/review-comments:
    get:
      tags: [review-comments]
      summary: Implemented (ADR-072) — list review-comment threads with placement
      description: |
        Requires project membership at `viewer` or above
        (`requireProjectAction("readBoard")`); `projectId` is derived from the
        run row, never the body. NOT status-gated — thread history stays
        visible after the gate closes, like the diff.

        Returns the run's review-comment threads (root + replies) with a
        computed `placement` per thread: exactly one DB query for the run's
        comments plus AT MOST one in-memory parse of the server-recomputed
        committed `base..branch` diff (no N+1; a run with zero threads
        short-circuits without computing the diff). `placement = "inline"`
        iff the stored `lineContent` exactly matches the current diff at the
        same `(filePath, side, line)`; otherwise `"outdated"` (no fuzzy
        re-anchoring; placement is never stored). Threads whose file fell past
        a `truncated` diff bound render as `outdated`; an unavailable diff
        source (removed/GC'd workspace) degrades every placement to
        `outdated` — the read returns 200, never a 500.
      operationId: getRunReviewComments
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Review-comment threads with computed placement.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReviewCommentThreadsResponse" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [review-comments]
      summary: Implemented (ADR-072) — create a root comment or a reply
      description: |
        Requires project membership at `member` or above
        (`requireProjectAction("answerHitl")`); `projectId` is derived from
        the run row. Guarded by the **open-review-gate allow-list**:
        `runs.status ∈ PENDING_HITL_RUN_STATUS` (= `{NeedsInput,
        NeedsInputIdle}`) AND a pending `hitl_requests` row
        (`respondedAt IS NULL`) with `kind = "human"` and
        `schema.review === true` must exist — otherwise 409 `PRECONDITION`.
        The new comment references that row (`hitlRequestId`,
        `gateAttempt`). The write NEVER touches `runs.status` and is a single
        DB transaction with no artifact write and no supervisor call.

        Body is a shape-discriminated union: a ROOT comment
        (`{filePath, side, line, body}`) or a REPLY (`{parentId, body}`).
        For a root, the anchor is validated against the server-recomputed
        diff (the same `diffRunWorkspace` + `lib/diff/prepare.ts` source the
        view renders) and `lineContent` is extracted server-side — the client
        never supplies it. A `truncated` diff, a `filePath` absent from the
        parsed diff, or a `line` absent on the named side → 409
        `PRECONDITION`. For a reply, `parentId` must resolve to a ROOT
        comment of the SAME run (server-state compare) → 409 `CONFLICT`
        otherwise. `author_user_id`/`author_label` come from the session,
        never the body. `filePath` is opaque anchor DATA — never used as a
        filesystem path component.
      operationId: postRunReviewComment
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostReviewCommentBody" }
            examples:
              root:
                summary: Anchored root comment
                value:
                  filePath: "web/lib/flows/hitl-validate.ts"
                  side: "new"
                  line: 42
                  body: "This guard misses the idle status."
              reply:
                summary: Reply to a root comment
                value:
                  parentId: "0b6cbb0e-6b9e-4d27-9a44-1f0d6a3e7f10"
                  body: "Fixed in the next attempt."
      responses:
        "201":
          description: Comment created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReviewCommentResponse" }
        "400":
          description: |
            Malformed body (`CONFIG`) — zod validation failure: neither a
            valid root nor a valid reply shape, empty `body`, or `body`
            over 10 000 chars.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            Either the review gate is not open (`PRECONDITION` — wrong
            `runs.status` or no pending review-gate HITL row), the anchor
            cannot be validated (`PRECONDITION` — diff `truncated`, file
            absent from the parsed diff, or line absent on that side), or a
            reply's `parentId` is not a root comment of this run
            (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/runs/{runId}/review-comments/{commentId}:
    patch:
      tags: [review-comments]
      summary: Implemented (ADR-072) — edit body (author-only) or resolve/unresolve (root-only)
      description: |
        Requires `answerHitl` (member) + the same open-review-gate guard as
        POST (409 `PRECONDITION` otherwise). The row is loaded and
        `row.run_id === runId` is compared server-state — mismatch or unknown
        `commentId` → 404. Body is a shape-discriminated union — exactly one
        of:

        - `{body}` — edit the comment text. **Author-only**
          (`author_user_id` must equal the session user) → 403
          `UNAUTHORIZED` otherwise. Sets `updated_at`.
        - `{status: "open" | "resolved"}` — resolve or re-open a thread.
          **Root-only** (a reply target → 409 `CONFLICT`); allowed for any
          `answerHitl` member. Resolving sets
          `resolved_by_user_id`/`resolved_at`; re-opening clears them.

        Writes never touch `runs.status`; single DB transaction, no
        side-effects.
      operationId: patchRunReviewComment
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: commentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchReviewCommentBody" }
            examples:
              edit:
                summary: Author edits the text
                value: { body: "Clarified — see the updated diff line." }
              resolve:
                summary: Any member resolves the thread
                value: { status: "resolved" }
      responses:
        "200":
          description: Updated comment.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReviewCommentResponse" }
        "400":
          description: |
            Malformed body (`CONFIG`) — zod validation failure: neither
            `{body}` nor `{status}` alone, empty `body`, `body` over
            10 000 chars, or an unknown `status` value.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          description: |
            Caller is not a `member` or above (`UNAUTHORIZED`), the account
            must change its password first (`PASSWORD_CHANGE_REQUIRED`), or a
            `{body}` edit was attempted by a non-author (`UNAUTHORIZED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            The review gate is not open (`PRECONDITION`), or `{status}` was
            targeted at a reply (`CONFLICT` — resolve is root-only).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    delete:
      tags: [review-comments]
      summary: Implemented (ADR-072) — delete a comment (author-only; root cascades replies)
      description: |
        Requires `answerHitl` (member) + the open-review-gate guard (409
        `PRECONDITION` otherwise). **Author-only** → 403 `UNAUTHORIZED` for a
        non-author. `row.run_id === runId` compared server-state — mismatch
        or unknown `commentId` → 404. Deleting a root cascades its replies
        (`parent_id` FK `ON DELETE CASCADE`). Single DB transaction; never
        touches `runs.status`.
      operationId: deleteRunReviewComment
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: commentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Comment deleted (replies cascaded for a root). No body.
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          description: |
            Caller is not a `member` or above, the account must change its
            password first, or the caller is not the comment's author
            (`UNAUTHORIZED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The review gate is not open (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/runs/{runId}/takeover/claim:
    post:
      tags: [takeover]
      summary: (M11b) Claim a run for manual takeover (local worktree handoff)
      description: |
        (M11b — Implemented. Reflects HEAD-after-M11b.)

        Claims a run parked at an M11a `human_review` node for a LOCAL worktree
        handoff (ADR-030). The run transitions `NeedsInput → HumanWorking` (a real
        `runs.status`). The EXISTING worktree path + run branch are exposed; NO new
        branch, target, PR, remote, or supervisor session is created — the reviewer
        edits in place on the same host.

        Requires project membership at `member` or above
        (`requireProjectAction("answerHitl")`); role-restricted claim is M13.
        The claim is a status-guarded CAS
        (`UPDATE runs SET status='HumanWorking' WHERE id=:id AND status='NeedsInput'`);
        a concurrent loser returns 409 `CONFLICT`. The current node must be a
        `human_review` node whose pinned-manifest `finish.human.decisions` includes
        `takeover`, else 409 `PRECONDITION`.

        **Identifier trust (per-route).** No body-controlled field — the body is
        empty:

        | Identifier | Source | Trust |
        | ---------- | ------ | ----- |
        | `runId` | path parameter, route-shape validated | `url-param` |
        | `userId` (claim owner) | Auth.js session | `auth-context` |
        | `projectId` | DB join from the run row | `server-state` |
        | current `human_review` node id | `runs.current_step_id` | `server-state` |

        No new `MaisterError` code (ADR-008 closed union): wrong state /
        non-`human_review` node → `PRECONDITION`; concurrent claim → `CONFLICT`.
      operationId: claimTakeover
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: |
            Claim recorded. The run is now `HumanWorking`; the response carries the
            checkout context (the EXISTING worktree path + run branch).
          content:
            application/json:
              schema:
                type: object
                required: [worktreePath, branch, ownerUserId]
                properties:
                  worktreePath:
                    type: string
                    description: Existing `workspaces.worktree_path` (server-state).
                  branch:
                    type: string
                    description: Existing `workspaces.branch` — the run branch (no new branch).
                  ownerUserId:
                    type: string
                    description: The claiming user (`users.id` from the Auth.js session).
              examples:
                claimed:
                  summary: Claim succeeded
                  value:
                    worktreePath: /repos/my-app/.maister/my-app/runs/abc/worktree
                    branch: maister/task-42-attempt-1
                    ownerUserId: 8f1c2e34-...
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Run not found, or not visible to the caller's projects.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            One of (`MaisterErrorBody`):
            - run is not `NeedsInput`, or the current node is not a `human_review`
              node offering the `takeover` decision (`PRECONDITION`);
            - a concurrent claim won the CAS first (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/takeover/return:
    post:
      tags: [takeover]
      summary: (M11b) Return a manually-taken-over run for re-validation
      description: |
        (M11b — Implemented. Reflects HEAD-after-M11b.)

        Returns a `HumanWorking` run after the reviewer has committed locally in the
        exposed worktree (ADR-030). The route runs `git log <base>..<branch>` +
        `git diff <base>..<branch>` against the EXISTING worktree, records the
        returned commit set + raw diff on the takeover `node_attempts` row, marks the
        validation re-entry node and its downstream STALE (M11a
        `markDownstreamStale`), flips the run `HumanWorking → Running`, and resumes
        the graph runner at the `human_review` node's `transitions.takeover` target
        (a validation node — `checks`) so the staled gates rerun over the human's
        commits and a fresh `human_review` gate is produced.

        Requires the session user to equal the recorded `owner_user_id`
        (owner-only in M11b; "take over stale work" by another user is M13).

        **Body is EMPTY.** The worktree path, branch, base ref, and owner are ALL
        derived server-side — the route NEVER accepts a body field naming a
        filesystem path, branch, or ref.

        **Identifier trust (per-route).**

        | Identifier | Source | Trust |
        | ---------- | ------ | ----- |
        | `runId` | path parameter | `url-param` |
        | `userId` (must equal current owner) | Auth.js session | `auth-context` |
        | `projectId`, `worktreePath`, `branch`, `mainBranch` | DB join run → workspace → project | `server-state` |
        | `baseRef` | `resolveBaseRef` over server-state branch/mainBranch | `server-state` |

        **Two-phase commit (downstream side-effect).**
        1. **Phase 1 — intent read.** Under `SELECT … FOR UPDATE` on the run row,
           assert `status='HumanWorking'` AND `owner_user_id = session.userId` AND
           not terminal. No AFTER-side marker yet.
        2. **Phase 2 — side-effect.** `resolveBaseRef` → `logRange` → `diffRange` →
           write `returned_commits`/`returned_diff`/`base_ref` on the takeover
           `node_attempts` row → `markDownstreamStale(runId, [reentryNode,
           …downstreamOf(reentryNode)])` (re-entry node INCLUDED).
        3. **Phase 3 — AFTER-side marker.** `markReturnedToRunning` (the
           `status='Running'` flip + the takeover row's `ended_at`) is the
           idempotency marker — set ONLY after Phase 2 fully succeeds. Then the
           runner resume is queued.

        A retry against an already-returned run (now `Running`/later) returns 409
        `PRECONDITION`, never a re-import.

        **Failure classification.**

        | Failure class | HTTP | Run/ledger state | Retry |
        | ------------- | ---- | ---------------- | ----- |
        | Run not `HumanWorking` (already returned / wrong state) | 409 `PRECONDITION` | unchanged | terminal — no re-import |
        | Session user ≠ `owner_user_id` | 403 `UNAUTHORIZED` | unchanged | not retryable by this actor |
        | Worktree dirty (uncommitted tracked edits or untracked files, `git status --porcelain` non-empty) | 409 `CONFLICT` | stays `HumanWorking`; NO ledger write; NO status flip | retryable after the operator commits or discards the changes |
        | Empty return (`base..branch` has zero commits) | 409 `CONFLICT` | stays `HumanWorking`; NO ledger write; NO status flip | retryable after the operator commits, or release instead |
        | `git log`/`git diff`/`merge-base` fails (worktree gone, git error) | 409 `CONFLICT` | stays `HumanWorking`; NO ledger write; NO status flip | retryable after operator fixes the worktree |
        | `markDownstreamStale` / ledger write throws mid-side-effect | 503 `EXECUTOR_UNAVAILABLE` | stays `HumanWorking`; partial write guarded by transaction; status NOT flipped | retryable — `FOR UPDATE` re-read still finds `HumanWorking` |
        | Graph-runner resume kickoff fails AFTER the status flip | 200 (return recorded) | `Running` | if the process dies after the AFTER-side flip but before the runner attaches, the run is recovered on startup by the takeover-return recovery sweep (idempotent re-dispatch) — see `manual-takeover.md` |

        No new `MaisterError` code (ADR-008 closed union).
      operationId: returnTakeover
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: |
            Return recorded. The takeover `node_attempts` row holds the returned
            commits + raw diff + base ref; downstream gates are stale; the run is now
            `Running` and the runner has been queued to rerun the validation path.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runStatus:
                    type: string
                    enum: [Running]
                    description: |
                      AFTER-side marker. The runner reruns the staled validation
                      path and re-opens a fresh `human_review` HITL.
                  returnedCommitCount:
                    type: integer
                    description: Number of commits in `git log <base>..<branch>` (display only).
              examples:
                returned:
                  summary: Return succeeded
                  value:
                    ok: true
                    runStatus: Running
                    returnedCommitCount: 3
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          description: |
            Session user is not the recorded takeover owner (`UNAUTHORIZED`), or the
            account must change its password first (`PASSWORD_CHANGE_REQUIRED`). Run
            unchanged.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "404":
          description: Run not found, or not visible to the caller's projects.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            One of (`MaisterErrorBody`):
            - run is not `HumanWorking` (already returned / wrong state)
              (`PRECONDITION`);
            - the worktree has uncommitted tracked edits or untracked files
              (`git status --porcelain` non-empty) (`CONFLICT`) — no ledger write,
              no status flip; retryable after the operator commits or discards;
            - the return is empty (`base..branch` has zero commits) (`CONFLICT`) —
              no ledger write, no status flip; retryable after the operator commits
              or releases instead;
            - a `git log`/`git diff`/`merge-base` op failed against the worktree
              (`CONFLICT`) — no ledger write, no status flip; retryable.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            Retryable failure (`EXECUTOR_UNAVAILABLE`): a ledger / staleness write
            threw mid-side-effect. The run stays `HumanWorking` (status NOT flipped);
            the `FOR UPDATE` re-read on retry finds it still `HumanWorking` and
            replays.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/abandon:
    post:
      tags: [runs]
      summary: (M11b) Abandon a run (user-initiated terminal stop)
      description: |
        (M11b — Implemented. Reflects HEAD-after-M11b.)

        User-facing run abandon. Flips the run to the terminal `Abandoned`
        status (`markAbandoned` sets `runs.status='Abandoned'` + `ended_at`) and
        then promotes the next queued `Pending` run to free the slot
        (`promoteNextPending`). The promote step is best-effort — a failure is
        logged and swallowed, never surfaced to the caller (the abandon already
        committed).

        **`HumanWorking`-specific behavior.** A `HumanWorking` run is first
        released back to `NeedsInput` (`releaseHumanWorking`, the
        release-without-changes path) so the standard abandon transition fires
        from a known non-terminal status — `markAbandoned`'s status guard does
        NOT include `HumanWorking`. The original review HITL re-opening is moot
        once the run is abandoned. Releasing the takeover claim before abandoning
        also frees its held concurrency slot for `promoteNextPending`.

        Requires project membership at `member` or above
        (`requireProjectAction("answerHitl")`). Run-level abandon is NOT
        task-level abandon — the task may auto-return to `Backlog` for a retry.

        **Body is EMPTY.**

        **Identifier trust (per-route).**

        | Identifier | Source | Trust |
        | ---------- | ------ | ----- |
        | `runId` | path parameter, route-shape validated | `url-param` |
        | `projectId` | DB join from the run row | `server-state` |
        | current `runs.status` | DB row, CAS-guarded by `markAbandoned` | `server-state` |

        The abandon transition is a status-guarded CAS over the abandonable set
        `{Pending, Running, NeedsInput, NeedsInputIdle, Review, Crashed}`
        (`HumanWorking` is reached via the release path above). A row already in
        a terminal status (`Done`/`Abandoned`/`Failed`) loses the CAS → 409
        `PRECONDITION`.

        No new `MaisterError` code (ADR-008 closed union): not-found → 404
        `PRECONDITION`; non-abandonable status → 409 `PRECONDITION`.
      operationId: abandonRun
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: |
            Run abandoned. The run is now terminal `Abandoned`; the next queued
            `Pending` run (if any) has been promoted to fill the freed slot.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runStatus:
                    type: string
                    enum: [Abandoned]
                    description: Terminal AFTER-side status.
              examples:
                abandoned:
                  summary: Abandon succeeded
                  value:
                    ok: true
                    runStatus: Abandoned
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Run not found (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: |
            Run is not in an abandonable status — it is already terminal
            (`Done`/`Abandoned`/`Failed`) and lost the status-guarded CAS
            (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/recover:
    post:
      tags: [reconciliation-gc]
      summary: (M19) Recover a Crashed run
      description: |
        (Implemented, M19 — ADR-034.)

        Recovers a `Crashed` flow run via a hybrid plan decided by
        `classifyRecover(run, nodeKind, retrySafe)` over the **recover target
        node** — `runs.resume_target_step_id` (the node id retained at crash
        time; `current_step_id` is nulled on crash), falling back to
        `current_step_id` for live/hand-seeded rows:

        | recover target node | `acpSessionId` | node `retry_safe` | plan | result |
        | ------------------- | -------------- | ----------------- | ---- | ------ |
        | `ai_coding` (agent) | present | ignored | `resume-agent` — ACP `session/resume <acpSessionId>` | 200 resumed / 202 queued |
        | `ai_coding` (agent) | null | ignored | `discard-only` | 409 |
        | session-less (`cli`/`check`/`judge`/`guard`/`human`) | irrelevant | `true` | `redispatch` — re-run the node | 200 redispatched / 202 queued |
        | session-less | irrelevant | `false` (default) | `discard-only` | 409 |
        | unresolvable target node | — | — | `discard-only` | 409 |

        An agent node is recovered by continuing its prior ACP session; a
        session-less node has no resumable session and is only redispatchable
        when its manifest config opts in with `retry_safe: true` (re-running a
        session-less node repeats its side effects — accepted-risk). Otherwise
        the run is discard-only.

        Requires project membership at `member` or above
        (`requireProjectAction("recoverRun")`). The `projectId` is derived from
        the run row (`server-state`); `runId` is the URL parameter
        (`url-param`). **Body is EMPTY** — base/target refs, current node, and
        `acpSessionId` are all derived server-side.

        **Durable-marker-before-side-effect (ADR-034 / §3.2).** Phase 1 (one tx
        under the scheduler advisory lock): `SELECT … FOR UPDATE`, CAS
        `WHERE status='Crashed'`, then re-admit through the global concurrency
        cap (a `Crashed` run already released its slot — Recover is a re-launch,
        NOT a cap bypass). On a free slot the run flips `Crashed→Running` with
        `runs.resume_started_at = now()` and proceeds to Phase 2
        (`createSession({resumeSessionId})`). On a full cap the run flips
        `Crashed→Pending` (retaining `acpSessionId`, stamping
        `resume_started_at`) and returns `202 {state:"queued"}` with NO
        supervisor call — the scheduler resumes it when a slot frees. The
        reconcile engine (ADR-033) is the single recovery mechanism for every
        crash/ambiguity window thereafter.

        No new `MaisterError` code (ADR-008 closed union): unresumable acp
        session → `CHECKPOINT` (410); not `Crashed` / concurrent recover →
        `CONFLICT` (409); transient supervisor failure → `EXECUTOR_UNAVAILABLE`
        (503), run left `Running` for the reconciler to re-attach or re-crash.

        **Identifier trust (per-route).**

        | Identifier | Source | Trust |
        | ---------- | ------ | ----- |
        | `runId` | path parameter, route-shape validated | `url-param` |
        | `userId` | Auth.js session | `auth-context` |
        | `projectId` | DB join from the run row | `server-state` |
        | `acpSessionId`, recover target node (`resume_target_step_id`) | DB row / pinned manifest | `server-state` |
      operationId: recoverRun
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: |
            Run resumed now. A slot was free, so the run flipped
            `Crashed→Running` and the supervisor restored the session via the
            ACP `session/resume` call.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runStatus:
                    type: string
                    enum: [Running]
                    description: AFTER-side marker — the driver attaches at the resume target node.
        "202":
          description: |
            Cap full at admission. The run flipped `Crashed→Pending` (retaining
            `acpSessionId`); the scheduler resumes it via the same
            `session/resume` path when a slot frees. No supervisor session was created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecoverQueuedResponse" }
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: |
            Run is not in `Crashed`, or a concurrent Recover won the Phase-1 CAS
            first (run is now `Running`/`Pending`) — a duplicate `createSession`
            is impossible — or `classifyRecover` resolved to `discard-only` (an
            agent target node with no `acpSessionId`, a session-less target node
            that is not `retry_safe`, or an unresolvable target node), so only
            Discard is offered (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "410":
          description: |
            The stored acp session is unresumable — supervisor refused the
            `session/resume` (`CHECKPOINT`). The run is `Crashed`; surface discard-only.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: |
            Transient supervisor failure (5xx / network / timeout) during the
            `createSession` side-effect (`EXECUTOR_UNAVAILABLE`). The run is
            left `Running` — NO rollback (an ack may have been lost and a
            session may be live); the reconciler re-attaches if it came up, else
            re-crashes past the grace window. Retryable.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/discard:
    post:
      tags: [reconciliation-gc]
      summary: (M19) Discard a run into the GC countdown
      description: |
        (Designed, M19 — ADR-034 / ADR-035. Code lands in Phase 3.)

        Marks a run `Abandoned` and enters the workspace GC countdown. This is a
        single terminal action — it does **NOT** synchronously remove the
        worktree. The worktree is left in place showing the TTL color-ramp
        countdown and is preserved-then-pruned by the GC sweep
        (`MAISTER_GC_AGE_DAYS`), exactly like any other Abandoned run.

        One tx: `markAbandoned` (allow-list incl. `Crashed`) stamps
        `workspaces.scheduled_removal_at = endedAt + MAISTER_GC_AGE_DAYS`, then
        `promoteNextPending` frees the slot. Idempotent on an already-terminal
        run: a same-state retry returns 200; a conflicting non-terminal state
        returns 409. No worktree side-effect means no removal-failure path.

        Requires project membership at `member` or above
        (`requireProjectAction("recoverRun")`). The `projectId` is derived from
        the run row (`server-state`); `runId` is the URL parameter
        (`url-param`). **Body is EMPTY.**

        No new `MaisterError` code (ADR-008 closed union): conflicting
        non-terminal state → `CONFLICT` (409).
      operationId: discardRun
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: |
            Run marked `Abandoned` and entered the GC countdown (the worktree
            stays for preserve-then-prune). Returned unchanged on an idempotent
            same-state retry.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runStatus]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runStatus:
                    type: string
                    enum: [Abandoned]
                    description: Terminal AFTER-side status.
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: |
            Run is in a conflicting non-terminal state that is not discardable
            (`CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/stop:
    post:
      tags: [runs]
      summary: Implemented — stop a live run, dispatched on run kind (flow, scratch, agent)
      description: |
        Stops a live run without deleting its worktree, dispatching on
        `runs.run_kind` (allow-listed `flow | scratch | agent`; an unknown kind
        is refused with `PRECONDITION`). In every kind the route resolves the
        live supervisor session from server-side `runs.acp_session_id` via
        `listSessions()` and calls `deleteSession(sessionId)` when found, then
        clears live ACP/current-step handles.

        - **flow** (Implemented) → `runs.status = Review`, active assignments
          closed.
        - **scratch** → `Review` when the run still has a live
          worktree, otherwise `Abandoned` (shared scratch-stop primitive; the
          dedicated `POST /api/scratch-runs/{runId}/stop` route delegates to the
          same primitive).
        - **agent** → finalized to `Abandoned` via `finalizeAgentRun`
          (which also frees the agent pool slot); the route MUST `deleteSession`
          because `finalizeAgentRun` does not.

        Requires project membership at `member` or above
        (`requireProjectAction("recoverRun")`). Body is empty; run kind, project
        id, workspace, and session handles are server-derived.
      operationId: stopRunWorkbench
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Run is parked (`Review`) or terminated (`Abandoned`).
          content:
            application/json:
              schema:
                type: object
                required: [ok, runId, runStatus, supervisorStopped]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runId: { type: string }
                  runStatus: { type: string, enum: [Review, Abandoned] }
                  supervisorStopped: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Run is not in a stoppable live state, or run kind is unsupported.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: Supervisor delete/list failed transiently.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/stop-archive:
    post:
      tags: [runs]
      summary: Implemented — stop a live flow or scratch run, then archive
      description: |
        Combined live action: stop the run (commits a parked status first —
        `Review` for flow, `Review` for scratch with a live worktree), then run
        `archiveWorkbench` (preserve the worktree, record
        `workspaces.archived_branch` / `archived_at`, leave it on disk). Returns
        the archive result plus `supervisorStopped` from the stop step.

        Flow and scratch only. The stop commit is durable before the archive, so
        an archive failure leaves the run in `Review`, retryable through the
        plain `archive` route — no extra idempotency marker. Body is empty; run
        kind, project, session, and paths are server-derived. Requires
        `requireProjectAction("recoverRun")` (authorized once for the combined
        operation).
      operationId: stopArchiveRunWorkbench
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Run stopped and worktree preserved.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runId, archived, archivedBranch, snapshotted, supervisorStopped]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runId: { type: string }
                  archived: { type: boolean }
                  archivedBranch: { type: string, nullable: true }
                  snapshotted: { type: boolean }
                  supervisorStopped: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Not stoppable, unsupported run kind, or preserve failure (run left in `Review`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: Supervisor delete/list failed transiently (run unchanged).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/stop-drop:
    post:
      tags: [runs]
      summary: Implemented — stop a live flow run, then drop
      description: |
        Combined live action for flow runs: stop the run (commits `Review`
        first), then run `dropWorkbench` (preserve, remove the owned worktree,
        record `removed_at`, mark the run `Abandoned`). Returns the drop result
        plus `supervisorStopped`.

        Flow only — scratch `Stop & drop` reuses the single-transaction
        `POST /api/scratch-runs/{runId}/discard` instead. The stop commit is
        durable before the drop, so a drop failure leaves the run in `Review`,
        retryable through the plain `drop` route. Body is empty; run kind,
        project, session, and paths are server-derived. Requires
        `requireProjectAction("recoverRun")` (authorized once).
      operationId: stopDropRunWorkbench
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Run stopped and worktree removed.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runId, runStatus, workspaceRemoved, archivedBranch, supervisorStopped]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runId: { type: string }
                  runStatus: { type: string, enum: [Abandoned] }
                  workspaceRemoved: { type: boolean, enum: [true] }
                  archivedBranch: { type: string, nullable: true }
                  supervisorStopped: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Not stoppable, unsupported run kind, preserve failure, or stale run-status CAS (run left in `Review`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: Supervisor delete/list failed transiently (run unchanged).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/archive:
    post:
      tags: [runs]
      summary: Implemented — preserve a stopped or terminal workbench
      description: |
        Calls `preserveWorktree` for a non-live workbench and records
        `workspaces.archived_branch` / `archived_at` when an archive ref is
        created. The worktree remains on disk. Live write states are refused.
      operationId: archiveRunWorkbench
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Preserve completed.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runId, archived, archivedBranch, snapshotted]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runId: { type: string }
                  archived: { type: boolean }
                  archivedBranch: { type: string, nullable: true }
                  snapshotted: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Live state, missing/removed workspace, or preserve failure.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/drop:
    post:
      tags: [runs]
      summary: Implemented — preserve then remove an owned worktree
      description: |
        Calls `preserveWorktree`, then removes the worktree through
        `removeOwnedWorktree({ allowedRoot: worktreesRoot(), force: true })`,
        then records `removed_at` only if the run status still matches the
        pre-removal status read by the service. Non-`Done` runs become
        `Abandoned`; `Done` stays `Done`. Scratch metadata is moved to
        `Abandoned` when applicable.
      operationId: dropRunWorkbench
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Worktree was removed after preservation.
          content:
            application/json:
              schema:
                type: object
                required:
                  [ok, runId, runStatus, workspaceRemoved, archivedBranch]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runId: { type: string }
                  runStatus:
                    type: string
                    enum: [Done, Abandoned]
                  workspaceRemoved: { type: boolean, enum: [true] }
                  archivedBranch: { type: string, nullable: true }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Live state, missing/removed workspace, preserve failure, stale run-status CAS, or unsafe removal.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/export-branch:
    post:
      tags: [runs]
      summary: Implemented — push a workbench branch for local handoff
      description: |
        Pushes the server-owned run branch to the selected remote. Dirty
        worktrees require `snapshotDirty=true` and a non-empty `commitMessage`;
        otherwise the route returns `409 PRECONDITION` and does not push. The
        selected remote must already exist and is checked before lifecycle claim.
        A non-fast-forward push returns `409 CONFLICT` with
        `pushRejected=non_fast_forward` and `canForce=true`; retrying with
        `force=true` uses `git push --force-with-lease`. Successful responses
        include the pushed ref and two non-chained checkout commands.
      operationId: exportRunWorkbenchBranch
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                remote:
                  type: string
                  default: origin
                snapshotDirty:
                  type: boolean
                  default: false
                commitMessage:
                  type: string
                  nullable: true
                force:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Branch pushed.
          content:
            application/json:
              schema:
                type: object
                required:
                  [
                    ok,
                    runId,
                    branch,
                    remote,
                    pushedRef,
                    snapshotCreated,
                    checkoutCommands,
                  ]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runId: { type: string }
                  branch: { type: string }
                  remote: { type: string }
                  pushedRef: { type: string }
                  snapshotCreated: { type: boolean }
                  checkoutCommands:
                    type: array
                    items: { type: string }
        "400":
          description: Invalid body.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Live state, missing/removed workspace, missing remote, dirty worktree without snapshot consent, lifecycle claim race, or non-fast-forward push conflict.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: Git push failed or credentials/remote unavailable.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/handoff-metadata:
    get:
      tags: [runs]
      summary: Implemented — inspect workbench handoff readiness
      description: |
        Returns dirty/clean state, validated git remotes, the server-owned run
        branch, a suggested handoff branch, and non-chained checkout command
        previews. This route is read-only. It derives project, workspace path,
        branch, and parent repo path from DB state; the body is ignored because
        GET has no request body.
      operationId: getRunWorkbenchHandoffMetadata
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Handoff metadata resolved.
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - runId
                  - branch
                  - dirty
                  - remotes
                  - defaultRemote
                  - suggestedHandoffBranch
                  - checkoutCommands
                properties:
                  ok: { type: boolean, enum: [true] }
                  runId: { type: string }
                  branch: { type: string }
                  dirty: { type: boolean }
                  remotes:
                    type: array
                    items: { type: string }
                  defaultRemote: { type: string, nullable: true }
                  suggestedHandoffBranch: { type: string }
                  checkoutCommands:
                    type: array
                    items: { type: string }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Missing/removed workspace, live state, or git metadata read conflict.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/snapshot-commit:
    post:
      tags: [runs]
      summary: Implemented — commit dirty workbench changes
      description: |
        Creates one snapshot commit on the server-owned run branch with
        `git add -A` and `git commit --no-verify`. The route refuses clean
        worktrees, live write states, and removed workspaces. It does not push,
        archive, drop, promote, or create a branch. Body-controlled fields are
        limited to the commit message; project, branch, paths, and session
        handles are DB-derived. Unknown body fields are rejected.
      operationId: snapshotRunWorkbenchCommit
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [commitMessage]
              properties:
                commitMessage:
                  type: string
                  minLength: 1
                  maxLength: 4096
      responses:
        "200":
          description: Snapshot commit created.
          content:
            application/json:
              schema:
                type: object
                required: [ok, runId, branch, commit, snapshotCreated]
                properties:
                  ok: { type: boolean, enum: [true] }
                  runId: { type: string }
                  branch: { type: string }
                  commit: { type: string }
                  snapshotCreated: { type: boolean, enum: [true] }
        "400":
          description: Invalid body.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Clean worktree, live state, missing/removed workspace, lifecycle claim race, or git commit conflict.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/runs/{runId}/handoff-branch:
    post:
      tags: [runs]
      summary: Implemented — create and push a continuation branch
      description: |
        Creates a handoff branch at the workbench HEAD without switching the
        server-owned run worktree, pushes that handoff branch to a selected
        existing remote, and returns copyable checkout commands. Existing local
        or remote refs are reused only when they already point at the same
        workbench HEAD, so retries after lost push acknowledgements are
        idempotent. The route refuses dirty worktrees; operators must
        snapshot-commit first. Body-controlled fields are limited to `remote`
        and `handoffBranch`.
        Project, workspace path, current run branch, and HEAD commit are
        server-derived. Unknown body fields are rejected.
      operationId: createRunWorkbenchHandoffBranch
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [remote, handoffBranch]
              properties:
                remote:
                  type: string
                  minLength: 1
                  maxLength: 255
                handoffBranch:
                  type: string
                  minLength: 1
                  maxLength: 255
      responses:
        "200":
          description: Handoff branch is ready locally/remotely.
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - runId
                  - branch
                  - handoffBranch
                  - remote
                  - pushedRef
                  - headCommit
                  - checkoutCommands
                properties:
                  ok: { type: boolean, enum: [true] }
                  runId: { type: string }
                  branch: { type: string }
                  handoffBranch: { type: string }
                  remote: { type: string }
                  pushedRef: { type: string }
                  headCommit: { type: string }
                  checkoutCommands:
                    type: array
                    items: { type: string }
        "400":
          description: Invalid body.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Dirty worktree, missing/removed workspace, lifecycle claim race, missing remote, different-head branch collision, or local git conflict.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "503":
          description: Remote branch existence check or push failed transiently.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
  /api/account/tokens:
    get:
      tags: [account]
      summary: (0063 Implemented) List personal API tokens
      description: |
        Requires an active Auth.js session. Returns only account-level personal
        tokens owned by the signed-in user (`project_id IS NULL`,
        `token_kind=user`). It never returns plaintext token material,
        `token_hash`, or another user's token metadata.

        Identifier labels:

        | Identifier | Source | Trust |
        | --- | --- | --- |
        | owner user id | auth-context | trusted after DB-authoritative session load |

        Audit/logging: no `token_audit_log` row is written for session-auth
        lifecycle reads. Server logs, if emitted, must not include plaintext
        token, token hash, Authorization headers, or held scope lists.
      operationId: listAccountTokens
      responses:
        "200":
          description: Personal token list (no secrets).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListAccountTokensResponse" }
              examples:
                default:
                  value:
                    tokens:
                      - id: "tok_123"
                        name: "Personal agent"
                        kind: "user"
                        ownerUserId: "user_123"
                        ownerLabel: "Alex"
                        scopes: ["tasks:read", "hitl:inbox:read"]
                        humanHitl: false
                        prefix: "mai_abcd1234"
                        createdAt: "2026-06-23T12:00:00.000Z"
                        lastUsedAt: null
                        expiresAt: null
                        revokedAt: null
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [account]
      summary: (0063 Implemented) Create a personal API token
      description: |
        Requires an active Auth.js session. Creates a global personal user
        token (`token_kind=user`, `owner_user_id=session user`,
        `project_id IS NULL`) that can operate across projects the owner can
        currently access. The response returns the plaintext `token` exactly
        once; the server stores only its sha256 hash and prefix.

        Identifier labels:

        | Identifier | Source | Trust |
        | --- | --- | --- |
        | owner user id | auth-context | trusted after DB-authoritative session load |
        | name | body-controlled | zod-validated |
        | scopes | body-controlled | zod-validated against `TokenScope` |
        | humanHitl | body-controlled | zod boolean |
        | expiresAt | body-controlled | zod datetime, optional |

        The body never accepts `projectId`. `scopes` must not contain
        `hitl:respond:human`; callers set `humanHitl=true` instead. When
        `humanHitl=true`, the server appends `hitl:respond:human` to stored
        scopes. If `scopes` is empty or omitted, the default is `["*"]` when
        `humanHitl=false` and `["*", "hitl:respond:human"]` when true; `*`
        still does not imply the exact human-HITL scope.

        Audit/logging: session-auth creation writes structured INFO fields
        `tokenId`, `ownerUserId`, `scopeCount`, `global=true`,
        `expiresAtPresent`, and `humanHitl`; it must not log plaintext token,
        token hash, Authorization headers, or held scope lists.
      operationId: createAccountToken
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAccountTokenBody" }
            examples:
              personal-agent:
                value:
                  name: "Personal agent"
                  scopes: ["tasks:read", "hitl:inbox:read"]
                  humanHitl: false
                  expiresAt: null
      responses:
        "201":
          description: |
            Token created. The plaintext `token` field is shown ONCE and is
            not stored server-side. All list responses omit the secret.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateAccountTokenResponse" }
              examples:
                default:
                  value:
                    id: "tok_123"
                    name: "Personal agent"
                    kind: "user"
                    ownerUserId: "user_123"
                    ownerLabel: "Alex"
                    scopes: ["tasks:read", "hitl:inbox:read"]
                    humanHitl: false
                    prefix: "mai_abcd1234"
                    token: "mai_abcd1234..."
                    createdAt: "2026-06-23T12:00:00.000Z"
                    expiresAt: null
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Duplicate/race domain conflict.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body or unknown scope (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/account/tokens/{tokenId}:
    delete:
      tags: [account]
      summary: (0063 Implemented) Revoke a personal API token
      description: |
        Requires an active Auth.js session. Revokes the matching personal
        account token by setting `revoked_at`. The delete predicate includes
        `id = tokenId`, `owner_user_id = session user`, and `project_id IS NULL`;
        project tokens and other users' tokens are hidden as 404.

        Identifier labels:

        | Identifier | Source | Trust |
        | --- | --- | --- |
        | tokenId | url-param | locator only |
        | owner user id | auth-context | trusted after DB-authoritative session load |

        Audit/logging: no `token_audit_log` row is written for session-auth
        lifecycle revocation. Server logs INFO `tokenId`, `ownerUserId`, and
        `outcome`; they must not include token material or held scope lists.
      operationId: revokeAccountToken
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Token revoked or already revoked.
        "401": { $ref: "#/components/responses/Unauthenticated" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: No matching personal token belongs to this owner.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/projects/{slug}/tokens:
    post:
      tags: [projects]
      summary: (M16) Create a project API token
      description: |
        (M16 — Implemented, ADR-041.) Requires project membership at `member` or
        above with the `editSettings` action
        (`requireProjectAction("editSettings")`). Creates a project-scoped API
        token. The plaintext token is returned ONCE in the response body and
        is never stored — only the sha256 hash is persisted. Store it
        immediately.

        `slug` is a URL parameter (server-state). Body-controlled fields are
        `name`, optional `kind`, optional `scopes`, and optional `expiresAt`.
        `kind=user` makes the current session user the token owner for audit
        attribution. All other fields (`id`, `prefix`, `token_hash`,
        `projectId`, `createdAt`) are set server-side.

        Source: `web/app/api/projects/[slug]/tokens/route.ts`.
      operationId: createProjectToken
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProjectTokenBody" }
      responses:
        "201":
          description: |
            Token created. The plaintext `token` field is shown ONCE and is
            not stored server-side. All subsequent list responses omit the
            secret.
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/CreateProjectTokenResponse" }
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller lacks `editSettings` for this project (`UNAUTHORIZED`), or
            must change password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: Project not found or archived (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "422":
          description: Invalid body (`CONFIG`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
    get:
      tags: [projects]
      summary: (M16) List project API tokens
      description: |
        (M16 — Implemented, ADR-041.) Requires `editSettings` for this project.
        Returns all non-deleted tokens for the project. NEVER returns
        `token_hash` or the plaintext secret — only metadata fields.

        Source: `web/app/api/projects/[slug]/tokens/route.ts`.
      operationId: listProjectTokens
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Token list (no secrets).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListProjectTokensResponse" }
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: Caller lacks `editSettings` for this project (`UNAUTHORIZED`), or must change password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "409":
          description: Project not found or archived (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/projects/{slug}/tokens/{tokenId}:
    delete:
      tags: [projects]
      summary: (M16) Revoke a project API token
      description: |
        (M16 — Implemented, ADR-041.) Requires project membership at `member` or
        above with the `editSettings` action. Sets `revoked_at` on the token
        row (soft-delete). Returns 404 if the token's `project_id` does not
        match the slug's project (existence-hide).

        Source: `web/app/api/projects/[slug]/tokens/[tokenId]/route.ts`.
      operationId: revokeProjectToken
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Token revoked (`revoked_at` set).
        "401":
          description: No valid session (`UNAUTHENTICATED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "403":
          description: |
            Caller lacks `editSettings` for this project (`UNAUTHORIZED`), or
            must change password first (`PASSWORD_CHANGE_REQUIRED`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }
        "404":
          description: Token not found, or its `project_id` does not match the slug's project.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaisterErrorBody" }

  /api/projects/{slug}/catalog/caps:
