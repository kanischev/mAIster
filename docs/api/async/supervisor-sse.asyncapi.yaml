asyncapi: 2.6.0
info:
  title: MAIster Supervisor — SSE event stream
  version: "0.5.0"
  description: |
    Server-Sent Events delivered by the supervisor's
    `GET /sessions/{id}/stream` endpoint (described in
    `../supervisor.openapi.yaml`).

    M3 events: every child stdout line yields one `session.line` event;
    the stream terminates with `session.exited` (clean / intentional) or
    `session.crashed` (non-zero exit, killing signal, orphan-detected).
    M5 adds two ACP-aware events emitted by the supervisor's
    `ClientSideConnection`:

    - `session.update` — structured ACP `session/update` parameter
      (delta payload from the adapter). One per ACP update received.
    - `session.permission_auto` — supervisor auto-approved an ACP
      `session/request_permission` mid-turn (M5 placeholder; M7
      replaces this with real HITL routing).

    Terminal events (`session.exited` / `session.crashed`) close the
    connection. Clients reconnect with `Last-Event-ID: <monotonicId>`
    to replay any events with a higher id from the per-session
    in-memory ring buffer (1000 entries). Older events are gone — the
    file at `.maister/<projectSlug>/runs/<runId>/<stepId>.log` is the
    durable record.
  contact:
    name: MAIster maintainers
    url: https://github.com/your-org/mAIster
  license:
    name: MIT
defaultContentType: application/json
servers:
  local:
    url: http://localhost:7777
    protocol: http
    description: Local supervisor (default port).
channels:
  /sessions/{id}/stream:
    parameters:
      id:
        description: ACP session id (UUID v4 generated at spawn).
        schema:
          type: string
          format: uuid
          minLength: 1
          maxLength: 128
    bindings:
      http:
        type: response
        method: GET
        headers:
          Content-Type:
            type: string
            const: text/event-stream
    subscribe:
      operationId: subscribeSessionEvents
      summary: Stream of session lifecycle events
      description: |
        Client connects via `GET /sessions/{id}/stream`. Supervisor pushes
        events as they happen and closes the connection on the terminal
        event.
      message:
        oneOf:
          - $ref: "#/components/messages/SessionLine"
          - $ref: "#/components/messages/SessionUpdate"
          - $ref: "#/components/messages/SessionPermissionAuto"
          - $ref: "#/components/messages/SessionExited"
          - $ref: "#/components/messages/SessionCrashed"
components:
  messages:
    SessionLine:
      name: session.line
      title: Child stdout line
      summary: One JSONL line emitted by the spawned adapter binary.
      contentType: application/json
      payload: { $ref: "#/components/schemas/SessionLineEvent" }
      examples:
        - name: first-line
          summary: First stdout line of a run.
          payload:
            type: session.line
            sessionId: "5f3a8a2b-7e34-4f6d-9d2c-1d4e5f6a7b8c"
            monotonicId: 1
            line: '{"jsonrpc":"2.0","method":"session/update","params":{"sessionId":"5f3a..."}}'
    SessionUpdate:
      name: session.update
      title: ACP session/update parameter
      summary: |
        Structured payload from the supervisor's `ClientSideConnection`
        for an ACP `session/update` notification. Emitted in parallel
        with `session.line` for the same wire data, but pre-parsed.
      contentType: application/json
      payload: { $ref: "#/components/schemas/SessionUpdateEvent" }
      examples:
        - name: agent-message-chunk
          summary: Incremental assistant message chunk from the adapter.
          payload:
            type: session.update
            sessionId: "5f3a8a2b-7e34-4f6d-9d2c-1d4e5f6a7b8c"
            monotonicId: 4
            update:
              sessionUpdate: "agent_message_chunk"
              content: { type: "text", text: "Working on it..." }
    SessionPermissionAuto:
      name: session.permission_auto
      title: M5 auto-approved permission request
      summary: |
        Supervisor received an ACP `session/request_permission` from the
        adapter and auto-allowed it with the first available option.
        Emitted alongside a `warn` log; M7 replaces this with structured
        HITL and removes the auto-allow behaviour.
      contentType: application/json
      payload: { $ref: "#/components/schemas/SessionPermissionAutoEvent" }
      examples:
        - name: write-file-auto-allow
          payload:
            type: session.permission_auto
            sessionId: "5f3a8a2b-7e34-4f6d-9d2c-1d4e5f6a7b8c"
            monotonicId: 7
            toolCall:
              toolCallId: "tc_01"
              kind: "edit"
              title: "Write README.md"
            optionId: "allow"
    SessionExited:
      name: session.exited
      title: Session terminated cleanly
      summary: |
        Emitted on clean exit (code 0, no signal) OR on intentional
        shutdown via `DELETE /sessions/{id}`. The stream closes
        immediately after this event.
      contentType: application/json
      payload: { $ref: "#/components/schemas/SessionExitedEvent" }
      examples:
        - name: clean-exit
          payload:
            type: session.exited
            sessionId: "5f3a8a2b-7e34-4f6d-9d2c-1d4e5f6a7b8c"
            monotonicId: 42
            exitCode: 0
    SessionCrashed:
      name: session.crashed
      title: Session terminated abnormally
      summary: |
        Emitted on non-zero exit, killing signal, or
        heartbeat-detected orphan (PID gone from the OS process table).
        The stream closes immediately after this event.
      contentType: application/json
      payload: { $ref: "#/components/schemas/SessionCrashedEvent" }
      examples:
        - name: sigsegv
          payload:
            type: session.crashed
            sessionId: "5f3a8a2b-7e34-4f6d-9d2c-1d4e5f6a7b8c"
            monotonicId: 42
            exitCode: null
            signal: SIGSEGV
        - name: orphan-detected
          payload:
            type: session.crashed
            sessionId: "5f3a8a2b-7e34-4f6d-9d2c-1d4e5f6a7b8c"
            monotonicId: 7
            exitCode: null
            signal: null
  schemas:
    EventBase:
      type: object
      required: [type, sessionId, monotonicId]
      properties:
        type:
          type: string
          enum:
            - session.line
            - session.update
            - session.permission_auto
            - session.exited
            - session.crashed
        sessionId:
          type: string
          format: uuid
        monotonicId:
          type: integer
          minimum: 1
          description: |
            Monotonically increasing per session. Used as the SSE event
            `id:` and as the `Last-Event-ID` reconnect cursor.
    SessionLineEvent:
      allOf:
        - $ref: "#/components/schemas/EventBase"
        - type: object
          required: [type, line]
          properties:
            type:
              type: string
              const: session.line
            line:
              type: string
              description: |
                Raw stdout line from the adapter. M5 still emits this
                alongside the parsed `session.update` event so that
                downstream cost / log consumers keep working unchanged.
    SessionUpdateEvent:
      allOf:
        - $ref: "#/components/schemas/EventBase"
        - type: object
          required: [type, update]
          properties:
            type:
              type: string
              const: session.update
            update:
              type: object
              additionalProperties: true
              description: |
                Parsed ACP `session/update` parameter. Shape is the
                ACP `SessionNotification.update` union (e.g.
                `agent_message_chunk`, `tool_call`, `tool_call_update`,
                `plan`). Treated as opaque on the wire here — typed
                clients should refer to `@agentclientprotocol/sdk` for
                the discriminated union.
    SessionPermissionAutoEvent:
      allOf:
        - $ref: "#/components/schemas/EventBase"
        - type: object
          required: [type, toolCall, optionId]
          properties:
            type:
              type: string
              const: session.permission_auto
            toolCall:
              type: object
              additionalProperties: true
              description: |
                The ACP `toolCall` payload that triggered the permission
                request (opaque JSON object).
            optionId:
              type: string
              description: |
                The id of the permission option the supervisor
                auto-selected (M5 always picks the first available
                option, typically `allow`). Echoed back to the adapter
                via the ACP `session/request_permission` response.
    SessionExitedEvent:
      allOf:
        - $ref: "#/components/schemas/EventBase"
        - type: object
          required: [type, exitCode]
          properties:
            type:
              type: string
              const: session.exited
            exitCode:
              type: integer
              description: |
                Adapter's OS exit code. Always present on this event.
                Non-zero codes still arrive here when the shutdown was
                intentional (operator issued `DELETE /sessions/{id}`).
    SessionCrashedEvent:
      allOf:
        - $ref: "#/components/schemas/EventBase"
        - type: object
          required: [type, exitCode, signal]
          properties:
            type:
              type: string
              const: session.crashed
            exitCode:
              type: integer
              nullable: true
              description: Null when the supervisor only saw a signal (or an orphan).
            signal:
              type: string
              nullable: true
              description: NodeJS.Signals string (e.g. SIGSEGV, SIGTERM). Null on orphan-detected.
