asyncapi: 2.6.0
info:
  title: MAIster Supervisor — SSE event stream
  version: "0.7.0"
  description: |
    Server-Sent Events delivered by the supervisor's
    `GET /sessions/{id}/stream` endpoint (described in
    `../supervisor.openapi.yaml`).

    Current events:

    - `session.line` — raw child stdout line.
    - `session.update` — structured ACP `session/update` parameter.
    - `session.permission_request` — ACP permission request waiting for
      a web-delivered decision through `POST /sessions/{id}/input`.
    - `session.exited` / `session.crashed` — terminal process events.

    Permission deferreds age out after `MAISTER_KEEPALIVE_MINUTES`; a
    late response returns `HITL_TIMEOUT`.

    Terminal events (`session.exited` / `session.crashed`) close the
    connection. Clients reconnect with `Last-Event-ID: <monotonicId>`
    to replay any events with a higher id from the per-session
    in-memory ring buffer (1000 entries). The supervisor also writes
    every event to a run-scoped `.maister/<projectSlug>/runs/<runId>/run.events.jsonl`
    durable log so the web SSE bridge can tail a single file across
    consecutive sessions of the same run.

    Consumer (M12): the web-side artifact projector tails the per-run
    `run.events.jsonl` and consumes `session.update` /
    `session.permission_request` messages to derive event-stream evidence
    (tool-call activity `log` + `preview` URLs). It is a pull-based,
    read-only consumer; it never drives run state.
  contact:
    name: MAIster maintainers
    url: https://github.com/your-org/mAIster
  license:
    name: MIT
defaultContentType: application/json
servers:
  local:
    url: http://localhost:7777
    protocol: http
    description: Local supervisor (default port).
channels:
  /sessions/{id}/stream:
    parameters:
      id:
        description: ACP session id (UUID v4 generated at spawn).
        schema:
          type: string
          format: uuid
          minLength: 1
          maxLength: 128
    bindings:
      http:
        type: response
        method: GET
        headers:
          Content-Type:
            type: string
            const: text/event-stream
    subscribe:
      operationId: subscribeSessionEvents
      summary: Stream of session lifecycle events
      description: |
        Client connects via `GET /sessions/{id}/stream`. Supervisor pushes
        events as they happen and closes the connection on the terminal
        event.
      message:
        oneOf:
          - $ref: "#/components/messages/SessionLine"
          - $ref: "#/components/messages/SessionUpdate"
          - $ref: "#/components/messages/SessionPermissionRequest"
          - $ref: "#/components/messages/SessionExited"
          - $ref: "#/components/messages/SessionCrashed"
          - $ref: "#/components/messages/SessionChatTurn"
components:
  messages:
    SessionLine:
      name: session.line
      title: Child stdout line
      summary: One JSONL line emitted by the spawned adapter binary.
      contentType: application/json
      payload: { $ref: "#/components/schemas/SessionLineEvent" }
      examples:
        - name: first-line
          summary: First stdout line of a run.
          payload:
            type: session.line
            sessionId: "5f3a8a2b-7e34-4f6d-9d2c-1d4e5f6a7b8c"
            monotonicId: 1
            line: '{"jsonrpc":"2.0","method":"session/update","params":{"sessionId":"5f3a..."}}'
    SessionUpdate:
      name: session.update
      title: ACP session/update parameter
      summary: |
        Structured payload from the supervisor's `ClientSideConnection`
        for an ACP `session/update` notification. Emitted in parallel
        with `session.line` for the same wire data, but pre-parsed.
      contentType: application/json
      payload: { $ref: "#/components/schemas/SessionUpdateEvent" }
      examples:
        - name: agent-message-chunk
          summary: Incremental assistant message chunk from the adapter.
          payload:
            type: session.update
            sessionId: "5f3a8a2b-7e34-4f6d-9d2c-1d4e5f6a7b8c"
            monotonicId: 4
            update:
              sessionUpdate: "agent_message_chunk"
              content: { type: "text", text: "Working on it..." }
        - name: model-advisory
          summary: |
            Supervisor-synthesized informational update (ADR-075). Emitted when
            application cannot be confirmed: claude (verify-only channel)
            reported a `currentModelId` differing from the configured model, or
            the codex `setSessionModel` call failed.
            Informational ONLY — never changes run state, never
            fails the run (`cost.jsonl` stays the billed-model truth). Rides the
            existing `session.update` channel — it is NOT a new event kind, so
            the closed `SessionEvent` union is unchanged and unknown-`sessionUpdate`
            consumers ignore it.
          payload:
            type: session.update
            sessionId: "5f3a8a2b-7e34-4f6d-9d2c-1d4e5f6a7b8c"
            monotonicId: 9
            update:
              sessionUpdate: "model_advisory"
              configuredModel: "glm-5.1"
              observedModelId: "glm-4.6"
              channel: "set_session_model"
    SessionPermissionRequest:
      name: session.permission_request
      title: Pending ACP permission request awaiting HITL decision
      summary: |
        Supervisor received an ACP `session/request_permission` from the
        adapter. The supervisor's `PendingPermissionRegistry` parked the
        deferred under the emitted `requestId`. Clients route this to
        the user (typically via the web tier's HITL board), then resolve
        the deferred via `POST /sessions/{id}/input` with
        `{kind: "permission", action: "select" | "cancel", requestId,
        optionId?}`. If no decision arrives within
        `MAISTER_KEEPALIVE_MINUTES`, the supervisor rejects the deferred
        with `HITL_TIMEOUT` and the adapter observes a cancelled tool
        call.
      contentType: application/json
      payload: { $ref: "#/components/schemas/SessionPermissionRequestEvent" }
      examples:
        - name: write-file-request
          payload:
            type: session.permission_request
            sessionId: "5f3a8a2b-7e34-4f6d-9d2c-1d4e5f6a7b8c"
            monotonicId: 7
            requestId: "8a4a7b9d-0d6b-4b27-a09c-0a3f4f1e1d8e"
            options:
              - { optionId: "allow", kind: "allow_always", name: "Allow" }
              - { optionId: "deny", kind: "reject_once", name: "Deny" }
            toolCall:
              toolCallId: "tc_01"
              kind: "edit"
              title: "Write README.md"
    SessionExited:
      name: session.exited
      title: Session terminated cleanly
      summary: |
        Emitted on clean exit (code 0, no signal) OR on intentional
        shutdown via `DELETE /sessions/{id}`. The stream closes
        immediately after this event.
      contentType: application/json
      payload: { $ref: "#/components/schemas/SessionExitedEvent" }
      examples:
        - name: clean-exit
          payload:
            type: session.exited
            sessionId: "5f3a8a2b-7e34-4f6d-9d2c-1d4e5f6a7b8c"
            monotonicId: 42
            exitCode: 0
    SessionCrashed:
      name: session.crashed
      title: Session terminated abnormally
      summary: |
        Emitted on non-zero exit, killing signal, or
        heartbeat-detected orphan (PID gone from the OS process table).
        The stream closes immediately after this event.
      contentType: application/json
      payload: { $ref: "#/components/schemas/SessionCrashedEvent" }
      examples:
        - name: sigsegv
          payload:
            type: session.crashed
            sessionId: "5f3a8a2b-7e34-4f6d-9d2c-1d4e5f6a7b8c"
            monotonicId: 42
            exitCode: null
            signal: SIGSEGV
        - name: orphan-detected
          payload:
            type: session.crashed
            sessionId: "5f3a8a2b-7e34-4f6d-9d2c-1d4e5f6a7b8c"
            monotonicId: 7
            exitCode: null
            signal: null
    SessionChatTurn:
      name: session.chat_turn
      title: Gate-chat answer-only turn at a HITL pause (M30 — Designed)
      summary: |
        (M30 — Designed, ADR-075) Answer-only gate-chat reply at a `human`/`form`
        HITL pause. Streams over the SSE bridge to the chat surface; never
        resolves the HITL and never drives the run to `Running`. Carries the DD11
        `mutationReverted` flag.
      contentType: application/json
      payload: { $ref: "#/components/schemas/SessionChatTurnEvent" }
  schemas:
    EventBase:
      type: object
      required: [type, sessionId, monotonicId]
      properties:
        type:
          type: string
          enum:
            - session.line
            - session.update
            - session.permission_request
            - session.exited
            - session.crashed
            - session.chat_turn
        sessionId:
          type: string
          format: uuid
        monotonicId:
          type: integer
          minimum: 1
          description: |
            Monotonically increasing per session. Used as the SSE event
            `id:` and as the `Last-Event-ID` reconnect cursor.
    SessionLineEvent:
      allOf:
        - $ref: "#/components/schemas/EventBase"
        - type: object
          required: [type, line]
          properties:
            type:
              type: string
              const: session.line
            line:
              type: string
              description: |
                Raw stdout line from the adapter. The supervisor emits this
                alongside the parsed `session.update` event so that
                downstream cost / log consumers keep working unchanged.
    SessionUpdateEvent:
      allOf:
        - $ref: "#/components/schemas/EventBase"
        - type: object
          required: [type, update]
          properties:
            type:
              type: string
              const: session.update
            update:
              type: object
              additionalProperties: true
              description: |
                Parsed ACP `session/update` parameter. Shape is the
                ACP `SessionNotification.update` union (e.g.
                `agent_message_chunk`, `tool_call`, `tool_call_update`,
                `plan`). Treated as opaque on the wire here — typed
                clients should refer to `@agentclientprotocol/sdk` for
                the discriminated union.

                One non-ACP variant exists: the supervisor-synthesized
                `model_advisory` update (ADR-075) — see the
                `ModelAdvisoryUpdate` schema below. Consumers that do not
                recognize a `sessionUpdate` value MUST ignore it (forward-compat).
    SessionPermissionRequestEvent:
      allOf:
        - $ref: "#/components/schemas/EventBase"
        - type: object
          required: [type, requestId, options, toolCall]
          properties:
            type:
              type: string
              const: session.permission_request
            requestId:
              type: string
              format: uuid
              description: |
                v4 UUID minted by the supervisor's
                `PendingPermissionRegistry` at the moment the deferred
                was parked. Clients echo this back via
                `POST /sessions/{id}/input` to identify which deferred
                they are resolving or cancelling.
            options:
              type: array
              minItems: 1
              items:
                type: object
                required: [optionId]
                properties:
                  optionId: { type: string, minLength: 1 }
                  kind: { type: string }
                  name: { type: string }
              description: |
                Subset of the ACP `PermissionOption[]` the adapter
                offered. The web tier MUST only present these options
                to the user; the supervisor does NOT cross-check
                `optionId` against this set today (see Phase 2 note in
                `system-analytics/hitl.md`).
            toolCall:
              type: object
              additionalProperties: true
              description: |
                Opaque ACP `toolCall` payload — passed through so that
                the UI can render a tool-call summary alongside the
                approve/deny prompt.
    SessionExitedEvent:
      allOf:
        - $ref: "#/components/schemas/EventBase"
        - type: object
          required: [type, exitCode]
          properties:
            type:
              type: string
              const: session.exited
            exitCode:
              type: integer
              description: |
                Adapter's OS exit code. Always present on this event.
                Non-zero codes still arrive here when the shutdown was
                intentional (operator issued `DELETE /sessions/{id}`).
            reason:
              type: string
              enum: [checkpoint, intentional]
              description: |
                M8 supervisor-side intentional-shutdown marker.
                `checkpoint` = graceful checkpoint issued via
                `POST /sessions/{id}/checkpoint` (web sweeper or
                explicit). `intentional` = plain `DELETE /sessions/{id}`.
                Absent for natural process exit (the adapter ran to
                completion on its own).
    SessionCrashedEvent:
      allOf:
        - $ref: "#/components/schemas/EventBase"
        - type: object
          required: [type, exitCode, signal]
          properties:
            type:
              type: string
              const: session.crashed
            exitCode:
              type: integer
              nullable: true
              description: Null when the supervisor only saw a signal (or an orphan).
            signal:
              type: string
              nullable: true
              description: NodeJS.Signals string (e.g. SIGSEGV, SIGTERM). Null on orphan-detected.
    ModelAdvisoryUpdate:
      type: object
      description: |
        Supervisor-synthesized `update` payload carried inside a `session.update`
        event (ADR-076) when application cannot be confirmed — claude (verify-only)
        reported a differing `currentModelId`, or the codex `setSessionModel`
        call failed. NOT a new `SessionEvent` kind — it reuses
        the opaque `session.update.update` field, so the closed `SessionEvent`
        union and both AsyncAPI `EventBase` enums are unchanged. Informational
        only: the supervisor NEVER changes `runs.status` on this signal, and
        `cost.jsonl` remains the billed-model ground truth.
      required: [sessionUpdate, configuredModel, observedModelId, channel]
      properties:
        sessionUpdate:
          type: string
          const: model_advisory
        configuredModel:
          type: string
          description: The model id the operator configured on the runner.
        observedModelId:
          type: string
          description: |
            The `currentModelId` the adapter reported on `session/new` /
            `session/resume` ("" when the adapter reported none — e.g. a codex
            apply failure with no observable model state).
        channel:
          type: string
          enum: [settings_local, set_session_model]
          description: Which application channel was used (claude = settings_local, codex = set_session_model).
    SessionChatTurnEvent:
      allOf:
        - $ref: "#/components/schemas/EventBase"
        - type: object
          required: [type, hitlRequestId, role, body]
          properties:
            type:
              type: string
              const: session.chat_turn
            hitlRequestId:
              type: string
              format: uuid
            role:
              type: string
              enum: [user, agent]
            body:
              type: string
            seq:
              type: integer
            mutationReverted:
              type: boolean
              description: |
                (M30 — Designed, ADR-078 DD11 L3) True when the L3 mutation sensor
                reverted a workspace mutation made during this turn; the UI shows
                a revert notice on the turn.
      description: |
        (M30 — Designed, ADR-078) Answer-only gate-chat turn at a `human`/`form`
        HITL pause. Rendered in the chat surface, NOT the flow timeline. The
        prompt is tagged `stepId = gate-chat-<hitlRequestId>` (server-derived,
        dash not colon).
