openapi: 3.0.3
info:
  title: MAIster External Operations API
  version: "1.0.0"
  description: |
    Token-authenticated external surface for MAIster (M16). All routes are
    under `/api/v1/ext/` and require a project-scoped bearer token issued via
    the token-management routes in `docs/api/web.openapi.yaml`.

    **Security model.** Every call is authenticated by the `projectToken`
    bearer scheme. The token is 256-bit random (`mai_` + base64url(32 bytes)),
    stored as sha256 at rest, looked up by prefix, and compared with
    `timingSafeEqual`. Token failure kinds map to 401. Cross-project resource
    access hides existence (404). Every route enforces its scope label unless
    the token holds `*`.

    **Audit.** Every call writes a `token_audit_log` row. The gate-report
    endpoint writes the success audit row inside the same database transaction
    as the gate update and artifact; failure-path audit rows are written after
    and do not mutate gate or artifact state.

    **DTO policy.** Response DTOs NEVER include `acp_session_id`, absolute
    worktree paths, `token_hash`, or supervisor-internal handles.

    See also:
      - [`../web.openapi.yaml`](../web.openapi.yaml) — token-management routes and session-auth surface
      - [`../../decisions.md`](../../decisions.md) — ADR-045, ADR-046, ADR-047

    **Milestone status: M16 (Implemented), as of 2026-06-02.**

servers:
  - url: http://localhost:3000
    description: Local Next.js dev server (default).

security:
  - projectToken: []

tags:
  - name: tasks
    description: Project task management via token auth.
  - name: runs
    description: Run launch and status via token auth.
  - name: readiness
    description: Run readiness check via token auth.
  - name: gates
    description: External gate report submission via token auth.
  - name: hitl
    description: |
      Human-in-the-loop list + respond via token auth (M17). The routes enforce
      `hitl:read` / `hitl:respond` or `*` and refuse a token actor answering a
      `human`-kind request (D7).
  - name: comments
    description: |
      (ADR-078, Implemented) Task comment list + create via token auth. The
      routes enforce `comments:read` / `comments:create` or `*` and call the
      SAME `addTaskComment` / `listTaskComments` domain functions as the
      session-auth routes — no parallel write path.

paths:
  /api/v1/ext/projects/{slug}/tasks:
    post:
      tags: [tasks]
      summary: Create a task on a project board
      description: |
        Scope `tasks:create`. Creates a task in `Backlog` on the project
        identified by `slug`. The `projectId` is derived server-side from the
        URL slug and compared against the token's project — mismatch → 404.

        Validates that `flowId` belongs to the project and, when
        `executorOverrideId` is supplied, that it also belongs to the same
        project. Both checks return 422 on failure.

        Writes a `token_audit_log` row with scope `tasks:create` after success.
      operationId: extCreateTask
      security:
        - projectToken: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExtCreateTaskBody" }
      responses:
        "201":
          description: Task created in `Backlog`.
          content:
            application/json:
              schema:
                type: object
                required: [taskId]
                properties:
                  taskId:
                    type: string
                    format: uuid
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

    get:
      tags: [tasks]
      summary: List tasks on a project board
      description: |
        Scope `tasks:read`. Returns all tasks for the project identified by
        `slug`. The `projectId` is derived server-side from the URL slug and
        compared against the token's project — mismatch → 404.

        Writes a `token_audit_log` row with scope `tasks:read` after success.
      operationId: extListTasks
      security:
        - projectToken: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Task list.
          content:
            application/json:
              schema:
                type: object
                required: [tasks]
                properties:
                  tasks:
                    type: array
                    items: { $ref: "#/components/schemas/TaskDTO" }
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/ext/projects/{slug}/tasks/{taskId}:
    get:
      tags: [tasks]
      summary: Get a single task
      description: |
        Scope `tasks:read`. Returns the task identified by `taskId` on the
        project identified by `slug`. The `projectId` is derived server-side
        from the URL slug and compared against the token's project — mismatch
        → 404. `taskId` ownership is re-validated against the token's project.

        Writes a `token_audit_log` row with scope `tasks:read` after success.
      operationId: extGetTask
      security:
        - projectToken: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Task detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskDTO" }
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [tasks]
      summary: Update a task (Backlog-only fields)
      description: |
        Scope `tasks:update`. Updates `title`, `prompt`, and/or
        `executorOverrideId` on a task in `Backlog` status. Fields not present
        in the body are left unchanged. The `projectId` is derived server-side;
        `taskId` ownership is re-validated against the token's project.

        Returns the full updated `TaskDTO` on success. Writes a
        `token_audit_log` row with scope `tasks:update` after success.
      operationId: extUpdateTask
      security:
        - projectToken: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExtUpdateTaskBody" }
      responses:
        "200":
          description: Updated task.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskDTO" }
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/ext/projects/{slug}/tasks/{taskId}/comments:
    get:
      tags: [comments]
      summary: (ADR-078, Implemented) List comments on a task
      description: |
        Scope `comments:read`. Returns comments for the task identified by
        `taskId` on the project identified by `slug`, ascending by
        `created_at`. The `projectId` is derived server-side from the URL
        slug and compared against the token's project — mismatch → 404;
        `taskId` ownership is re-validated against the same project
        (existing ext idiom). Bodies are returned as stored: markdown with
        `KEY-N` mentions already expanded at write time.

        Calls the same `listTaskComments` domain function as the
        session-auth route. Writes a `token_audit_log` row with scope
        `comments:read` after success.
      operationId: extListTaskComments
      security:
        - projectToken: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: Comment list (ascending `created_at`).
          content:
            application/json:
              schema:
                type: object
                required: [comments]
                properties:
                  comments:
                    type: array
                    items: { $ref: "#/components/schemas/CommentDTO" }
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [comments]
      summary: (ADR-078, Implemented) Add a comment to a task
      description: |
        Scope `comments:create`. Adds a markdown comment through the SAME
        `addTaskComment` domain pipeline as the session-auth route (ONE
        transaction: mention expansion → comment insert → activity →
        subscription upserts → inbox fanout).

        Actor mapping (ADR-078 D12): a user-owned token acts as
        `('user', ownerUserId)` via `actorUserIdForToken`; an ownerless
        project token acts as `('system', NULL)` with
        `{via: 'ext', tokenId}` recorded in the comment-activity payload.

        Writes a `token_audit_log` row with scope `comments:create` inside
        the same transaction (success-audit-in-work, ext idiom).
      operationId: extCreateTaskComment
      security:
        - projectToken: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExtCreateCommentBody" }
      responses:
        "201":
          description: Comment created; stored body has mentions expanded.
          content:
            application/json:
              schema:
                type: object
                required: [comment]
                properties:
                  comment: { $ref: "#/components/schemas/CommentDTO" }
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/ext/projects/{slug}/tasks/{taskId}/triage:
    post:
      summary: (M34 — Implemented) Submit a triage verdict
      description: |
        Scope `tasks:triage`. The triager's verdict op — ONE transactional
        update of the task's launch-verdict fields plus the `'triaged'`
        stamp. At least one body field is required; every provided field is
        validated against server state (`flowId` ∈ project flows, `runnerId`
        ∈ enabled runner catalog, `promotionMode` ∈ enum, `targetBranch` =
        git ref-name shape). Always sets `tasks.triage_status = 'triaged'`
        and records a `triage_set` activity entry carrying the verdict
        payload. Writes a `token_audit_log` row with scope `tasks:triage`;
        agent tokens record `actor_label = agent:<id>` and the activity
        actor is the polymorphic `agent` pair (ADR-083).
      operationId: extTriageTask
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExtTriageBody" }
      responses:
        "200":
          description: Verdict applied; the task is `triaged`.
          content:
            application/json:
              schema:
                type: object
                required: [ok, triageStatus]
                properties:
                  ok: { type: boolean }
                  triageStatus: { type: string, enum: [triaged] }
        "401": { $ref: "#/components/responses/TokenUnauthorized" }
        "403": { $ref: "#/components/responses/HitlForbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
  /api/v1/ext/projects/{slug}/tasks/{taskId}/relations:
    get:
      summary: (M34 — Implemented) List a task's typed relations
      description: |
        Scope `relations:read`. Returns every relation touching the task,
        with the canonical direction resolved into a per-row `role`
        (`from` = the URL task is the relation's from-end). Inverse labels
        are render-time concerns; the wire carries the canonical kind.
      operationId: extListTaskRelations
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Relations touching the task.
          content:
            application/json:
              schema:
                type: object
                required: [relations]
                properties:
                  relations:
                    type: array
                    items: { $ref: "#/components/schemas/ExtRelationView" }
        "401": { $ref: "#/components/responses/TokenUnauthorized" }
        "403": { $ref: "#/components/responses/HitlForbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      summary: (M34 — Implemented) Add a typed relation from this task
      description: |
        Scope `relations:create`. Mirrors the web route: creates the
        canonical one-direction relation `(from = URL task, kind, to)`.
        `toNumber` is resolved STRICTLY within the URL-param project via
        `(project_id, number)` — cross-project reach is impossible by
        construction. Duplicates are idempotent no-ops. The relation actor
        is token-derived (`agent` for agent tokens).
      operationId: extAddTaskRelation
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExtRelationOpBody" }
      responses:
        "201":
          description: Relation created (or already existed).
          content:
            application/json:
              schema:
                type: object
                required: [ok, created]
                properties:
                  ok: { type: boolean }
                  created: { type: boolean }
        "401": { $ref: "#/components/responses/TokenUnauthorized" }
        "403": { $ref: "#/components/responses/HitlForbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
    delete:
      summary: (M34 — Implemented) Remove a typed relation from this task
      description: |
        Scope `relations:delete`. Removes the canonical relation
        `(from = URL task, kind, to)`. Same body shape as create (mirrors
        the web `deleteTaskRelation`). Missing relation is an idempotent
        no-op (`removed: false`).
      operationId: extRemoveTaskRelation
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExtRelationOpBody" }
      responses:
        "200":
          description: Removal outcome.
          content:
            application/json:
              schema:
                type: object
                required: [ok, removed]
                properties:
                  ok: { type: boolean }
                  removed: { type: boolean }
        "401": { $ref: "#/components/responses/TokenUnauthorized" }
        "403": { $ref: "#/components/responses/HitlForbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
  /api/v1/ext/runs:
    post:
      tags: [runs]
      summary: Launch a run for a task
      description: |
        Scope `runs:launch`. Launches a run for a task owned by the token's
        project. ADR-085 keeps this route v1-compatible: the body accepts only
        `taskId`, runner override, `baseBranch`, and `targetBranch`. It does
        not accept `flowId` or `deliveryPolicy`; those richer overrides are
        session-auth UI/API-only until a future versioned external contract.

        The route still funnels through the same `launchRun` service and the
        same server launchability classifier, executor resolution, supervisor
        readiness gate, worktree creation, and scheduler claim. The `projectId`
        is derived from the task row; `taskId` ownership is re-validated
        against the token's project.

        Returns 202 (may be `Pending` if the global concurrency cap is full,
        or `Running` if a slot was free). Writes a `token_audit_log` row with
        scope `runs:launch` after success.
      operationId: extLaunchRun
      security:
        - projectToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExtLaunchRunBody" }
      responses:
        "202":
          description: Run accepted. May be `Pending` (queued) or `Running`.
          content:
            application/json:
              schema:
                type: object
                required: [runId, status]
                properties:
                  runId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [Pending, Running]
                  queuePosition:
                    type: integer
                    minimum: 1
                    description: Present iff `status == "Pending"`.
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          description: |
            Executor or platform unavailable (`EXECUTOR_UNAVAILABLE`).
            Supervisor unreachable or the executor is not registered/available.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExtErrorBody" }

  /api/v1/ext/runs/delegate:
    post:
      tags: [runs]
      summary: (M37 — Implemented) Delegate a child unit from an orchestrator
      description: |
        (M37 — Implemented, ADR-098.) Scope `runs:delegate`. Spawns ONE governed
        child unit from the calling orchestrator run. Backs the `run_delegate`
        delegation tool exposed over the maister MCP facade to `orchestrator`
        nodes only.

        **Identifiers (trust contour).** The `projectId` and the **parent**
        `runId` are derived SERVER-SIDE from the ephemeral `agent:<id>` token
        minted for the orchestrator launch (scoped `runs:delegate`) — NEVER body
        fields. `target.agentId` / `target.flowId` are body-controlled and
        resolved through that project's enabled + trusted catalog
        (`resolveEffectiveAgentDefinition` + pinned revision); a target not
        resolvable through the enabled+trusted catalog is refused
        (`PRECONDITION` → 409) and **no child run is created** (resolve+trust is
        physically separate from launch). `prompt` / `title` are body free-text.

        `mode = "task"` creates a child task (Kanban card) linked by `parent_of`
        plus a child run; `mode = "run"` creates a child run only
        (`runs.parent_run_id`, workbench subtree, no board card). Child creation
        funnels through `POST /api/v1/ext/runs` so the web tier owns the
        transaction; the supervisor `POST /sessions` happens after commit, and an
        orphan (committed run, no session) reconciles to `Crashed`. The launch
        snapshots the resolved effective definition + runner onto the child run
        row. Over-depth (`MAISTER_ORCHESTRATOR_MAX_DEPTH`) is rejected pre-tx
        (`CONFIG` → 422).

        Writes a `token_audit_log` row with scope `runs:delegate` (audit identity
        `agent:<id>`) after success.
      operationId: extDelegateRun
      security:
        - projectToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExtRunDelegateBody" }
      responses:
        "202":
          description: |
            Child unit created (the run row is committed; the supervisor
            `POST /sessions` happens after commit, so the child may still be
            `Pending` when this returns). `childTaskId` is present only for
            `mode = "task"`.
          content:
            application/json:
              schema:
                type: object
                required: [childRunId]
                properties:
                  childRunId:
                    type: string
                    format: uuid
                  childTaskId:
                    type: string
                    format: uuid
                    description: Present only for `mode == "task"`.
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: |
            Request body failed schema validation, or a `CONFIG` precondition was
            violated — over-depth (`MAISTER_ORCHESTRATOR_MAX_DEPTH`), engine floor
            below `1.6.0`, or a `strict` path-scope declaration (refused until the
            deferred policy layer lands, ADR-099).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExtErrorBody" }
        "503":
          description: |
            Executor or platform unavailable (`EXECUTOR_UNAVAILABLE`) — supervisor
            unreachable, the agent pool cap is exhausted, or the child spawn
            failed retryably.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExtErrorBody" }

  /api/v1/ext/runs/plan:
    post:
      tags: [runs]
      summary: (M37 — Implemented) Submit a success-gated task DAG from an orchestrator
      description: |
        (M37 — Implemented, ADR-098.) Scope `runs:delegate`. Writes a DAG of child
        tasks wired by the success-gated `requires` relation in ONE transaction.
        Backs the `run_plan` delegation tool. `requires` releases a dependent
        ONLY on a producer's `Done` (Failed/Abandoned keeps dependents blocked and
        wakes the orchestrator), unlike `depends_on`/`blocks`; it is wired into
        the shared launchability classifier so it gates at every launch entry
        point.

        **Identifiers (trust contour).** The `projectId` and the parent `runId`
        are derived SERVER-SIDE from the orchestrator's `agent:<id>` token — NEVER
        body fields. Each task's `target.agentId` / `target.flowId` is
        body-controlled and resolved through the project's enabled + trusted
        catalog (unresolvable/untrusted → `PRECONDITION` → 409, no tasks
        created). `dependsOn` edges are body-controlled and validated BEFORE the
        transaction: each entry MUST reference an in-batch `key` (cross-batch or
        unknown ref → `PRECONDITION` → 409) and the edge set MUST be acyclic.

        **Pre-transaction `CONFIG` bounds (→ 422):** a cyclic `dependsOn`, a batch
        larger than `MAISTER_MAX_ORCHESTRATOR_FANOUT`, or a run-tree depth past
        `MAISTER_ORCHESTRATOR_MAX_DEPTH`. Validation is all-or-nothing — no
        partial DAG is ever written. Tasks whose dependencies are already clear
        are marked launchable and fold into the advisory-locked
        `promoteNextPending` CAS (the route NEVER launches directly, preserving
        the global cap), so a `childRunId` may be present for those.

        Writes a `token_audit_log` row with scope `runs:delegate` after success.
      operationId: extPlanRuns
      security:
        - projectToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExtRunPlanBody" }
      responses:
        "202":
          description: |
            DAG written. One result row per submitted task `key`; `childRunId` is
            present only for tasks that were immediately launchable.
          content:
            application/json:
              schema:
                type: object
                required: [tasks]
                properties:
                  tasks:
                    type: array
                    items: { $ref: "#/components/schemas/ExtRunPlanResultItem" }
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: |
            Request body failed schema validation, or a `CONFIG` precondition was
            violated — cyclic `dependsOn`, over-fanout
            (`MAISTER_MAX_ORCHESTRATOR_FANOUT`), or over-depth
            (`MAISTER_ORCHESTRATOR_MAX_DEPTH`). No partial DAG is written.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExtErrorBody" }
        "503":
          description: |
            Executor or platform unavailable (`EXECUTOR_UNAVAILABLE`) for an
            immediate launch; the DAG is still committed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExtErrorBody" }

  /api/v1/ext/runs/collect:
    post:
      tags: [runs]
      summary: (M37 — Implemented) Collect terminal results of orchestrator children
      description: |
        (M37 — Implemented, ADR-098.) Scope `runs:collect`. Returns
        terminal-result summaries for the calling orchestrator's children. Backs
        the `run_collect` delegation tool. Reads each child's `RunDTO` projection plus
        its produced-artifact manifest (`artifact_instances`) and the base→run
        diff ref — NEVER the child worktree directly, matching the
        reviewer-isolation contract.

        **Identifiers (trust contour).** The `projectId` and the parent `runId`
        are derived SERVER-SIDE from the orchestrator's `agent:<id>` token. With
        `childRunId` set, the named child MUST be a child of the calling
        orchestrator (mismatch → 404, existence-hide); with `all: true`, every
        child of the calling orchestrator is returned. Exactly one of
        `childRunId` / `all` MUST be supplied.

        Writes a `token_audit_log` row with scope `runs:collect` after success.
      operationId: extCollectRuns
      security:
        - projectToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExtRunCollectBody" }
      responses:
        "200":
          description: Terminal-result summaries for the requested children.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ExtChildRunSummary" }
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/ext/runs/cancel:
    post:
      tags: [runs]
      summary: (M37 — Implemented) Cancel an orchestrator child run
      description: |
        (M37 — Implemented, ADR-098.) Scope `runs:cancel`. Cancels one child run
        of the calling orchestrator. Backs the `run_cancel` delegation tool.

        **Identifiers (trust contour).** The `projectId` and the parent `runId`
        are derived SERVER-SIDE from the orchestrator's `agent:<id>` token; the
        body `childRunId` MUST be a child of the calling orchestrator (mismatch →
        404, existence-hide). The cancel funnels through the same run-stop path as
        the session-auth surface; the returned `status` is the child's row state
        after the cancel was applied.

        Writes a `token_audit_log` row with scope `runs:cancel` after success.
      operationId: extCancelRun
      security:
        - projectToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExtRunCancelBody" }
      responses:
        "200":
          description: Cancel applied; the child's row state is returned.
          content:
            application/json:
              schema:
                type: object
                required: [childRunId, status]
                properties:
                  childRunId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    description: |
                      The child's run status after the cancel was applied (e.g.
                      `Abandoned`). A run-status string per the run state machine.
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/ext/runs/message:
    post:
      tags: [runs]
      summary: (M37 — Implemented) Re-message a persistent swarm child
      description: |
        (M37 — Implemented, ADR-099.) Scope `runs:delegate`. Sends a follow-up
        prompt to a PERSISTENT addressable child in the calling orchestrator's
        run-tree. Backs the `run_message` delegation tool. If the child is parked
        between turns it is respawned and resumed with prior context
        (`session/resume`); if it is live the prompt is delivered to the running
        session. The child re-parks on its next `end_turn`.

        **Identifiers (trust contour).** The `projectId` and the **caller**
        `runId` are derived SERVER-SIDE from the orchestrator's `agent:<id>`
        token — NEVER body fields. The target is resolved by `addressableKey` OR
        `childRunId` (exactly one required) and is SCOPED to the caller's own
        tree (`root_run_id`) — a persistent child in another tree is invisible
        (resolved to `PRECONDITION` → 409). The target MUST be a persistent
        agent child; a non-persistent or non-agent target → `PRECONDITION` → 409.

        Writes a `token_audit_log` row with scope `runs:delegate` after success.
      operationId: extMessageRun
      security:
        - projectToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [prompt]
              description: |
                Exactly one of `addressableKey` / `childRunId` MUST be supplied.
              properties:
                addressableKey:
                  type: string
                  minLength: 1
                  maxLength: 128
                  pattern: "^[A-Za-z0-9._-]+$"
                  description: |
                    The persistent child's stable key, unique within the caller's
                    orchestrator tree.
                childRunId:
                  type: string
                  format: uuid
                  description: The persistent child's run id, in the caller's tree.
                prompt:
                  type: string
                  minLength: 1
                  description: Free-text follow-up prompt delivered to the child.
      responses:
        "200":
          description: Message delivered; the child's row state is returned.
          content:
            application/json:
              schema:
                type: object
                required: [childRunId, status]
                properties:
                  childRunId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    description: The child's run status after delivery (e.g. `Running`).
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/ext/runs/promote:
    post:
      tags: [runs]
      summary: (M37 — Implemented) Promote a reviewed delegated child to Done
      description: |
        (M37 — Implemented, ADR-100.) Scope `runs:promote` — held ONLY by the
        orchestrator's run-bound token (a child agent token does not), so a
        child→child promote is a 403 by scope. For an `own`-mode child this merges
        the reviewed child's branch into its target and flips that child `Done`.
        Backs the `run_promote` delegation tool.

        **Shared-tree promote (Implemented — ADR-102).** When `childRunId` is a
        `workspace_mode='shared'` child, this is a TREE promote, not a per-child
        promote: the operation resolves the shared TREE workspace by the orchestrator
        tree root (`rootRunId`, server-derived) and the
        `workspace_mode='shared'` marker — NOT by the promoting child's own row
        (reuser children have none) — merges the single tree branch ONCE, and settles
        ALL `workspace_mode='shared'` children of that tree `Review → Done` in one
        transaction. It is gated by a promote-time settled re-check: while ANY shared
        sibling is still in a writable status (`Running | NeedsInput | NeedsInputIdle
        | HumanWorking | Pending | WaitingOnChildren`), the promote is refused
        `PRECONDITION` → 409 and merges nothing. Exactly-once: a concurrent shared
        tree-promote that loses the durable-claim CAS, or a re-promote that finds
        nothing in `Review`, is an idempotent no-op (`CONFLICT` / `PRECONDITION` →
        409). This supersedes ADR-099 §4's launch gate for shared writable worktrees.

        **Identifiers (trust contour).** `childRunId` is the ONLY body-controlled
        identifier; it is validated against the bound-run scope — it MUST be a direct
        child of the bound orchestrator, in the token's project, and currently in
        `Review` (otherwise `PRECONDITION` → 409). The `projectId`, the **parent**
        `runId`, and the tree `rootRunId` (used to resolve the shared tree workspace)
        are server-derived run state from the run-bound orchestrator token — NEVER
        body fields. A merge CONFLICT returns `CONFLICT` → 409 and leaves the child
        (and, for a shared tree, ALL shared siblings) in `Review` for a human to
        resolve — the orchestrator NEVER auto-resolves (§8).

        Writes a `token_audit_log` row with scope `runs:promote` after success.
      operationId: extPromoteRun
      security:
        - projectToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [childRunId]
              properties:
                childRunId:
                  type: string
                  format: uuid
                  description: The reviewed child run to promote.
      responses:
        "200":
          description: |
            Merged to the target; the child is now `Done`. For a
            `workspace_mode='shared'` child (Implemented — ADR-102) the single tree
            branch is merged once and ALL shared siblings of the tree are settled
            `Review → Done` in the same transaction; the echoed `childRunId` is the
            one promoted.
          content:
            application/json:
              schema:
                type: object
                required: [childRunId, status]
                properties:
                  childRunId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [Done]
                  commit:
                    type: string
                    description: |
                      The merge commit sha, when the promotion produced one.
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: |
            A `PRECONDITION` (child is not a direct child of the bound
            orchestrator, or not in `Review`, or the token is not run-bound;
            **shared-tree, Implemented — ADR-102**: the settled-gate is unmet because a
            shared sibling is still in a writable status, the target is not a shared
            child / has no resolvable tree workspace, or nothing is in `Review`
            because the tree was already promoted) or a merge `CONFLICT` (the child —
            and, for a shared tree, ALL shared siblings — stay in `Review`; no
            auto-resolve; a lost shared durable-claim CAS is also `CONFLICT`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExtErrorBody" }
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/ext/runs/rework:
    post:
      tags: [runs]
      summary: (M37 — Implemented) Re-open a reviewed delegated child for another turn
      description: |
        (M37 — Implemented, ADR-100.) Scope `runs:delegate` (a run-bound
        orchestrator addressing its own child). CAS-flips a reviewed child
        `Review → Running` and resumes its session (`session/resume` on the
        retained `acp_session_id`) with the coordinator's override `prompt`
        against the child's existing worktree; it re-reviews on its next
        `end_turn`. Backs the `run_rework` delegation tool.

        **Identifiers (trust contour).** The `projectId` and the **parent**
        `runId` are derived SERVER-SIDE from the run-bound orchestrator token —
        NEVER body fields. `childRunId` MUST be a direct child of the bound
        orchestrator, in the token's project, and currently in `Review`
        (otherwise `PRECONDITION` → 409).

        **(Implemented — ADR-102.)** Reworking a `workspace_mode='shared'` child
        is refused `CONFLICT` → 409 while the tree promote is in progress / done
        (the rework fences on the allocator workspace's `promotion_state`), so a
        rework cannot mutate the shared branch during the tree-promote merge.

        Writes a `token_audit_log` row with scope `runs:delegate` after success.
      operationId: extReworkRun
      security:
        - projectToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [childRunId, prompt]
              properties:
                childRunId:
                  type: string
                  format: uuid
                  description: The reviewed child run to re-open.
                prompt:
                  type: string
                  minLength: 1
                  description: |
                    Rework instruction delivered to the resumed child session.
      responses:
        "200":
          description: Child re-opened; it is now `Running`.
          content:
            application/json:
              schema:
                type: object
                required: [childRunId, status]
                properties:
                  childRunId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [Running]
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/ext/runs/{runId}:
    get:
      tags: [runs]
      summary: Get run status
      description: |
        Scope `runs:read`. Returns the `RunDTO` for the run identified by
        `runId`. The run's `projectId` is re-validated against the token's
        project — mismatch → 404 (existence-hide).

        Writes a `token_audit_log` row with scope `runs:read` after success.
      operationId: extGetRun
      security:
        - projectToken: []
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Run status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunDTO" }
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/ext/runs/{runId}/readiness:
    get:
      tags: [readiness]
      summary: Get run readiness
      description: |
        Scope `readiness:read`. Returns the `ReadinessDTO` for the run —
        whether the run is ready to be promoted, blocked by outstanding gates,
        stale, failed, still waiting, or overridden. Includes external gate
        status and required artifact presence/validity.

        The run's `projectId` is re-validated against the token's project —
        mismatch → 404. Writes a `token_audit_log` row with scope
        `readiness:read` after success.
      operationId: extGetRunReadiness
      security:
        - projectToken: []
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Run readiness state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReadinessDTO" }
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/ext/runs/{runId}/gates/{gateId}/report:
    post:
      tags: [gates]
      summary: Report result for an external gate
      description: |
        Scope `gates:report`. Reports the result of an `external_check` gate
        for the given run. The run's `projectId` is re-validated against the
        token's project. The `gateId` must identify a live, non-terminal
        `external_check` gate_result row for this run — unknown or non-external
        gate → 404.

        **Success path** (valid token, correct project, known external gate,
        valid body): the gate_result row is flipped to `passed` or `failed`,
        a `test_report` artifact is recorded (producer `gate`, locator inline),
        and the success audit row is all written in one database transaction
        (rollback-safe).

        **Failure path** (bad/expired/revoked token → 401; missing scope →
        403; cross-project → 404; non-external or unknown gate → 404; terminal run
        (`Done`/`Abandoned`/`Crashed`/`Failed`) → 409; body invalid → 422):
        only a failure audit row is written after response, and no gate or
        artifact state is mutated.

        Staleness: if `staleOnNewCommit` is set on the gate's manifest config
        and a new report arrives with a different `commitSha`, the prior passed
        report is superseded and the gate becomes stale. Concurrent reports for
        the same run are serialized so a double-delivered webhook for the same
        `commitSha` never appends duplicate superseding rows.

        Writes a `token_audit_log` row with scope `gates:report`.
      operationId: extReportGate
      security:
        - projectToken: []
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: gateId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExtGateReportBody" }
      responses:
        "200":
          description: Gate report recorded, artifact created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExtGateReportResponse" }
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/ext/runs/{runId}/hitl:
    get:
      tags: [hitl]
      summary: List pending HITL requests for a run
      description: |
        Scope `hitl:read` (M17). Returns the pending (unanswered) human-in-the-
        loop requests for the run identified by `runId`. The run's `projectId`
        is re-validated against the token's project — mismatch → 404
        (existence-hide).

        **Scope enforcement (D8).** This route gates on the token scope:
        `hitl:read` must be present in the token's `scopes`, or the token must
        hold `*`, else 403. The 403 body does NOT reveal which scopes the token
        holds.

        **DTO policy.** Items NEVER include `acp_session_id`, absolute worktree
        paths, supervisor-internal handles, or any other internal locator.

        Writes a `token_audit_log` row with scope `hitl:read` after success.
      operationId: extListRunHitl
      security:
        - projectToken: []
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Pending HITL requests for the run.
          content:
            application/json:
              schema:
                type: object
                required: [hitl]
                properties:
                  hitl:
                    type: array
                    items: { $ref: "#/components/schemas/ExtHitlRequestDTO" }
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/ext/runs/{runId}/hitl/{hitlRequestId}/respond:
    post:
      tags: [hitl]
      summary: Respond to a pending HITL request
      description: |
        Scope `hitl:respond` (M17). Answers the pending HITL request identified
        by `hitlRequestId` on the run identified by `runId`. Routes through the
        SAME `respondToHitl` service (and the same two-phase commit + audit) as
        the session-auth `POST /api/runs/{runId}/hitl/{hitlRequestId}/respond`.
        The run's `projectId` is re-validated against the token's project, and
        `hitlRow.runId` must equal the URL `runId` — either mismatch → 404
        (existence-hide).

        The handler dispatches on the stored `hitl_requests.kind`:

        - **permission**: supply `optionId`. Two-phase atomic claim; same
          `optionId` on retry → idempotent 200; idle-resume scheduled → 202.
        - **form**: supply `response` (validated against the row's `schema`;
          422 on failure), with optional `confidence` (`0..1`).

        **Actor-kind gate (D7).** A token actor MAY answer only
        `kind ∈ {permission, form}`. A `human`-kind request (including a graph
        `human_review`) requires a human actor — a token answering it → 403.
        This makes "escalate-to-human is a Flow gate, never the external actor's"
        (ADR-024) executable: a machine token can never satisfy a human gate,
        even holding `hitl:respond`. The token actor can answer a pending request
        but can never create one or alter gate placement.

        **Scope enforcement (D8).** A token lacking `hitl:respond` (and not `*`)
        → 403. The 403 body does NOT reveal which scopes the token holds.

        Writes a `token_audit_log` row with scope `hitl:respond`.
      operationId: extRespondRunHitl
      security:
        - projectToken: []
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: hitlRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExtHitlRespondBody" }
            examples:
              permission-select:
                summary: Approve a pending permission
                value:
                  optionId: "allow"
              form-typed:
                summary: Structured form response with confidence
                value:
                  response:
                    approved: true
                    comments: "lgtm"
                  confidence: 0.9
      responses:
        "200":
          description: |
            Response durably recorded. For permission, the supervisor deferred
            was resolved; for form, the input artifact was written and the
            runner was queued. The runner (not this route) owns the
            `NeedsInput → Running` transition.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExtHitlRespondResponse" }
        "202":
          description: |
            Idle-resume scheduled — the run was checkpointed (`NeedsInputIdle`)
            and a fresh supervisor session was spawned to deliver against the
            new request. Same-payload retries keep returning 202 until
            auto-delivery completes, then return 200 idempotent.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExtHitlRespondResponse" }
        "401":
          $ref: "#/components/responses/TokenUnauthorized"
        "403":
          $ref: "#/components/responses/HitlForbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "410":
          description: |
            Terminal idle-resume failure (`HITL_TIMEOUT`/`CHECKPOINT`): the
            `NeedsInputIdle` run could not be resumed to deliver the response
            and was transitioned to a terminal state. Not retryable. Surfaced
            verbatim from the shared `respondToHitl` service (same as the
            session-auth respond route).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExtErrorBody" }
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          description: |
            Retryable transient failure (`EXECUTOR_UNAVAILABLE`): the supervisor
            was unreachable for permission delivery, the idle-resume spawn
            failed retryably, or the form input artifact could not be written.
            Safe to retry. Surfaced verbatim from the shared `respondToHitl`
            service.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ExtErrorBody" }

components:
  securitySchemes:
    projectToken:
      type: http
      scheme: bearer
      description: |
        Project-scoped API token. Format: `mai_` + base64url(randomBytes(32)).
        Stored as sha256 hex at rest; never logged or streamed. Lookup is by
        the 12-character prefix; verification uses `timingSafeEqual`. A valid,
        active, non-expired, non-revoked token must hold the route's required
        scope or `*`. Missing scope returns 403 without revealing held scopes.
        Token failures (invalid, expired, revoked, wrong-project) map to 401
        or 404 per the existence-hide policy.

  responses:
    TokenUnauthorized:
      description: |
        Missing, invalid, expired, or revoked bearer token. All token failure
        kinds (invalid prefix/hash mismatch, expired, revoked) return 401.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ExtErrorBody" }
    NotFound:
      description: |
        Resource not found, or the token's project does not own the addressed
        resource (existence-hide — cross-project access returns 404, not 403).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ExtErrorBody" }
    UnprocessableEntity:
      description: Request body failed schema validation.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ExtErrorBody" }
    Conflict:
      description: |
        The request conflicts with current resource state — e.g. reporting a
        gate on a run that has already finished (`Done`/`Abandoned`/`Crashed`/
        `Failed`), or a task/run create/launch precondition conflict (task not
        in `Backlog`, project archived, branch/worktree taken). Code `CONFLICT`
        or `PRECONDITION`.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ExtErrorBody" }
    HitlForbidden:
      description: |
        Access refused (`UNAUTHORIZED`). Common cases:

          - **Missing scope** — the token lacks the route's required scope and
            does not hold `*`. The body NEVER reveals which scopes the token
            holds.
          - **Actor-kind gate (D7, respond only)** — a token actor attempted to
            answer a `human`-kind request (including a graph `human_review`).
            A `human`-kind request requires a human actor; token actors may
            answer only `kind ∈ {permission, form}`.

        Cross-project access does NOT use 403 — it hides existence (404).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ExtErrorBody" }

  schemas:
    ExtErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error message.

    ExtTriageBody:
      type: object
      description: |
        (M34 — Implemented) Triage verdict — at least one field. Every provided
        field is allow-list validated; the op always stamps
        `triage_status='triaged'`.
      minProperties: 1
      additionalProperties: false
      properties:
        flowId:
          type: string
          minLength: 1
          description: Flow to run the task with; must belong to the project.
        runnerId:
          type: string
          minLength: 1
          description: Verdict runner; must be an enabled catalog runner.
        targetBranch:
          type: string
          minLength: 1
          maxLength: 255
          description: Promotion target branch (git ref-name shape).
        promotionMode:
          type: string
          enum: [local_merge, pull_request]

    ExtRelationOpBody:
      type: object
      description: |
        (M34 — Implemented) Relation create/remove body — mirrors the web
        route: the canonical direction is `(from = URL task, kind, to)`.
      required: [kind, toNumber]
      additionalProperties: false
      properties:
        kind:
          type: string
          enum: [blocks, depends_on, parent_of]
        toNumber:
          type: integer
          minimum: 1
          description: |
            The other task's per-project number (`KEY-N`'s N), resolved
            strictly within the URL-param project.

    ExtRelationView:
      type: object
      description: |
        (M34 — Implemented) One relation touching the addressed task. `role`
        says which end the URL task is; `other` is the opposite end.
      required: [kind, role, other]
      properties:
        kind:
          type: string
          enum: [blocks, depends_on, parent_of]
        role:
          type: string
          enum: [from, to]
        other:
          type: object
          required: [taskId, number, title, status]
          properties:
            taskId: { type: string, format: uuid }
            number: { type: integer, minimum: 1 }
            taskKey: { type: string }
            title: { type: string }
            status:
              type: string
              enum: [Backlog, InFlight, Done, Abandoned]

    ExtCreateCommentBody:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 10000
          description: |
            Markdown comment body. `KEY-N` tokens outside code fences,
            inline code, and existing links are expanded to task links at
            write time; unresolved tokens stay literal.

    CommentDTO:
      type: object
      description: |
        (ADR-078, Implemented) Comment projection. `body` is markdown with
        mentions already expanded. The actor pair is `('user', id)` for
        user-owned tokens / session users, `('system', null)` for ownerless
        project tokens; `label` is resolved at read time.
      required: [id, taskId, body, actor, createdAt]
      properties:
        id: { type: string, format: uuid }
        taskId: { type: string, format: uuid }
        body:
          type: string
        actor:
          type: object
          required: [type, id, label]
          properties:
            type:
              type: string
              enum: [user, agent, system]
            id:
              type: string
              nullable: true
            label:
              type: string
        createdAt: { type: string, format: date-time }

    TaskDTO:
      type: object
      description: |
        External projection of a task. Never includes `acp_session_id`,
        worktree paths, `token_hash`, or supervisor-internal handles.
      required:
        - id
        - title
        - prompt
        - status
        - stage
        - flowId
        - attemptNumber
        - createdByUserId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        number:
          type: integer
          minimum: 1
          description: |
            (ADR-078, Implemented) Per-project task number; `KEY-N` =
            `taskKey` + `-` + `number`. Additive — present once migration
            `0041` lands (backfill makes it NOT NULL).
        taskKey:
          type: string
          pattern: "^[A-Z][A-Z0-9]{1,9}$"
          description: |
            (ADR-078, Implemented) The owning project's platform-unique task
            key. Additive alongside `number`.
        title:
          type: string
        prompt:
          type: string
        status:
          type: string
          description: Task lifecycle status on the board.
          enum: [Backlog, InFlight, Done]
        stage:
          type: string
          description: Finer-grained stage within the task lifecycle.
        flowId:
          type: string
          description: ID of the flow configured for this task.
        executorOverrideId:
          type: string
          format: uuid
          nullable: true
          description: Optional executor override stored on the task.
        latestRunId:
          type: string
          format: uuid
          nullable: true
          description: ID of the most recent run launched for this task, if any.
        attemptNumber:
          type: integer
          minimum: 0
          description: Number of runs launched against this task (0 = never launched).
        createdByUserId:
          type: string
          format: uuid
          nullable: true
          description: Human owner attributed to a user-owned token; null for project tokens and legacy rows.
        createdAt:
          type: string
          format: date-time

    RunDTO:
      type: object
      description: |
        External projection of a run. Never includes `acp_session_id`,
        worktree paths, `token_hash`, or supervisor-internal handles.
      required:
        - id
        - taskId
        - projectId
        - status
        - flowId
        - executorId
        - startedAt
      properties:
        id:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
          nullable: true
        projectId:
          type: string
          format: uuid
        status:
          type: string
          description: Current run status.
          enum:
            - Pending
            - Running
            - NeedsInput
            - NeedsInputIdle
            - HumanWorking
            - Review
            - Crashed
            - Done
            - Abandoned
            - Failed
        flowId:
          type: string
          nullable: true
          description: Flow id used for this run (from the pinned revision at launch time).
        executorId:
          type: string
          format: uuid
          description: Resolved executor id used for this run.
        currentStepId:
          type: string
          nullable: true
          description: The id of the step currently executing, if any.
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true

    ReadinessDTO:
      type: object
      description: |
        Readiness roll-up for a run at the review chokepoint. Produced by
        `assertEvidenceReady` extended with `external_check` gate awareness.
      required:
        - readiness
        - externalGates
        - requiredArtifacts
        - reasons
      properties:
        readiness:
          type: string
          description: |
            Overall readiness verdict.
            - `ready` — all required gates passed, all required artifacts present and valid.
            - `blocked` — one or more external gates are `pending`, `failed`, or `stale`.
            - `stale` — previously ready but a downstream change made it stale.
            - `failed` — a required gate or artifact failed irrecoverably.
            - `waiting` — run has not yet reached the review chokepoint.
            - `overridden` — a human override cleared an otherwise-blocking gate; promotion is permitted.
          enum: [ready, blocked, stale, failed, waiting, overridden]
        externalGates:
          type: array
          items:
            type: object
            required: [gateId, status]
            properties:
              gateId:
                type: string
                description: Gate id from the flow manifest.
              status:
                type: string
                enum: [pending, passed, failed, stale, overridden, skipped]
              description:
                type: string
                nullable: true
                description: Gate description from `flow.yaml` `gates[].external.description`.
              externalRunUrl:
                type: string
                nullable: true
                description: URL of the external CI/CD run that reported this gate.
              commitSha:
                type: string
                nullable: true
                description: Commit SHA the last gate report was against.
        requiredArtifacts:
          type: array
          items:
            type: object
            required: [defId, kind, present, validity]
            properties:
              defId:
                type: string
                description: Artifact definition id from the flow manifest.
              kind:
                type: string
                description: Artifact kind.
              present:
                type: boolean
                description: Whether the artifact exists in the evidence index.
              validity:
                type: string
                nullable: true
                description: Validity state of the artifact, if present.
                enum: [current, stale, superseded, failed, skipped]
        reasons:
          type: array
          description: Human-readable reasons explaining the readiness verdict.
          items:
            type: string

    ExtCreateTaskBody:
      type: object
      required: [title, prompt]
      properties:
        title:
          type: string
          minLength: 1
        prompt:
          type: string
          minLength: 1
        flowId:
          type: string
          minLength: 1
          description: |
            ID of a `flows` row belonging to the project identified by the URL
            `slug`. Any other flow ID returns 422. (M34 — Implemented) OPTIONAL:
            a task created without `flowId` is a simple-intent task — it
            classifies as `unconfigured` (not launchable) until a triage
            verdict (`POST .../triage`) or a human fills the flow.
        executorOverrideId:
          type: string
          minLength: 1
          description: |
            Optional. ID of an `executors` row belonging to this project.
            Stored in `tasks.executor_override_id`. Any other executor ID
            returns 422.

    ExtUpdateTaskBody:
      type: object
      description: |
        Partial update for a `Backlog` task. At least one field must be present.
        Fields absent from the body are left unchanged.
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 1
        prompt:
          type: string
          minLength: 1
        executorOverrideId:
          type: string
          nullable: true
          description: |
            Set to a valid executor ID to override, or `null` to clear the
            existing override.

    ExtLaunchRunBody:
      type: object
      required: [taskId]
      additionalProperties: false
      properties:
        taskId:
          type: string
          format: uuid
          description: |
            ID of a task owned by the token's project. The `projectId` is
            derived server-side from the task row and re-validated against the
            token's project before launchability is evaluated.
        runnerId:
          type: string
          minLength: 1
          description: |
            Optional per-launch platform ACP runner override. Highest priority
            in the fail-closed runner resolution chain.
        executorOverrideId:
          type: string
          minLength: 1
          deprecated: true
          description: |
            Legacy alias for `runnerId`. New external clients should send
            `runnerId`. The route refuses both fields when they conflict.
        baseBranch:
          type: string
          minLength: 1
          description: |
            (M18, Implemented) Optional base branch the run worktree is created
            from. Same semantics as the session-auth `POST /api/runs`
            `baseBranch`: server-validated against the project's branch
            allow-list before use as a git `startPoint` — unknown branch →
            `PRECONDITION` (409). Defaults to the project's `default_branch`.
        targetBranch:
          type: string
          minLength: 1
          description: |
            (M18, Implemented) Optional branch the run is promoted into after
            review. Server-validated against the same branch allow-list;
            unknown branch → `PRECONDITION` (409). Defaults to `baseBranch`.
            Promotion itself stays internal/UI-only in M18 — the external
            surface gains branch targeting on **launch** only.

    ExtGateReportBody:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [passed, failed]
          description: Outcome of the external check.
        externalRunUrl:
          type: string
          nullable: true
          description: |
            URL of the external CI/CD run or check suite that produced this
            report. Surfaced in `ReadinessDTO.externalGates[].externalRunUrl`.
        commitSha:
          type: string
          nullable: true
          description: |
            Commit SHA this report applies to. When `staleOnNewCommit` is set
            on the gate manifest config, a subsequent report with a different
            `commitSha` supersedes this one and re-stales the gate.
        summary:
          type: string
          nullable: true
          description: Human-readable summary of the check result.
        payload:
          type: object
          description: |
            Arbitrary structured payload from the external reporter (e.g. test
            counts, lint findings). Stored in the `test_report` artifact. Must
            be a JSON-serializable object when present.
          nullable: true
          additionalProperties: true

    ExtGateReportResponse:
      type: object
      required: [gateId, status, artifactId]
      properties:
        gateId:
          type: string
          description: The gate id that was updated.
        status:
          type: string
          enum: [passed, failed]
          description: The status the gate was set to.
        artifactId:
          type: string
          format: uuid
          description: ID of the `test_report` artifact created for this report.

    ExtHitlRequestDTO:
      type: object
      description: |
        (M17) External projection of a pending HITL request. NEVER includes
        `acp_session_id`, absolute worktree paths, `token_hash`, or
        supervisor-internal handles.
      required:
        - hitlRequestId
        - stepId
        - kind
        - prompt
        - requestedAt
      properties:
        hitlRequestId:
          type: string
          format: uuid
        stepId:
          type: string
          description: The flow step/node id that raised this request.
        kind:
          type: string
          description: |
            Request kind. A token actor may answer only `permission` and
            `form`; `human` requires a human actor (D7).
          enum: [permission, form, human]
        prompt:
          type: string
          description: Prompt text shown to the responder.
        schema:
          type: object
          nullable: true
          description: |
            Form/decision schema the `response` is validated against, when the
            request carries one (`form` / `human`). Null for `permission`.
          additionalProperties: true
        options:
          type: array
          description: |
            Allowed options for a `permission` request (the supervisor's
            declared choices), each as an `{ optionId, label }` object. Always an
            array — empty (`[]`) for `form` / `human`, never null.
          items:
            type: object
            required:
              - optionId
              - label
            properties:
              optionId:
                type: string
              label:
                type: string
        criticality:
          type: string
          nullable: true
          description: |
            Flow-author-declared criticality of the request, when set on the
            `human` node/step. Null when undeclared. Annotation only — it does
            NOT re-gate readiness.
          enum: [low, medium, high, critical]
        requestedAt:
          type: string
          format: date-time
          description: When the request was created.

    ExtHitlRespondBody:
      type: object
      description: |
        (M17) HITL response payload. Supply `optionId` for a `permission`
        request, or `response` for a `form` request. A `human`-kind request
        cannot be answered by a token actor (D7).
      properties:
        optionId:
          type: string
          minLength: 1
          description: |
            Required iff the HITL row has `kind == "permission"`. MUST match one
            of the supervisor-declared options.
        response:
          type: object
          description: |
            Required iff the HITL row has `kind == "form"`. Validated against the
            row's `schema` (server-state, never body-trusted); 422 on failure.
          additionalProperties: true
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: |
            Optional responder self-reported certainty (`0..1`) for a `form`
            response. Bounded server-side; echoed into the stored
            `hitl_requests.response` jsonb and written to
            `hitl_requests.human_confidence`. Ignored for `permission`.

    ExtHitlRespondResponse:
      type: object
      required: [ok, runStatus]
      description: |
        (M17) Result of an ext HITL response. Mirrors the session route — the
        runner (not this route) owns the `NeedsInput → Running` transition.
      properties:
        ok:
          type: boolean
          enum: [true]
        runStatus:
          type: string
          enum: [NeedsInput]
          description: Row state at response time.
        state:
          type: string
          enum: [resume-in-progress]
          description: Present only on the 202 idle-resume branch.

    ExtDelegationTarget:
      type: object
      description: |
        (M37 — Implemented, ADR-098) The catalog-resolved child to spawn. Exactly
        one of `agentId` / `flowId` is supplied; both are body-controlled and
        resolved through the project's enabled + trusted catalog (pinned
        revision). A target not resolvable through that catalog is refused
        (`PRECONDITION` → 409); no child run is created.
      additionalProperties: false
      properties:
        agentId:
          type: string
          minLength: 1
          description: Package-qualified platform-agent id (`<flowRefId>:<stem>`).
        flowId:
          type: string
          minLength: 1
          description: Flow id, resolved against the project's enabled flows.

    ExtRunDelegateBody:
      type: object
      description: |
        (M37 — Implemented, ADR-098) `run_delegate` payload. `projectId` and the
        parent `runId` are token-derived, never carried here.
      required: [target, mode, prompt]
      additionalProperties: false
      properties:
        target:
          $ref: "#/components/schemas/ExtDelegationTarget"
        mode:
          type: string
          enum: [task, run]
          description: |
            `task` = child task (`parent_of` Kanban card) + child run; `run` =
            child run only (`runs.parent_run_id`, no board card).
        prompt:
          type: string
          minLength: 1
          description: Free-text prompt handed to the child unit.
        title:
          type: string
          minLength: 1
          description: Optional title for the child task (used only for `mode == "task"`).
        workspace:
          type: string
          enum: [none, repo_read, worktree]
          description: |
            Workspace axis for the child run (M34). Defaults to the resolved
            definition's recommended workspace when omitted.
        workspaceMode:
          type: string
          enum: [own, shared]
          description: |
            (M37 — ADR-099) Worktree allocation mode for a
            `workspace: worktree` child. `own` (default) = a per-run worktree;
            `shared` = all children of this orchestrator tree share one
            pre-allocated tree with serialized writers (one active writer per
            tree). `shared` requires a delegated child (a `rootRunId`); a top-level
            run is refused with `CONFIG`. A `shared` writable tree is ONE branch =
            ONE Review = ONE tree-level promote that settles all shared siblings
            (Implemented — ADR-102, via `POST /api/v1/ext/runs/promote`); ADR-102
            supersedes ADR-099 §4's launch gate for shared writable worktrees.
        persistent:
          type: boolean
          description: |
            (M37 Phase 8 — ADR-099) Spawn a PERSISTENT addressable swarm member
            that parks (`NeedsInputIdle`, ACP session retained) between turns
            instead of running to terminal; re-message it via `run_message` by its
            `addressableKey`. Requires `addressableKey`.
        addressableKey:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[A-Za-z0-9._-]+$"
          description: |
            (M37 Phase 8 — ADR-099) Stable key, unique within the orchestrator
            tree (`root_run_id`), used to address a persistent child via
            `run_message`. Required when `persistent` is true.
        runnerOverride:
          type: string
          minLength: 1
          description: |
            Optional per-launch platform ACP runner override; highest priority in
            the fail-closed runner resolution chain. Snapshotted onto the child
            run's `runner_snapshot`.

    ExtRunPlanTask:
      type: object
      description: |
        (M37 — Implemented, ADR-098) One node of a submitted task DAG. `key` is the
        in-batch identifier referenced by other tasks' `dependsOn`.
      required: [key, target, prompt, dependsOn]
      additionalProperties: false
      properties:
        key:
          type: string
          minLength: 1
          description: |
            In-batch unique key. Referenced by other tasks' `dependsOn`; not
            persisted as the task identity (the task gets its own `KEY-N`).
        target:
          $ref: "#/components/schemas/ExtDelegationTarget"
        prompt:
          type: string
          minLength: 1
        workspace:
          type: string
          enum: [none, repo_read, worktree]
          description: Optional workspace axis for the task's run.
        runnerOverride:
          type: string
          minLength: 1
          description: Optional per-launch runner override.
        dependsOn:
          type: array
          description: |
            In-batch `key`s this task `requires`. Validated acyclic and
            in-batch BEFORE the transaction (cross-batch/unknown ref →
            `PRECONDITION` → 409; cycle → `CONFIG` → 422). `requires` releases a
            dependent only on the producer's `Done`.
          items:
            type: string
            minLength: 1

    ExtRunPlanBody:
      type: object
      description: |
        (M37 — Implemented, ADR-098) `run_plan` payload. `projectId` and the parent
        `runId` are token-derived. The batch size is bounded by
        `MAISTER_MAX_ORCHESTRATOR_FANOUT`.
      required: [tasks]
      additionalProperties: false
      properties:
        tasks:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/ExtRunPlanTask" }

    ExtRunPlanResultItem:
      type: object
      description: |
        (M37 — Implemented, ADR-098) Per-task result of a submitted DAG. `childRunId`
        is present only for a task that was immediately launchable (its
        dependencies were already clear) and folded into `promoteNextPending`.
      required: [key, taskId]
      additionalProperties: false
      properties:
        key:
          type: string
          description: The submitted in-batch key, echoed back.
        taskId:
          type: string
          format: uuid
          description: The created task's id.
        childRunId:
          type: string
          format: uuid
          description: Present only when the task was immediately launchable.

    ExtRunCollectBody:
      type: object
      description: |
        (M37 — Implemented, ADR-098) `run_collect` selector. Exactly one of
        `childRunId` / `all` MUST be supplied.
      additionalProperties: false
      properties:
        childRunId:
          type: string
          format: uuid
          description: Collect one named child (must be a child of the caller).
        all:
          type: boolean
          description: Collect every child of the calling orchestrator.

    ExtChildRunSummary:
      type: object
      description: |
        (M37 — Implemented, ADR-098) Terminal-result summary for one orchestrator
        child. `artifacts` is the produced-artifact manifest from
        `artifact_instances`; `diffRef` locates the base→run diff. NEVER exposes
        the child worktree, `acp_session_id`, or any supervisor-internal handle.
      required: [childRunId, status, artifacts]
      additionalProperties: false
      properties:
        childRunId:
          type: string
          format: uuid
        status:
          type: string
          description: |
            The child's run status (a run-status string per the run state
            machine; a nested orchestrator child may be `WaitingOnChildren`).
        outputText:
          type: string
          nullable: true
          description: |
            The child's terminal stdout var (`{{ steps.<id>.output }}`), when
            available.
        artifacts:
          type: array
          description: Produced-artifact manifest for the child run.
          items:
            type: object
            required: [id, kind, name]
            additionalProperties: false
            properties:
              id:
                type: string
                format: uuid
              kind:
                type: string
                description: Artifact kind.
              name:
                type: string
                description: Artifact name / locator label.
        diffRef:
          type: string
          nullable: true
          description: Opaque ref locating the child's base→run diff (never the worktree).

    ExtRunCancelBody:
      type: object
      description: |
        (M37 — Implemented, ADR-098) `run_cancel` payload. `childRunId` must be a
        child of the calling orchestrator.
      required: [childRunId]
      additionalProperties: false
      properties:
        childRunId:
          type: string
          format: uuid
