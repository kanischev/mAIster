openapi: 3.0.3
info:
  title: MAIster Supervisor HTTP API
  version: "0.7.0"
  description: |
    HTTP + SSE surface exposed by `supervisor/` (the Node daemon that owns ACP
    sessions and spawns adapter binaries. Implemented adapters are
    `claude-agent-acp` and `codex-acp`; ADR-084/ADR-085 add `gemini --acp`,
    `opencode acp`, and `mimo acp` as readiness-gated code-owned adapter
    families.
    Consumed by the Next.js web tier through `web/lib/supervisor-client.ts`.

    **Implemented contract.** The lifecycle
    (`POST` / `DELETE` `/sessions`, `GET /sessions`,
    `GET /sessions/:id/stream`), ACP prompt boundary
    (`POST /sessions/:id/prompt`), permission-only HITL input
    (`POST /sessions/:id/input`), and checkpoint endpoint
    (`POST /sessions/:id/checkpoint`) are implemented end-to-end.

    The SSE stream emitted by `GET /sessions/:id/stream` is described separately
    in `api/async/supervisor-sse.asyncapi.yaml`; as of M7 the stream
    carries `session.update`, `session.permission_request`, `session.line`,
    `session.exited`, and `session.crashed` events.

    See [`../architecture.md`](../architecture.md), [`../supervisor.md`](../supervisor.md),
    and [`../decisions.md#adr-002-supervisor-runs-as-a-separate-node-daemon`](../decisions.md).
  contact:
    name: MAIster maintainers
    url: https://github.com/your-org/mAIster
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: http://localhost:{port}
    description: |
      Local supervisor on the operator's workstation. POC ships single-host
      docker compose; production deployments substitute their own host.
    variables:
      port:
        default: "7777"
security: []
tags:
  - name: health
    description: Supervisor readiness.
  - name: sessions
    description: ACP session lifecycle.
  - name: prompt
    description: ACP prompt boundary for Flow and scratch agent turns.
  - name: stream
    description: Per-session event stream (SSE).
  - name: hitl
    description: Permission-only human-in-the-loop input delivery.
  - name: model-catalog
    description: Model discovery resolver for a runner draft (ADR-076).
paths:
  /health:
    get:
      tags: [health]
      summary: Report supervisor readiness
      description: |
        Lightweight readiness probe for the supervisor daemon itself.
        A `200` response means the daemon is reachable and can accept
        session work. The body intentionally excludes project ids, run ids,
        executor secrets, env vars, and filesystem paths.
      operationId: getSupervisorHealth
      responses:
        "200":
          description: Supervisor is ready to accept session work.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorHealthResponse" }
  /diagnostics:
    get:
      tags: [health]
      summary: Inspect runtime launch diagnostics
      description: |
        Read-only diagnostics for remote supervisor runtime configuration:
        adapter binary availability, binary source/path/version/error,
        adapter smoke evidence, sidecar readiness state, env-ref presence, and launcher version
        metadata. Does not return raw secret values. A binary that exists but
        cannot initialize its first-run writable state is reported as
        `available: false` with an adapter-specific `error`, not as a raw 500.
      operationId: getSupervisorDiagnostics
      responses:
        "200":
          description: Runtime diagnostics snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupervisorDiagnosticsResponse"
  /sessions:
    post:
      tags: [sessions]
      summary: Start a new agent session
      description: |
        Spawns the adapter binary determined by the versioned `runner.adapter`
        when present, otherwise by legacy `executor.agent` (`claude-agent-acp`
        for `claude`, `codex-acp` for `codex`), with `cwd = worktreePath`.
        ADR-084 adapters use the same registry: `gemini` launches
        `gemini --acp`; `opencode` launches `opencode acp`. Unsupported
        adapter/provider/policy combinations, missing required env refs, and
        unsupported checkpoint strategies are rejected before spawn.
        Returns after the adapter process starts and the ACP handshake returns
        an `acpSessionId`; everything after that is observable via the SSE
        stream.

        Capability launch fields are server-derived by the web tier:
        `capabilityProfilePath` points at the run-scoped profile snapshot
        materialized in the worktree/runtime area, and `adapterLaunch` carries
        only validated env/arg additions for the selected adapter. The
        supervisor does not resolve project policy or trust; it validates and
        passes these fields to the spawned child.

        ADR-085 adds `nodeAttemptId` attribution metadata for graph-runner
        sessions. The supervisor validates it as a safe id and stamps it on
        cost records; it never grants filesystem, project, or session authority.
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StartSessionRequest" }
      responses:
        "201":
          description: Spawn succeeded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StartSessionResponse" }
        "409":
          description: Zod validation rejected the request body.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                missingField:
                  value: { code: "PRECONDITION", message: "executor: Required" }
        "500":
          description: Spawn failed (binary missing, EACCES, first-run state failure, OOM at fork).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                enoent:
                  value: { code: "SPAWN", message: "spawn claude-agent-acp failed: ENOENT" }
        "503":
          description: Executor unavailable (missing env ref, unsupported adapter readiness, or reserved pool exhaustion).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
    get:
      tags: [sessions]
      summary: List all currently registered sessions
      description: |
        Returns the in-memory `SessionRecord[]` for every session the
        supervisor knows about (live, exited, crashed — kept for the
        post-terminal grace window before GC).
      operationId: listSessions
      responses:
        "200":
          description: Current registry contents.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SessionRecord" }
        default:
          description: Unhandled supervisor error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
  /sessions/{id}/prompt:
    post:
      tags: [prompt]
      summary: Send an ACP prompt to a live session
      description: |
        Drives the M5 Flow DSL `agent` step. The supervisor forwards the
        prompt onto the per-session `ClientSideConnection` (built on
        `@agentclientprotocol/sdk@0.22.1`) and blocks until the adapter
        returns a `stopReason`. Concurrent `agent` steps in
        `slash-in-existing` mode reuse one session across multiple prompt
        calls; `new-session` steps create a fresh session per prompt.

        Permission requests raised by the adapter mid-turn surface as
        `session.permission_request` SSE events (M7+). The supervisor
        parks the ACP deferred until the web tier resolves it via
        `POST /sessions/{id}/input`; the prompt promise stays in flight
        for the duration of the HITL turn.

        ADR-085 requires `nodeAttemptId` on graph-runner prompt sends,
        including `slash-in-existing` reused sessions, so active cost
        attribution changes at prompt time instead of relying on timestamp
        inference. Concurrent prompts in one reused session are refused by the
        web tier before they become ambiguous.
      operationId: sendSessionPrompt
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendPromptRequest" }
      responses:
        "200":
          description: |
            Prompt completed. The adapter's `stopReason` indicates whether
            the turn ended cleanly, hit a token cap, exceeded max turn
            requests, or was refused.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SendPromptResponse" }
        "404":
          description: No session with that id.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                unknown:
                  value: { code: "PRECONDITION", message: "unknown session" }
        "409":
          description: |
            Session exists but cannot accept the prompt — either it is no
            longer `live` (already `exited`/`crashed`), no ACP connection
            has been attached (initialization race), or a `contentBlocks`
            resource URI failed the session-bound confinement check (a remote
            scheme, or a `file:` path outside repo ∪ worktree ∪ run dir). The
            content blocks are NOT forwarded on a confinement violation.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                notLive:
                  value: { code: "PRECONDITION", message: "session not live" }
                noConnection:
                  value:
                    code: "PRECONDITION"
                    message: "session has no ACP connection"
                uriEscape:
                  value:
                    code: "PRECONDITION"
                    message: "resource URI escapes the run sandbox: file:///etc/passwd"
                zodReject:
                  value:
                    code: "PRECONDITION"
                    message: "stepId: Required"
        "500":
          description: |
            Adapter returned a malformed or non-conforming ACP frame, or
            the ACP transport itself faulted mid-turn.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                acpProtocol:
                  value: { code: "ACP_PROTOCOL", message: "prompt failed: ..." }
  /sessions/{id}:
    delete:
      tags: [sessions]
      summary: Stop a running session
      description: |
        Marks the session as an intentional shutdown then sends `SIGTERM`.
        After `MAISTER_KILL_GRACE_MS` (default 5000 ms) without exit, escalates
        to `SIGKILL`. The terminal event arrives on the SSE stream as
        `session.exited` (because the shutdown was intentional), not
        `session.crashed`, even on non-zero exit code.
      operationId: deleteSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "204":
          description: Termination initiated. SSE will deliver the terminal event.
        "404":
          description: No session with that id.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                unknown:
                  value: { code: "PRECONDITION", message: "unknown session" }
  /sessions/{id}/stream:
    get:
      tags: [stream]
      summary: SSE event stream for a session
      description: |
        Server-Sent Events. Each child stdout line yields one `session.line`
        event; the lifecycle terminates with either `session.exited` or
        `session.crashed`. The stream closes automatically after the
        terminal event.

        Supports `Last-Event-ID` for reconnect replay from a per-session
        in-memory ring buffer (1000 entries). Older events that have
        already been GC'd are not replayable from this endpoint — the
        web tier's eventual log-file tail bridge (M7+M9) fills that gap.

        Full event schemas live in `api/async/supervisor-sse.asyncapi.yaml`.
      operationId: streamSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - name: Last-Event-ID
          in: header
          required: false
          description: Highest `monotonicId` already received by the client.
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: |
            text/event-stream. Each event has `id`, `event`, and `data` fields.
            See AsyncAPI for the payload union.
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  id: 1
                  event: session.line
                  data: {"type":"session.line","sessionId":"<uuid>","monotonicId":1,"line":"<JSONL>"}

                  id: 2
                  event: session.exited
                  data: {"type":"session.exited","sessionId":"<uuid>","monotonicId":2,"exitCode":0}
        "404":
          description: No session with that id.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
  /sessions/{id}/checkpoint:
    post:
      tags: [sessions]
      summary: (M8) Graceful checkpoint of the session
      description: |
        Cancels every open `pendingPermissions` deferred for the session
        with reason `"checkpoint"`, SIGTERMs the child within
        `MAISTER_KILL_GRACE_MS`, and on graceful exit emits
        `session.exited { reason: "checkpoint" }` on the SSE stream.
        Idempotent: an already-exited session returns 200 with
        `alreadyCheckpointed: true` and the most recent `monotonicId`.
        On SIGKILL escalation returns 500 `EXECUTOR_UNAVAILABLE` — the
        web sweeper treats this as retryable.
      operationId: checkpointSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              description: Strictly empty. Unknown keys → 409.
      responses:
        "200":
          description: Graceful checkpoint completed (or idempotent ack).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckpointResponse" }
        "404":
          description: No session with that id.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
        "409":
          description: Body validation failed (unknown keys).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
        "500":
          description: SIGTERM grace expired; SIGKILL was issued. Sweeper retries.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
  /sessions/{id}/input:
    post:
      tags: [hitl]
      summary: Deliver an HITL permission decision to a live session (M7)
      description: |
        Permission-only HITL surface. The body is a discriminated union on
        `action`. The supervisor never writes filesystem artifacts on this
        path — durable form/human responses are written directly by the
        web tier; this endpoint only resolves or cancels the live ACP
        `requestPermission` deferred held by the pending-permission
        registry.

        - `action: "select"` resolves the deferred with ACP
          `{outcome: "selected", optionId}`.
        - `action: "cancel"` resolves the deferred with ACP
          `{outcome: "cancelled"}` and records `reason` in supervisor
          logs.
      operationId: deliverInput
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InputBody" }
            examples:
              select:
                summary: Approve a pending permission
                value:
                  kind: "permission"
                  action: "select"
                  requestId: "8a4a7b9d-0d6b-4b27-a09c-0a3f4f1e1d8e"
                  optionId: "allow"
              cancel:
                summary: Cancel a pending permission
                value:
                  kind: "permission"
                  action: "cancel"
                  requestId: "8a4a7b9d-0d6b-4b27-a09c-0a3f4f1e1d8e"
                  reason: "DB_PERSIST_FAILED"
      responses:
        "200":
          description: Deferred resolved (or cancelled).
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "404":
          description: |
            No session with that id, OR no pending permission with that
            `requestId` (deferred already evicted or timed out).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                missing:
                  value:
                    code: "NEEDS_INPUT"
                    message: "no pending permission with that requestId"
        "409":
          description: Body validation failure (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                refine:
                  value:
                    code: "PRECONDITION"
                    message: "optionId: optionId is required when action='select'"
  /model-catalog/resolve:
    post:
      tags: [model-catalog]
      summary: Resolve the model catalog for a runner draft
      description: |
        Discovers valid model ids for a runner **draft** (adapter + provider +
        optional `router`/`sidecarId`) by fanning out across the registered
        `ModelSource`s — ACP active probe (primary), provider listing API,
        curated GLM list, and CCR — then merging and deduping by model `id` and
        caching the result in memory (TTL). A `force` flag bypasses the cache.

        Env-ref fields inside `provider` (`authTokenEnv` / `apiKeyEnv`) carry
        **bare** environment-variable names; the supervisor resolves their
        values from `process.env` and **never** returns or logs a secret. A
        single source's failure is reported in that source's `status`
        (`error` / `skipped`) and does **not** fail the resolve — the route
        still returns `200` with whatever the other sources produced.

        The only request-level rejection is `409 PRECONDITION` on a malformed
        draft (unknown adapter, an `env:`-prefixed or raw-secret value in an
        env-ref field, a malformed provider union, or `router` without
        `sidecarId`). See [ADR-076](../decisions.md#adr-076-acp-runner-model-discovery-resolver-on-supervisor--configured-model-application) and
        [`../system-analytics/model-catalog.md`](../system-analytics/model-catalog.md).

        **Identifiers.** Every body field is draft config (`body-controlled`),
        not a locator into live server state; env-ref values are resolved
        server-side only.
      operationId: resolveModelCatalog
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ModelCatalogResolveRequest" }
            examples:
              zaiEnvRouter:
                summary: claude + z.ai env-router draft (force refresh)
                value:
                  adapter: "claude"
                  provider:
                    kind: "anthropic_compatible"
                    baseUrl: "https://api.z.ai/api/anthropic"
                    authTokenEnv: "ZAI_API_KEY"
                  force: true
      responses:
        "200":
          description: |
            Resolved catalog. `models` is merged + deduped across sources;
            `sources` carries a per-source status (one may be `error`/`skipped`
            while others are `ok`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelCatalogResolveResponse" }
        "409":
          description: Malformed draft (Zod rejection → `PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                rawSecret:
                  value:
                    code: "PRECONDITION"
                    message: "provider.authTokenEnv: must be an environment variable name"
        default:
          description: Unhandled supervisor error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
components:
  parameters:
    SessionId:
      name: id
      in: path
      required: true
      description: |
        Supervisor-assigned session id (UUID v4 generated at spawn time),
        returned as `sessionId` in `StartSessionResponse`. This is the
        path key for every `/sessions/{id}/...` endpoint.

        **Not** the ACP `acpSessionId` — that field is the adapter's
        resume handle (used in `resumeSessionId` on `POST /sessions`
        and in `StartSessionResponse.acpSessionId` /
        `SessionRecord.acpSessionId`). Calling
        `POST /sessions/{acpSessionId}/prompt` with that handle will
        return 404 even when the underlying ACP session is live.
      schema:
        type: string
        format: uuid
        minLength: 1
        maxLength: 128
  schemas:
    SupervisorHealthResponse:
      type: object
      required: [status, version, uptimeMs, sessions, checkedAt]
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [ready]
        version:
          type: string
          minLength: 1
          description: Supervisor package version.
        uptimeMs:
          type: integer
          minimum: 0
          description: Milliseconds since this supervisor process started.
        sessions:
          $ref: "#/components/schemas/SupervisorSessionCounts"
        checkedAt:
          type: string
          format: date-time
    SupervisorDiagnosticsResponse:
      type: object
      required: [status, version, checkedAt, adapters, sidecars, envRefs]
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [ready]
        version:
          type: string
          minLength: 1
        checkedAt:
          type: string
          format: date-time
        adapters:
          type: array
          items:
            type: object
            required:
              [id, binary, source, path, available, version, error, smoke]
            additionalProperties: false
            properties:
              id: { $ref: "#/components/schemas/ExecutorAgent" }
              binary: { type: string, minLength: 1 }
              source:
                type: string
                enum: [path, override]
                description: |
                  `path` = resolved from supervisor PATH; `override` = explicit
                  supervisor-side adapter binary override.
              path:
                type: string
                nullable: true
                description: Resolved executable path when known. Never a secret.
              available: { type: boolean }
              version:
                type: string
                nullable: true
                description: Cheap version probe result when available.
              error:
                type: string
                nullable: true
                description: |
                  Redacted operator-visible diagnostic such as `ENOENT`,
                  `EACCES`, version-probe failure, or adapter first-run
                  writable-state failure. Must not contain env values.
              smoke:
                type: object
                required: [status, reason, checkedAt, protocolVersion]
                additionalProperties: false
                properties:
                  status:
                    type: string
                    enum: [not_required, pending, ok, skipped, error]
                    description: |
                      Cached ACP compatibility smoke state. `ok` is required
                      before Gemini/OpenCode/MiMo can become launch-ready.
                  reason:
                    type: string
                    nullable: true
                  checkedAt:
                    type: string
                    format: date-time
                    nullable: true
                  protocolVersion:
                    type: integer
                    nullable: true
        sidecars:
          type: array
          items:
            type: object
            required: [id, kind, state]
            additionalProperties: false
            properties:
              id: { type: string, minLength: 1 }
              kind: { type: string, enum: [ccr] }
              state:
                type: string
                enum: [idle, starting, ready, failed, stopping]
        envRefs:
          type: array
          items:
            type: object
            required: [name, present]
            additionalProperties: false
            properties:
              name:
                type: string
                pattern: '^[A-Za-z_][A-Za-z0-9_]*$'
              present: { type: boolean }
    SupervisorSessionCounts:
      type: object
      required: [live, exited, crashed]
      additionalProperties: false
      properties:
        live:
          type: integer
          minimum: 0
        exited:
          type: integer
          minimum: 0
        crashed:
          type: integer
          minimum: 0
    ExecutorAgent:
      type: string
      enum: [claude, codex, gemini, opencode, mimo]
      description: |
        Identity dispatch — picks the code-owned adapter family. `gemini`,
        `opencode`, and `mimo` are implemented adapter ids, but workflow
        readiness remains launch-gated by diagnostics and adapter-specific
        smoke evidence.
    ExecutorRouter:
      type: string
      enum: [ccr]
      description: Optional in-session multi-provider router. See ADR-005.
    Executor:
      type: object
      required: [agent, model]
      properties:
        agent: { $ref: "#/components/schemas/ExecutorAgent" }
        model:
          type: string
          minLength: 1
          description: |
            Free-form. The adapter validates against its own provider.
            Examples: `claude-sonnet-4-6`, `gpt-5-codex`, `glm-4.6`.
          example: "claude-sonnet-4-6"
        env:
          type: object
          additionalProperties: { type: string }
          description: |
            Env vars overlaid on the supervisor's process env when spawning
            the child. Per-executor env wins over the supervisor's env. Used
            for env-router routing (e.g. `ANTHROPIC_BASE_URL`,
            `ANTHROPIC_AUTH_TOKEN`).
        router: { $ref: "#/components/schemas/ExecutorRouter" }
    RunnerProvider:
      oneOf:
        - type: object
          additionalProperties: false
          required: [kind]
          properties:
            kind: { type: string, enum: [anthropic] }
        - type: object
          additionalProperties: false
          required: [kind]
          properties:
            kind: { type: string, enum: [anthropic_compatible] }
            baseUrl: { type: string, format: uri }
            authTokenEnv:
              type: string
              pattern: '^[A-Za-z_][A-Za-z0-9_]*$'
        - type: object
          additionalProperties: false
          required: [kind]
          properties:
            kind: { type: string, enum: [openai] }
        - type: object
          additionalProperties: false
          required: [kind]
          properties:
            kind: { type: string, enum: [openai_compatible] }
            baseUrl: { type: string, format: uri }
            apiKeyEnv:
              type: string
              pattern: '^[A-Za-z_][A-Za-z0-9_]*$'
            wireApi: { type: string, enum: [responses] }
        - type: object
          additionalProperties: false
          required: [kind]
          properties:
            kind: { type: string, enum: [google_gemini] }
            apiKeyEnv:
              type: string
              pattern: '^[A-Za-z_][A-Za-z0-9_]*$'
        - type: object
          additionalProperties: false
          required: [kind]
          properties:
            kind: { type: string, enum: [google_vertex] }
            projectId: { type: string, minLength: 1 }
            location: { type: string, minLength: 1 }
            apiKeyEnv:
              type: string
              pattern: '^[A-Za-z_][A-Za-z0-9_]*$'
        - type: object
          additionalProperties: false
          required: [kind]
          properties:
            kind: { type: string, enum: [google_gateway] }
            baseUrl: { type: string, format: uri }
            apiKeyEnv:
              type: string
              pattern: '^[A-Za-z_][A-Za-z0-9_]*$'
        - type: object
          additionalProperties: false
          required: [kind]
          properties:
            kind: { type: string, enum: [agent_native] }
      description: |
        Versioned runner provider intent. Secret fields are env variable names
        already resolved by the web tier from `env:NAME` references; raw secret
        values are not accepted. `google_gemini`, `google_vertex`,
        `google_gateway`, and `agent_native` are implemented provider intents
        for the Gemini/OpenCode/MiMo adapter families and remain adapter-readiness
        gated until the selected workflow is smoke-proven.
    RunnerSidecar:
      type: object
      additionalProperties: false
      required: [id, kind]
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 128
          pattern: '^[A-Za-z0-9._-]+$'
        kind: { type: string, enum: [ccr] }
        lifecycle: { type: string, enum: [managed, external] }
        configPath:
          type: string
          description: Absolute config path for managed CCR sidecar instances.
        baseUrl:
          type: string
          format: uri
          description: Proxy base URL for external CCR sidecar instances.
        healthcheckUrl:
          type: string
          format: uri
          description: Optional healthcheck URL for external CCR sidecars.
        authTokenEnv:
          type: string
          pattern: '^[A-Za-z_][A-Za-z0-9_]*$'
      description: Optional keyed router sidecar intent.
    RunnerLaunch:
      type: object
      additionalProperties: false
      required:
        - version
        - runnerId
        - adapter
        - capabilityAgent
        - model
        - provider
        - permissionPolicy
      properties:
        version: { type: integer, enum: [1] }
        runnerId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: '^[A-Za-z0-9._-]+$'
        adapter: { $ref: "#/components/schemas/ExecutorAgent" }
        capabilityAgent: { $ref: "#/components/schemas/ExecutorAgent" }
        model:
          type: string
          minLength: 1
        provider: { $ref: "#/components/schemas/RunnerProvider" }
        permissionPolicy:
          type: string
          enum: [default, dangerously_skip_permissions]
        sidecar: { $ref: "#/components/schemas/RunnerSidecar" }
      description: |
        Platform ACP runner launch intent. When present, the supervisor maps it
        through allow-listed provisioners and overwrites the legacy `executor`
        shape before spawning. `executor` stays required temporarily for
        backward compatibility.
    StartSessionRequest:
      type: object
      required: [runId, projectSlug, worktreePath, stepId, executor]
      properties:
        runId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: '^[A-Za-z0-9._-]+$'
          description: |
            Application-generated run id. Doubles as a path segment under
            `.maister/<slug>/runs/<runId>/`. Constrained to safe filesystem
            characters.
        projectSlug:
          type: string
          minLength: 1
          maxLength: 64
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
          description: Kebab-case slug. Path segment under `.maister/<slug>/`.
        worktreePath:
          type: string
          minLength: 1
          maxLength: 4096
          description: |
            Absolute filesystem path. Becomes `cwd` for the spawned child.
            MUST start with `/` and MUST NOT contain `..` segments.
        repoPath:
          type: string
          minLength: 1
          maxLength: 4096
          description: |
            (Implemented — capability composer) Optional project repo root.
            Bound to the session and added to the prompt content-block URI
            confinement allow-set (repo ∪ worktree ∪ run dir) so a `file_path`
            attachment that references a repo-absolute path is accepted. Same
            shape as `worktreePath` (absolute, no `..`). Sent only by runs that
            can carry file content-blocks (scratch).
        stepId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: '^[A-Za-z0-9._-]+$'
          description: |
            Flow step id. Step log lands at `<runId>/<stepId>.log`. Constrained
            to safe filesystem characters.
        nodeAttemptId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: '^[A-Za-z0-9._-]+$'
          description: |
            ADR-085 graph-runner attribution id. Required by the web tier for
            graph sessions and stamped on cost records when present. Metadata
            only; it never authorizes access to a run or filesystem path.
        executor: { $ref: "#/components/schemas/Executor" }
        runner: { $ref: "#/components/schemas/RunnerLaunch" }
        capabilityProfilePath:
          type: string
          minLength: 1
          maxLength: 4096
          description: |
            Absolute filesystem path to the web-materialized, run-scoped
            capability profile. Must start with `/` and must not contain `..`
            segments. The supervisor passes it only through validated
            `adapterLaunch` env/args; it does not inspect policy.
        adapterLaunch:
          $ref: "#/components/schemas/AdapterLaunch"
        resumeSessionId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: '^[A-Za-z0-9._-]+$'
          description: |
            Optional checkpoint-resume handle (M8). When set, the supervisor
            restores the prior conversation via the ACP `session/resume`
            protocol call on this id (no history replay). It is NOT passed as a
            CLI flag — the adapters ignore `--resume` on argv.
        readOnlySession:
          type: boolean
          default: false
          description: |
            (M34 — Implemented, ADR-090 L1.) Session-scoped generalization of the
            per-prompt `readOnlyTurn` (ADR-078): for the whole session the ACP
            permission handler auto-DENIES write-class tool permission
            requests and auto-APPROVES an allow-list of read-safe kinds. No
            pending-permission deferreds are created — the session never
            surfaces HITL permission requests. Used for `none`/`repo_read`
            platform-agent runs; incompatible with
            `permission_policy=dangerously_skip_permissions` (the web tier
            refuses that combination before calling this endpoint).
    AdapterLaunch:
      type: object
      additionalProperties: false
      description: |
        Constrained launch additions produced by the web capability
        materializer. It cannot override the adapter binary, `cwd`, run id,
        project slug, worktree path, session id, or ACP session id.
      properties:
        env:
          type: object
          maxProperties: 64
          additionalProperties:
            type: string
            maxLength: 4096
          description: |
            Extra environment variables for the spawned adapter. Values are
            never logged. Applied after `executor.env` so run-scoped materialized
            paths can win on collision.
        preArgs:
          type: array
          maxItems: 32
          items:
            type: string
            minLength: 1
            maxLength: 1024
          description: Adapter arguments inserted before supervisor-managed args.
        postArgs:
          type: array
          maxItems: 32
          items:
            type: string
            minLength: 1
            maxLength: 1024
          description: Adapter arguments appended after supervisor-managed args.
    StartSessionResponse:
      type: object
      required: [sessionId, pid, acpSessionId]
      properties:
        sessionId:
          type: string
          format: uuid
          description: Supervisor-assigned session id (path key for subsequent calls).
        pid:
          type: integer
          minimum: 1
          description: OS pid of the spawned adapter.
        acpSessionId:
          type: string
          minLength: 1
          maxLength: 128
          description: |
            ACP session id surfaced by `session/new` (or the SAME
            `resumeSessionId`, echoed back unchanged, on a `session/resume`).
            It is the M8 checkpoint/resume handle. Cached at
            `runs.acp_session_id` by the web tier.
    SendPromptRequest:
      type: object
      required: [stepId, prompt]
      properties:
        stepId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: '^[A-Za-z0-9._-]+$'
          description: |
            Flow step id this prompt belongs to. Echoed in supervisor
            logs and used to attribute `session.update` events back to a
            step in the web tier.
        nodeAttemptId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: '^[A-Za-z0-9._-]+$'
          description: |
            ADR-085 active prompt attribution id for graph runs. On
            `slash-in-existing` sessions this updates the cost-record context
            for the duration of the prompt response.
        prompt:
          type: string
          maxLength: 1000000
          description: |
            Rendered Mustache prompt for the step. Sent verbatim as the
            ACP `prompt` parameter; the supervisor does not re-template.
        contentBlocks:
          type: array
          maxItems: 64
          description: |
            (Implemented, T5.4 — capability composer, FR-D5) Optional
            pre-assembled ACP content blocks (a `text` block plus
            `resource_link`/`resource` blocks). When present the supervisor
            forwards them **verbatim** as
            the ACP `prompt` content array — it does NOT re-template or rewrite;
            `prompt` stays the plain-text equivalent/fallback. The web tier has
            already normalized capability tokens to wire form (FR-E) and confined
            resource URIs to the run worktree before this call.
          items:
            type: object
            required: [type]
            additionalProperties: true
            properties:
              type: { type: string, enum: [text, resource_link, resource] }
              text: { type: string }
              uri: { type: string }
              name: { type: string }
              mimeType: { type: string }
    SendPromptStopReason:
      type: string
      enum: [end_turn, max_tokens, max_turn_requests, refusal]
      description: |
        ACP `stopReason` from `session/prompt`. Supervisor success responses
        exclude `cancelled`: if an adapter returns `cancelled` for a direct
        prompt, the supervisor treats it as `ACP_PROTOCOL`; user-initiated
        graceful stop/checkpoint uses the DELETE/checkpoint paths instead.
        The web tier may still expose a client-side `cancelled` state for
        transport cancellation outside this supervisor response.
    SendPromptResponse:
      type: object
      required: [stopReason]
      properties:
        stopReason: { $ref: "#/components/schemas/SendPromptStopReason" }
        meta:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            ACP `_meta` passthrough (opaque object provided by the
            adapter; shape is provider-specific). May be `null` or
            omitted when the adapter sent no `_meta`.
    SessionStatus:
      type: string
      enum: [live, exited, crashed]
    SessionRecord:
      type: object
      required: [sessionId, runId, projectSlug, stepId, status, pid, startedAt, logPath, monotonicId]
      properties:
        sessionId: { type: string, format: uuid }
        runId: { type: string }
        projectSlug: { type: string }
        stepId: { type: string }
        status: { $ref: "#/components/schemas/SessionStatus" }
        pid: { type: integer, minimum: 1 }
        startedAt: { type: string, format: date-time }
        exitedAt: { type: string, format: date-time, nullable: true }
        exitCode: { type: integer, nullable: true }
        signal: { type: string, nullable: true, example: "SIGTERM" }
        logPath: { type: string, description: Absolute path to the step .log file. }
        monotonicId: { type: integer, minimum: 0, description: Highest event id emitted so far for this session. }
        acpSessionId:
          type: string
          minLength: 1
          maxLength: 128
          description: |
            ACP session id once `session/new` has been observed (or
            echoed from `resumeSessionId`). Absent during the brief
            window between spawn and ACP handshake.
    SupervisorErrorCode:
      type: string
      enum:
        - PRECONDITION
        - SPAWN
        - EXECUTOR_UNAVAILABLE
        - ACP_PROTOCOL
        - CHECKPOINT
        - CRASH
        - HITL_TIMEOUT
        - NEEDS_INPUT
      description: |
        Subset of the web-tier `MaisterErrorCode`. The web client translates
        this body into `MaisterError({ code })` at the boundary.

        `HITL_TIMEOUT` (M7+) is raised when a pending permission deferred
        ages past `MAISTER_KEEPALIVE_MINUTES`. `NEEDS_INPUT` (M7+) is
        returned by `POST /sessions/{id}/input` when no matching pending
        permission exists for the given `(sessionId, requestId)`.
    SupervisorErrorBody:
      type: object
      required: [code, message]
      properties:
        code: { $ref: "#/components/schemas/SupervisorErrorCode" }
        message: { type: string }
    CheckpointResponse:
      type: object
      description: |
        M8 graceful-checkpoint response. Always includes the boolean
        `alreadyCheckpointed` so callers can branch without inspecting
        any status code beyond 200. The `monotonicId` is the most
        recent event sequence number emitted on this session — useful
        for SSE `lastEventId` reconnects after the checkpoint.
      required: [alreadyCheckpointed, sessionId, monotonicId]
      properties:
        alreadyCheckpointed:
          type: boolean
          description: |
            `true` if the session was already in `exited` or `crashed`
            when the checkpoint was requested (idempotent retry).
            `false` for a fresh graceful exit.
        sessionId: { type: string }
        monotonicId: { type: integer, minimum: 0 }
    InputBody:
      type: object
      required: [kind, action, requestId]
      description: |
        Permission-only HITL response body for `POST /sessions/{id}/input`.
        Discriminated on `action`:

        - `select`: `optionId` is REQUIRED; the supervisor resolves the
          live deferred with ACP `{outcome: "selected", optionId}`.
        - `cancel`: `optionId` is forbidden; `reason` is optional and
          logged. The supervisor resolves the deferred with ACP
          `{outcome: "cancelled"}`.

        There is no `kind: "form"` branch — durable form / human responses
        are written by the web tier directly via `atomicWriteJson` and
        never traverse this endpoint.
      properties:
        kind:
          type: string
          enum: [permission]
        action:
          type: string
          enum: [select, cancel]
        requestId:
          type: string
          format: uuid
          description: |
            v4 UUID minted by the supervisor at `requestPermission` time
            and surfaced via the `session.permission_request` SSE event.
        optionId:
          type: string
          minLength: 1
          description: |
            Required iff `action == "select"`. MUST be one of the
            `options[].optionId` values the supervisor emitted on the
            matching `session.permission_request` event.
        reason:
          type: string
          minLength: 1
          maxLength: 256
          description: |
            Optional, only meaningful for `action == "cancel"`. Logged by
            the supervisor for operator triage; not forwarded to the
            agent. Truncated to 256 chars upstream.
    ModelSourceKind:
      type: string
      enum: [acp_probe, provider_api, curated, ccr, agent_observed]
      description: |
        Origin of a discovered model id. `acp_probe` = active adapter probe
        (primary); `provider_api` = provider listing endpoint; `curated` =
        static GLM list for z.ai (`anthropic_compatible`); `ccr` = CCR
        `/api/config`; `agent_observed` = passive harvest from a real session.
    ModelCatalogResolveRequest:
      type: object
      additionalProperties: false
      required: [adapter, provider]
      description: |
        Runner draft to resolve. `provider` reuses the `RunnerProvider` union;
        its env-ref fields (`authTokenEnv` / `apiKeyEnv`) are **bare** names
        (`^[A-Za-z_][A-Za-z0-9_]*$`) — an `env:`-prefixed or raw-secret value is
        rejected with `409 PRECONDITION`. Gemini/OpenCode/MiMo drafts return typed
        skipped/error model source statuses until their adapter-specific smoke
        proves a live source.
      properties:
        adapter: { $ref: "#/components/schemas/ExecutorAgent" }
        provider: { $ref: "#/components/schemas/RunnerProvider" }
        router: { $ref: "#/components/schemas/ExecutorRouter" }
        sidecarId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: '^[A-Za-z0-9._-]+$'
          description: Required when `router == "ccr"`; selects the CCR sidecar instance.
        force:
          type: boolean
          default: false
          description: Bypass the in-memory cache and repopulate it.
    ModelEntry:
      type: object
      required: [id, origins]
      additionalProperties: false
      properties:
        id:
          type: string
          minLength: 1
          description: Model id as the adapter/provider expects it (e.g. `glm-5.1`, `claude-sonnet-4-6`).
        displayName:
          type: string
          description: Optional human label when the source provides one.
        origins:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/ModelSourceKind" }
          description: |
            Every source that advertised this id. Dedupe is by `id`
            (first-source-wins on the entry body); `origins` accumulates.
    ModelSourceStatus:
      type: object
      required: [kind, status]
      additionalProperties: false
      properties:
        kind: { $ref: "#/components/schemas/ModelSourceKind" }
        status:
          type: string
          enum: [ok, skipped, error]
          description: |
            `ok` = contributed models; `skipped` = not applicable / no
            non-interactive auth (e.g. codex probe); `error` = the source failed
            (missing env-ref, unreachable, malformed response). Never fails the
            resolve.
        reason:
          type: string
          description: Human-readable detail for `skipped`/`error`. Never contains a secret.
        count:
          type: integer
          minimum: 0
          description: Number of models this source contributed before dedupe.
    ModelCatalogResolveResponse:
      type: object
      required: [models, sources, resolvedAt, ttlSeconds]
      additionalProperties: false
      properties:
        models:
          type: array
          items: { $ref: "#/components/schemas/ModelEntry" }
        sources:
          type: array
          items: { $ref: "#/components/schemas/ModelSourceStatus" }
          description: Per-source status, one entry per source that `supports()` the draft.
        resolvedAt:
          type: string
          format: date-time
          description: When this catalog was resolved (cache-set time on a miss).
        ttlSeconds:
          type: integer
          minimum: 0
          description: Cache validity window for this draft key.
