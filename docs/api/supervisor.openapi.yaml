openapi: 3.0.3
info:
  title: MAIster Supervisor HTTP API
  version: "0.7.0"
  description: |
    HTTP + SSE surface exposed by `supervisor/` (the Node daemon that owns ACP
    sessions and spawns adapter binaries `claude-agent-acp` / `codex-acp`).
    Consumed by the Next.js web tier through `web/lib/supervisor-client.ts`.

    **Implemented contract.** The lifecycle
    (`POST` / `DELETE` `/sessions`, `GET /sessions`,
    `GET /sessions/:id/stream`), ACP prompt boundary
    (`POST /sessions/:id/prompt`), permission-only HITL input
    (`POST /sessions/:id/input`), and checkpoint endpoint
    (`POST /sessions/:id/checkpoint`) are implemented end-to-end.

    The SSE stream emitted by `GET /sessions/:id/stream` is described separately
    in `api/async/supervisor-sse.asyncapi.yaml`; as of M7 the stream
    carries `session.update`, `session.permission_request`, `session.line`,
    `session.exited`, and `session.crashed` events.

    See [`../architecture.md`](../architecture.md), [`../supervisor.md`](../supervisor.md),
    and [`../decisions.md#adr-002-supervisor-runs-as-a-separate-node-daemon`](../decisions.md).
  contact:
    name: MAIster maintainers
    url: https://github.com/your-org/mAIster
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: http://localhost:{port}
    description: |
      Local supervisor on the operator's workstation. POC ships single-host
      docker compose; production deployments substitute their own host.
    variables:
      port:
        default: "7777"
security: []
tags:
  - name: health
    description: Supervisor readiness.
  - name: sessions
    description: ACP session lifecycle.
  - name: prompt
    description: ACP prompt boundary for Flow and scratch agent turns.
  - name: stream
    description: Per-session event stream (SSE).
  - name: hitl
    description: Permission-only human-in-the-loop input delivery.
paths:
  /health:
    get:
      tags: [health]
      summary: Report supervisor readiness
      description: |
        Lightweight readiness probe for the supervisor daemon itself.
        A `200` response means the daemon is reachable and can accept
        session work. The body intentionally excludes project ids, run ids,
        executor secrets, env vars, and filesystem paths.
      operationId: getSupervisorHealth
      responses:
        "200":
          description: Supervisor is ready to accept session work.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorHealthResponse" }
  /sessions:
    post:
      tags: [sessions]
      summary: Start a new agent session
      description: |
        Spawns the adapter binary determined by `executor.agent`
        (`claude-agent-acp` for `claude`, `codex-acp` for `codex`), with
        `cwd = worktreePath`. Returns after the adapter process starts and the
        ACP handshake returns an `acpSessionId`; everything after that is
        observable via the SSE stream.

        Capability launch fields are server-derived by the web tier:
        `capabilityProfilePath` points at the run-scoped profile snapshot
        materialized in the worktree/runtime area, and `adapterLaunch` carries
        only validated env/arg additions for the selected adapter. The
        supervisor does not resolve project policy or trust; it validates and
        passes these fields to the spawned child.
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StartSessionRequest" }
      responses:
        "201":
          description: Spawn succeeded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StartSessionResponse" }
        "409":
          description: Zod validation rejected the request body.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                missingField:
                  value: { code: "PRECONDITION", message: "executor: Required" }
        "500":
          description: Spawn failed (binary missing, EACCES, OOM at fork).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                enoent:
                  value: { code: "SPAWN", message: "spawn claude-agent-acp failed: ENOENT" }
        "503":
          description: Reserved for executor pool exhaustion (M6).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
    get:
      tags: [sessions]
      summary: List all currently registered sessions
      description: |
        Returns the in-memory `SessionRecord[]` for every session the
        supervisor knows about (live, exited, crashed — kept for the
        post-terminal grace window before GC).
      operationId: listSessions
      responses:
        "200":
          description: Current registry contents.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SessionRecord" }
        default:
          description: Unhandled supervisor error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
  /sessions/{id}/prompt:
    post:
      tags: [prompt]
      summary: Send an ACP prompt to a live session
      description: |
        Drives the M5 Flow DSL `agent` step. The supervisor forwards the
        prompt onto the per-session `ClientSideConnection` (built on
        `@agentclientprotocol/sdk@0.22.1`) and blocks until the adapter
        returns a `stopReason`. Concurrent `agent` steps in
        `slash-in-existing` mode reuse one session across multiple prompt
        calls; `new-session` steps create a fresh session per prompt.

        Permission requests raised by the adapter mid-turn surface as
        `session.permission_request` SSE events (M7+). The supervisor
        parks the ACP deferred until the web tier resolves it via
        `POST /sessions/{id}/input`; the prompt promise stays in flight
        for the duration of the HITL turn.
      operationId: sendSessionPrompt
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendPromptRequest" }
      responses:
        "200":
          description: |
            Prompt completed. The adapter's `stopReason` indicates whether
            the turn ended cleanly, hit a token cap, exceeded max turn
            requests, or was refused.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SendPromptResponse" }
        "404":
          description: No session with that id.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                unknown:
                  value: { code: "PRECONDITION", message: "unknown session" }
        "409":
          description: |
            Session exists but cannot accept a prompt — either it is no
            longer `live` (already `exited`/`crashed`) or no ACP
            connection has been attached (initialization race).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                notLive:
                  value: { code: "PRECONDITION", message: "session not live" }
                noConnection:
                  value:
                    code: "PRECONDITION"
                    message: "session has no ACP connection"
                zodReject:
                  value:
                    code: "PRECONDITION"
                    message: "stepId: Required"
        "500":
          description: |
            Adapter returned a malformed or non-conforming ACP frame, or
            the ACP transport itself faulted mid-turn.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                acpProtocol:
                  value: { code: "ACP_PROTOCOL", message: "prompt failed: ..." }
  /sessions/{id}:
    delete:
      tags: [sessions]
      summary: Stop a running session
      description: |
        Marks the session as an intentional shutdown then sends `SIGTERM`.
        After `MAISTER_KILL_GRACE_MS` (default 5000 ms) without exit, escalates
        to `SIGKILL`. The terminal event arrives on the SSE stream as
        `session.exited` (because the shutdown was intentional), not
        `session.crashed`, even on non-zero exit code.
      operationId: deleteSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "204":
          description: Termination initiated. SSE will deliver the terminal event.
        "404":
          description: No session with that id.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                unknown:
                  value: { code: "PRECONDITION", message: "unknown session" }
  /sessions/{id}/stream:
    get:
      tags: [stream]
      summary: SSE event stream for a session
      description: |
        Server-Sent Events. Each child stdout line yields one `session.line`
        event; the lifecycle terminates with either `session.exited` or
        `session.crashed`. The stream closes automatically after the
        terminal event.

        Supports `Last-Event-ID` for reconnect replay from a per-session
        in-memory ring buffer (1000 entries). Older events that have
        already been GC'd are not replayable from this endpoint — the
        web tier's eventual log-file tail bridge (M7+M9) fills that gap.

        Full event schemas live in `api/async/supervisor-sse.asyncapi.yaml`.
      operationId: streamSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
        - name: Last-Event-ID
          in: header
          required: false
          description: Highest `monotonicId` already received by the client.
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: |
            text/event-stream. Each event has `id`, `event`, and `data` fields.
            See AsyncAPI for the payload union.
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  id: 1
                  event: session.line
                  data: {"type":"session.line","sessionId":"<uuid>","monotonicId":1,"line":"<JSONL>"}

                  id: 2
                  event: session.exited
                  data: {"type":"session.exited","sessionId":"<uuid>","monotonicId":2,"exitCode":0}
        "404":
          description: No session with that id.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
  /sessions/{id}/checkpoint:
    post:
      tags: [sessions]
      summary: (M8) Graceful checkpoint of the session
      description: |
        Cancels every open `pendingPermissions` deferred for the session
        with reason `"checkpoint"`, SIGTERMs the child within
        `MAISTER_KILL_GRACE_MS`, and on graceful exit emits
        `session.exited { reason: "checkpoint" }` on the SSE stream.
        Idempotent: an already-exited session returns 200 with
        `alreadyCheckpointed: true` and the most recent `monotonicId`.
        On SIGKILL escalation returns 500 `EXECUTOR_UNAVAILABLE` — the
        web sweeper treats this as retryable.
      operationId: checkpointSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              description: Strictly empty. Unknown keys → 409.
      responses:
        "200":
          description: Graceful checkpoint completed (or idempotent ack).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckpointResponse" }
        "404":
          description: No session with that id.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
        "409":
          description: Body validation failed (unknown keys).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
        "500":
          description: SIGTERM grace expired; SIGKILL was issued. Sweeper retries.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
  /sessions/{id}/input:
    post:
      tags: [hitl]
      summary: Deliver an HITL permission decision to a live session (M7)
      description: |
        Permission-only HITL surface. The body is a discriminated union on
        `action`. The supervisor never writes filesystem artifacts on this
        path — durable form/human responses are written directly by the
        web tier; this endpoint only resolves or cancels the live ACP
        `requestPermission` deferred held by the pending-permission
        registry.

        - `action: "select"` resolves the deferred with ACP
          `{outcome: "selected", optionId}`.
        - `action: "cancel"` resolves the deferred with ACP
          `{outcome: "cancelled"}` and records `reason` in supervisor
          logs.
      operationId: deliverInput
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InputBody" }
            examples:
              select:
                summary: Approve a pending permission
                value:
                  kind: "permission"
                  action: "select"
                  requestId: "8a4a7b9d-0d6b-4b27-a09c-0a3f4f1e1d8e"
                  optionId: "allow"
              cancel:
                summary: Cancel a pending permission
                value:
                  kind: "permission"
                  action: "cancel"
                  requestId: "8a4a7b9d-0d6b-4b27-a09c-0a3f4f1e1d8e"
                  reason: "DB_PERSIST_FAILED"
      responses:
        "200":
          description: Deferred resolved (or cancelled).
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, enum: [true] }
        "404":
          description: |
            No session with that id, OR no pending permission with that
            `requestId` (deferred already evicted or timed out).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                missing:
                  value:
                    code: "NEEDS_INPUT"
                    message: "no pending permission with that requestId"
        "409":
          description: Body validation failure (`PRECONDITION`).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SupervisorErrorBody" }
              examples:
                refine:
                  value:
                    code: "PRECONDITION"
                    message: "optionId: optionId is required when action='select'"
components:
  parameters:
    SessionId:
      name: id
      in: path
      required: true
      description: |
        Supervisor-assigned session id (UUID v4 generated at spawn time),
        returned as `sessionId` in `StartSessionResponse`. This is the
        path key for every `/sessions/{id}/...` endpoint.

        **Not** the ACP `acpSessionId` — that field is the adapter's
        resume handle (used in `resumeSessionId` on `POST /sessions`
        and in `StartSessionResponse.acpSessionId` /
        `SessionRecord.acpSessionId`). Calling
        `POST /sessions/{acpSessionId}/prompt` with that handle will
        return 404 even when the underlying ACP session is live.
      schema:
        type: string
        format: uuid
        minLength: 1
        maxLength: 128
  schemas:
    SupervisorHealthResponse:
      type: object
      required: [status, version, uptimeMs, sessions, checkedAt]
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [ready]
        version:
          type: string
          minLength: 1
          description: Supervisor package version.
        uptimeMs:
          type: integer
          minimum: 0
          description: Milliseconds since this supervisor process started.
        sessions:
          $ref: "#/components/schemas/SupervisorSessionCounts"
        checkedAt:
          type: string
          format: date-time
    SupervisorSessionCounts:
      type: object
      required: [live, exited, crashed]
      additionalProperties: false
      properties:
        live:
          type: integer
          minimum: 0
        exited:
          type: integer
          minimum: 0
        crashed:
          type: integer
          minimum: 0
    ExecutorAgent:
      type: string
      enum: [claude, codex]
      description: Identity dispatch — picks the adapter binary.
    ExecutorRouter:
      type: string
      enum: [ccr]
      description: Optional in-session multi-provider router. See ADR-005.
    Executor:
      type: object
      required: [agent, model]
      properties:
        agent: { $ref: "#/components/schemas/ExecutorAgent" }
        model:
          type: string
          minLength: 1
          description: |
            Free-form. The adapter validates against its own provider.
            Examples: `claude-sonnet-4-6`, `gpt-5-codex`, `glm-4.6`.
          example: "claude-sonnet-4-6"
        env:
          type: object
          additionalProperties: { type: string }
          description: |
            Env vars overlaid on the supervisor's process env when spawning
            the child. Per-executor env wins over the supervisor's env. Used
            for env-router routing (e.g. `ANTHROPIC_BASE_URL`,
            `ANTHROPIC_AUTH_TOKEN`).
        router: { $ref: "#/components/schemas/ExecutorRouter" }
    StartSessionRequest:
      type: object
      required: [runId, projectSlug, worktreePath, stepId, executor]
      properties:
        runId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: '^[A-Za-z0-9._-]+$'
          description: |
            Application-generated run id. Doubles as a path segment under
            `.maister/<slug>/runs/<runId>/`. Constrained to safe filesystem
            characters.
        projectSlug:
          type: string
          minLength: 1
          maxLength: 64
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
          description: Kebab-case slug. Path segment under `.maister/<slug>/`.
        worktreePath:
          type: string
          minLength: 1
          maxLength: 4096
          description: |
            Absolute filesystem path. Becomes `cwd` for the spawned child.
            MUST start with `/` and MUST NOT contain `..` segments.
        stepId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: '^[A-Za-z0-9._-]+$'
          description: |
            Flow step id. Step log lands at `<runId>/<stepId>.log`. Constrained
            to safe filesystem characters.
        executor: { $ref: "#/components/schemas/Executor" }
        capabilityProfilePath:
          type: string
          minLength: 1
          maxLength: 4096
          description: |
            Absolute filesystem path to the web-materialized, run-scoped
            capability profile. Must start with `/` and must not contain `..`
            segments. The supervisor passes it only through validated
            `adapterLaunch` env/args; it does not inspect policy.
        adapterLaunch:
          $ref: "#/components/schemas/AdapterLaunch"
        resumeSessionId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: '^[A-Za-z0-9._-]+$'
          description: |
            Optional. When set, the supervisor adds `--resume <id>` to the
            adapter's argv. M5 wires it through verbatim; M8 uses it as
            the checkpoint-resume handle.
    AdapterLaunch:
      type: object
      additionalProperties: false
      description: |
        Constrained launch additions produced by the web capability
        materializer. It cannot override the adapter binary, `cwd`, run id,
        project slug, worktree path, session id, or ACP session id.
      properties:
        env:
          type: object
          maxProperties: 64
          additionalProperties:
            type: string
            maxLength: 4096
          description: |
            Extra environment variables for the spawned adapter. Values are
            never logged. Applied after `executor.env` so run-scoped materialized
            paths can win on collision.
        preArgs:
          type: array
          maxItems: 32
          items:
            type: string
            minLength: 1
            maxLength: 1024
          description: Adapter arguments inserted before supervisor-managed args.
        postArgs:
          type: array
          maxItems: 32
          items:
            type: string
            minLength: 1
            maxLength: 1024
          description: Adapter arguments appended after supervisor-managed args.
    StartSessionResponse:
      type: object
      required: [sessionId, pid, acpSessionId]
      properties:
        sessionId:
          type: string
          format: uuid
          description: Supervisor-assigned session id (path key for subsequent calls).
        pid:
          type: integer
          minimum: 1
          description: OS pid of the spawned adapter.
        acpSessionId:
          type: string
          minLength: 1
          maxLength: 128
          description: |
            ACP session id surfaced by `session/new` (or echoed back from
            `resumeSessionId` on resume). Doubles as the `--resume` handle
            for the M8 checkpoint/resume path. Cached at
            `runs.acp_session_id` by the web tier.
    SendPromptRequest:
      type: object
      required: [stepId, prompt]
      properties:
        stepId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: '^[A-Za-z0-9._-]+$'
          description: |
            Flow step id this prompt belongs to. Echoed in supervisor
            logs and used to attribute `session.update` events back to a
            step in the web tier.
        prompt:
          type: string
          maxLength: 1000000
          description: |
            Rendered Mustache prompt for the step. Sent verbatim as the
            ACP `prompt` parameter; the supervisor does not re-template.
    SendPromptStopReason:
      type: string
      enum: [end_turn, max_tokens, max_turn_requests, refusal]
      description: |
        ACP `stopReason` from `session/prompt`. The web tier additionally
        maps transport-cancelled requests to `cancelled` client-side; the
        supervisor itself only ever returns one of the four ACP values.
    SendPromptResponse:
      type: object
      required: [stopReason]
      properties:
        stopReason: { $ref: "#/components/schemas/SendPromptStopReason" }
        meta:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            ACP `_meta` passthrough (opaque object provided by the
            adapter; shape is provider-specific). May be `null` or
            omitted when the adapter sent no `_meta`.
    SessionStatus:
      type: string
      enum: [live, exited, crashed]
    SessionRecord:
      type: object
      required: [sessionId, runId, projectSlug, stepId, status, pid, startedAt, logPath, monotonicId]
      properties:
        sessionId: { type: string, format: uuid }
        runId: { type: string }
        projectSlug: { type: string }
        stepId: { type: string }
        status: { $ref: "#/components/schemas/SessionStatus" }
        pid: { type: integer, minimum: 1 }
        startedAt: { type: string, format: date-time }
        exitedAt: { type: string, format: date-time, nullable: true }
        exitCode: { type: integer, nullable: true }
        signal: { type: string, nullable: true, example: "SIGTERM" }
        logPath: { type: string, description: Absolute path to the step .log file. }
        monotonicId: { type: integer, minimum: 0, description: Highest event id emitted so far for this session. }
        acpSessionId:
          type: string
          minLength: 1
          maxLength: 128
          description: |
            ACP session id once `session/new` has been observed (or
            echoed from `resumeSessionId`). Absent during the brief
            window between spawn and ACP handshake.
    SupervisorErrorCode:
      type: string
      enum:
        - PRECONDITION
        - SPAWN
        - EXECUTOR_UNAVAILABLE
        - ACP_PROTOCOL
        - CHECKPOINT
        - CRASH
        - HITL_TIMEOUT
        - NEEDS_INPUT
      description: |
        Subset of the web-tier `MaisterErrorCode`. The web client translates
        this body into `MaisterError({ code })` at the boundary.

        `HITL_TIMEOUT` (M7+) is raised when a pending permission deferred
        ages past `MAISTER_KEEPALIVE_MINUTES`. `NEEDS_INPUT` (M7+) is
        returned by `POST /sessions/{id}/input` when no matching pending
        permission exists for the given `(sessionId, requestId)`.
    SupervisorErrorBody:
      type: object
      required: [code, message]
      properties:
        code: { $ref: "#/components/schemas/SupervisorErrorCode" }
        message: { type: string }
    CheckpointResponse:
      type: object
      description: |
        M8 graceful-checkpoint response. Always includes the boolean
        `alreadyCheckpointed` so callers can branch without inspecting
        any status code beyond 200. The `monotonicId` is the most
        recent event sequence number emitted on this session — useful
        for SSE `lastEventId` reconnects after the checkpoint.
      required: [alreadyCheckpointed, sessionId, monotonicId]
      properties:
        alreadyCheckpointed:
          type: boolean
          description: |
            `true` if the session was already in `exited` or `crashed`
            when the checkpoint was requested (idempotent retry).
            `false` for a fresh graceful exit.
        sessionId: { type: string }
        monotonicId: { type: integer, minimum: 0 }
    InputBody:
      type: object
      required: [kind, action, requestId]
      description: |
        Permission-only HITL response body for `POST /sessions/{id}/input`.
        Discriminated on `action`:

        - `select`: `optionId` is REQUIRED; the supervisor resolves the
          live deferred with ACP `{outcome: "selected", optionId}`.
        - `cancel`: `optionId` is forbidden; `reason` is optional and
          logged. The supervisor resolves the deferred with ACP
          `{outcome: "cancelled"}`.

        There is no `kind: "form"` branch — durable form / human responses
        are written by the web tier directly via `atomicWriteJson` and
        never traverse this endpoint.
      properties:
        kind:
          type: string
          enum: [permission]
        action:
          type: string
          enum: [select, cancel]
        requestId:
          type: string
          format: uuid
          description: |
            v4 UUID minted by the supervisor at `requestPermission` time
            and surfaced via the `session.permission_request` SSE event.
        optionId:
          type: string
          minLength: 1
          description: |
            Required iff `action == "select"`. MUST be one of the
            `options[].optionId` values the supervisor emitted on the
            matching `session.permission_request` event.
        reason:
          type: string
          minLength: 1
          maxLength: 256
          description: |
            Optional, only meaningful for `action == "cancel"`. Logged by
            the supervisor for operator triage; not forwarded to the
            agent. Truncated to 256 chars upstream.
